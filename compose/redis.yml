# docker-compose for DCC Redis
# Location on server: /opt/dcc/compose/redis.yml
#
# Redis acts as the message bus between blockchain-postgres-sync (publisher)
# and websocket-api (subscriber). BPS publishes state changes via PUBLISH;
# websocket-api subscribes with PSUBSCRIBE topic://* and fans updates to clients.
#
# Deploy:
#   NETWORK=testnet docker compose -f /opt/dcc/compose/redis.yml up -d
#
# Listening only on 127.0.0.1 — not accessible from the internet.
# REDIS_PASSWORD must be exported before running docker compose.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # One-shot: ensure the data volume is owned by the redis image's uid/gid
  # (999:999) before the main service starts as that user. Needed because
  # `redis` below runs with user: "999:999" from the start — there is no
  # root-then-gosu step left to fix ownership on a fresh named volume.
  redis-init:
    image: redis:8.8-alpine@sha256:9d317178eceac8454a2284a9e6df2466b93c745529947f0cd42a0fa9609d7005
    container_name: "redis-init-${NETWORK:-mainnet}"
    entrypoint: ["sh", "-c", "chown -R 999:999 /data"]
    volumes:
      - redis-data:/data
    restart: "no"

  redis:
    depends_on:
      redis-init:
        condition: service_completed_successfully
    # Redis version is infra — not driven by app CI. Pin to minor for stability;
    # patch upgrades are handled by Renovate in this repo.
    #
    # Licensing note (verified 2026-07-03): Redis Inc. moved Redis 7.4+/8.x to a
    # tri-license (RSALv2 / SSPLv1 / AGPLv3) in 2025, then in May 2025 committed
    # to AGPLv3 as a durable open-source option going forward — AGPLv3 is
    # OSI-approved. We only run Redis as internal infra (message bus between
    # BPS and websocket-api, never exposed to the internet, never resold or
    # offered as a hosted/managed service to third parties), so none of the
    # RSALv2/SSPLv1 restrictions (no commercializing, no offering as a managed
    # service) apply to us regardless of which license option upstream ships
    # under. No practical impact for this deployment.
    image: redis:8.8-alpine@sha256:9d317178eceac8454a2284a9e6df2466b93c745529947f0cd42a0fa9609d7005
    container_name: "redis-${NETWORK:-mainnet}"
    restart: unless-stopped
    # Bind to loopback only — never expose Redis to the public internet.
    network_mode: host
    # Array form: each argument is passed directly to redis-server with no
    # shell interpretation. Docker Compose still expands ${VAR} in array elements.
    command:
      - redis-server
      - --bind
      - "127.0.0.1"
      - --port
      - "6379"
      - --requirepass
      - "${REDIS_PASSWORD}"
      - --appendonly
      - "yes"
      - --appendfilename
      - "appendonly-${NETWORK:-mainnet}.aof"
      - --maxmemory
      - "256mb"
      - --maxmemory-policy
      - "volatile-lru"
      - --loglevel
      - "notice"
    # REDISCLI_AUTH lets redis-cli authenticate without passing -a on the command line.
    # This keeps the password out of /proc/<pid>/cmdline on health-check runs.
    environment:
      REDISCLI_AUTH: "${REDIS_PASSWORD}"
    volumes:
      - redis-data:/data
    healthcheck:
      # CMD-SHELL runs inside the container where REDISCLI_AUTH is set,
      # so redis-cli authenticates automatically. grep PONG ensures a hard fail
      # if Redis returns NOAUTH instead of pong.
      test: ["CMD-SHELL", "redis-cli -h 127.0.0.1 ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

    # Run as the image's built-in redis user (uid/gid 999) from the start.
    # The official entrypoint's root->redis privilege drop (chown + gosu,
    # which needs CAP_CHOWN/CAP_SETUID/CAP_SETGID) never runs when the
    # container is already non-root, so cap_drop: ALL below is safe —
    # redis-init has already chowned the volume for this uid/gid.
    user: "999:999"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: false  # Redis writes AOF and RDB to /data

    deploy:
      resources:
        limits:
          memory: 320m   # 256mb maxmemory + 64m overhead for AOF rewrite buffer
        reservations:
          memory: 64m

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Prometheus metrics for Redis — scraped by compose/prometheus.yml at
  # redis-exporter:9121. Bound to loopback only, same perimeter as redis itself.
  redis-exporter:
    image: oliver006/redis_exporter:v1.86.0-alpine@sha256:755a0b4cbcc86c4843b167c830674e52b63f9467c934b8ccb811b4f506e197f0
    container_name: "redis-exporter-${NETWORK:-mainnet}"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    network_mode: host
    environment:
      REDIS_ADDR: "redis://127.0.0.1:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      REDIS_EXPORTER_WEB_LISTEN_ADDRESS: "127.0.0.1:9121"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9121/metrics | grep -q redis_up || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 64m
        reservations:
          memory: 16m
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  redis-data:
    name: "redis-data-${NETWORK:-mainnet}"
