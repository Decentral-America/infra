# docker-compose for Prometheus — Newark backend node
# Scrapes the DCC chain metrics exporter (which calls DCC REST API over HTTPS).
# Location on server: /opt/dcc/compose/prometheus.yml
#
# Start: NETWORK=testnet docker compose -f /opt/dcc/compose/prometheus.yml up -d
services:
  prometheus:
    # prom/prometheus:v3.13.0 — LTS release, security upgrade from v3.12.0
    # Patches: CVE-2026-44990 (sanitize-html XSS in UI), CVE-2025-4673 and
    # CVE-2023-45289 (credentials forwarded on cross-host redirect) via
    # prometheus/common v0.69.0 bump. No breaking changes affect this
    # deployment (SHA-256 pagination tokens and PromQL min()/max() rename
    # are internal/behind experimental flags not used here).
    image: prom/prometheus:v3.13.0@sha256:c6b27ea434f8389bfe233fbc7be381cf50587c286e871bc842008f5a1b1908a7
    container_name: "prometheus-${NETWORK:-testnet}"
    network_mode: host
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    volumes:
      - /opt/dcc/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /opt/dcc/monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.listen-address=127.0.0.1:9091'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9091/-/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  exporter:
    image: python:3.13-slim@sha256:eb43ff125d8d58d7449dcba7d336c23bcac412f526d861db493b9994d8010280
    container_name: "exporter-${NETWORK:-testnet}"
    network_mode: host
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=8m
    volumes:
      - /opt/dcc/monitoring/exporter.py:/app/exporter.py:ro
    command: ["python3", "/app/exporter.py"]
    environment:
      EXPORTER_PORT: "9101"
      # Node URLs — public HTTPS endpoints, no outbound firewall changes needed
      NODE_URLS: "main-node=https://testnet-node.decentralchain.io"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9101/metrics | head -1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64m
        reservations:
          memory: 16m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  alertmanager:
    # Bumped 0.27.0 -> 0.33.0 (2026-07-04): 0.27.0 was ~2 years / 6 minors
    # stale. alertmanager.yml already uses the modern `matchers:` list syntax
    # (not the deprecated match:/match_re: maps), so it's already compatible
    # with 0.33's UTF-8-by-default matcher parser — verified before bumping.
    image: prom/alertmanager:v0.33.0@sha256:af26fbe4dd1886ac0efd7bd55cd9027da262e105b137a376522b7c14c3626e4a
    container_name: "alertmanager-${NETWORK:-testnet}"
    network_mode: host
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - /opt/dcc/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--web.listen-address=127.0.0.1:9093'
      - '--storage.path=/alertmanager'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9093/-/ready || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 64m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  alert-webhook:
    image: python:3.13-slim@sha256:eb43ff125d8d58d7449dcba7d336c23bcac412f526d861db493b9994d8010280
    container_name: "alert-webhook-${NETWORK:-testnet}"
    network_mode: host
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=8m
    volumes:
      - /opt/dcc/monitoring/alert-webhook.py:/app/alert-webhook.py:ro
    command: ["python3", "/app/alert-webhook.py"]
    environment:
      GITHUB_REPO: "Decentral-America/infra"
      ALERT_WEBHOOK_PORT: "9099"
      # GITHUB_TOKEN injected via env_file (SOPS-managed)
    env_file:
      - /opt/dcc/secrets/${NETWORK:-mainnet}.env
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9099/healthz 2>/dev/null || exit 0"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  prometheus-data:
    name: "prometheus-data-${NETWORK:-testnet}"
