# ── DecentralChain DEX Matcher ─────────────────────────────────────────────────
#
# Prerequisites (set by bootstrap.sh and deploy-container.yml):
#   IMAGE_TAG — full image reference, e.g. ghcr.io/decentral-america/matcher:abc123
#   NETWORK   — mainnet | testnet | stagenet
#
# Dependency:
#   Requires a running node-scala (with DEX extension on :6887 and BlockchainUpdates
#   extension on :6881) on the same host.
#
# Volumes:
#   /opt/dcc/data/matcher-<NETWORK>        — persistent matcher DB + account.dat
#   /opt/dcc/config/matcher-<NETWORK>      — local.conf with network-specific overrides
#                                            (generated by bootstrap.sh; see terraform/)
#
# Port:
#   6886 — REST API (internal; expose via reverse proxy only)
# ──────────────────────────────────────────────────────────────────────────────

services:
  matcher:
    image: "${IMAGE_TAG:?IMAGE_TAG is required}"
    container_name: "matcher-${NETWORK:-mainnet}"
    restart: unless-stopped

    # Secrets are written by bootstrap.sh; never baked into the image.
    env_file:
      - /opt/dcc/secrets/${NETWORK:-mainnet}.env

    # Constants only — never duplicate env_file keys here.
    environment:
      # 1g is sufficient for testnet. Scale to 2g for stagenet/mainnet.
      MATCHER_HEAP_SIZE: "1g"
      # Data directory — must point at the bind-mounted path so the DB and
      # account.dat survive image upgrades.
      DCC_DEX_ROOT: "/var/lib/decentralchain-dex"

    # host network mode: matcher connects to node gRPC on localhost:6887 (DEX extension)
    # and localhost:6881 (BlockchainUpdates). Without host mode, 'localhost' inside the
    # container resolves to the container's own loopback → Connection refused.
    # Caddy (also host-network) still reaches the matcher on localhost:6886.
    # The ports: section is removed — incompatible with host networking.
    network_mode: host

    volumes:
      # Persistent matcher DB + account.dat
      - "/opt/dcc/data/matcher-${NETWORK:-mainnet}:/var/lib/decentralchain-dex"
      # Network-specific config override (generated by bootstrap.sh).
      - "/opt/dcc/config/matcher-${NETWORK:-mainnet}:/var/lib/decentralchain-dex/config:ro"
      # dcc-grpc patch: overrides the WKT-shadowing dcc-grpc-0.0.0-b3087f23.jar bundled
      # in the image. The patched JAR was rebuilt without PB.protoSources += externalIncludePath,
      # eliminating com/google/protobuf/JavaFeaturesProto.class that shadowed protobuf-java-4.35.0.
      # Remove once the matcher image is rebuilt from updated source.
      - "/opt/dcc/matcher-patch/${NETWORK:-mainnet}/dcc-grpc-clean.jar:/usr/share/decentralchain-dex/lib/io.decentralchain.dcc-grpc-0.0.0-b3087f23912f5e1f2996a4ee4052aa73be2ef1ed.jar:ro"
      - "/opt/dcc/matcher-patch/${NETWORK:-mainnet}/dex-pb-clean.jar:/usr/share/decentralchain-dex/lib/io.decentralchain.dex-pb-0.0.0-b3087f23912f5e1f2996a4ee4052aa73be2ef1ed.jar:ro"

    # docker compose up --wait blocks here until the healthcheck passes.
    # GET /matcher returns the matcher's Base58 public key when ready to accept orders.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6886/matcher"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5
    # ── Container security hardening ───────────────────────────────────────────
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # The matcher writes its LevelDB order book to the bind-mounted data volume;
    # root filesystem is read-only — only named/bind-mounted volumes are writable.
    read_only: true
    tmpfs:
      # exec required: RocksDB JNI extracts librocksdbjni*.so to /tmp and
      # loads it via dlopen(). Without exec the JNI load fails with
      # UnsatisfiedLinkError "failed to map segment from shared object".
      - /tmp:size=256m,mode=1777,exec
    deploy:
      resources:
        limits:
          # Scale to 4g for stagenet/mainnet.
          memory: 2g
        reservations:
          memory: 512m

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
