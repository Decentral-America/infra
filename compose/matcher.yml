# ── DecentralChain DEX Matcher ─────────────────────────────────────────────────
#
# Prerequisites (set by bootstrap.sh and deploy-container.yml):
#   IMAGE_TAG — full image reference, e.g. ghcr.io/decentral-america/matcher:abc123
#   NETWORK   — mainnet | testnet | stagenet
#
# Dependency:
#   Requires a running node-scala (with DEX extension on :6887 and BlockchainUpdates
#   extension on :6881) on the same host.  node-go does NOT implement these extension
#   gRPC interfaces; the matcher must target node-scala.
#
# Volumes:
#   /opt/dcc/data/matcher-<NETWORK>        — persistent matcher DB + account.dat
#   /opt/dcc/config/matcher-<NETWORK>      — local.conf with network-specific overrides
#                                            (generated by bootstrap.sh; see terraform/)
#
# Port:
#   6886 — REST API (internal; expose via reverse proxy only)
# ──────────────────────────────────────────────────────────────────────────────

services:
  matcher:
    image: "${IMAGE_TAG:?IMAGE_TAG is required}"
    container_name: "matcher-${NETWORK:-mainnet}"
    restart: unless-stopped

    # Secrets are written by bootstrap.sh; never baked into the image.
    env_file:
      - /opt/dcc/secrets/${NETWORK:-mainnet}.env

    # Constants only — never duplicate env_file keys here.
    environment:
      MATCHER_HEAP_SIZE: "2g"
      # WAVES_DEX_ROOT is read by the entrypoint to set -Dwaves.dex.root-directory.
      # It must point at the bind-mounted data directory so the DB and account.dat
      # survive image upgrades.
      WAVES_DEX_ROOT: "/var/lib/decentralchain-dex"

    ports:
      # REST API — localhost only; expose externally via nginx/Caddy
      - "127.0.0.1:6886:6886"

    volumes:
      # Persistent matcher DB + account.dat
      - "/opt/dcc/data/matcher-${NETWORK:-mainnet}:/var/lib/decentralchain-dex"
      # Network-specific config override (generated by bootstrap.sh).
      # Contains address-scheme-character, gRPC targets, and matcher account settings.
      - "/opt/dcc/config/matcher-${NETWORK:-mainnet}:/var/lib/decentralchain-dex/config:ro"

    # docker compose up --wait blocks here until the healthcheck passes.
    # GET /matcher returns the matcher's Base58 public key when ready to accept orders.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6886/matcher"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
