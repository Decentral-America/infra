# docker-compose for DCC Data Service
# Location on server: /opt/dcc/compose/data-service.yml
#
# Deploy via: docker compose -f data-service.yml up -d --remove-orphans data-service
# ─────────────────────────────────────────────────────────────────────────────

services:
  data-service:
    image: "${IMAGE_TAG:?IMAGE_TAG must be set — deploy via CI or set IMAGE_TAG=<image>:<sha> explicitly}"
    container_name: "data-service-${NETWORK:-mainnet}"
    restart: unless-stopped
    # host network mode: data-service connects to localhost:5432 (PostgreSQL).
    # Without this, Docker bridge mode makes 'localhost' resolve to the container's
    # own loopback — PostgreSQL is unreachable, causing ECONNREFUSED on all DB queries.
    # Caddy (also host-network) still reaches data-service on localhost:8080.
    # The ports: section is removed — incompatible with host networking.
    network_mode: host
    env_file:
      - /opt/dcc/secrets/${NETWORK:-mainnet}.env
    environment:
      NODE_ENV: production
      # PORT is a hardcoded infrastructure constant, safe to set here.
      # Container binds to 127.0.0.1:8080; Caddy proxies it with TLS on 443.
      PORT: "8080"
      # data-service defaults to PGSSLMODE=require. For on-server PostgreSQL
      # (127.0.0.1 loopback), SSL adds no security benefit and requires a
      # trusted cert. Disable it for all local deployments.
      PGSSLMODE: "disable"
    # DEFAULT_MATCHER, RATE_PAIR_ACCEPTANCE_VOLUME_THRESHOLD, RATE_THRESHOLD_ASSET_ID
    # come from env_file. Do NOT add them here — environment: overrides env_file,
    # so an unset shell var would silently clear the value.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # ── Container security hardening ───────────────────────────────────────────
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Read-only root filesystem. Hono/Node needs write access only for tmp.
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
