# docker-compose for DCC Caddy TLS reverse proxy
# Location on server: /opt/dcc/compose/caddy.yml
#
# Caddy handles automatic TLS termination (Let's Encrypt ACME) for:
#   - Scanner/block-explorer  (127.0.0.1:3000 → HTTPS)
#   - Data-service REST API   (127.0.0.1:8080 → HTTPS)
#
# The Caddyfile is written by bootstrap.sh using the SCANNER_DOMAIN and
# DATA_SERVICE_DOMAIN UDF variables. If neither is set, this service is
# a no-op (empty Caddyfile).
#
# Caddy is infrastructure, not an application — it is started once by
# bootstrap.sh and auto-restarts on reboot. It is NOT deployed via the
# deploy-container.yml pipeline.
#
# First-time start (run once after bootstrap):
#   NETWORK=mainnet docker compose -f /opt/dcc/compose/caddy.yml up -d
#
# Caddy 2.11.4 released 2026-06-03 — security fixes over 2.11.3:
#   - GHSA-qrp7-cvwr-j2c6 (High): Windows file_server path auth bypass
#   - GHSA-f59h-q822-g45g (High): FastCGI forward_auth header injection
#   - GHSA-vcc4-2c75-vc9v (Moderate): stripHTML template function bypass
# ─────────────────────────────────────────────────────────────────────────────

services:
  caddy:
    # Custom build: stock Caddy 2.11.4 + github.com/mholt/caddy-ratelimit
    # (docker/caddy-ratelimit/Dockerfile, built by build-caddy-ratelimit.yml —
    # run 28766968674, 2026-07-06). Required for update-caddy.yml's
    # `rate_limit` directives; the stock upstream image lacks that module.
    # Rebuild + re-pin whenever the Dockerfile changes (base image bump,
    # module SHA bump) — see build-caddy-ratelimit.yml's own header comment.
    image: ghcr.io/decentral-america/caddy-ratelimit@sha256:4d7fa373b5557b238b807c7e0317f53c92edd138a88df2fc48d9429ed5b25b1e
    container_name: "caddy-${NETWORK:-mainnet}"
    # host network mode: Caddy binds directly to the host's port 80 and 443.
    # This lets it forward to scanner (127.0.0.1:3000) and data-service
    # (127.0.0.1:8080) without Docker bridge networking overhead.
    network_mode: host
    restart: unless-stopped

    # ── Container security hardening ─────────────────────────────────────────
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      # Required to bind to privileged ports 80 and 443 as a non-root process.
      - NET_BIND_SERVICE

    # ── Persistent volumes ────────────────────────────────────────────────────
    # caddy-data: TLS certificates and ACME account state (survives restarts).
    # caddy-config: Caddy runtime config persistence (fast restarts).
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    volumes:
      - /opt/dcc/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
      - caddy-admin:/run/caddy

    # ── Health check ──────────────────────────────────────────────────────────
    # Check that Caddy is listening on port 80 (HTTP→HTTPS redirect) and 443 (TLS).
    # Reads /proc/net/tcp6 directly — no wget unix-socket tricks (busybox wget in
    # Alpine does not support http://unix:// URIs). Port 80=0x0050, 443=0x01BB.
    # Works because Caddy runs in host-network mode and shares the host's /proc.
    healthcheck:
      test: ["CMD-SHELL", "grep -qE ':0050 ' /proc/net/tcp6 && grep -qE ':01BB ' /proc/net/tcp6"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 64m

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  caddy-data:
    # Network-scoped volume name: caddy-data-mainnet / caddy-data-stagenet / etc.
    name: "caddy-data-${NETWORK:-mainnet}"
  caddy-config:
    name: "caddy-config-${NETWORK:-mainnet}"
  caddy-admin:
    name: "caddy-admin-${NETWORK:-mainnet}"
