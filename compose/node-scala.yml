# ── DecentralChain Scala Node ──────────────────────────────────────────────────
#
# Prerequisites (set by bootstrap.sh and deploy-container.yml):
#   IMAGE_TAG — full image reference, e.g. ghcr.io/decentral-america/node-scala:abc123
#   NETWORK   — mainnet | testnet | stagenet
#
# Volumes:
#   node-scala-state-<NETWORK> — persistent blockchain state (named, survives upgrades)
#
# Ports (all except P2P are localhost-only):
#   6869 — REST API     (internal; expose via reverse proxy only)
#   6868 — P2P          (must be externally reachable for peer discovery)
#   6881 — BlockchainUpdates gRPC extension (used by blockchain-postgres-sync)
#   6887 — DEX extension gRPC              (used by the matcher)
#   6870 — metrics                         (internal; scrape via Prometheus)
#
# Dependency note:
#   The DEX matcher (matcher.yml) connects to THIS node on localhost:6887 and
#   localhost:6881. Deploy node-scala BEFORE the matcher on any new server.
# ──────────────────────────────────────────────────────────────────────────────

services:
  node-scala:
    image: "${IMAGE_TAG:?IMAGE_TAG is required}"
    container_name: "node-scala-${NETWORK:-mainnet}"
    restart: unless-stopped

    # Secrets are written by bootstrap.sh; never baked into the image.
    env_file:
      - /opt/dcc/secrets/${NETWORK:-mainnet}.env

    # Constants only — never duplicate env_file keys here.
    environment:
      # Map the env_file NETWORK var to DCC_NETWORK for the entrypoint.
      # Without this, DCC_NETWORK defaults to "mainnet" (Dockerfile ENV) and
      # non-mainnet deploys start with the wrong blockchain type.
      DCC_NETWORK: "${NETWORK:-mainnet}"
      # JVM heap size — 2g is sufficient for testnet (low chain history, low load).
      # Scale to 6g for stagenet/mainnet on a 16 GB host.
      DCC_HEAP_SIZE: "2g"
      # Bind the REST API on all interfaces so Caddy (host-network) can proxy it.
      # The entrypoint sets -Ddcc.rest-api.bind-address=$DCC_REST_API_BIND (default 127.0.0.1).
      # Port 6869 is still mapped to 127.0.0.1 on the host — not directly reachable externally.
      DCC_REST_API_BIND: "0.0.0.0"

    ports:
      # REST API — localhost only; expose via Caddy reverse proxy
      - "127.0.0.1:6869:6869"
      # P2P — world-reachable for peer discovery (firewall allows TCP 6868)
      - "6868:6868"
      # BlockchainUpdates gRPC — localhost only; blockchain-postgres-sync connects here
      - "127.0.0.1:6881:6881"
      # DEX extension gRPC — localhost only; matcher connects here
      - "127.0.0.1:6887:6887"
      # Prometheus metrics — localhost only
      - "127.0.0.1:6870:6870"

    volumes:
      # Blockchain state — named volume survives image upgrades and docker rm
      - "node-scala-state-${NETWORK:-mainnet}:/var/lib/dcc"
      # Network config — entrypoint.sh requires /etc/dcc/dcc.conf to exist before
      # it creates the combined config (user config + injected wallet secrets).
      # Without this mount, DCC_WALLET_SEED and DCC_WALLET_PASSWORD are never applied.
      - "/opt/dcc/config/node-${NETWORK:-mainnet}/dcc.conf:/etc/dcc/dcc.conf:ro"
      # DEX extension plugins — bind-mounted read-only into the node's plugin classpath.
      # The DEXExtension JAR provides the gRPC service on port 6887 used by the matcher.
      # Populated by: scp dcc-ext_*.jar deploy@server:/opt/dcc/plugins/<network>/dcc-ext.jar
      - "/opt/dcc/plugins/${NETWORK:-mainnet}:/usr/share/dcc/lib/plugins:ro"

    # docker compose up --wait blocks until the container is running/healthy.
    # /node/version is the canonical liveness endpoint on the Scala node REST API.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6869/node/version"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5

    # ── Container security hardening ──────────────────────────────────────────
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # The JVM writes blockchain state and LevelDB files to the named volume;
    # root filesystem is read-only — only named volumes are writable.
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777,exec
    deploy:
      resources:
        limits:
          # JVM heap (2g) + RocksDB native + JVM overhead ≈ 3.5 GB peak for testnet.
          # Scale to 10g for stagenet/mainnet on a 16 GB host.
          memory: 4g
        reservations:
          memory: 1g

    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

# External volumes — pre-created by bootstrap.sh with a fixed name that has
# no compose project prefix. This ensures blockchain state is preserved even
# if the deploy project name changes (docker compose managed volumes are
# named {project}_{volume}, so changing --project-name orphans the data).
# bootstrap.sh: docker volume create dcc-node-state-<network>
volumes:
  node-scala-state-mainnet:
    external: true
    name: "dcc-node-state-mainnet"
  node-scala-state-stagenet:
    external: true
    name: "dcc-node-state-stagenet"
  node-scala-state-testnet:
    external: true
    name: "dcc-node-state-testnet"
