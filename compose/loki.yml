# docker-compose for Loki + Alloy — centralised log aggregation
# Location on server: /opt/dcc/compose/loki.yml
#
# Architecture:
#   Alloy (Promtail's successor — see the alloy service comment below) tails
#   container logs via the Docker API and ships them to Loki. Grafana queries
#   Loki via the datasource provisioned in monitoring/datasources/loki.yaml.
#
# Start: NETWORK=testnet docker compose -f /opt/dcc/compose/loki.yml up -d
#
# Ports (all localhost-only):
#   3100  — Loki HTTP API (push + query)
#   12345 — Alloy HTTP server (debug UI + /metrics)
#
# Grafana datasource: provisioned from monitoring/datasources/loki.yaml
# Prometheus scrape:  Loki exposes /metrics at :3100/metrics, Alloy at
#                      :12345/metrics — see monitoring/prometheus.yml
# ─────────────────────────────────────────────────────────────────────────────

services:
  loki:
    # Bumped 3.3.2 -> 3.7.3 (2026-07-04): 3.3.x reached EOL 2025-04-17 and had
    # stopped receiving security backports over a year before this bump.
    # Checked for breaking changes between 3.3 and 3.7: the label-limit
    # default change (30->15) happened at 3.0 (already past) and our config
    # sets max_label_names_per_series explicitly anyway; bloom-filter
    # migration notes don't apply since we don't use bloom filters.
    image: grafana/loki:3.7.3
    container_name: "loki-${NETWORK:-testnet}"
    network_mode: host
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    volumes:
      - /opt/dcc/monitoring/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      # Loki 3.6.0 dropped the shell/wget/busybox from its image entirely
      # (confirmed empirically: the wget-based CMD-SHELL check below started
      # failing with "/bin/sh: no such file or directory" the moment we
      # bumped to 3.7.3) — grafana/loki#20313 added a native -health flag
      # for exactly this, shipped in 3.7.0. Verified against the actual
      # 3.7.3 image before using it.
      test: ["CMD", "/usr/bin/loki", "-health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 64m
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # Promtail was deprecated at Loki 3.0 and fully removed/EOL'd March 2026 —
  # no further patches, ever. Migrated to Grafana Alloy, the official
  # successor. config.alloy was generated from the old promtail-config.yaml
  # via `alloy convert -f promtail` (grafana/alloy's own conversion tool),
  # verified with `alloy validate` before use, and hand-reviewed line-by-line
  # against the original — all 3 per-service JSON log parsing stages and all
  # 5 Docker relabel rules carried over unchanged. Alloy tails container logs
  # via the Docker API (loki.source.docker) rather than reading log files
  # directly, so it no longer needs /var/lib/docker/containers mounted.
  # One-shot: the image bakes /var/lib/alloy/data as owned by alloy:alloy
  # (uid/gid 473) with no "other" access. The alloy service below runs as
  # that same uid/gid from the start (see its user: field) rather than as
  # root, because root without CAP_DAC_OVERRIDE (dropped via cap_drop: ALL)
  # can't bypass those permission bits either — confirmed empirically
  # (`mkdir /var/lib/alloy/data: permission denied` even as uid 0). Same
  # class of bug as redis-init below in this same file's git history.
  alloy-init:
    image: grafana/alloy:v1.17.1
    container_name: "alloy-init-${NETWORK:-testnet}"
    entrypoint: ["sh", "-c", "chown -R 473:473 /data"]
    volumes:
      - alloy-data:/data
    restart: "no"

  alloy:
    image: grafana/alloy:v1.17.1
    container_name: "alloy-${NETWORK:-testnet}"
    depends_on:
      alloy-init:
        condition: service_completed_successfully
    user: "473:473"
    network_mode: host
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - /opt/dcc/monitoring/config.alloy:/etc/alloy/config.alloy:ro
      # Docker socket — Alloy streams container logs via the Docker API
      # (not by reading /var/lib/docker/containers files like Promtail did).
      # Group-owned by "docker" on the host (typically GID 999/998); mounting
      # read-only doesn't restrict socket I/O, only prevents replacing the
      # socket file itself. If Alloy (uid 473) can't reach the daemon, the
      # host's docker.sock group GID needs to be added to this container's
      # supplementary groups — check group_add: ["<docker-gid-on-host>"] if
      # loki.source.docker logs 'permission denied' after this fix deploys.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy/data
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
    healthcheck:
      # Unlike Loki/Promtail's minimal images, Alloy's is full Debian with
      # bash — but no curl/wget/python3 (confirmed empirically). Same
      # /dev/tcp port-open trade-off as Promtail's old healthcheck: proves
      # the HTTP server (default 127.0.0.1:12345) is listening, not that
      # /-/ready returns 200.
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/12345' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 64m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  loki-data:
    name: "loki-data-${NETWORK:-testnet}"
  alloy-data:
    name: "alloy-data-${NETWORK:-testnet}"
