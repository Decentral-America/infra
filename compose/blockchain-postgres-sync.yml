# docker-compose for DCC Blockchain-Postgres-Sync
# Location on server: /opt/dcc/compose/blockchain-postgres-sync.yml
#
# Deploy via: docker compose -f blockchain-postgres-sync.yml up -d --remove-orphans blockchain-postgres-sync
# ─────────────────────────────────────────────────────────────────────────────
#
# Chain IDs: mainnet=63 ('?'), stagenet=83 ('S'), testnet=33 ('!')
# ─────────────────────────────────────────────────────────────────────────────

services:
  blockchain-postgres-sync:
    image: "${IMAGE_TAG:?IMAGE_TAG must be set — deploy via CI or set IMAGE_TAG=<image>:<sha> explicitly}"
    container_name: "blockchain-postgres-sync-${NETWORK:-mainnet}"
    restart: unless-stopped
    network_mode: host  # Needs access to local PostgreSQL on 127.0.0.1:5432
    env_file:
      - /opt/dcc/secrets/${NETWORK:-mainnet}.env
    environment:
      # BLOCKCHAIN_UPDATES_URL and CHAIN_ID come from env_file (standard names).
      # STARTING_HEIGHT: use a literal default of 0 so new deployments start
      # from genesis. Override manually for disaster-recovery scenarios.
      STARTING_HEIGHT: "0"
      # BPS reads Postgres config with POSTGRES__ prefix (double underscore) via
      # envy::prefixed("POSTGRES__"). These vars are written to the secrets file
      # by bootstrap.sh and push-secrets.yml alongside the standard PG* vars.
      # They are NOT interpolated here from the host shell — they come from env_file.
    # The blockchain-postgres-sync binary serves an axum HTTP server on
    # METRICS_PORT (default 9090) with /health and /readiness endpoints.
    # /readiness also validates the PostgreSQL connection pool.
    # The image ships curl (debian:12-slim runtime), matching the Dockerfile HEALTHCHECK.
    # We pin the compose healthcheck explicitly so `docker compose up --wait`
    # blocks until the DB connection is verified, not just until the process starts.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:${METRICS_PORT:-9090}/readiness"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    # ── Container security hardening ───────────────────────────────────────────
    # NOTE: network_mode: host disables Docker's network namespace, so
    # cap_drop / security_opt still apply to the process but the container
    # shares the host network stack (required to reach localhost:5432 PostgreSQL).
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # BPS writes to PostgreSQL via network only (no local sockets) and has no
    # local state — root filesystem can be read-only. Tmp is needed for scratch.
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
