# docker-compose for DCC Node Dashboard
# Location on server: /opt/dcc/compose/admin-dashboard.yml
#
# Traffic path: Cloudflare Tunnel → localhost:3001 → this container
# No Caddy entry needed — the tunnel is the only ingress.
# ─────────────────────────────────────────────────────────────────────────────

services:
  admin-dashboard:
    image: "${IMAGE_TAG:?IMAGE_TAG must be set — deploy via CI or set IMAGE_TAG=<image>:<sha> explicitly}"
    container_name: "admin-dashboard-${NETWORK:-mainnet}"
    restart: unless-stopped
    # host network mode: same reasoning as scanner — SSR loader makes outbound
    # requests to the DCC node URL which may resolve to the host's own IP.
    # PORT=3001 (set in env_file) avoids conflict with scanner on 3000.
    network_mode: host
    # E2E/stress-test execution happens in GitHub Actions (dispatched by
    # api.e2e.stream.ts / api.load-test.stream.ts), not in this container —
    # no local test suite path or load-tester binary needs to live here.
    env_file:
      - /opt/dcc/secrets/${NETWORK:-mainnet}.env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 64m
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
