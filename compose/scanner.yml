# docker-compose for DCC Scanner
# Location on server: /opt/dcc/compose/scanner.yml
#
# Deploy via: docker compose -f scanner.yml up -d --remove-orphans scanner
# ─────────────────────────────────────────────────────────────────────────────

services:
  scanner:
    image: "${IMAGE_TAG:?IMAGE_TAG must be set — deploy via CI or set IMAGE_TAG=<image>:<sha> explicitly}"
    container_name: "scanner-${NETWORK:-mainnet}"
    restart: unless-stopped
    # host network mode: scanner's SSR layer makes outbound requests to
    # testnet-node.decentralchain.io (which resolves to the host's own external
    # IP). Docker bridge containers cannot reach the host's external IP through
    # iptables, causing connection refused. Sharing the host network lets SSR
    # reach Caddy (also on host network) at localhost:443 without issue.
    # Port 3000 is still on the host loopback; Caddy forwards to it normally.
    network_mode: host
    env_file:
      - /opt/dcc/secrets/${NETWORK:-mainnet}.env
    # DCC_NODE_URL, DCC_MATCHER_URL, DCC_DATA_SERVICE_URL come from env_file.
    # Do NOT duplicate them in environment: — Docker Compose environment: always
    # overrides env_file, so an unset shell var would silently clear the value.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    # ── Container security hardening ───────────────────────────────────────────
    # no-new-privileges: prevents the process from acquiring new capabilities
    # via setuid/setgid binaries or file capabilities after exec.
    security_opt:
      - no-new-privileges:true
    # Drop ALL Linux capabilities; add back only what the app actually needs.
    # Scanner is a stateless Next.js SSR app — it needs no special capabilities.
    cap_drop:
      - ALL
    # Read-only root filesystem: prevents the container from writing to its own
    # image layers. Combined with cap_drop, limits blast radius of a compromise.
    read_only: true
    # tmpfs: writable directories that Next.js needs at runtime (tmp + cache).
    # These are in-memory and do not survive container restarts.
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /app/.next/cache:size=128m
    # Resource limits: cap memory so one container can't starve the host.
    # Scanner serves SSR pages; 512 MB is generous for typical traffic.
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
