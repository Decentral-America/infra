# gen-0 WireGuard private key — SOPS-target skeleton (PLAINTEXT, pre-encryption).
#
# Fill in `privatekey`, then encrypt IN PLACE:
#     sops -e -i wireguard/gen-0-wg.secret.yaml
# then move it to clusters/testnet/apps/gen-0-wg.secret.yaml and add its filename to
# clusters/testnet/apps/kustomization.yaml. Flux's kustomize-controller decrypts it
# with the sops-age secret at apply time (same path as gen-0-wallet.secret.yaml).
#
# Duplicate for gen-1 (name: gen-1-wg) and val-0 (name: val-0-wg).
# The .sops.yaml rule `clusters/testnet/.*\.secret\.yaml` already covers these once moved.
apiVersion: v1
kind: Secret
metadata:
  name: gen-0-wg
  namespace: dcc
type: Opaque
stringData:
  privatekey: "<paste contents of gen-0.key>"
