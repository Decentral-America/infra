# /etc/wireguard/wg0.conf  —  MAIN node (HUB) 66.228.55.154   [DRAFT template]
#
# Rendered on the VPS by .github/workflows/deploy-wireguard-vps.yml, which
# substitutes ${WG_MAIN_PRIVATE_KEY} from /opt/dcc/secrets/testnet.env and the
# spoke public keys. Do NOT commit a real PrivateKey — this file is a template.
#
# The hub RELAYS spoke<->spoke traffic: the 3 LKE spokes share one NAT and cannot
# reach each other directly, so main forwards between them (ip_forward + FORWARD accept).

[Interface]
Address    = 10.66.0.1/24
ListenPort = 51820
PrivateKey = ${WG_MAIN_PRIVATE_KEY}
MTU        = 1420
# Enable spoke<->spoke relaying and clamp TCP MSS so large P2P/block frames never
# black-hole on a path with a smaller PMTU (fragmentation-stall guard).
PostUp   = sysctl -w net.ipv4.ip_forward=1; iptables -A FORWARD -i wg0 -o wg0 -j ACCEPT; iptables -t mangle -A FORWARD -o wg0 -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --clamp-mss-to-pmtu
PostDown = iptables -D FORWARD -i wg0 -o wg0 -j ACCEPT; iptables -t mangle -D FORWARD -o wg0 -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --clamp-mss-to-pmtu

# ── gen-0 ──────────────────────────────────────────────────────────────────────
[Peer]
PublicKey           = ${GEN0_WG_PUBKEY}
AllowedIPs          = 10.66.0.11/32
PersistentKeepalive = 25

# ── gen-1 ──────────────────────────────────────────────────────────────────────
[Peer]
PublicKey           = ${GEN1_WG_PUBKEY}
AllowedIPs          = 10.66.0.12/32
PersistentKeepalive = 25

# ── val-0 ──────────────────────────────────────────────────────────────────────
[Peer]
PublicKey           = ${VAL0_WG_PUBKEY}
AllowedIPs          = 10.66.0.13/32
PersistentKeepalive = 25
