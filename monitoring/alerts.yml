groups:
  - name: dcc-testnet-critical
    interval: 60s
    rules:
      # ── Chain liveness — dcc_blockchain_height_age_seconds is seconds since last block ──
      - alert: BlockProductionStalled
        expr: |
          dcc_blockchain_height_age_seconds > 300
        for: 5m
        labels:
          severity: critical
          network: testnet
        annotations:
          summary: "DCC testnet block production stalled (>5 min since last block)"
          description: "dcc_blockchain_height_age_seconds > 300. Chain may be halted or main node offline."

      # ── Finality (feature-25 Deterministic Finality — the authoritative finalized height) ──
      # This is the authoritative finalized height from GET /blocks/height/finalized. If generators
      # stop committing or quorum is lost, the lag grows and this fires (covers the old generator-count
      # alerts). HotStuff's observational commit has its own separate WARNING-level alert below
      # (HotStuffCommitNotAdvancing) — it is NOT authoritative and must never page.
      # Normal lag on this testnet is ~100 blocks (finality is per-generation-period,
      # generation-period-length=100, so finalizedHeight ≈ height − 100). Alert only when lag exceeds
      # ~2.5 periods, i.e. finality is genuinely falling behind, to avoid false positives at steady state.
      - alert: FinalizationStalled
        expr: |
          dcc_finality_lag > 250
        for: 15m
        labels:
          severity: high
          network: testnet
        annotations:
          summary: "DCC finalization lagging >250 blocks (>2.5 generation periods)"
          description: "dcc_finality_lag > 250 for 15 min (normal ~100). Generators may not be committed or quorum lost — check auto-commit-generators."

      # ── Exporter health ────────────────────────────────────────────────────
      - alert: ExporterScrapeError
        expr: |
          dcc_scrape_error == 1
        for: 5m
        labels:
          severity: high
          network: testnet
        annotations:
          summary: "DCC exporter cannot reach node endpoints"
          description: "dcc_scrape_error=1 for 5 min. Node REST API may be unreachable."

  - name: dcc-testnet-infra
    interval: 60s
    rules:
      # ── Prometheus exporter reachability ─────────────────────────────────
      - alert: ExporterDown
        expr: |
          up{job="dcc-chain"} == 0
        for: 5m
        labels:
          severity: critical
          network: testnet
        annotations:
          summary: "DCC chain exporter unreachable"
          description: "Prometheus cannot scrape dcc-exporter at :9101. Exporter container may be down."

      # ── Finality not advancing at all ─────────────────────────────────────
      - alert: FinalizationNotAdvancing
        expr: |
          increase(dcc_finalized_height[30m]) == 0
        for: 30m
        labels:
          severity: high
          network: testnet
        annotations:
          summary: "finalizedHeight not advancing for 30 min"
          description: "dcc_finalized_height has been completely static for 30 min. Generators are not committing or endorsements are not flowing — run auto-commit-generators.yml."

      # ── T2 HotStuff observational commit (NOT authoritative — feature-25 above is) ──────
      # dcc_hotstuff_finalized_height is emitted only when dcc.hotstuff.enabled AND the node has
      # committed >=1 HotStuff block (see exporter.py). When present it should track the tip at
      # tip-settled-depth. If it goes static while the chain keeps producing, HotStuff QC formation
      # has regressed (e.g. the 2026-07-13 blockHeight-mismatch class of bug) — worth investigating
      # but NOT page-worthy, since feature-25 remains the authoritative finality. WARNING only.
      - alert: HotStuffCommitNotAdvancing
        expr: |
          (increase(dcc_hotstuff_finalized_height[30m]) == 0) and (increase(dcc_block_height[30m]) > 0)
        for: 30m
        labels:
          severity: warning
          network: testnet
        annotations:
          summary: "observational HotStuff commit static for 30 min while the chain advances"
          description: "dcc_hotstuff_finalized_height has not advanced in 30 min although dcc_block_height is still increasing. HotStuff QC formation likely regressed (observational only; feature-25 finality is unaffected). Diagnose with hotstuff-status.yml and check for '[HotStuff] QUORUM REACHED but no QC' WARNs."
