[server]
http_port = 3002
domain = grafana.testnet.decentralchain.io
root_url = https://grafana.testnet.decentralchain.io

[security]
allow_embedding = true

[auth.anonymous]
enabled = true
org_name = Main Org.
org_role = Viewer

[users]
default_theme = dark

[dashboards]
default_home_dashboard_path = /etc/grafana/provisioning/dashboards/testnet.json

[analytics]
reporting_enabled = false
check_for_updates = false
