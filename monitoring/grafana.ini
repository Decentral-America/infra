[server]
http_port = 3002
domain = grafana.testnet.decentralchain.io
root_url = https://grafana.testnet.decentralchain.io

[security]
allow_embedding = true
# Never leave the admin password at the default "admin". Even with the login form
# disabled below, set a strong one via env (GF_SECURITY_ADMIN_PASSWORD) as defense
# in depth so grafana-cli / API basic-auth can't be brute-forced to admin/admin.

[auth]
# Public grafana is an anonymous read-only viewer embedded in the admin dashboard.
# Disable the interactive login form and basic auth entirely so the default
# admin/admin credentials cannot be used to take over the instance (add a
# datasource -> SSRF). Dashboards + datasources are file-provisioned, so no web
# admin login is needed; use grafana-cli on the host for any admin change.
disable_login_form = true

[auth.basic]
enabled = false

[auth.anonymous]
enabled = true
org_name = Main Org.
org_role = Viewer

[users]
default_theme = dark

[dashboards]
default_home_dashboard_path = /etc/grafana/provisioning/dashboards/testnet.json

[analytics]
reporting_enabled = false
check_for_updates = false
