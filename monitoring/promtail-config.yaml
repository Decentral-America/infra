# Promtail configuration — scrapes all Docker container logs on this host
# Deployed to: /opt/dcc/monitoring/promtail-config.yaml
# deploy-monitoring.yml syncs this file to the server.
#
# Approach: filesystem scrape of /var/lib/docker/containers/**/*.log
# This requires NO Docker logging plugin. Docker's default json-file driver
# writes logs here automatically. No container restarts needed.
#
# Docker socket is used only for service discovery (resolving container names
# and labels from container IDs found in log file paths).

server:
  http_listen_port: 9080
  http_listen_address: 127.0.0.1
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /var/lib/promtail/positions.yaml

clients:
  - url: http://127.0.0.1:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576
    timeout: 10s

scrape_configs:
  # ── Docker container logs ──────────────────────────────────────────────────
  # Discovers all containers via the Docker socket, then tails their json-file
  # logs from /var/lib/docker/containers/<id>/<id>-json.log.
  # Labels extracted: container_name, image, network (from NETWORK env var if set).
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
        # Only scrape containers that have at least one label — skips transient
        # containers without metadata (build cache layers, etc.)
        filters: []

    relabel_configs:
      # Use the container name as the primary label (drop the leading slash).
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      # Image name without the registry prefix.
      - source_labels: ['__meta_docker_container_image_name']
        target_label: image
      # Preserve the docker-compose service label if present.
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
      # Preserve the docker-compose project label if present.
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: compose_project
      # DCC network label (set via NETWORK env in all DCC compose files).
      - source_labels: ['__meta_docker_container_label_com_docker_compose_env_NETWORK']
        target_label: network

    pipeline_stages:
      # Docker json-file log entries are JSON objects with "log", "stream", "time".
      # Extract the inner log line.
      - json:
          expressions:
            output: log
            stream: stream
            timestamp: time
      - labels:
          stream:
      - output:
          source: output
      - timestamp:
          source: timestamp
          format: RFC3339Nano
          fallback_formats:
            - RFC3339
            - "2006-01-02T15:04:05.999999999Z"

      # ── DCC node-scala log parsing ──────────────────────────────────────────
      # node-scala emits JSON-structured logs. Extract level and component.
      # Only applies when the container name matches node-scala-*.
      - match:
          selector: '{container=~"node-scala-.*"}'
          stages:
            - json:
                expressions:
                  level: level
                  logger: logger
            - labels:
                level: level
                logger: logger

      # ── BPS (blockchain-postgres-sync) log parsing ─────────────────────────
      # BPS emits JSON logs with "level", "message", "timestamp" fields.
      - match:
          selector: '{container=~"blockchain-postgres-sync-.*"}'
          stages:
            - json:
                expressions:
                  level: level
            - labels:
                level: level

      # ── Matcher log parsing ────────────────────────────────────────────────
      - match:
          selector: '{container=~"matcher-.*"}'
          stages:
            - json:
                expressions:
                  level: level
            - labels:
                level: level
