global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'network']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: github-issues

  routes:
    # Critical alerts fire immediately with no grouping wait
    - matchers:
        - severity = critical
      group_wait: 0s
      repeat_interval: 1h
      receiver: github-issues

receivers:
  - name: github-issues
    webhook_configs:
      - url: 'http://localhost:9099/alert'
        send_resolved: true
        http_config:
          bearer_token_file: /etc/alertmanager/github_token

inhibit_rules:
  # If ExporterDown, suppress all other alerts (no data = no real state)
  - source_matchers:
      - alertname = ExporterDown
    target_matchers:
      - network = testnet
    equal: ['network']
