# Loki minimal local configuration
# Deployed to: /opt/dcc/monitoring/loki-config.yaml
# deploy-monitoring.yml syncs this file to the server.
#
# Single-process mode (target: all) — suitable for a single-node testnet/stagenet.
# For mainnet scale, migrate to microservices mode with S3-backed object store.

auth_enabled: false

server:
  http_listen_port: 3100
  http_listen_address: 127.0.0.1
  grpc_listen_port: 9096
  grpc_listen_address: 127.0.0.1
  log_level: warn

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # Retention: keep 30 days of logs (matches Prometheus tsdb retention).
  retention_period: 720h
  # Ingestion rate limits — generous for a single-host testnet.
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  # Max label names per stream — keep low to avoid cardinality explosion.
  max_label_names_per_series: 30

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  delete_request_store: filesystem
