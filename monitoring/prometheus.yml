global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    network: testnet

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: dcc-chain
    static_configs:
      - targets: ['127.0.0.1:9101']
    relabel_configs:
      - target_label: network
        replacement: testnet
  - job_name: bps
    static_configs:
      - targets: ['127.0.0.1:9090']  # BPS metrics port
    relabel_configs:
      - target_label: network
        replacement: testnet
