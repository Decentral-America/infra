global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    network: testnet

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['127.0.0.1:9093']
      timeout: 10s

scrape_configs:
  - job_name: dcc-chain
    static_configs:
      - targets: ['127.0.0.1:9101']
    relabel_configs:
      - target_label: network
        replacement: testnet
  # BPS now exposes bps_up / bps_last_synced_height at :9090/metrics
  # (blockchain-postgres-sync/src/bin/consumer.rs).
  - job_name: bps
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:9090']
    relabel_configs:
      - target_label: network
        replacement: testnet

  # Loki metrics — ingestion rate, chunk/index store ops, compaction lag.
  # Loki exposes Prometheus-format metrics at :3100/metrics.
  - job_name: loki
    static_configs:
      - targets: ['127.0.0.1:3100']
    relabel_configs:
      - target_label: network
        replacement: testnet

  # Alloy metrics (Promtail's successor — see compose/loki.yml). Metric names
  # differ from Promtail's own (grafana/alloy's convert tool flagged this) —
  # no existing alert rule references promtail-specific metrics, so nothing
  # else needed updating.
  - job_name: alloy
    static_configs:
      - targets: ['127.0.0.1:12345']
    relabel_configs:
      - target_label: network
        replacement: testnet

  # redis_exporter — connected_clients, keyspace hit ratio, memory, persistence
  # (rdb_last_save/aof_last_write_status), evicted_keys. See compose/redis.yml.
  - job_name: redis
    static_configs:
      - targets: ['127.0.0.1:9121']
    relabel_configs:
      - target_label: network
        replacement: testnet
