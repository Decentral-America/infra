# Flux Kustomization for the monitoring stack (moved from inside monitoring/ — B2 fix).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: monitoring
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/testnet/monitoring
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  dependsOn:
    - name: apps
  # postBuild substitutes ${SMTP_PASSWORD} and ${GRAFANA_ADMIN_PASSWORD} from the
  # monitoring-secrets Secret. Create it once with your credentials, then SOPS-encrypt:
  #
  #   kubectl create secret generic monitoring-secrets -n monitoring \
  #     --from-literal=SMTP_PASSWORD=<info@decentralchain.io password> \
  #     --from-literal=GRAFANA_ADMIN_PASSWORD=<choose a strong password>
  #
  # Until the Secret exists, monitoring deploys but email/Grafana login are disabled.
  postBuild:
    substituteFrom:
      - kind: Secret
        name: monitoring-secrets
        optional: true
