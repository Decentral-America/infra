---
# ── StatefulSet: dcc-gen-0 ────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dcc-gen-0
  namespace: dcc
spec:
  serviceName: dcc-gen-0
  replicas: 1
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  selector:
    matchLabels:
      app: dcc-gen-0
  template:
    metadata:
      labels:
        app: dcc-gen-0
        role: generator
        network: testnet
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      terminationGracePeriodSeconds: 60
      securityContext:
        fsGroup: 999
        # seccomp: RuntimeDefault filters ~300+ high-risk syscalls (ptrace, mount,
        # kexec_load, etc.) with zero application impact. The image (docker/Dockerfile)
        # already sets `USER dcc` (uid/gid 999) and never does root work at runtime —
        # these pods have always run as uid 999 in practice. runAsNonRoot/runAsUser
        # below just make the kubelet enforce that existing behavior.
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          # preferred (not required) — single-node testnet still schedules fine;
          # on mainnet with 2+ nodes the scheduler will spread gen-0 and gen-1
          # across separate hosts, eliminating a single point of failure.
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    role: generator
                topologyKey: kubernetes.io/hostname
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: node
          image: ghcr.io/decentral-america/node-scala@sha256:a84096a64bc402d902a9d4bc6af7392c3a05102feb2fba3c60b202398f99ae6f
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          env:
            - name: DCC_NETWORK
              value: testnet
            - name: DCC_HEAP_SIZE
              value: "768m"
            - name: DCC_LOG_LEVEL
              value: INFO
            - name: DCC_DATA
              value: /var/lib/dcc
            - name: DCC_LOG
              value: /tmp
            - name: JAVA_OPTS
              value: >-
                -XX:+UseContainerSupport
                -XX:+UseG1GC
                -XX:MaxGCPauseMillis=200
            - name: DCC_WALLET_SEED
              valueFrom:
                secretKeyRef:
                  name: gen-0-wallet
                  key: seed
          ports:
            - containerPort: 6863
              hostPort: 6863
              protocol: TCP
          volumeMounts:
            - name: chain-data
              mountPath: /var/lib/dcc
            - name: config
              mountPath: /etc/dcc
          resources:
            requests:
              cpu: "420m"
              memory: "880Mi"
            limits:
              cpu: "420m"
              memory: "880Mi"
          livenessProbe:
            httpGet:
              path: /node/status
              port: 6869
              host: 127.0.0.1
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /node/status
              port: 6869
              host: 127.0.0.1
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: gen-0-config
  volumeClaimTemplates:
    - metadata:
        name: chain-data
      spec:
        storageClassName: linode-block-storage-retain
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 20Gi

