        app: dcc-val-0
        role: validator
        network: testnet
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      terminationGracePeriodSeconds: 60
      securityContext:
        fsGroup: 999
        # seccomp: RuntimeDefault — same as gen-0/gen-1. runAsNonRoot/runAsUser enforce
        # the non-root uid 999 the image (docker/Dockerfile `USER dcc`) already runs as.
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: node
          image: ghcr.io/decentral-america/node-scala@sha256:a84096a64bc402d902a9d4bc6af7392c3a05102feb2fba3c60b202398f99ae6f
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          env:
            - name: DCC_NETWORK
              value: testnet
            - name: DCC_HEAP_SIZE
              value: "768m"
            - name: DCC_LOG_LEVEL
              value: INFO
            - name: DCC_DATA
              value: /var/lib/dcc
            - name: DCC_LOG
              value: /tmp
            - name: JAVA_OPTS
              value: >-
                -XX:+UseContainerSupport
                -XX:+UseG1GC
                -XX:MaxGCPauseMillis=200
            # Validators still need a node wallet/identity to start (the node
            # otherwise auto-generates a seed and then fails to unlock it:
