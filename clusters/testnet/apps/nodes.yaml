# ── StatefulSet: dcc-val-0 ────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dcc-val-0
  namespace: dcc
spec:
  serviceName: dcc-val-0
  replicas: 1
  podManagementPolicy: OrderedReady
  updateStrategy:
