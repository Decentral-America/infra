            - name: config
              mountPath: /etc/dcc
          resources:
            requests:
              cpu: "250m"
              memory: "1024Mi"
            limits:
              cpu: "250m"
              memory: "1024Mi"
          livenessProbe:
            httpGet:
              path: /node/status
              port: 6871
              host: 127.0.0.1
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /node/status
              port: 6871
              host: 127.0.0.1
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 10
      volumes:
        - name: config
          configMap:
            name: val-0-config
  volumeClaimTemplates:
    - metadata:
        name: chain-data
      spec:
        storageClassName: linode-block-storage-retain
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 20Gi

---
# ── NetworkPolicy: isolate dcc namespace ─────────────────────────────────────
# ⚠ These three NetworkPolicy objects are NO-OPS for dcc-gen-0, dcc-gen-1,
# dcc-val-0, and metrics-exporter: all four run `hostNetwork: true`, and per
# Kubernetes semantics, NetworkPolicy does not apply to host-networked pods —
# they share the node's network namespace rather than getting a pod-level
# veth/IP for Calico to filter. This was previously miscommented as "Calico
# enforces"; it does not, for these specific pods.
#
# Real enforcement today is the Linode Cloud Firewall (terraform/lke.tf,
# `inbound_policy = "DROP"` with explicit per-port allow rules) — that's a
# genuine, working perimeter, just not the layer these objects imply. These
# NetworkPolicy objects are kept as documentation of intent and because they
# DO work correctly for any future non-hostNetwork pod added to this
# namespace; they should not be read as protecting the current workloads.
#
# For real pod-level defense-in-depth on top of the Cloud Firewall, see
# clusters/testnet/policy/host-endpoints.yaml — a Calico HostEndpoint +
# StagedGlobalNetworkPolicy pair that mirrors these same rules at the host
# level, where hostNetwork pods can actually be governed. It ships in
# non-enforcing (staged/log) mode; see that file for the promotion procedure.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: dcc
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Allow P2P inbound from anywhere. NOTE: as above, this NetworkPolicy is a
# no-op for the current hostNetwork pods — real host-level enforcement of
# this same rule lives in clusters/testnet/policy/host-endpoints.yaml.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-p2p-ingress
  namespace: dcc
spec:
  podSelector:
    matchLabels:
      network: testnet
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 6863
        - protocol: TCP
          port: 6864
        - protocol: TCP
          port: 6865

---
# Allow all egress from DCC pods (P2P outbound to any peer, DNS, NTP)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress
  namespace: dcc
spec:
  podSelector:
    matchLabels:
      network: testnet
  policyTypes:
    - Egress
  egress:
    - {}

---
# ── PodDisruptionBudgets ──────────────────────────────────────────────────────
# maxUnavailable: 1 (not minAvailable: 1) — avoids drain deadlock on single replicas
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: dcc-gen-0-pdb
  namespace: dcc
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: dcc-gen-0

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: dcc-gen-1-pdb
  namespace: dcc
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: dcc-gen-1

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: dcc-val-0-pdb
  namespace: dcc
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: dcc-val-0
