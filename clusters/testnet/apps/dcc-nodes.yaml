# ── StatefulSet: dcc-val-0 ────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dcc-val-0
  namespace: dcc
spec:
  serviceName: dcc-val-0
  replicas: 1
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  selector:
    matchLabels:
      app: dcc-val-0
  template:
    metadata:
      labels:
        app: dcc-val-0
        role: validator
        network: testnet
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      terminationGracePeriodSeconds: 60
      securityContext:
        fsGroup: 999
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: node
          image: ghcr.io/decentral-america/node-scala:node-scala-testnet-latest
          imagePullPolicy: Always
          env:
            - name: DCC_NETWORK
              value: testnet
            - name: DCC_HEAP_SIZE
              value: "512m"
            - name: DCC_LOG_LEVEL
              value: INFO
            - name: DCC_DATA
              value: /var/lib/dcc
            - name: DCC_LOG
              value: /tmp
            - name: JAVA_OPTS
              value: >-
                -XX:+UseContainerSupport
                -XX:+UseG1GC
                -XX:MaxGCPauseMillis=200
            # Validators still need a node wallet/identity to start (the node
            # otherwise auto-generates a seed and then fails to unlock it:
            # "CANNOT GET CONSOLE TO ASK WALLET PASSWORD" → exit 61).
            - name: DCC_WALLET_SEED
              valueFrom:
                secretKeyRef:
                  name: val-0-wallet
                  key: seed
          ports:
            - containerPort: 6865
              hostPort: 6865
              protocol: TCP
          volumeMounts:
            - name: chain-data
              mountPath: /var/lib/dcc
            - name: config
              mountPath: /etc/dcc
          resources:
            requests:
              cpu: "250m"
              memory: "620Mi"
            limits:
              cpu: "250m"
              memory: "620Mi"
          livenessProbe:
            httpGet:
              path: /node/status
              port: 6871
              host: 127.0.0.1
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /node/status
              port: 6871
              host: 127.0.0.1
            initialDelaySeconds: 90
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: val-0-config
  volumeClaimTemplates:
    - metadata:
        name: chain-data
      spec:
        storageClassName: linode-block-storage-retain
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 20Gi

---
# ── NetworkPolicy: isolate dcc namespace ─────────────────────────────────────
# Default deny-all, then allowlist only what's needed.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: dcc
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Allow P2P inbound from anywhere (Calico enforces; Cloud Firewall is the first layer)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-p2p-ingress
  namespace: dcc
spec:
  podSelector:
    matchLabels:
      network: testnet
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 6863
        - protocol: TCP
          port: 6864
        - protocol: TCP
          port: 6865

---
# Allow all egress from DCC pods (P2P outbound to any peer, DNS, NTP)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress
  namespace: dcc
spec:
  podSelector:
    matchLabels:
      network: testnet
  policyTypes:
    - Egress
  egress:
    - {}

---
# ── PodDisruptionBudgets ──────────────────────────────────────────────────────
# maxUnavailable: 1 (not minAvailable: 1) — avoids drain deadlock on single replicas
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: dcc-gen-0-pdb
  namespace: dcc
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: dcc-gen-0

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: dcc-gen-1-pdb
  namespace: dcc
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: dcc-gen-1

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: dcc-val-0-pdb
  namespace: dcc
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: dcc-val-0
