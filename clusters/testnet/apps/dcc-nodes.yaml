---
# ── StatefulSet: dcc-gen-0 ────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dcc-gen-0
  namespace: dcc
spec:
  serviceName: dcc-gen-0
  replicas: 1
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  selector:
    matchLabels:
      app: dcc-gen-0
  template:
    metadata:
      labels:
        app: dcc-gen-0
        role: generator
        network: testnet
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      terminationGracePeriodSeconds: 60
      securityContext:
        fsGroup: 999
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: node
          image: ghcr.io/decentral-america/node-scala:node-scala-testnet-latest
          imagePullPolicy: Always
          env:
            - name: DCC_NETWORK
              value: testnet
            - name: DCC_HEAP_SIZE
              value: "768m"
            - name: DCC_LOG_LEVEL
              value: INFO
            - name: DCC_DATA
              value: /var/lib/dcc
            - name: DCC_LOG
              value: /tmp
            - name: JAVA_OPTS
              value: >-
                -XX:+UseContainerSupport
                -XX:+UseG1GC
                -XX:MaxGCPauseMillis=200
            - name: DCC_WALLET_SEED
              valueFrom:
                secretKeyRef:
                  name: gen-0-wallet
                  key: seed
          ports:
            - containerPort: 6863
              hostPort: 6863
              protocol: TCP
          volumeMounts:
            - name: chain-data
              mountPath: /var/lib/dcc
            - name: config
              mountPath: /etc/dcc
          resources:
            requests:
              cpu: "420m"
              memory: "880Mi"
            limits:
              cpu: "420m"
              memory: "880Mi"
          livenessProbe:
            httpGet:
              path: /node/status
              port: 6869
              host: 127.0.0.1
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /node/status
              port: 6869
              host: 127.0.0.1
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: gen-0-config
  volumeClaimTemplates:
    - metadata:
        name: chain-data
      spec:
        storageClassName: linode-block-storage-retain
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 20Gi

