---
# ── NetworkPolicy: isolate dcc namespace ─────────────────────────────────────
# Default deny-all, then allowlist only what's needed.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: dcc
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Allow P2P inbound from anywhere (Calico enforces; Cloud Firewall is the first layer)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-p2p-ingress
  namespace: dcc
spec:
  podSelector:
    matchLabels:
      network: testnet
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 6863
        - protocol: TCP
          port: 6864
        - protocol: TCP
          port: 6865

---
# Allow all egress from DCC pods (P2P outbound to any peer, DNS, NTP)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress
  namespace: dcc
spec:
  podSelector:
    matchLabels:
      network: testnet
  policyTypes:
    - Egress
  egress:
    - {}

---
# ── PodDisruptionBudgets ──────────────────────────────────────────────────────
# maxUnavailable: 1 (not minAvailable: 1) — avoids drain deadlock on single replicas
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: dcc-gen-0-pdb
  namespace: dcc
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: dcc-gen-0

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
