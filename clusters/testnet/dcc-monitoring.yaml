# Flux Kustomization for the DCC monitoring stack (moved from inside monitoring/ — B2 fix).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dcc-monitoring
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/testnet/monitoring
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  dependsOn:
    - name: dcc-apps
  # postBuild substitutes ${SMTP_HOST} / ${SMTP_USER} / ${SMTP_PASSWORD} from the
  # alertmanager-smtp Secret. Create it once with your SMTP provider credentials:
  #
  #   kubectl create secret generic alertmanager-smtp -n monitoring \
  #     --from-literal=SMTP_HOST=smtp.gmail.com \
  #     --from-literal=SMTP_USER=alerts@decentralchain.io \
  #     --from-literal=SMTP_PASSWORD=<app-password>
  #
  # Then SOPS-encrypt and commit it. Until then, alerting is silent but monitoring works.
  postBuild:
    substituteFrom:
      - kind: Secret
        name: alertmanager-smtp
        optional: true   # monitoring deploys; email is just silent until Secret exists
