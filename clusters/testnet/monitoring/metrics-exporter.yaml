# ── DCC Chain Metrics Exporter ───────────────────────────────────────────────
# Scrapes each node's REST API and exposes chain metrics as Prometheus gauges.
# node-exporter covers OS metrics; kube-state-metrics covers pod/container metrics.
# This covers the chain-specific layer: block height, peer count, UTX size.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: ConfigMap
metadata:
  name: exporter-script
  namespace: dcc
data:
  exporter.py: |
    #!/usr/bin/env python3
    """
    Minimal Prometheus exporter for DCC node-scala REST API.
    Scrapes /blocks/height and /node/status from each node.
    Exposes on :9200/metrics for ServiceMonitor scraping.
    """
    import http.server, urllib.request, json, time, os

    NODES = [
        ("gen-0", "http://127.0.0.1:6869"),
        ("gen-1", "http://127.0.0.1:6870"),
        ("val-0", "http://127.0.0.1:6871"),
    ]
    PORT = int(os.getenv("EXPORTER_PORT", "9200"))

    def fetch(url):
        try:
            with urllib.request.urlopen(url, timeout=4) as r:
                return json.loads(r.read())
        except Exception:
            return None

    def metrics():
        lines = []
        lines.append('# HELP dcc_block_height Current blockchain height')
        lines.append('# TYPE dcc_block_height gauge')
        lines.append('# HELP dcc_blockchain_height_age_seconds Seconds since last block was added (0 if advancing)')
        lines.append('# TYPE dcc_blockchain_height_age_seconds gauge')

        for name, base in NODES:
            h = fetch(f"{base}/blocks/height")
            s = fetch(f"{base}/node/status")
            if h and "height" in h:
                lines.append(f'dcc_block_height{{node="{name}"}} {h["height"]}')
            if s and "updatedTimestamp" in s:
                age = max(0, (time.time() * 1000 - s["updatedTimestamp"]) / 1000)
                lines.append(f'dcc_blockchain_height_age_seconds{{node="{name}"}} {age:.1f}')

        return '\n'.join(lines) + '\n'

    class Handler(http.server.BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path == '/metrics':
                body = metrics().encode()
                self.send_response(200)
                self.send_header('Content-Type', 'text/plain; version=0.0.4')
                self.send_header('Content-Length', len(body))
                self.end_headers()
                self.wfile.write(body)
            else:
                self.send_response(404); self.end_headers()
        def log_message(self, *_): pass

    http.server.HTTPServer(('0.0.0.0', PORT), Handler).serve_forever()

---
# Deploy as a DaemonSet-like pod on the same node (hostNetwork shares localhost)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-exporter
  namespace: dcc
  labels:
    app: metrics-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metrics-exporter
  template:
    metadata:
      labels:
        app: metrics-exporter
        network: testnet
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9200"
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: exporter
          # python:3.13-slim — digest pinned to match compose/prometheus.yml's
          # exporter/alert-webhook services (same base image, kept in sync).
          image: python:3.13-slim@sha256:eb43ff125d8d58d7449dcba7d336c23bcac412f526d861db493b9994d8010280
          command: ["python3", "/app/exporter.py"]
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534 # nobody — python:3.13-slim (Debian) has no dedicated non-root user
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: EXPORTER_PORT
              value: "9200"
          ports:
            - containerPort: 9200
              hostPort: 9200
              protocol: TCP
          volumeMounts:
            - name: script
              mountPath: /app
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "50m"
              memory: "64Mi"
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9200
              host: 127.0.0.1
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: script
          configMap:
            name: exporter-script
            defaultMode: 0555

---
apiVersion: v1
kind: Service
metadata:
  name: metrics-exporter
  namespace: dcc
  labels:
    app: metrics-exporter
spec:
  selector:
    app: metrics-exporter
  ports:
    - name: metrics
      port: 9200
      targetPort: 9200

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: chain-metrics
  namespace: dcc
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: metrics-exporter
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics

---
# ── NodePort: expose Grafana on Frankfurt LKE node's public IP ────────────────
# Caddy on Newark proxies grafana.testnet.decentralchain.io → 172.105.64.89:32300
apiVersion: v1
kind: Service
metadata:
  name: grafana-nodeport
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - name: http
      port: 80
      targetPort: 3000
      nodePort: 32300
