# ── Helm source: prometheus-community ────────────────────────────────────────
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: prometheus-community
  namespace: flux-system
spec:
  interval: 24h
  url: https://prometheus-community.github.io/helm-charts

---
# ── HelmRelease: kube-prometheus-stack ───────────────────────────────────────
# Deploys Prometheus Operator + Alertmanager + node-exporter.
# Grafana is disabled — metrics are shipped to Grafana Cloud (free tier, 10k series).
# Remote write URL and credentials are injected from the monitoring-credentials secret
# (SOPS-encrypted, added when Grafana Cloud account is connected).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 1h
  chart:
    spec:
      chart: kube-prometheus-stack
      version: ">=65.0.0 <70.0.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # Grafana disabled — using Grafana Cloud remote write instead
    grafana:
      enabled: false

    prometheus:
      prometheusSpec:
        # Scrape all ServiceMonitors and PodMonitors across all namespaces
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        # 7-day local retention — sufficient for testnet ops.
        # Add a remoteWrite block here later if you want long-term storage (e.g. Grafana Cloud).
        retention: 7d
        retentionSize: "8GB"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 200m
            memory: 512Mi

    alertmanager:
      alertmanagerSpec:
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
      config:
        global:
          resolve_timeout: 5m
          # SMTP credentials injected from alertmanager-smtp Secret.
          # Create it once (SOPS-encrypted):
          #   kubectl create secret generic alertmanager-smtp -n monitoring \
          #     --from-literal=smtp_password=<app-password>
          smtp_smarthost: "${SMTP_HOST}:587"
          smtp_from: "alerts@decentralchain.io"
          smtp_auth_username: "${SMTP_USER}"
          smtp_auth_password: "${SMTP_PASSWORD}"
          smtp_require_tls: true
        route:
          group_by: ["alertname", "namespace"]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
          receiver: "null"
          routes:
            - matchers:
                - alertname =~ "Watchdog|InfoInhibitor"
              receiver: "null"
            - matchers:
                - severity = "critical"
              receiver: email
        receivers:
          - name: "null"
          - name: email
            email_configs:
              - to: "info@decentralchain.io"
                send_resolved: true
                headers:
                  subject: '[DCC Testnet] {{ .Status | toUpper }}: {{ .CommonAnnotations.summary }}'

    # node-exporter on every LKE worker node
    nodeExporter:
      enabled: true

    # kube-state-metrics for StatefulSet health
    kubeStateMetrics:
      enabled: true

---
# ── PrometheusRule: DCC blockchain alerts ────────────────────────────────────
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: dcc-alerts
  namespace: dcc
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: dcc.blockchain
      interval: 60s
      rules:
        # Uses dcc-metrics-exporter (REST API → Prometheus bridge)
        - alert: DCCBlockHeightStalled
          expr: |
            increase(dcc_block_height[5m]) == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "DCC block height not advancing on node {{ $labels.node }}"
            description: "No new blocks in 5 minutes. Generator may be isolated or crashed."

        # Age-based alert: last block was updated >5min ago
        - alert: DCCChainStalled
          expr: |
            dcc_blockchain_height_age_seconds > 300
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "DCC chain stalled on {{ $labels.node }} — last block {{ $value | humanizeDuration }} ago"

        - alert: DCCPodRestarting
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="dcc"}[10m]) > 3
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "DCC pod {{ $labels.pod }} restarting repeatedly"

        - alert: DCCDiskPressure
          expr: |
            (kubelet_volume_stats_used_bytes{namespace="dcc"} /
             kubelet_volume_stats_capacity_bytes{namespace="dcc"}) > 0.85
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "DCC chain-data PVC at {{ $value | humanizePercentage }} capacity"
            description: "Expand PVC before disk fills. StorageClass allows online expansion."

        # JVM heap via cAdvisor container memory (works without JMX exporter)
        # container_memory_working_set_bytes ÷ container_spec_memory_limit_bytes
        - alert: DCCContainerMemoryPressure
          expr: |
            (container_memory_working_set_bytes{namespace="dcc", container="node"}
             / container_spec_memory_limit_bytes{namespace="dcc", container="node"}) > 0.85
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "DCC node container memory >85% on {{ $labels.pod }}"
            description: "Working set at {{ $value | humanizePercentage }} of limit. Risk of OOMKill."

---
