name: BPS Reset via sudo postgres user
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  fix:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Reset BPS via sudo -u postgres psql
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             docker stop blockchain-postgres-sync-testnet 2>/dev/null
             echo "=== Trying sudo -u postgres ==="
             sudo -u postgres psql -d bps_testnet -c "\dt" 2>&1 | head -10
             echo "=== Truncate via postgres superuser ==="
             sudo -u postgres psql -d bps_testnet -c "DO \$x\$ DECLARE r record; BEGIN FOR r IN SELECT tablename FROM pg_tables WHERE schemaname='"'"'public'"'"' LOOP EXECUTE '"'"'TRUNCATE '"'"'||r.tablename||'"'"' CASCADE'"'"'; END LOOP; END; \$x\$;" 2>&1
             echo "=== Restart BPS ==="
             docker start blockchain-postgres-sync-testnet 2>/dev/null && echo OK
             sleep 20
             docker logs blockchain-postgres-sync-testnet --tail=5 2>&1
             docker ps --format "{{.Names}}\t{{.Status}}" | grep -E "postgres|matcher"'
          rm -f /tmp/id_rsa
