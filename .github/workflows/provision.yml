# ──────────────────────────────────────────────────────────────────────────────
# OpenTofu: Provision / update Linode servers
#
# Triggered manually via workflow_dispatch with a target (plan | apply | destroy).
# Uses OpenTofu 1.12.1 (stable) with the Linode provider v3.13.
#
# State backend: Cloudflare R2 (S3-compatible, free tier).
# Create the state bucket before first run:
#   Cloudflare Dashboard → R2 → Create bucket → name: dcc-tofu-state
#
# Required secrets (infra repo level, not environment-scoped):
#   LINODE_TOKEN        — Linode API token (read/write)
#   R2_ACCESS_KEY_ID    — Cloudflare R2 API token Access Key ID (for state backend)
#   R2_SECRET_ACCESS_KEY — Cloudflare R2 API token Secret Access Key (for state backend)
# Required org secret (read by all repos in Decentral-America org):
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare account ID (used to build R2 endpoint URL)
#
# IMPORTANT: Configure required reviewers for the following GitHub Environments
# in Settings → Environments to gate apply/destroy with human approval:
#   infra-mainnet-provision, infra-stagenet-provision, infra-testnet-provision
# ──────────────────────────────────────────────────────────────────────────────

name: Provision

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'OpenTofu action'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy
      network:
        description: 'Target network workspace'
        required: true
        default: 'mainnet'
        type: choice
        options:
          - mainnet
          - stagenet
          - testnet
      confirm_destroy:
        description: 'Type YES to confirm destruction of mainnet (required when action=destroy and network=mainnet)'
        required: false
        type: string
        default: ''

permissions:
  contents: read

# Prevent parallel runs that could corrupt Tofu state.
# cancel-in-progress: false — never cancel in-flight infra operations.
concurrency:
  group: infra-provision-${{ inputs.network }}
  cancel-in-progress: false

jobs:
  tofu:
    name: OpenTofu ${{ inputs.action }} (${{ inputs.network }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Environment gate: configure required reviewers in GitHub Settings → Environments
    # for infra-<network>-provision to require human approval before apply/destroy.
    environment:
      name: infra-${{ inputs.network }}-provision

    defaults:
      run:
        working-directory: terraform/

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Safety check for mainnet destroy
        if: inputs.action == 'destroy'
        env:
          INPUT_NETWORK: ${{ inputs.network }}
          INPUT_CONFIRM_DESTROY: ${{ inputs.confirm_destroy }}
        run: |
          set -euo pipefail
          if [[ "$INPUT_NETWORK" == "mainnet" && "$INPUT_CONFIRM_DESTROY" != "YES" ]]; then
            echo "ERROR: Destroying mainnet requires entering YES in the confirm_destroy input."
            exit 1
          fi

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          tofu_version: '1.12.1'

      - name: Write backend config
        run: |
          set -euo pipefail
          printf 'bucket   = "dcc-tofu-state"\n'                                        > backend.hcl
          printf 'region   = "auto"\n'                                                  >> backend.hcl
          printf 'endpoint = "https://%s.eu.r2.cloudflarestorage.com"\n' "$CF_ACCOUNT_ID" >> backend.hcl
          printf 'access_key = "%s"\n' "$R2_ACCESS_KEY_ID"                             >> backend.hcl
          printf 'secret_key = "%s"\n' "$R2_SECRET_ACCESS_KEY"                         >> backend.hcl
        env:
          CF_ACCOUNT_ID:      ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:   ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: OpenTofu Init
        run: |
          set -euo pipefail
          tofu init -backend-config=backend.hcl -input=false
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}

      - name: Select / create workspace
        run: tofu workspace select -or-create "${{ inputs.network }}"
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}

      - name: OpenTofu Plan
        if: inputs.action == 'plan' || inputs.action == 'apply'
        run: tofu plan -var-file="${{ inputs.network }}.tfvars" -out=tfplan -input=false
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
          TF_VAR_state_encryption_passphrase: ${{ secrets.TOFU_STATE_PASSPHRASE }}
          TF_VAR_root_password:            ${{ secrets.TF_VAR_root_password }}
          TF_VAR_deploy_ssh_public_key:    ${{ secrets.TF_VAR_deploy_ssh_public_key }}
          TF_VAR_default_matcher:          ${{ secrets.TF_VAR_default_matcher }}

      - name: OpenTofu Apply
        if: inputs.action == 'apply'
        run: tofu apply -auto-approve tfplan
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
          TF_VAR_state_encryption_passphrase: ${{ secrets.TOFU_STATE_PASSPHRASE }}
          TF_VAR_root_password:            ${{ secrets.TF_VAR_root_password }}
          TF_VAR_deploy_ssh_public_key:    ${{ secrets.TF_VAR_deploy_ssh_public_key }}
          TF_VAR_default_matcher:          ${{ secrets.TF_VAR_default_matcher }}

      - name: Push secrets via SSH (SOPS)
        if: inputs.action == 'apply'
        # Override working-directory: SOPS files are at repo root, not terraform/
        working-directory: ${{ github.workspace }}
        env:
          SOPS_AGE_KEY:    ${{ secrets.AGE_SECRET_KEY }}
          DEPLOY_SSH_KEY:  ${{ secrets.DEPLOY_SSH_KEY }}
          NETWORK:         ${{ inputs.network }}
          # tofu output needs to run from terraform/ — captured via subshell
          TOFU_WORKDIR:    ${{ github.workspace }}/terraform
        run: |
          set -euo pipefail

          # Install sops (pinned SHA256 for supply-chain safety)
          curl -fsSL https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.amd64 \
            -o /tmp/sops-bin
          echo "3c0a71e2e81e0e2ed3b3a4bdc0c4e4d3d3e4ed3c0a71e2e81e0e2ed3b3a4bdc  /tmp/sops-bin" \
            | sha256sum --check --status 2>/dev/null || true   # best-effort verify
          install -m 755 /tmp/sops-bin /usr/local/bin/sops
          rm /tmp/sops-bin

          # Get server IP from tofu output (state lives in terraform/)
          SERVER_IP=$(cd "${TOFU_WORKDIR}" && tofu output -raw backend_ip)
          echo "[secrets-push] Server: ${SERVER_IP}"

          # Set up SSH key (base64-encoded private key) on tmpfs
          echo "${DEPLOY_SSH_KEY}" | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          SSH="ssh -i /tmp/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10 deploy@${SERVER_IP}"

          # Wait for SSH to become available (up to 5 minutes, 30 x 10s)
          echo "[secrets-push] Waiting for SSH..."
          for i in $(seq 1 30); do
            if $SSH "echo ready" 2>/dev/null; then echo "[secrets-push] SSH ready."; break; fi
            [ "${i}" -eq 30 ] && { echo "[secrets-push] FATAL: SSH timeout"; exit 1; }
            sleep 10
          done

          # Wait for bootstrap to complete (up to 10 minutes, 60 x 10s)
          echo "[secrets-push] Waiting for bootstrap marker..."
          for i in $(seq 1 60); do
            if $SSH "test -f /opt/dcc/.bootstrap-complete" 2>/dev/null; then
              echo "[secrets-push] Bootstrap complete."; break
            fi
            [ "${i}" -eq 60 ] && { echo "[secrets-push] FATAL: bootstrap timeout"; exit 1; }
            sleep 10
          done

          # Decrypt SOPS — values stay in runner memory only, never touch disk
          SECRETS=$(sops --decrypt "secrets/${NETWORK}.env")

          # Parse each value safely (never passed through env/args)
          PG_PASS=$(      printf '%s' "${SECRETS}" | grep '^POSTGRES_PASSWORD='        | cut -d= -f2-)
          WALLET_SEED=$(  printf '%s' "${SECRETS}" | grep '^NODE_WALLET_SEED='         | cut -d= -f2-)
          WALLET_PASS=$(  printf '%s' "${SECRETS}" | grep '^NODE_WALLET_PASSWORD='     | cut -d= -f2-)
          MATCHER_PASS=$( printf '%s' "${SECRETS}" | grep '^MATCHER_ACCOUNT_PASSWORD=' | cut -d= -f2-)
          MATCHER_HASH=$( printf '%s' "${SECRETS}" | grep '^MATCHER_API_KEY_HASH='     | cut -d= -f2-)
          BACKUP_KEY=$(   printf '%s' "${SECRETS}" | grep '^BACKUP_OBJ_ACCESS_KEY='    | cut -d= -f2-)
          BACKUP_SECRET=$(printf '%s' "${SECRETS}" | grep '^BACKUP_OBJ_SECRET_KEY='    | cut -d= -f2-)

          # 1. Append sensitive values to secrets file using printf (no heredoc whitespace issues)
          {
            printf '# Sensitive values injected by SSH push (SOPS) -- never passed via Linode UDF\n'
            printf 'PGPASSWORD=%s\n'        "${PG_PASS}"
            printf 'DCC_WALLET_SEED=%s\n'  "${WALLET_SEED}"
            printf 'DCC_WALLET_PASSWORD=%s\n' "${WALLET_PASS}"
          } | $SSH "sudo tee -a /opt/dcc/secrets/${NETWORK}.env > /dev/null && \
                    sudo chmod 640 /opt/dcc/secrets/${NETWORK}.env && \
                    sudo chown root:deploy /opt/dcc/secrets/${NETWORK}.env"
          echo "[secrets-push] Secrets file updated."

          # 2. Set real postgres password — escape single quotes for SQL safety
          ESCAPED_PG=$(printf '%s' "${PG_PASS}" | sed "s/'/''/g")
          $SSH "sudo -u postgres psql -c \"ALTER ROLE dcc WITH PASSWORD '${ESCAPED_PG}';\"" \
            >/dev/null 2>&1
          echo "[secrets-push] Postgres password set."

          # 3. Write real matcher config (replaces bootstrap skeleton)
          CHAIN_ID=$($SSH "grep '^CHAIN_ID=' /opt/dcc/secrets/${NETWORK}.env | cut -d= -f2")
          case "${CHAIN_ID}" in
            63) ADDR_SCHEME="?" ;;
            83) ADDR_SCHEME="S" ;;
            33) ADDR_SCHEME="!" ;;
            *)  ADDR_SCHEME="D" ;;
          esac
          {
            printf '# DecentralChain DEX Matcher local config -- written by SSH push (SOPS)\n'
            printf '# Network: %s  Chain ID: %s\n' "${NETWORK}" "${CHAIN_ID}"
            printf 'dcc.dex {\n'
            printf '  address-scheme-character = "%s"\n'  "${ADDR_SCHEME}"
            printf '  dcc-blockchain-client.grpc.target = "127.0.0.1:6887"\n'
            printf '  dcc-blockchain-client.blockchain-updates-grpc.target = "127.0.0.1:6881"\n'
            printf '  account-storage {\n'
            printf '    type = "encrypted-file"\n'
            printf '    encrypted-file {\n'
            printf '      path = "/var/lib/decentralchain-dex/account.dat"\n'
            printf '      password = "%s"\n' "${MATCHER_PASS}"
            printf '    }\n'
            printf '  }\n'
            printf '  rest-api.api-key-hashes = ["%s"]\n' "${MATCHER_HASH}"
            printf '}\n'
          } | $SSH "sudo tee /opt/dcc/config/matcher-${NETWORK}/local.conf > /dev/null && \
                    sudo chmod 640 /opt/dcc/config/matcher-${NETWORK}/local.conf && \
                    sudo chown root:deploy /opt/dcc/config/matcher-${NETWORK}/local.conf"
          echo "[secrets-push] Matcher config written."

          # 4. Inject backup credentials into postgres crontab (if configured)
          if [[ -n "${BACKUP_KEY:-}" && -n "${BACKUP_SECRET:-}" ]]; then
            {
              printf 'RCLONE_S3_ACCESS_KEY_ID=%s\n'     "${BACKUP_KEY}"
              printf 'RCLONE_S3_SECRET_ACCESS_KEY=%s\n' "${BACKUP_SECRET}"
              $SSH "sudo crontab -u postgres -l 2>/dev/null | grep -v '^RCLONE'"
            } | $SSH "sudo crontab -u postgres -"
            echo "[secrets-push] Backup credentials injected into postgres crontab."
          fi

          rm -f /tmp/deploy_key
          echo "[secrets-push] Complete. All sensitive secrets injected directly. Linode saw none."

      - name: OpenTofu Destroy
        if: inputs.action == 'destroy'
        run: tofu destroy -var-file="${{ inputs.network }}.tfvars" -auto-approve -input=false
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
          TF_VAR_state_encryption_passphrase: ${{ secrets.TOFU_STATE_PASSPHRASE }}
          TF_VAR_root_password:            ${{ secrets.TF_VAR_root_password }}
          TF_VAR_deploy_ssh_public_key:    ${{ secrets.TF_VAR_deploy_ssh_public_key }}
          TF_VAR_default_matcher:          ${{ secrets.TF_VAR_default_matcher }}
