name: Refresh Plugin JARs from Image
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  refresh:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Replace dcc-grpc.jar with fresh thin JAR from container
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             echo "=== Find fresh grpc-server JAR inside running container ==="
             GRPC_JAR=$(docker exec node-scala-testnet find /usr/share/dcc/lib -name "io.decentralchain.dcc-grpc-server-*.jar" 2>/dev/null | head -1)
             echo "JAR: $GRPC_JAR"
             docker cp "node-scala-testnet:${GRPC_JAR}" /tmp/fresh-grpc.jar
             ls -lh /tmp/fresh-grpc.jar
             echo "=== Replace plugin JAR ==="
             sudo cp /tmp/fresh-grpc.jar /opt/dcc/plugins/testnet/dcc-grpc.jar
             sudo rm -f /opt/dcc/plugins/testnet/dcc-grpc.jar.disabled /opt/dcc/plugins/testnet/dcc-grpc.jar.bak
             echo "=== Verify: no stale Block header in new JAR ==="
             python3 -c "
import zipfile
z=zipfile.ZipFile(\"/opt/dcc/plugins/testnet/dcc-grpc.jar\")
bh=[n for n in z.namelist() if \"Block\" in n and \"Header\" in n and \"protobuf\" in n]
ext=[n for n in z.namelist() if \"BlockchainUpdate\" in n or \"GRPCServer\" in n or \"application.conf\" in n]
print(\"Stale Block headers:\",bh if bh else \"NONE\")
print(\"Extension classes/conf:\",ext)
print(\"Total entries:\",len(z.namelist()))
"
             ls -lh /opt/dcc/plugins/testnet/
             echo "=== Restart node ==="
             docker restart node-scala-testnet
             sleep 35
             docker ps --format "{{.Names}}\t{{.Status}}" | grep node-scala
             ss -tlnp 2>/dev/null | grep 6881 || echo "port 6881 check failed"
             docker logs node-scala-testnet --since 1m 2>&1 | grep -i "BlockchainUpdates\|Enable extension\|6881\|started gRPC\|ERROR" | head -8
             curl -s http://localhost:6869/blocks/height 2>/dev/null'
          rm -f /tmp/id_rsa
