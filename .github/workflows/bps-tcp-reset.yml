name: BPS Reset via TCP psql
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  reset:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Reset BPS via TCP psql with password from secrets
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             docker stop blockchain-postgres-sync-testnet 2>/dev/null
             PGPASSWORD=$(grep "^PGPASSWORD=" /opt/dcc/secrets/testnet.env 2>/dev/null | cut -d= -f2)
             echo "TCP connection test:"
             PGPASSWORD="$PGPASSWORD" psql -h 127.0.0.1 -U dcc -d dcc_testnet -c "SELECT 1" 2>&1 | head -3
             echo "Table list:"
             PGPASSWORD="$PGPASSWORD" psql -h 127.0.0.1 -U dcc -d dcc_testnet -c "\dt" 2>&1 | head -20
             echo "Truncating blocks:"
             PGPASSWORD="$PGPASSWORD" psql -h 127.0.0.1 -U dcc -d dcc_testnet -c "TRUNCATE blocks CASCADE" 2>&1
             PGPASSWORD="$PGPASSWORD" psql -h 127.0.0.1 -U dcc -d dcc_testnet -c "TRUNCATE transactions CASCADE" 2>&1
             PGPASSWORD="$PGPASSWORD" psql -h 127.0.0.1 -U dcc -d dcc_testnet -c "TRUNCATE microblocks CASCADE" 2>&1
             echo "Restarting BPS:"
             docker start blockchain-postgres-sync-testnet 2>/dev/null && echo OK
             sleep 20
             docker logs blockchain-postgres-sync-testnet --tail=5 2>&1
             docker ps --format "{{.Names}}\t{{.Status}}" | grep -E "postgres|matcher"'
          rm -f /tmp/id_rsa
