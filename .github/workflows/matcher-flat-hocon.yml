name: Matcher flat HOCON local.conf
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  fix:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Write flat HOCON local.conf and immediately start
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             docker stop matcher-testnet 2>/dev/null
             DATA_DIR="/opt/dcc/data/matcher-testnet"
             SECRETS="/opt/dcc/secrets/testnet.env"
             echo "=== Remove stale JAVA_OPTS ==="
             sudo sed -i "/^JAVA_OPTS=/d;/^JAVA_TOOL_OPTIONS/d;/^JDK_JAVA_OPTIONS/d" "$SECRETS" 2>/dev/null
             echo "=== Write flat HOCON (no nested braces) ==="
             sudo mkdir -p "$DATA_DIR/config" 2>/dev/null
             printf "dcc.dex.address-scheme-character = \"\\041\"\ndcc.dex.account-storage.type = in-mem\n" | sudo tee "$DATA_DIR/config/local.conf" > /dev/null
             sudo chown -R 113:113 "$DATA_DIR" 2>/dev/null
             echo "local.conf:"
             cat "$DATA_DIR/config/local.conf"
             echo "=== Start matcher ==="
             docker start matcher-testnet 2>/dev/null && echo OK
             sleep 5
             echo "=== Immediate log check ==="
             docker logs matcher-testnet --since 2026-06-27T13:30:00 2>&1 | grep -iE "Starting|Blockchain Id|address|public key|account|ERROR|error|type" | grep -v "DEBUG\|class path\|at java" | head -10
             sleep 30
             echo "=== Status ==="
             docker ps --format "{{.Names}}\t{{.Status}}" | grep matcher'
          rm -f /tmp/id_rsa
