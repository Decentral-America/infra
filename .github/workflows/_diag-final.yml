name: Diag Final Loki Query
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: testnet
    steps:
      - name: Direct loki query with hard timeout
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          timeout 30 ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=10 "$SSH_USER@$SSH_HOST" \
            'timeout 10 curl -sG "http://127.0.0.1:3100/loki/api/v1/query" --data-urlencode "query=count_over_time({container=\"matcher-testnet\"}[2m])" 2>&1 | head -c 500; echo'
          rm -f /tmp/id_rsa
