# ──────────────────────────────────────────────────────────────────────────────
# Update Caddyfile on a provisioned server and reload Caddy.
#
# bootstrap.sh generates the Caddyfile only at first-boot, so new domain
# blocks (scanner, data-service, websocket) cannot be added retroactively
# by re-running bootstrap. This workflow re-generates the Caddyfile from
# testnet.tfvars domain variables and reloads Caddy without downtime.
#
# Trigger manually whenever a new domain is added to testnet.tfvars.
# Safe to re-run — generates deterministically from the same sources.
# ──────────────────────────────────────────────────────────────────────────────

name: Update Caddyfile

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Target network'
        required: true
        default: 'testnet'
        type: choice
        options: [testnet, stagenet, mainnet]

permissions:
  contents: read

concurrency:
  group: update-caddyfile-${{ inputs.network }}
  cancel-in-progress: false

jobs:
  update:
    name: Update Caddyfile → ${{ inputs.network }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout infra repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Read domain variables from testnet.tfvars
        id: domains
        run: |
          parse() { grep "^${1}\s*=" terraform/testnet.tfvars | sed 's/.*=\s*"\(.*\)"/\1/'; }
          echo "scanner=$(parse scanner_domain)"          >> "$GITHUB_OUTPUT"
          echo "data_service=$(parse data_service_domain)" >> "$GITHUB_OUTPUT"
          echo "websocket=$(parse websocket_domain)"      >> "$GITHUB_OUTPUT"
          echo "acme=$(parse acme_email)"                 >> "$GITHUB_OUTPUT"

      - name: Generate and push Caddyfile, then reload Caddy
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        env:
          NETWORK:            ${{ inputs.network }}
          SCANNER_DOMAIN:     ${{ steps.domains.outputs.scanner }}
          DATA_SERVICE_DOMAIN: ${{ steps.domains.outputs.data_service }}
          WEBSOCKET_DOMAIN:   ${{ steps.domains.outputs.websocket }}
          ACME_EMAIL:         ${{ steps.domains.outputs.acme }}
        with:
          host:     ${{ inputs.network == 'testnet' && secrets.TESTNET_DEPLOY_HOST || inputs.network == 'stagenet' && secrets.STAGENET_DEPLOY_HOST || secrets.MAINNET_DEPLOY_HOST }}
          username: ${{ inputs.network == 'testnet' && secrets.TESTNET_DEPLOY_USER || inputs.network == 'stagenet' && secrets.STAGENET_DEPLOY_USER || secrets.MAINNET_DEPLOY_USER }}
          key:      ${{ inputs.network == 'testnet' && secrets.TESTNET_DEPLOY_SSH_KEY || inputs.network == 'stagenet' && secrets.STAGENET_DEPLOY_SSH_KEY || secrets.MAINNET_DEPLOY_SSH_KEY }}
          envs:     NETWORK,SCANNER_DOMAIN,DATA_SERVICE_DOMAIN,WEBSOCKET_DOMAIN,ACME_EMAIL
          script: |
            set -euo pipefail

            CADDYFILE=/opt/dcc/caddy/Caddyfile

            # Back up existing Caddyfile before overwriting
            cp "$CADDYFILE" "${CADDYFILE}.bak.$(date +%s)" || true

            {
              printf '# Generated by update-caddyfile.yml — do not edit manually\n'
              printf '{\n'
              printf '    admin unix//run/caddy/admin.sock\n'
              if [[ -n "${ACME_EMAIL:-}" ]]; then
                printf '    email %s\n' "${ACME_EMAIL}"
              fi
              printf '}\n\n'

              if [[ -n "${SCANNER_DOMAIN:-}" ]]; then
                printf '%s {\n' "${SCANNER_DOMAIN}"
                printf '    reverse_proxy localhost:3000\n'
                printf '    header {\n'
                printf '        Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"\n'
                printf '        X-Content-Type-Options "nosniff"\n'
                printf '        X-Frame-Options "DENY"\n'
                printf '        Referrer-Policy "strict-origin-when-cross-origin"\n'
                printf '        X-XSS-Protection "0"\n'
                printf '        Content-Security-Policy "default-src '\''self'\''; script-src '\''self'\'' '\''unsafe-inline'\''; style-src '\''self'\'' '\''unsafe-inline'\''; img-src '\''self'\'' data: blob: https:; font-src '\''self'\'' data:; connect-src '\''self'\'' https://*.decentralchain.io wss://*.decentralchain.io; worker-src '\''self'\'' blob:; frame-ancestors '\''none'\''; base-uri '\''self'\''; form-action '\''self'\''; object-src '\''none'\''"\n'
                printf '        Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"\n'
                printf '        Cross-Origin-Opener-Policy "same-origin"\n'
                printf '        -Server\n'
                printf '    }\n'
                printf '    encode gzip zstd\n'
                printf '    log\n'
                printf '}\n\n'
              fi

              if [[ -n "${DATA_SERVICE_DOMAIN:-}" ]]; then
                printf '%s {\n' "${DATA_SERVICE_DOMAIN}"
                printf '    reverse_proxy localhost:8080\n'
                printf '    header {\n'
                printf '        Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"\n'
                printf '        X-Content-Type-Options "nosniff"\n'
                printf '        Referrer-Policy "strict-origin-when-cross-origin"\n'
                printf '        -Server\n'
                printf '    }\n'
                printf '    encode gzip zstd\n'
                printf '    log\n'
                printf '}\n\n'
              fi

              if [[ -n "${WEBSOCKET_DOMAIN:-}" ]]; then
                printf '%s {\n' "${WEBSOCKET_DOMAIN}"
                printf '    reverse_proxy localhost:8081\n'
                printf '    header {\n'
                printf '        Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"\n'
                printf '        X-Content-Type-Options "nosniff"\n'
                printf '        Referrer-Policy "strict-origin-when-cross-origin"\n'
                printf '        -Server\n'
                printf '    }\n'
                printf '    log\n'
                printf '}\n'
              fi
            } | sudo tee "$CADDYFILE" > /dev/null
            sudo chmod 644 "$CADDYFILE"
            sudo chown deploy:deploy "$CADDYFILE"

            # Reload Caddy without dropping connections (caddy reload is a hot reload)
            docker exec "caddy-${NETWORK}" caddy reload --config /etc/caddy/Caddyfile
            echo "Caddyfile updated and Caddy reloaded."
