name: Raw Node Logs
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  logs:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Truncate BPS tables and restart
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             echo "=== Stop BPS ==="
             docker stop blockchain-postgres-sync-testnet
             echo "=== Extract credentials safely via Python ==="
             docker inspect blockchain-postgres-sync-testnet 2>/dev/null | python3 -c "
import sys,json,subprocess,os
data=json.load(sys.stdin)
env={e.split(\"=\",1)[0]:e.split(\"=\",1)[1] for e in data[0][\"Config\"][\"Env\"] if \"=\" in e}
pgpass=env.get(\"POSTGRES_PASSWORD\",\"\")
pghost=env.get(\"PGHOST\",\"localhost\")
pguser=env.get(\"PGUSER\",\"dcc\")
pgdb=env.get(\"PGDATABASE\",\"bps_testnet\")
print(f\"Connecting: {pguser}@{pghost}/{pgdb}\")
os.environ[\"PGPASSWORD\"]=pgpass
r=subprocess.run([\"psql\",\"-h\",pghost,\"-U\",pguser,\"-d\",pgdb,\"-c\",\"DO \$\$ DECLARE r record; BEGIN FOR r IN SELECT tablename FROM pg_tables WHERE schemaname=\\'public\\' LOOP EXECUTE \\'TRUNCATE \\'||r.tablename||\\'CASCADE\\'; END LOOP; END; \$\$;\"],capture_output=True,text=True)
print(r.stdout.strip() or r.stderr.strip() or \"Done\")
" 2>&1
             echo "=== Start BPS ==="
             docker start blockchain-postgres-sync-testnet
             sleep 20
             docker ps --format "{{.Names}}\t{{.Status}}" | grep blockchain-postgres
             docker logs blockchain-postgres-sync-testnet --since 25s 2>&1 | grep -v "^Error:" | head -6'
          rm -f /tmp/id_rsa
