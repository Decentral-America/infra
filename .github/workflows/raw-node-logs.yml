name: Raw Node Logs
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  logs:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Get full miner error stack trace
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'docker logs node-scala-testnet 2>&1 | grep -i "NoSuchMethod\|error.*miner\|error.*extension\|Error in" | head -5'
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'docker logs node-scala-testnet 2>&1 | grep "\"ERROR\"" | cut -c1-4000 | head -3'
          rm -f /tmp/id_rsa
