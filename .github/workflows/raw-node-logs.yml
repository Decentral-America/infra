name: Raw Node Logs
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  logs:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Truncate BPS tables and restart
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             echo "=== Stop BPS ==="
             docker stop blockchain-postgres-sync-testnet
             echo "=== Get BPS credentials from its environment ==="
             eval $(docker inspect blockchain-postgres-sync-testnet --format "{{range .Config.Env}}export {{.}}; {{end}}" 2>/dev/null) || true
             echo "PGHOST=$PGHOST PGUSER=$PGUSER PGDATABASE=$PGDATABASE"
             echo "=== Truncate via psql using BPS credentials ==="
             PGPASSWORD="$POSTGRES_PASSWORD" psql -h "${PGHOST:-localhost}" -U "${PGUSER:-dcc}" -d "${PGDATABASE:-bps_testnet}" -c "DO \$\$ DECLARE r record; BEGIN FOR r IN SELECT tablename FROM pg_tables WHERE schemaname='"'"'public'"'"' LOOP EXECUTE '"'"'TRUNCATE '"'"'||r.tablename||'"'"' CASCADE'"'"'; END LOOP; END; \$\$;" 2>&1
             echo "=== Start BPS ==="
             docker start blockchain-postgres-sync-testnet
             sleep 20
             docker ps --format "{{.Names}}\t{{.Status}}" | grep blockchain-postgres
             docker logs blockchain-postgres-sync-testnet --since 25s 2>&1 | grep -v "^Error:" | head -6'
          rm -f /tmp/id_rsa
