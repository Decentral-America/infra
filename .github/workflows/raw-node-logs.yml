name: Raw Node Logs
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  logs:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Get full miner error stack trace
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'docker logs node-scala-testnet 2>&1 | python3 -c "
import sys, json
for line in sys.stdin:
    line = line.strip()
    if not line:
        continue
    try:
        d = json.loads(line)
        if d.get(\"level\") == \"ERROR\" or \"NoSuchMethod\" in d.get(\"stack_trace\",\"\"):
            print(\"MSG:\", d.get(\"message\"))
            st = d.get(\"stack_trace\",\"\")
            for l in st.split(\"\\n\")[:15]:
                print(\" \", l)
    except:
        pass
"'
          rm -f /tmp/id_rsa
