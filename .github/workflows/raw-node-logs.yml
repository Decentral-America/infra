name: Raw Node Logs
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  logs:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Truncate BPS tables and restart
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             echo "=== Truncate BPS tables ==="
             docker exec postgres-testnet psql -U postgres -d bps_testnet -c "DO \$\$ DECLARE r record; BEGIN FOR r IN SELECT tablename FROM pg_tables WHERE schemaname='"'"'public'"'"' LOOP EXECUTE '"'"'TRUNCATE '"'"'||r.tablename||'"'"' CASCADE'"'"'; END LOOP; END; \$\$;" 2>/dev/null || echo "Direct psql failed - trying via container"
             PGPASS=$(grep POSTGRES_PASSWORD /opt/dcc/secrets/testnet.env 2>/dev/null | cut -d= -f2- | tr -d '"'"'"'"'"')
             PGHOST=$(grep PGHOST /opt/dcc/secrets/testnet.env 2>/dev/null | cut -d= -f2)
             PGUSER=$(grep PGUSER /opt/dcc/secrets/testnet.env 2>/dev/null | cut -d= -f2)
             PGDB=$(grep PGDATABASE /opt/dcc/secrets/testnet.env 2>/dev/null | cut -d= -f2)
             PGPASSWORD="$PGPASS" psql -h "$PGHOST" -U "$PGUSER" -d "$PGDB" -c "DO \$\$ DECLARE r record; BEGIN FOR r IN SELECT tablename FROM pg_tables WHERE schemaname='"'"'public'"'"' LOOP EXECUTE '"'"'TRUNCATE '"'"'||r.tablename||'"'"' CASCADE'"'"'; END LOOP; END; \$\$;" 2>&1 | head -3
             echo "=== Restart BPS ==="
             docker restart blockchain-postgres-sync-testnet
             sleep 15
             docker ps --format "{{.Names}}\t{{.Status}}" | grep blockchain-postgres
             docker logs blockchain-postgres-sync-testnet --tail=5 2>&1 | grep -v "^Error:" | head -5'
          rm -f /tmp/id_rsa
