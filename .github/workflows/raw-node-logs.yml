name: Raw Node Logs
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  logs:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Check service status (read-only)
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             echo "=== Containers ==="
             docker ps --format "{{.Names}}\t{{.Status}}\t{{.Image}}" | grep -E "node-scala|blockchain-postgres|matcher"
             echo "=== Node height ==="
             curl -s http://localhost:6869/blocks/height 2>/dev/null
             echo ""
             echo "=== T2 finality ==="
             curl -s http://localhost:6869/blockchain/finality 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(\"lag:\",d.get(\"hotStuffLag\",\"?\"),\"finalized:\",d.get(\"hotStuffFinalizedHeight\",\"?\"))" 2>/dev/null
             echo "=== BPS block count ==="
             sudo -u postgres psql -d bps_testnet -c "SELECT count(*) as blocks FROM blocks_microblocks;" 2>&1
             echo "=== BPS last 3 logs ==="
             docker logs blockchain-postgres-sync-testnet --since 60s 2>&1 | grep -v "^Error:" | tail -5'
          rm -f /tmp/id_rsa
