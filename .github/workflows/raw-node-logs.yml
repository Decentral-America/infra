name: Raw Node Logs
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  logs:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Get node status and recent logs
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             echo "=== Container status ==="
             docker ps -a --format "{{.Names}}\t{{.Status}}" | grep -E "node-scala|blockchain-postgres|matcher"
             echo "=== Port 6881 ==="
             ss -tlnp 2>/dev/null | grep 6881 || echo "port 6881 not open"
             echo "=== Node ERROR logs (startup + extension) ==="
             docker logs node-scala-testnet 2>&1 | grep -i "BlockchainUpdates\|6881\|Enable extension\|ERROR\|NoSuchMethod" | grep -v "HTTP 200" | tail -10
             echo "=== Chain height ==="
             curl -s http://localhost:6869/blocks/height 2>/dev/null'
          rm -f /tmp/id_rsa
