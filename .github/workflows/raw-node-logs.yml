name: Raw Node Logs
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  logs:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Check service status + Kamon metrics (read-only)
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             echo "=== Finality ==="
             curl -s http://localhost:6869/blockchain/finality 2>/dev/null | python3 -c "
import json,sys
d=json.load(sys.stdin)
print(\"H:\",d[\"height\"],\"T0:\",d[\"finalizedHeight\"],\"T2:\",d[\"hotStuffFinalizedHeight\"])
print(\"CurGens:\",len(d.get(\"currentGenerators\",[])),\"NextGens:\",len(d.get(\"nextGenerators\",[])))
print(\"Period:\",d.get(\"currentGenerationPeriod\",{}),\"Next:\",d.get(\"nextGenerationPeriod\",{}))
" 2>/dev/null
             echo "=== Kamon hotstuff round latency ==="
             curl -s http://localhost:6870/metrics 2>/dev/null | grep -E "hotstuff_round_latency|hotstuff_round" | grep -v "^#" | head -15
             echo "=== BPS blocks ==="
             sudo -u postgres psql -d bps_testnet -t -c "SELECT count(*) FROM blocks_microblocks;" 2>/dev/null
             echo "=== BPS health ==="
             docker ps --format "{{.Names}}\t{{.Status}}" | grep blockchain-postgres
             echo "=== Admin dashboard ==="
             docker ps --format "{{.Names}}\t{{.Status}}" | grep admin || echo "(admin-dashboard not running)"
             docker logs admin-dashboard-testnet --since 120s 2>&1 | tail -10 || echo "(no logs)"'
          rm -f /tmp/id_rsa
