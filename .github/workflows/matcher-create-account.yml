name: Create Matcher Account from Seed
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  create:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Create matcher account.dat from seed + password
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             docker stop matcher-testnet 2>/dev/null
             MATCHER_IMG=$(docker inspect matcher-testnet --format "{{.Config.Image}}" 2>/dev/null)
             echo "Matcher image: $MATCHER_IMG"
             DATA_DIR="/opt/dcc/data/matcher-testnet"
             sudo mkdir -p "$DATA_DIR/data" "$DATA_DIR/config" 2>/dev/null
             sudo chown -R 113:113 "$DATA_DIR" 2>/dev/null
             echo "=== Remove any stale root config override ==="
             sudo rm -f "$DATA_DIR/application.conf" 2>/dev/null
             echo "=== Create account.dat using matcher create subcommand ==="
             docker run --rm \
               --env-file /opt/dcc/secrets/testnet.env \
               -e MATCHER_ACCOUNT_SEED="tomorrow bleak cram rival inherit river genuine unknown guitar sister slot scale flip animal grit" \
               -e MATCHER_ACCOUNT_PASSWORD="+cUVQtSQTU+KRzP+Q1m+b5fgtHUSiNsWb4xAZp/ArVI=" \
               -v /opt/dcc/data/matcher-testnet:/var/lib/decentralchain-dex \
               "$MATCHER_IMG" \
               create --address-scheme "!" \
               --seed-phrase "tomorrow bleak cram rival inherit river genuine unknown guitar sister slot scale flip animal grit" \
               --password "+cUVQtSQTU+KRzP+Q1m+b5fgtHUSiNsWb4xAZp/ArVI=" \
               --output /var/lib/decentralchain-dex/account.dat 2>&1 | head -20 || echo "create cmd failed, trying alternative"
             echo "=== Check if account.dat was created ==="
             ls -la "$DATA_DIR/" 2>/dev/null | grep account
             echo "=== Write config with correct credentials ==="
             printf '"'"'dcc.dex {\n  address-scheme-character = "!"\n  account-storage {\n    type = encrypted-file\n    encrypted-file.password = "+cUVQtSQTU+KRzP+Q1m+b5fgtHUSiNsWb4xAZp/ArVI="\n  }\n}\n'"'"' | sudo tee "$DATA_DIR/config/application.conf" > /dev/null
             sudo chown 113:113 "$DATA_DIR/config/application.conf" 2>/dev/null
             cat "$DATA_DIR/config/application.conf"
             echo "=== Start matcher normally ==="
             docker start matcher-testnet 2>/dev/null && echo OK
             sleep 30
             docker logs matcher-testnet --tail=15 2>&1 | grep -v "class path\|at java\|at scala\|at io\|at org\|at com"
             docker ps --format "{{.Names}}\t{{.Status}}" | grep matcher'
          rm -f /tmp/id_rsa
