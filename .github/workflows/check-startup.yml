name: Check Node Startup
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Get startup logs and plugin dir
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no "${SSH_USER}@${SSH_HOST}" \
            'set +e
             echo "=== Plugin dir ==="
             ls -lh /opt/dcc/plugins/testnet/
             echo "=== Node first 60 lines of logs ==="
             docker logs node-scala-testnet 2>&1 | head -60 | grep -v "HTTP 200"
             echo "=== Port 6881 ==="
             ss -tlnp | grep 6881 || echo "not open"'
          rm -f /tmp/id_rsa
