name: Get Matcher Crash Error
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Get matcher logs since last start
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             echo "=== Matcher status ==="
             docker ps --format "{{.Names}}\t{{.Status}}" | grep matcher
             echo "=== Matcher logs since 11:50 (focused on errors) ==="
             docker logs matcher-testnet --since 2026-06-27T11:50:00 2>&1 | grep -iE "ERROR|error|FATAL|fatal|OOM|OutOfMemory|Cannot|refused|WARN.*error|scheme|account|address" | grep -v "DEBUG\|kamon\|at java\|at scala\|at io\|at org\|at com\|class path" | head -30
             echo "=== Config current ==="
             cat /opt/dcc/data/matcher-testnet/config/application.conf 2>/dev/null
             echo "=== BPS status ==="
             docker ps --format "{{.Names}}\t{{.Status}}" | grep postgres'
          rm -f /tmp/id_rsa
