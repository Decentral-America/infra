# ──────────────────────────────────────────────────────────────────────────────
# Push SOPS-encrypted secrets to a provisioned server via SSH.
#
# Called by provision.yml after tofu apply. Runs under the network's deploy
# environment (testnet / stagenet / mainnet) so DEPLOY_SSH_KEY and
# AGE_SECRET_KEY are scoped there — never in the provision environment.
#
# Required environment secrets (in the <network> deploy environment):
#   DEPLOY_SSH_KEY  — base64-encoded Ed25519 private key for the deploy user
#   AGE_SECRET_KEY  — age private key for SOPS decryption (per-network)
#
# Inputs:
#   network    — testnet | stagenet | mainnet
#   server_ip  — public IPv4 of the provisioned server
# ──────────────────────────────────────────────────────────────────────────────

name: Push Secrets via SSH

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Target network'
        required: true
        default: 'testnet'
        type: choice
        options: [testnet, stagenet, mainnet]
      server_ip:
        description: 'Server IP (from tofu output backend_ip)'
        required: true
        type: string
  workflow_call:
    inputs:
      network:
        type: string
        required: true
      server_ip:
        type: string
        required: true

permissions:
  contents: read

jobs:
  push:
    name: Push SOPS secrets (${{ inputs.network }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # This environment holds DEPLOY_SSH_KEY and AGE_SECRET_KEY.
    # Keeping them here (not in the provision environment) limits the blast
    # radius: compromising the provision environment does not grant SSH access.
    environment: ${{ inputs.network }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Validate required secrets
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          AGE_SECRET_KEY: ${{ secrets.AGE_SECRET_KEY }}
          NETWORK:        ${{ inputs.network }}
        run: |
          set -euo pipefail
          MISSING=""
          [ -z "${DEPLOY_SSH_KEY:-}" ] && MISSING="${MISSING} DEPLOY_SSH_KEY"
          [ -z "${AGE_SECRET_KEY:-}"  ] && MISSING="${MISSING} AGE_SECRET_KEY"
          if [ -n "${MISSING}" ]; then
            echo "::error::Missing secrets in the '${NETWORK}' GitHub environment:${MISSING}"
            echo "Go to: Settings → Environments → ${NETWORK} and add the listed secrets."
            echo "Alternatively, run scripts/push-secrets-local.sh directly from your machine."
            exit 1
          fi
          echo "[push-secrets] Required secrets present."

      - name: Push secrets via SSH (SOPS)
        env:
          SOPS_AGE_KEY:   ${{ secrets.AGE_SECRET_KEY }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          NETWORK:        ${{ inputs.network }}
          SERVER_IP:      ${{ inputs.server_ip }}
        run: |
          set -euo pipefail

          # ── Install sops (pinned release + verified SHA256) ─────────────────
          # v3.13.x bundles a post-quantum-capable age (confirmed for v3.13.1;
          # not re-verified for this v3.13.2 patch bump, but no age-related
          # changelog entry suggests otherwise) supporting hybrid
          # ML-KEM-768 + X25519 recipients (age1pq1... keys). Required for
          # the PQ age key upgrade from X25519-only keys.
          SOPS_VERSION="v3.13.2"
          SOPS_SHA256="154dfe4cd70554bdd82b98e4cd4acf191d43d01ead6f00a73477aa44c4ac42ef"
          curl -fsSL "https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/sops-${SOPS_VERSION}.linux.amd64" \
            -o /tmp/sops-bin
          echo "${SOPS_SHA256}  /tmp/sops-bin" | sha256sum --check --status \
            || { echo "[secrets-push] FATAL: sops binary SHA256 mismatch — aborting"; exit 1; }
          install -m 755 /tmp/sops-bin /usr/local/bin/sops
          rm /tmp/sops-bin

          # ── SSH key setup ───────────────────────────────────────────────────
          echo "${DEPLOY_SSH_KEY}" | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          SSH="ssh -i /tmp/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10 deploy@${SERVER_IP}"

          # ── Wait for SSH (5 min) ────────────────────────────────────────────
          echo "[secrets-push] Waiting for SSH on ${SERVER_IP}..."
          for i in $(seq 1 30); do
            if $SSH "echo ready" 2>/dev/null; then echo "[secrets-push] SSH ready."; break; fi
            [ "${i}" -eq 30 ] && { echo "[secrets-push] FATAL: SSH timeout after 5 min"; exit 1; }
            sleep 10
          done

          # ── Wait for bootstrap-complete marker (10 min) ─────────────────────
          echo "[secrets-push] Waiting for bootstrap to finish..."
          for i in $(seq 1 60); do
            if $SSH "test -f /opt/dcc/.bootstrap-complete" 2>/dev/null; then
              echo "[secrets-push] Bootstrap complete."; break
            fi
            [ "${i}" -eq 60 ] && { echo "[secrets-push] FATAL: bootstrap timeout after 10 min"; exit 1; }
            sleep 10
          done

          # ── Decrypt SOPS — stays in runner memory only ──────────────────────
          echo "[secrets-push] Running SOPS decrypt..."
          sops --version
          echo "[secrets-push] AGE key present: $([ -n "${SOPS_AGE_KEY:-}" ] && echo YES || echo NO)"
          echo "[secrets-push] Secrets file exists: $([ -f "secrets/${NETWORK}.env" ] && echo YES || echo NO)"
          set +e
          SECRETS=$(sops --decrypt "secrets/${NETWORK}.env" 2>&1)
          SOPS_EXIT=$?
          set -e
          echo "[secrets-push] SOPS exit code: ${SOPS_EXIT}"
          if [ "${SOPS_EXIT}" -ne 0 ]; then
            echo "[secrets-push] FATAL: SOPS decryption failed — output:"
            echo "${SECRETS}"
            exit 1
          fi

          # grep exits 1 on no match — || true prevents pipefail from aborting on optional keys
          PG_PASS=$(        printf '%s' "${SECRETS}" | grep '^POSTGRES_PASSWORD='        | cut -d= -f2- || true)
          WALLET_SEED=$(    printf '%s' "${SECRETS}" | grep '^MAIN_NODE_WALLET_SEED='         | cut -d= -f2- || true)
          WALLET_PASS=$(    printf '%s' "${SECRETS}" | grep '^MAIN_NODE_WALLET_PASSWORD='     | cut -d= -f2- || true)
          MATCHER_PASS=$(   printf '%s' "${SECRETS}" | grep '^MATCHER_ACCOUNT_PASSWORD=' | cut -d= -f2- || true)
          MATCHER_HASH=$(   printf '%s' "${SECRETS}" | grep '^MATCHER_API_KEY_HASH='     | cut -d= -f2- || true)
          MATCHER_SEED=$(   printf '%s' "${SECRETS}" | grep '^MATCHER_SEED='             | cut -d= -f2- || true)
          REDIS_PASS=$(     printf '%s' "${SECRETS}" | grep '^REDIS_PASSWORD='           | cut -d= -f2- || true)
          NODE_API_KEY=$(          printf '%s' "${SECRETS}" | grep '^MAIN_NODE_REST_API_KEY='                   | cut -d= -f2- || true)
          DEFAULT_MATCHER=$(       printf '%s' "${SECRETS}" | grep '^DEFAULT_MATCHER='                        | cut -d= -f2- || true)
          ADMIN_OAUTH_CLIENT_ID=$( printf '%s' "${SECRETS}" | grep '^ADMIN_DASHBOARD_GITHUB_OAUTH_CLIENT_ID=' | cut -d= -f2- || true)
          ADMIN_OAUTH_CLIENT_SEC=$(printf '%s' "${SECRETS}" | grep '^ADMIN_DASHBOARD_GITHUB_OAUTH_CLIENT_SECRET=' | cut -d= -f2- || true)
          ADMIN_JWT_SECRET=$(      printf '%s' "${SECRETS}" | grep '^ADMIN_DASHBOARD_JWT_SECRET='             | cut -d= -f2- || true)
          ADMIN_DASHBOARD_GITHUB_PAT=$(      printf '%s' "${SECRETS}" | grep '^ADMIN_DASHBOARD_GITHUB_PAT='                       | cut -d= -f2- || true)
          GRAFANA_URL=$(           printf '%s' "${SECRETS}" | grep '^GRAFANA_URL='                            | cut -d= -f2- || true)
          SENTRY_AUTH_TOKEN=$(     printf '%s' "${SECRETS}" | grep '^SENTRY_AUTH_TOKEN='                      | cut -d= -f2- || true)
          # If not in SOPS file, derive from live matcher API (public endpoint, no auth needed)
          if [[ -z "${DEFAULT_MATCHER:-}" ]]; then
            DEFAULT_MATCHER=$(curl -sf "https://${NETWORK}-matcher.decentralchain.io/matcher" 2>/dev/null | tr -d '"' || echo "")
          fi
          echo "[secrets-push] Keys extracted: PG=${#PG_PASS} WALLET=${#WALLET_SEED} REDIS=${#REDIS_PASS} NODE_API=${#NODE_API_KEY} MATCHER=${#DEFAULT_MATCHER} MATCHER_SEED=${#MATCHER_SEED} MATCHER_PASS=${#MATCHER_PASS}"

          # ── 1. Append sensitive values to secrets file ──────────────────────
          {
            printf '# Sensitive values — injected via SSH push (SOPS), never via Linode UDF\n'
            printf 'PGPASSWORD=%s\n'           "${PG_PASS}"
            # BPS (blockchain-postgres-sync) uses envy::prefixed("POSTGRES__")
            # and cannot read standard PG* vars — mirror the password under that prefix.
            printf 'POSTGRES__PASSWORD=%s\n'   "${PG_PASS}"
            printf 'DCC_WALLET_SEED=%s\n'      "${WALLET_SEED}"
            printf 'DCC_WALLET_PASSWORD=%s\n'  "${WALLET_PASS}"
            # Redis — shared by websocket-api (REPO__PASSWORD) and BPS (REDIS_URL).
            # REDIS_PASSWORD must exist in secrets/${NETWORK}.env (SOPS-encrypted).
            if [[ -n "${REDIS_PASS:-}" ]]; then
              printf 'REDIS_PASSWORD=%s\n'     "${REDIS_PASS}"
              # websocket-api reads REPO__PASSWORD via envy::prefixed("REPO__")
              printf 'REPO__PASSWORD=%s\n'     "${REDIS_PASS}"
              # BPS reads REDIS_URL to decide whether to enable Redis publishing.
              printf 'REDIS_URL=redis://:%s@127.0.0.1:6379/\n' "${REDIS_PASS}"
            else
              printf '# WARNING: REDIS_PASSWORD not found in SOPS secrets — Redis publishing disabled.\n'
              printf '# Add REDIS_PASSWORD=<password> to secrets/%s.env and re-run push-secrets.\n' "${NETWORK}"
            fi
            # Node REST API key — used by Caddy to inject X-API-Key for protected endpoints
            # so the public blockchain explorer can display peer data.
            if [[ -n "${NODE_API_KEY:-}" ]]; then
              printf 'MAIN_NODE_REST_API_KEY=%s\n' "${NODE_API_KEY}"
            fi
            # data-service non-secret config — required by the service on startup.
            # DEFAULT_MATCHER is the DEX matcher public key (fetched from matcher API).
            printf 'DEFAULT_MATCHER=%s\n'                       "${DEFAULT_MATCHER}"
            # RATE_PAIR_ACCEPTANCE_VOLUME_THRESHOLD must be a positive integer.
            printf 'RATE_PAIR_ACCEPTANCE_VOLUME_THRESHOLD=%s\n' "${RATE_PAIR_ACCEPTANCE_VOLUME_THRESHOLD:-1}"
            printf 'RATE_THRESHOLD_ASSET_ID=%s\n'               "${RATE_THRESHOLD_ASSET_ID:-DCC}"
            # Admin dashboard — OAuth, JWT, and operational integration keys
            if [[ -n "${ADMIN_OAUTH_CLIENT_ID:-}" ]]; then
              printf 'ADMIN_DASHBOARD_GITHUB_OAUTH_CLIENT_ID=%s\n'     "${ADMIN_OAUTH_CLIENT_ID}"
              printf 'ADMIN_DASHBOARD_GITHUB_OAUTH_CLIENT_SECRET=%s\n' "${ADMIN_OAUTH_CLIENT_SEC}"
              printf 'ADMIN_DASHBOARD_JWT_SECRET=%s\n'                 "${ADMIN_JWT_SECRET}"
            fi
            # GitHub PAT for CI/CD status page (Actions: Read on Decentral-America/*)
            if [[ -n "${ADMIN_DASHBOARD_GITHUB_PAT:-}" ]]; then
              printf 'ADMIN_DASHBOARD_GITHUB_PAT=%s\n' "${ADMIN_DASHBOARD_GITHUB_PAT}"
            fi
            # Grafana embed URL (non-secret, but stored in SOPS for consistency)
            if [[ -n "${GRAFANA_URL:-}" ]]; then
              printf 'GRAFANA_URL=%s\n' "${GRAFANA_URL}"
            fi
            # Sentry auth token for server-side issues API proxy
            if [[ -n "${SENTRY_AUTH_TOKEN:-}" ]]; then
              printf 'SENTRY_AUTH_TOKEN=%s\n' "${SENTRY_AUTH_TOKEN}"
            fi
          } | $SSH "sudo tee /tmp/secrets-patch.env > /dev/null && \
            sudo touch /opt/dcc/secrets/${NETWORK}.env && \
            sudo bash -c 'cat /tmp/secrets-patch.env /opt/dcc/secrets/${NETWORK}.env \
              | awk -F= \"!seen[\\\$1]++\" > /tmp/secrets-merged.env \
              && mv /tmp/secrets-merged.env /opt/dcc/secrets/${NETWORK}.env \
              && rm -f /tmp/secrets-patch.env \
              && chmod 640 /opt/dcc/secrets/${NETWORK}.env \
              && chown root:deploy /opt/dcc/secrets/${NETWORK}.env'"
          echo "[secrets-push] Secrets file updated (upsert — no duplicates)."

          # ── 2. Set real postgres password (SQL dollar-quoting) ──────────────
          # Dollar-quoted literals are immune to single-quote injection.
          # Tag '$dccpw$' will not appear in any real password.
          $SSH "sudo -u postgres psql" << PGEOF
          ALTER ROLE dcc WITH PASSWORD \$dccpw\$${PG_PASS}\$dccpw\$;
          PGEOF
          echo "[secrets-push] Postgres password set."

          # ── 3. Write matcher config ──────────────────────────────────────────
          # Uses in-mem account storage — seed is injected via MATCHER_SEED in
          # the secrets env file read by the matcher compose service.
          CHAIN_ID=$($SSH "grep '^CHAIN_ID=' /opt/dcc/secrets/${NETWORK}.env | cut -d= -f2" 2>/dev/null || true)
          if [[ -z "${CHAIN_ID}" ]]; then
            case "${NETWORK}" in
              testnet)  CHAIN_ID="33" ;;
              stagenet) CHAIN_ID="83" ;;
              mainnet)  CHAIN_ID="63" ;;
              *)        echo "[secrets-push] ERROR: unknown NETWORK '${NETWORK}' — cannot derive CHAIN_ID"; exit 1 ;;
            esac
            echo "[secrets-push] CHAIN_ID not found in secrets file — defaulting to ${CHAIN_ID} for ${NETWORK}"
          fi
          case "${CHAIN_ID}" in
            63) ADDR_SCHEME="?" ;;
            83) ADDR_SCHEME="S" ;;
            33) ADDR_SCHEME="!" ;;
            *)  ADDR_SCHEME="D" ;;
          esac
          # Escape REDIS_PASS and PG_PASS for embedding in HOCON.
          REDIS_PASS_ESC=$(printf '%s' "${REDIS_PASS}" | python3 -c "
          import sys, json
          raw = sys.stdin.read()
          print(json.dumps(raw)[1:-1], end='')
          ")
          PG_PASS_ESC=$(printf '%s' "${PG_PASS}" | python3 -c "
          import sys, json
          raw = sys.stdin.read()
          print(json.dumps(raw)[1:-1], end='')
          ")
          {
            printf '# DecentralChain DEX Matcher local config -- written by SSH push (SOPS)\n'
            printf '# Network: %s  Chain ID: %s\n' "${NETWORK}" "${CHAIN_ID}"
            printf 'dcc.dex {\n'
            printf '  address-scheme-character = "%s"\n'  "${ADDR_SCHEME}"
            printf '  dcc-blockchain-client.grpc.target = "127.0.0.1:6887"\n'
            printf '  dcc-blockchain-client.blockchain-updates-grpc.target = "127.0.0.1:6881"\n'
            printf '  account-storage.type = in-mem\n'
            printf '  rest-api.api-key-hashes = ["%s"]\n' "${MATCHER_HASH}"
            # Redis runs on port 6379 (standard), not the matcher default 1932.
            if [[ -n "${REDIS_PASS:-}" ]]; then
              printf '  redis.address = "redis://:%s@localhost:6379"\n' "${REDIS_PASS_ESC}"
            else
              printf '  redis.address = "redis://localhost:6379"\n'
            fi
            # Postgres: system postgres on 5432 with dcc_<network> database.
            # Matcher default is 5435 / database "user" which don't exist on this host.
            printf '  postgres {\n'
            printf '    server-name = "localhost"\n'
            printf '    port-number = 5432\n'
            printf '    database = "dcc_%s"\n' "${NETWORK}"
            printf '    user = "dcc"\n'
            printf '    password = "%s"\n' "${PG_PASS_ESC}"
            printf '  }\n'
            printf '}\n'
          } | $SSH "sudo tee /opt/dcc/config/matcher-${NETWORK}/local.conf > /dev/null && \
                    sudo chmod 644 /opt/dcc/config/matcher-${NETWORK}/local.conf && \
                    sudo chown root:deploy /opt/dcc/config/matcher-${NETWORK}/local.conf"
          echo "[secrets-push] Matcher config written (in-mem account storage)."

          if [[ -z "${MATCHER_SEED:-}" ]]; then
            echo "[secrets-push] WARNING: MATCHER_SEED not in SOPS — matcher will start with a random key."
            echo "[secrets-push] Add MATCHER_SEED (15-word mnemonic) to secrets/${NETWORK}.env and re-run."
          fi

          rm -f /tmp/deploy_key
          echo "[secrets-push] Done. All sensitive secrets injected directly. Linode saw none."
