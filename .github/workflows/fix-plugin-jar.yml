name: Fix Plugin JAR — Remove Stale Proto Classes
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  fix:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Remove stale protobuf classes from dcc-grpc.jar
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             echo "=== Before: check for protobuf classes in dcc-grpc.jar ==="
             python3 -c "
import zipfile
z = zipfile.ZipFile(\"/opt/dcc/plugins/testnet/dcc-grpc.jar\")
protos = [n for n in z.namelist() if n.startswith(\"io/decentralchain/protobuf\") or n.startswith(\"io/decentralchain/events\")]
print(\"Proto/events classes in dcc-grpc.jar:\", len(protos))
print(\"First 5:\", protos[:5])
z.close()
" 2>/dev/null
             echo "=== Removing stale io.decentralchain.protobuf + io.decentralchain.events classes ==="
             cp /opt/dcc/plugins/testnet/dcc-grpc.jar /opt/dcc/plugins/testnet/dcc-grpc.jar.bak
             python3 -c "
import zipfile, os, shutil
src = \"/opt/dcc/plugins/testnet/dcc-grpc.jar\"
tmp = \"/tmp/dcc-grpc-fixed.jar\"
with zipfile.ZipFile(src, \"r\") as zin:
    with zipfile.ZipFile(tmp, \"w\", zipfile.ZIP_DEFLATED) as zout:
        removed = 0
        for item in zin.infolist():
            n = item.filename
            if n.startswith(\"io/decentralchain/protobuf\") or n.startswith(\"io/decentralchain/events\") or n.startswith(\"scalapb/\"):
                removed += 1
            else:
                zout.writestr(item, zin.read(item.filename))
        print(f\"Removed {removed} stale classes\")
shutil.move(tmp, src)
print(\"Done\")
" 2>/dev/null
             echo "=== After: verify Block\$Header gone ==="
             python3 -c "
import zipfile
z = zipfile.ZipFile(\"/opt/dcc/plugins/testnet/dcc-grpc.jar\")
bh = [n for n in z.namelist() if \"Block\" in n and \"Header\" in n and \"protobuf\" in n]
print(\"Block\$Header in dcc-grpc.jar:\", bh)
z.close()
"
             echo "=== Do same for dcc-ext.jar ==="
             python3 -c "
import zipfile, os, shutil
src = \"/opt/dcc/plugins/testnet/dcc-ext.jar\"
tmp = \"/tmp/dcc-ext-fixed.jar\"
with zipfile.ZipFile(src, \"r\") as zin:
    with zipfile.ZipFile(tmp, \"w\", zipfile.ZIP_DEFLATED) as zout:
        removed = 0
        for item in zin.infolist():
            n = item.filename
            if n.startswith(\"io/decentralchain/protobuf\") or n.startswith(\"scalapb/\"):
                removed += 1
            else:
                zout.writestr(item, zin.read(item.filename))
        print(f\"dcc-ext.jar: removed {removed} stale classes\")
shutil.move(tmp, src)
print(\"Done\")
" 2>/dev/null
             echo "=== Restart node to pick up clean plugin JARs ==="
             docker restart node-scala-testnet
             sleep 20
             docker ps --format "{{.Names}}\t{{.Status}}" | grep node-scala
             curl -s http://localhost:6869/node/version 2>/dev/null || echo "(starting)"'
          rm -f /tmp/id_rsa
