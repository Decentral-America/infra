name: Fix Plugin JARs
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  fix:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Write fix script locally
        run: |
          python3 -c "
content = '''import zipfile, shutil
for jar, label in [(\"/opt/dcc/plugins/testnet/dcc-grpc.jar\", \"dcc-grpc\"), (\"/opt/dcc/plugins/testnet/dcc-ext.jar\", \"dcc-ext\")]:
    try:
        tmp = \"/tmp/\" + label + \"-fixed.jar\"
        removed = 0
        with zipfile.ZipFile(jar, \"r\") as zin:
            with zipfile.ZipFile(tmp, \"w\", zipfile.ZIP_DEFLATED) as zout:
                for item in zin.infolist():
                    n = item.filename
                    if n.startswith(\"io/decentralchain/protobuf\") or n.startswith(\"scalapb/\") or n.startswith(\"io/decentralchain/events/\"):
                        removed += 1
                    else:
                        zout.writestr(item, zin.read(item.filename))
        shutil.copyfile(jar, jar + \".bak\")
        shutil.move(tmp, jar)
        print(label + \": removed \" + str(removed) + \" stale classes\")
    except Exception as e:
        print(label + \": ERROR \" + str(e))
'''
open('/tmp/fix_jars.py', 'w').write(content)
print('Script written')
"
      - name: Deploy fix to VPS and restart node
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          scp -i /tmp/id_rsa -o StrictHostKeyChecking=no /tmp/fix_jars.py "${SSH_USER}@${SSH_HOST}:/tmp/fix_jars.py"
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             python3 /tmp/fix_jars.py
             rm -f /tmp/fix_jars.py
             echo "=== Restarting node ==="
             docker restart node-scala-testnet
             sleep 25
             docker ps --format "{{.Names}}\t{{.Status}}" | grep node-scala
             curl -s http://localhost:6869/node/version 2>/dev/null || echo "(starting)"
             sleep 10
             echo "=== Port 6881 check ==="
             ss -tlnp 2>/dev/null | grep 6881 || echo "port 6881 not yet open"'
          rm -f /tmp/id_rsa
