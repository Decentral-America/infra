name: Verify API Key Rotation
# Run after rotating API keys to confirm all 4 nodes accept the new keys.
# Fails with a clear error if any node still rejects the key (wrong hash in config).
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Get LKE kubeconfig
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
        run: |
          CID=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters" | \
            jq -r '.data[] | select(.label | test("testnet")) | .id' | head -1)
          RAW=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters/${CID}/kubeconfig" | \
            jq -r '.kubeconfig')
          echo "$RAW" | base64 -d > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV

      - name: Verify main node API key
        env:
          SSH_KEY:      ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST:     ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER:     ${{ secrets.TESTNET_DEPLOY_USER }}
          MAIN_API_KEY: ${{ secrets.MAIN_NODE_REST_API_KEY }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          echo "${MAIN_API_KEY}" > /tmp/.main_key
          scp -i /tmp/id_rsa -o StrictHostKeyChecking=no /tmp/.main_key "${SSH_USER}@${SSH_HOST}:/tmp/.main_key" 2>/dev/null
          rm -f /tmp/.main_key
          RESULT=$(ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no "${SSH_USER}@${SSH_HOST}" \
            'KEY=$(cat /tmp/.main_key | tr -d "\n"); rm -f /tmp/.main_key
             HTTP=$(curl -s -o /dev/null -w "%{http_code}" -H "X-API-Key: $KEY" http://localhost:6869/peers/connected)
             echo $HTTP')
          echo "Main node API key check: HTTP $RESULT"
          if [ "$RESULT" != "200" ]; then
            echo "FAIL: Main node rejected key (HTTP $RESULT). Check api-key-hash in dcc.conf."
            exit 1
          fi
          rm -f /tmp/id_rsa

      - name: Verify gen-0 API key
        env:
          API_KEY: ${{ secrets.GEN_0_NODE_REST_API_KEY }}
        run: |
          kubectl port-forward pod/dcc-gen-0-0 -n dcc 16869:6869 &
          PF_PID=$!
          sleep 5
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" -H "X-API-Key: $API_KEY" http://localhost:16869/peers/connected)
          echo "Gen-0 API key check: HTTP $HTTP"
          kill $PF_PID 2>/dev/null || true
          if [ "$HTTP" != "200" ]; then
            echo "FAIL: Gen-0 rejected key (HTTP $HTTP). Check api-key-hash in nodes.yaml."
            exit 1
          fi

      - name: Verify gen-1 API key
        env:
          API_KEY: ${{ secrets.GEN_1_NODE_REST_API_KEY }}
        run: |
          kubectl port-forward pod/dcc-gen-1-0 -n dcc 16870:6870 &
          PF_PID=$!
          sleep 5
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" -H "X-API-Key: $API_KEY" http://localhost:16870/peers/connected)
          echo "Gen-1 API key check: HTTP $HTTP"
          kill $PF_PID 2>/dev/null || true
          if [ "$HTTP" != "200" ]; then
            echo "FAIL: Gen-1 rejected key (HTTP $HTTP). Check api-key-hash in nodes.yaml."
            exit 1
          fi

      - name: Verify val-0 API key
        env:
          API_KEY: ${{ secrets.VAL_0_NODE_REST_API_KEY }}
        run: |
          kubectl port-forward pod/dcc-val-0-0 -n dcc 16871:6871 &
          PF_PID=$!
          sleep 5
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" -H "X-API-Key: $API_KEY" http://localhost:16871/peers/connected)
          echo "Val-0 API key check: HTTP $HTTP"
          kill $PF_PID 2>/dev/null || true
          if [ "$HTTP" != "200" ]; then
            echo "FAIL: Val-0 rejected key (HTTP $HTTP). Check api-key-hash in nodes.yaml."
            exit 1
          fi

      - name: Summary
        run: echo "All 4 nodes accepted their API keys successfully."
