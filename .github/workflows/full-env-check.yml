name: Full Env Check
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        with:
          host:     ${{ secrets.TESTNET_DEPLOY_HOST }}
          username: ${{ secrets.TESTNET_DEPLOY_USER }}
          key:      ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          script: |
            echo "=== All keys in secrets file (values masked) ==="
            sudo grep -v "^#\|^$" /opt/dcc/secrets/testnet.env | sed 's/=.*/=***/' | sort || echo "file error"
            echo "=== BPS original config (from its own env, masked) ==="
            docker inspect blockchain-postgres-sync-testnet --format '{{range .Config.Env}}{{println .}}{{end}}' 2>/dev/null | sed 's/=.*/=***/' | grep -E "^POSTGRES|^PG|^BLOCKCHAIN|^CHAIN|^STARTING|^REDIS|^METRICS" | sort || echo "container not inspectable"
