name: BPS Table Truncate via postgres container
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  truncate:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Truncate BPS postgres tables
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" 'set +e
            docker stop blockchain-postgres-sync-testnet 2>/dev/null
            PGPASSWORD=$(grep "^PGPASSWORD=" /opt/dcc/secrets/testnet.env 2>/dev/null | cut -d= -f2)
            echo "PGPASSWORD present: $([ -n "$PGPASSWORD" ] && echo YES || echo NO)"
            echo "=== Truncate via temp postgres container ==="
            docker run --rm --network host \
              -e PGPASSWORD="$PGPASSWORD" \
              postgres:17-alpine \
              psql -h localhost -U dcc -d dcc_testnet \
              -c "DO \$\$ DECLARE r RECORD; BEGIN FOR r IN SELECT tablename FROM pg_tables WHERE schemaname='"'"'public'"'"' LOOP EXECUTE '"'"'TRUNCATE '"'"' || r.tablename || '"'"' CASCADE'"'"'; END LOOP; END; \$\$;" \
              2>&1 && echo "TRUNCATED" || echo "FAILED"
            echo "=== Start BPS ==="
            docker start blockchain-postgres-sync-testnet 2>/dev/null && echo OK
            sleep 20
            echo "=== BPS last logs ==="
            docker logs blockchain-postgres-sync-testnet --tail=5 2>&1
            echo "=== BPS status ==="
            docker ps --format "{{.Names}}\t{{.Status}}" | grep postgres'
          rm -f /tmp/id_rsa
