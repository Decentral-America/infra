name: Debug WebSocket Startup

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Target network'
        required: true
        default: 'testnet'
        type: choice
        options: [testnet]

permissions:
  contents: read

jobs:
  debug:
    name: Debug websocket-api startup
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Run binary directly and capture output
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        env:
          NETWORK:     ${{ inputs.network }}
          GHCR_TOKEN:  ${{ secrets.GHCR_TOKEN }}
          IMAGE:       ghcr.io/decentral-america/websocket-api:07263ac5cfe8762cfccc3b500295600a088eff72
        with:
          host:     ${{ secrets.TESTNET_DEPLOY_HOST }}
          username: ${{ secrets.TESTNET_DEPLOY_USER }}
          key:      ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          envs:     NETWORK,GHCR_TOKEN,IMAGE
          script: |
            set -euo pipefail

            echo "$GHCR_TOKEN" | docker login ghcr.io -u x-access-token --password-stdin

            echo "=== Running binary for 5 seconds to capture startup logs ==="
            timeout 5 docker run --rm \
              --network host \
              --env-file /opt/dcc/secrets/${NETWORK}.env \
              -e PORT=8082 \
              -e REPO__HOST=127.0.0.1 \
              -e REPO__PORT=6379 \
              -e REPO__USERNAME="" \
              -e REPO__KEY_TTL=60 \
              -e REPO__MAX_POOL_SIZE=10 \
              -e REPO__REFRESH_THREADS=1 \
              "$IMAGE" 2>&1 || true

            echo "=== Binary exited ==="

            echo "=== Checking env_file content (sensitive values masked) ==="
            grep -E "^REPO__|^PORT|^REDIS" /opt/dcc/secrets/${NETWORK}.env | sed 's/=.*/=***/' || true

            echo "=== Redis connectivity check ==="
            REDIS_PASS=$(grep '^REDIS_PASSWORD=' /opt/dcc/secrets/${NETWORK}.env | cut -d= -f2- || true)
            docker exec redis-${NETWORK} redis-cli -h 127.0.0.1 -a "$REDIS_PASS" ping || true

            echo "=== ldd on binary ==="
            docker run --rm --entrypoint="" "$IMAGE" ldd /app/service 2>&1 || echo "ldd not available in distroless"
