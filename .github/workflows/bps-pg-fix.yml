name: BPS Final Reset Attempt
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  reset:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Reset BPS postgres via host psql
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'docker stop blockchain-postgres-sync-testnet 2>/dev/null
             which psql && echo "psql found on host" || echo "psql not on host"
             psql -U dcc dcc_testnet -c "SELECT count(*) FROM pg_tables WHERE schemaname='"'"'public'"'"'" 2>&1
             psql -U dcc dcc_testnet -c "SELECT tablename FROM pg_tables WHERE schemaname='"'"'public'"'"'" 2>&1 | head -20
             for t in blocks transactions microblocks transaction_ids assets scripts leasing addresses; do
               psql -U dcc dcc_testnet -c "TRUNCATE $t CASCADE" 2>&1 | head -2 || true
             done
             docker start blockchain-postgres-sync-testnet 2>/dev/null
             sleep 15
             docker logs blockchain-postgres-sync-testnet --tail=5 2>&1
             docker ps --format "{{.Names}}\t{{.Status}}" | grep -E "postgres|matcher"'
          rm -f /tmp/id_rsa
