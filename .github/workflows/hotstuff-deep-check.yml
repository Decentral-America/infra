name: HotStuff Deep Diagnostic
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Deep HotStuff check
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             echo "=== Finality full ==="
             curl -s http://localhost:6869/blockchain/finality 2>/dev/null | python3 -m json.tool
             echo "=== Peers connected (full) ==="
             curl -s http://localhost:6869/peers/connected 2>/dev/null | python3 -m json.tool | head -30
             echo "=== Peers all ==="
             curl -s http://localhost:6869/peers/all 2>/dev/null | python3 -m json.tool | head -30
             echo "=== Generators at current height ==="
             HEIGHT=$(curl -s http://localhost:6869/blocks/height 2>/dev/null | python3 -c "import json,sys; print(json.load(sys.stdin)[\"height\"])" 2>/dev/null)
             echo "Height: $HEIGHT"
             curl -s "http://localhost:6869/generators/at/$HEIGHT" 2>/dev/null
             echo ""
             echo "=== HotStuff all logs (last 200s) ==="
             docker logs node-scala-testnet --since 2026-06-27T22:00:00Z 2>&1 | grep -i "HotStuff\|hotStuff\|hotstuff\|round\|vote\|QC\|quorum" | grep -v "DEBUG\|HTTP\|GET\|POST" | tail -20
             echo "=== Node version ==="
             curl -s http://localhost:6869/node/version 2>/dev/null'
          rm -f /tmp/id_rsa
