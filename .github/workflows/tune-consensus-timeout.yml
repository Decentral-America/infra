name: Tune HotStuff Round Timeout
# Queries hotstuff_round_latency_ms histogram from Kamon (port 6870),
# computes p99 + 20% margin, updates dcc.conf and nodes.yaml, commits,
# and restarts the main node. Manual override via timeout_ms input.
on:
  workflow_dispatch:
    inputs:
      timeout_ms:
        description: 'Manual timeout override in ms (0 = auto from Kamon p99+20%)'
        required: false
        default: '0'
        type: string
  workflow_call:

permissions:
  contents: write

jobs:
  tune:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - uses: actions/checkout@v4

      - name: Query Kamon p99 and compute new timeout
        id: compute
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa

          MANUAL="${{ inputs.timeout_ms }}"
          if [ "${MANUAL}" != "0" ] && [ -n "${MANUAL}" ]; then
            echo "Using manual timeout: ${MANUAL}ms"
            echo "NEW_TIMEOUT=${MANUAL}" >> "$GITHUB_OUTPUT"
            echo "SOURCE=manual" >> "$GITHUB_OUTPUT"
            rm -f /tmp/id_rsa
            exit 0
          fi

          echo "=== Querying Kamon metrics from port 6870 ==="
          METRICS=$(ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'curl -s http://localhost:6870/metrics 2>/dev/null | grep "hotstuff_round_latency" | grep -v "^#"')
          echo "Raw metrics:"
          echo "$METRICS"

          # Compute p99+20% using $'...' quoting so no heredoc terminator appears at column 0.
          # Falls back to 1200ms if histogram is absent or empty.
          NEW_TIMEOUT=$(echo "$METRICS" | python3 -c $'
import sys, re, math
lines = sys.stdin.read().strip().splitlines()
buckets = {}
total_count = 0
for line in lines:
    m = re.match(r\'hotstuff_round_latency_ms_bucket\\{le="([^"]+)"\\}\\s+(\\d+)\', line)
    if m:
        buckets[float(m.group(1))] = int(m.group(2))
    m2 = re.match(r\'hotstuff_round_latency_ms_count\\s+(\\d+)\', line)
    if m2:
        total_count = int(m2.group(1))
if not buckets or total_count == 0:
    print(1200)
    sys.exit(0)
target = 0.99 * total_count
sorted_buckets = sorted(buckets.items())
p99 = sorted_buckets[-1][0]
prev_count = 0
prev_le = 0
for le, count in sorted_buckets:
    if le == float("inf"):
        continue
    if count >= target:
        frac = (target - prev_count) / max(count - prev_count, 1)
        p99 = prev_le + frac * (le - prev_le)
        break
    prev_count = count
    prev_le = le
new_timeout = max(400, int(math.ceil((p99 * 1.20) / 50) * 50))
print(new_timeout)
')

          echo "=== Computed new round-timeout-ms: ${NEW_TIMEOUT}ms ==="
          echo "NEW_TIMEOUT=${NEW_TIMEOUT}" >> "$GITHUB_OUTPUT"
          echo "SOURCE=kamon-p99" >> "$GITHUB_OUTPUT"
          rm -f /tmp/id_rsa

      - name: Update dcc.conf and nodes.yaml in repo
        run: |
          NEW_TIMEOUT="${{ steps.compute.outputs.NEW_TIMEOUT }}"
          echo "Setting round-timeout-ms = ${NEW_TIMEOUT}ms (source: ${{ steps.compute.outputs.SOURCE }})"

          sed -i "s/round-timeout-ms = [0-9]*/round-timeout-ms = ${NEW_TIMEOUT}/" \
            node-config/testnet/dcc.conf
          echo "node-config/testnet/dcc.conf:"
          grep "round-timeout" node-config/testnet/dcc.conf

          sed -i "s/round-timeout-ms = [0-9]*/round-timeout-ms = ${NEW_TIMEOUT}/g" \
            clusters/testnet/apps/nodes.yaml
          echo "clusters/testnet/apps/nodes.yaml:"
          grep "round-timeout" clusters/testnet/apps/nodes.yaml

      - name: Commit and push updated configs
        run: |
          NEW_TIMEOUT="${{ steps.compute.outputs.NEW_TIMEOUT }}"
          git config user.name "jourlez"
          git config user.email "josuecr.288@gmail.com"
          git add node-config/testnet/dcc.conf clusters/testnet/apps/nodes.yaml
          git diff --cached --stat
          git commit -m "ops(testnet): tune round-timeout-ms -> ${NEW_TIMEOUT}ms (HotStuff p99+20%)"
          git push

      - name: Deploy to main node (VPS) and restart
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          scp -i /tmp/id_rsa -o StrictHostKeyChecking=no \
            node-config/testnet/dcc.conf \
            "${SSH_USER}@${SSH_HOST}:/tmp/dcc.conf.new"
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set -e
             echo "=== Apply dcc.conf ==="
             sudo cp /tmp/dcc.conf.new /opt/dcc/config/node-testnet/dcc.conf
             sudo chown root:root /opt/dcc/config/node-testnet/dcc.conf
             sudo chmod 644 /opt/dcc/config/node-testnet/dcc.conf
             rm -f /tmp/dcc.conf.new
             echo "=== Restart node (no data wipe) ==="
             docker restart node-scala-testnet
             sleep 45
             echo "=== Verify new timeout ==="
             docker logs node-scala-testnet --since 50s 2>&1 | grep -i "round-timeout\|hotstuff\|started" | head -5
             curl -s http://localhost:6869/blocks/height 2>/dev/null'
          rm -f /tmp/id_rsa
          echo "Gen nodes pick up new timeout via Flux GitOps within ~1 min (nodes.yaml committed above)"
