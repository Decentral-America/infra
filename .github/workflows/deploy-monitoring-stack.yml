name: Deploy Monitoring Stack
on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy'
        required: false
        default: 'manual'
  workflow_call:
permissions:
  contents: read
concurrency:
  group: deploy-monitoring-stack
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: testnet
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Deploy monitoring config to VPS
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          scp -i /tmp/id_rsa -o StrictHostKeyChecking=yes \
            monitoring/prometheus.yml monitoring/alerts.yml \
            monitoring/loki-config.yaml monitoring/config.alloy \
            monitoring/alertmanager.yml monitoring/alert-webhook.py \
            monitoring/scripts/deploy-monitoring.sh \
            "${SSH_USER}@${SSH_HOST}:/tmp/"
          scp -i /tmp/id_rsa -o StrictHostKeyChecking=yes \
            monitoring/datasources/loki.yaml \
            monitoring/datasources/prometheus.yaml \
            "${SSH_USER}@${SSH_HOST}:/tmp/"
          scp -i /tmp/id_rsa -o StrictHostKeyChecking=yes \
            compose/loki.yml "${SSH_USER}@${SSH_HOST}:/tmp/loki-compose.yml"
          scp -i /tmp/id_rsa -o StrictHostKeyChecking=yes \
            compose/prometheus.yml "${SSH_USER}@${SSH_HOST}:/tmp/prometheus-compose.yml"
          # Grafana (dashboards UI, embedded in admin-dashboard). Previously not managed by this
          # deploy at all, so nothing (re)started it -> 502 at grafana.testnet.decentralchain.io.
          scp -i /tmp/id_rsa -o StrictHostKeyChecking=yes \
            compose/grafana.yml "${SSH_USER}@${SSH_HOST}:/tmp/grafana-compose.yml"
          scp -i /tmp/id_rsa -o StrictHostKeyChecking=yes \
            monitoring/grafana.ini "${SSH_USER}@${SSH_HOST}:/tmp/grafana.ini"
          scp -i /tmp/id_rsa -o StrictHostKeyChecking=yes \
            monitoring/dashboards/dashboards.yaml monitoring/dashboards/testnet.json \
            "${SSH_USER}@${SSH_HOST}:/tmp/"
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=yes "${SSH_USER}@${SSH_HOST}" \
            bash /tmp/deploy-monitoring.sh
          rm -f /tmp/id_rsa
