name: Update Caddy
# Reads domain config from testnet.tfvars, reads MAIN_NODE_REST_API_KEY from SOPS,
# generates the complete Caddyfile locally in the runner, SCPs it to the server,
# then restarts Caddy. No variable passing through SSH env — generates locally,
# pushes atomically.
#
# ⚠ The generated Caddyfile below uses `rate_limit` (NODE/MATCHER domains),
# which requires the custom image built by build-caddy-ratelimit.yml — the
# stock Caddy image doesn't ship that module. Do NOT run this workflow until
# compose/caddy.yml's `image:` has been updated to that custom build's digest
# (see the comment there), or Caddy will fail to start on restart.
on:
  workflow_dispatch:
    inputs:
      network:
        required: true
        default: 'testnet'
        type: choice
        options: [testnet]
permissions:
  contents: read
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only testnet is selectable today (ungated by policy); wiring this now
    # means adding stagenet/mainnet to the choice list later is safe by default.
    environment: ${{ inputs.network }}

    steps:
      - name: Checkout infra
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Generate Caddyfile
        id: gen
        env:
          SOPS_AGE_KEY: ${{ secrets.AGE_KEY_TESTNET }}
          NETWORK:      ${{ inputs.network }}
        run: |
          set -euo pipefail

          # ── Read domains from tfvars ──────────────────────────────────────────
          parse() { grep "^${1}" terraform/testnet.tfvars | awk -F'"' '{print $2}'; }
          SCANNER=$(parse scanner_domain)
          DATA_SVC=$(parse data_service_domain)
          WEBSOCKET=$(parse websocket_domain)
          NODE=$(parse node_domain)
          MATCHER=$(parse matcher_domain)
          ADMIN=$(parse admin_domain)
          GRAFANA=$(parse grafana_domain)
          ACME=$(parse acme_email)

          echo "Domains read from testnet.tfvars:"
          echo "  scanner:      $SCANNER"
          echo "  data_service: $DATA_SVC"
          echo "  websocket:    $WEBSOCKET"
          echo "  node:         $NODE"
          echo "  matcher:      $MATCHER"
          echo "  admin:        $ADMIN"
          echo "  grafana:      $GRAFANA"
          echo "  acme:         $ACME"

          # ── Read MAIN_NODE_REST_API_KEY from SOPS ─────────────────────────────────
          SOPS_VERSION="v3.13.2"
          SOPS_SHA256="154dfe4cd70554bdd82b98e4cd4acf191d43d01ead6f00a73477aa44c4ac42ef"
          curl -fsSL "https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/sops-${SOPS_VERSION}.linux.amd64" -o /tmp/sops-bin
          echo "${SOPS_SHA256}  /tmp/sops-bin" | sha256sum --check --status
          install -m 755 /tmp/sops-bin /usr/local/bin/sops
          rm /tmp/sops-bin

          SECRETS=$(sops --decrypt "secrets/${NETWORK}.env" 2>/dev/null || echo "")
          NODE_API_KEY=$(printf '%s' "${SECRETS}" | grep '^MAIN_NODE_REST_API_KEY=' | cut -d= -f2- || true)
          if [[ -z "${NODE_API_KEY:-}" ]]; then
            echo "WARNING: MAIN_NODE_REST_API_KEY not in SOPS — /peers/* will return 403"
            NODE_API_KEY="missing"
          else
            echo "MAIN_NODE_REST_API_KEY found in SOPS"
          fi

          # ── Generate complete Caddyfile ───────────────────────────────────────
          cat > /tmp/Caddyfile << EOF
          # Generated by update-caddy.yml — do not edit manually
          {
              admin unix//run/caddy/admin.sock
              email ${ACME}
          }

          # Shared CORS origin allowlist for credentialed endpoints (node, matcher).
          # Reflecting Origin unconditionally alongside Allow-Credentials: true lets
          # any website make authenticated cross-origin requests on a visitor's
          # behalf (CWE-942) — @cors_allowed_origin only matches decentralchain.io
          # and its direct subdomains, the same trust boundary already used in the
          # scanner app's own CSP connect-src above.
          (cors_allowlist) {
              @cors_allowed_origin header_regexp Origin ^https://([a-z0-9-]+\.)?decentralchain\.io$
          }

          ${SCANNER} {
              handle /api/geo/* {
                  uri strip_prefix /api/geo
                  reverse_proxy https://ipinfo.io {
                      header_up Host ipinfo.io
                      # Strip upstream headers that should not be forwarded to the browser
                      header_down -Alt-Svc
                      header_down -Access-Control-Allow-Origin
                      header_down -Via
                  }
              }
              handle /api/greencheck/* {
                  uri replace /api/greencheck /api/v3/greencheck
                  reverse_proxy https://api.thegreenwebfoundation.org {
                      header_up Host api.thegreenwebfoundation.org
                      header_down -Alt-Svc
                      header_down -Via
                  }
              }
              reverse_proxy localhost:3000
              header {
                  Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
                  X-Content-Type-Options "nosniff"
                  X-Frame-Options "DENY"
                  Referrer-Policy "strict-origin-when-cross-origin"
                  X-XSS-Protection "0"
                  Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://*.decentralchain.io wss://*.decentralchain.io https://ipinfo.io https://api.thegreenwebfoundation.org; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"
                  Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"
                  Cross-Origin-Opener-Policy "same-origin"
                  -Server
              }
              encode gzip zstd
              log
          }

          ${DATA_SVC} {
              reverse_proxy localhost:8080
              header {
                  Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
                  X-Content-Type-Options "nosniff"
                  Referrer-Policy "strict-origin-when-cross-origin"
                  -Server
              }
              encode gzip zstd
              log
          }

          ${WEBSOCKET} {
              reverse_proxy localhost:8081
              header {
                  Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
                  X-Content-Type-Options "nosniff"
                  Referrer-Policy "strict-origin-when-cross-origin"
                  -Server
              }
              log
          }

          ${NODE} {
              import cors_allowlist

              # -- Rate limiting -------------------------------------------------------
              # Requires the custom image built by build-caddy-ratelimit.yml (stock
              # caddy:*-alpine doesn't ship github.com/mholt/caddy-ratelimit). Verified
              # locally: each zone below is isolated (a burst on one path doesn't
              # consume another path's budget) and correctly returns 429 once exhausted.
              @blocks_path path /blocks/*
              rate_limit @blocks_path {
                  zone blocks_per_ip {
                      key    {remote_host}
                      events 1000
                      window 1m
                  }
              }
              @broadcast path /transactions/broadcast
              rate_limit @broadcast {
                  zone broadcast_per_ip {
                      key    {remote_host}
                      events 50
                      window 1m
                  }
              }
              @other_api not path /blocks/* /transactions/broadcast
              rate_limit @other_api {
                  zone api_per_ip {
                      key    {remote_host}
                      events 300
                      window 1m
                  }
              }

              @options method OPTIONS
              handle @options {
                  # Reflect origin only if it's on the allowlist (see @cors_allowed_origin
                  # above) — required when the exchange sends credentials (cookies/auth).
                  # Vary tells caches this header varies. No match = no CORS headers at
                  # all, so the browser correctly refuses to expose the response.
                  header @cors_allowed_origin Access-Control-Allow-Origin {http.request.header.Origin}
                  header @cors_allowed_origin Access-Control-Allow-Credentials "true"
                  header @cors_allowed_origin Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
                  header @cors_allowed_origin Access-Control-Allow-Headers "Content-Type, Authorization, Accept, X-API-Key, timestamp, signature"
                  header @cors_allowed_origin Access-Control-Max-Age "3600"
                  header Vary "Origin"
                  respond "" 204
              }
              @protected path /peers/* /debug/* /consensus/*
              handle @protected {
                  reverse_proxy localhost:6869 {
                      header_up X-API-Key "${NODE_API_KEY}"
                      header_up -Origin
                      header_up -Referer
                  }
                  header {
                      Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
                      Vary "Origin"
                      -Server
                  }
                  header @cors_allowed_origin Access-Control-Allow-Origin {http.request.header.Origin}
                  header @cors_allowed_origin Access-Control-Allow-Credentials "true"
              }
              reverse_proxy localhost:6869 {
                  header_up -Origin
                  header_up -Referer
              }
              header {
                  Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
                  X-Content-Type-Options "nosniff"
                  Referrer-Policy "strict-origin-when-cross-origin"
                  Vary "Origin"
                  -Server
              }
              header @cors_allowed_origin Access-Control-Allow-Origin {http.request.header.Origin}
              header @cors_allowed_origin Access-Control-Allow-Credentials "true"
              log
          }

          ${MATCHER} {
              import cors_allowlist

              # -- Rate limiting (matcher) ----------------------------------------------
              # Same custom image requirement as NODE_DOMAIN above.
              rate_limit {
                  zone matcher_per_ip {
                      key    {remote_host}
                      events 300
                      window 1m
                  }
              }

              @options method OPTIONS
              handle @options {
                  # timestamp and signature are custom headers sent by the exchange DEX client.
                  # Origin reflected only if it's on the allowlist (@cors_allowed_origin above).
                  header @cors_allowed_origin Access-Control-Allow-Origin {http.request.header.Origin}
                  header @cors_allowed_origin Access-Control-Allow-Credentials "true"
                  header @cors_allowed_origin Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
                  header @cors_allowed_origin Access-Control-Allow-Headers "Content-Type, Authorization, Accept, timestamp, signature, X-API-Key"
                  header @cors_allowed_origin Access-Control-Max-Age "3600"
                  header Vary "Origin"
                  respond "" 204
              }
              reverse_proxy localhost:6886 {
                  header_up -Origin
                  header_up -Referer
              }
              header {
                  Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
                  X-Content-Type-Options "nosniff"
                  Referrer-Policy "strict-origin-when-cross-origin"
                  Vary "Origin"
                  -Server
              }
              header @cors_allowed_origin Access-Control-Allow-Origin {http.request.header.Origin}
              header @cors_allowed_origin Access-Control-Allow-Credentials "true"
              log
          }

          ${ADMIN} {
              reverse_proxy localhost:3001
              header {
                  Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
                  X-Content-Type-Options "nosniff"
                  X-Frame-Options "DENY"
                  Referrer-Policy "strict-origin-when-cross-origin"
                  -Server
              }
              encode gzip zstd
              log
          }

          $([ -n "${GRAFANA}" ] && cat << GRAFANA_BLOCK
          ${GRAFANA} {
              # Reverse proxy to Grafana NodePort on Frankfurt LKE worker.
              # No X-Frame-Options — allow iframe embedding in admin dashboard.
              # Grafana runs locally on Newark (compose/grafana.yml) on port 3002.
              reverse_proxy localhost:3002
              header {
                  Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
                  X-Content-Type-Options "nosniff"
                  Referrer-Policy "strict-origin-when-cross-origin"
                  -Server
              }
              encode gzip zstd
              log
          }
          GRAFANA_BLOCK
          )
          EOF

          echo "Caddyfile generated ($(wc -l < /tmp/Caddyfile) lines)"

      - name: Set up SSH credentials
        env:
          DEPLOY_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          DEPLOY_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload Caddyfile to server
        env:
          DEPLOY_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          set -euo pipefail
          scp -i ~/.ssh/deploy_key \
            /tmp/Caddyfile \
            "$DEPLOY_USER@$DEPLOY_HOST:/opt/dcc/caddy/Caddyfile"

      - name: Set permissions and restart Caddy
        env:
          DEPLOY_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
          NETWORK:     ${{ inputs.network }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o ConnectTimeout=10 \
            "$DEPLOY_USER@$DEPLOY_HOST" bash -s << REMOTE
          set -euo pipefail
          NETWORK="${NETWORK}"
          CF=/opt/dcc/caddy/Caddyfile
          sudo chmod 644 "\$CF"
          sudo chown deploy:deploy "\$CF"
          echo "=== Caddyfile lines ==="
          wc -l "\$CF"
          echo "=== Geo proxy block ==="
          grep -A5 "handle /api/geo" "\$CF" | head -8
          echo "=== CSP ==="
          grep "Content-Security" "\$CF" | head -1

          if docker inspect "caddy-\${NETWORK}" >/dev/null 2>&1; then
            docker restart "caddy-\${NETWORK}"
            echo "Caddy restarted."
          else
            echo "caddy-\${NETWORK} container missing — attempting compose up"
            if [ -f /opt/dcc/compose/caddy.yml ]; then
              NETWORK="\${NETWORK}" docker compose --project-name "caddy-\${NETWORK}" \
                -f /opt/dcc/compose/caddy.yml up -d \
              && echo "OK (compose up)" || echo "FAILED (compose up)"
            else
              echo "FAILED — /opt/dcc/compose/caddy.yml not found"
              ls /opt/dcc/compose/ 2>/dev/null || true
            fi
          fi
          REMOTE
