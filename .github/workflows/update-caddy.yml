name: Update Caddy
# Reads domain config from testnet.tfvars, reads MAIN_NODE_REST_API_KEY from SOPS,
# generates the complete Caddyfile locally in the runner, SCPs it to the server,
# then restarts Caddy. No variable passing through SSH env — generates locally,
# pushes atomically.
on:
  workflow_dispatch:
    inputs:
      network:
        required: true
        default: 'testnet'
        type: choice
        options: [testnet]
permissions:
  contents: read
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout infra
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Generate Caddyfile
        id: gen
        env:
          SOPS_AGE_KEY: ${{ secrets.AGE_KEY_TESTNET }}
          NETWORK:      ${{ inputs.network }}
        run: |
          set -euo pipefail

          # ── Read domains from tfvars ──────────────────────────────────────────
          parse() { grep "^${1}" terraform/testnet.tfvars | awk -F'"' '{print $2}'; }
          SCANNER=$(parse scanner_domain)
          DATA_SVC=$(parse data_service_domain)
          WEBSOCKET=$(parse websocket_domain)
          NODE=$(parse node_domain)
          MATCHER=$(parse matcher_domain)
          ADMIN=$(parse admin_domain)
          GRAFANA=$(parse grafana_domain)
          ACME=$(parse acme_email)

          echo "Domains read from testnet.tfvars:"
          echo "  scanner:      $SCANNER"
          echo "  data_service: $DATA_SVC"
          echo "  websocket:    $WEBSOCKET"
          echo "  node:         $NODE"
          echo "  matcher:      $MATCHER"
          echo "  admin:        $ADMIN"
          echo "  grafana:      $GRAFANA"
          echo "  acme:         $ACME"

          # ── Read MAIN_NODE_REST_API_KEY from SOPS ─────────────────────────────────
          SOPS_VERSION="v3.13.1"
          SOPS_SHA256="620a9d7e3352ababeca6908cea24a6e8b14ce89a448ddbd3f94f1ef3398f470a"
          curl -fsSL "https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/sops-${SOPS_VERSION}.linux.amd64" -o /tmp/sops-bin
          echo "${SOPS_SHA256}  /tmp/sops-bin" | sha256sum --check --status
          install -m 755 /tmp/sops-bin /usr/local/bin/sops
          rm /tmp/sops-bin

          SECRETS=$(sops --decrypt "secrets/${NETWORK}.env" 2>/dev/null || echo "")
          NODE_API_KEY=$(printf '%s' "${SECRETS}" | grep '^MAIN_NODE_REST_API_KEY=' | cut -d= -f2- || true)
          if [[ -z "${NODE_API_KEY:-}" ]]; then
            echo "WARNING: MAIN_NODE_REST_API_KEY not in SOPS — /peers/* will return 403"
            NODE_API_KEY="missing"
          else
            echo "MAIN_NODE_REST_API_KEY found in SOPS"
          fi

          # ── Generate complete Caddyfile ───────────────────────────────────────
          cat > /tmp/Caddyfile << EOF
          # Generated by update-caddy.yml — do not edit manually
          {
              admin unix//run/caddy/admin.sock
              email ${ACME}
          }

          ${SCANNER} {
              handle /api/geo/* {
                  uri strip_prefix /api/geo
                  reverse_proxy https://ipinfo.io {
                      header_up Host ipinfo.io
                      # Strip upstream headers that should not be forwarded to the browser
                      header_down -Alt-Svc
                      header_down -Access-Control-Allow-Origin
                      header_down -Via
                  }
              }
              handle /api/greencheck/* {
                  uri replace /api/greencheck /api/v3/greencheck
                  reverse_proxy https://api.thegreenwebfoundation.org {
                      header_up Host api.thegreenwebfoundation.org
                      header_down -Alt-Svc
                      header_down -Via
                  }
              }
              reverse_proxy localhost:3000
              header {
                  Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
                  X-Content-Type-Options "nosniff"
                  X-Frame-Options "DENY"
                  Referrer-Policy "strict-origin-when-cross-origin"
                  X-XSS-Protection "0"
                  Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://*.decentralchain.io wss://*.decentralchain.io https://ipinfo.io https://api.thegreenwebfoundation.org; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"
                  Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"
                  Cross-Origin-Opener-Policy "same-origin"
                  -Server
              }
              encode gzip zstd
              log
          }

          ${DATA_SVC} {
              reverse_proxy localhost:8080
              header {
                  Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
                  X-Content-Type-Options "nosniff"
                  Referrer-Policy "strict-origin-when-cross-origin"
                  -Server
              }
              encode gzip zstd
              log
          }

          ${WEBSOCKET} {
              reverse_proxy localhost:8081
              header {
                  Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
                  X-Content-Type-Options "nosniff"
                  Referrer-Policy "strict-origin-when-cross-origin"
                  -Server
              }
              log
          }

          ${NODE} {
              @options method OPTIONS
              handle @options {
                  # Reflect origin instead of wildcard — required when exchange sends
                  # credentials (cookies/auth). Vary tells caches this header varies.
                  header Access-Control-Allow-Origin {http.request.header.Origin}
                  header Access-Control-Allow-Credentials "true"
                  header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
                  header Access-Control-Allow-Headers "Content-Type, Authorization, Accept, X-API-Key, timestamp, signature"
                  header Access-Control-Max-Age "3600"
                  header Vary "Origin"
                  respond "" 204
              }
              @protected path /peers/* /debug/* /consensus/*
              handle @protected {
                  reverse_proxy localhost:6869 {
                      header_up X-API-Key "${NODE_API_KEY}"
                      header_up -Origin
                      header_up -Referer
                  }
                  header {
                      Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
                      Access-Control-Allow-Origin {http.request.header.Origin}
                      Access-Control-Allow-Credentials "true"
                      Vary "Origin"
                      -Server
                  }
              }
              reverse_proxy localhost:6869 {
                  header_up -Origin
                  header_up -Referer
              }
              header {
                  Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
                  X-Content-Type-Options "nosniff"
                  Referrer-Policy "strict-origin-when-cross-origin"
                  Access-Control-Allow-Origin {http.request.header.Origin}
                  Access-Control-Allow-Credentials "true"
                  Vary "Origin"
                  -Server
              }
              log
          }

          ${MATCHER} {
              @options method OPTIONS
              handle @options {
                  # timestamp and signature are custom headers sent by the exchange DEX client.
                  header Access-Control-Allow-Origin {http.request.header.Origin}
                  header Access-Control-Allow-Credentials "true"
                  header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
                  header Access-Control-Allow-Headers "Content-Type, Authorization, Accept, timestamp, signature, X-API-Key"
                  header Access-Control-Max-Age "3600"
                  header Vary "Origin"
                  respond "" 204
              }
              reverse_proxy localhost:6886 {
                  header_up -Origin
                  header_up -Referer
              }
              header {
                  Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
                  X-Content-Type-Options "nosniff"
                  Referrer-Policy "strict-origin-when-cross-origin"
                  Access-Control-Allow-Origin {http.request.header.Origin}
                  Access-Control-Allow-Credentials "true"
                  Vary "Origin"
                  -Server
              }
              log
          }

          ${ADMIN} {
              reverse_proxy localhost:3001
              header {
                  Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
                  X-Content-Type-Options "nosniff"
                  X-Frame-Options "DENY"
                  Referrer-Policy "strict-origin-when-cross-origin"
                  -Server
              }
              encode gzip zstd
              log
          }

          $([ -n "${GRAFANA}" ] && cat << GRAFANA_BLOCK
          ${GRAFANA} {
              # Reverse proxy to Grafana NodePort on Frankfurt LKE worker.
              # No X-Frame-Options — allow iframe embedding in admin dashboard.
              reverse_proxy 139.162.152.128:32300
              header {
                  Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
                  X-Content-Type-Options "nosniff"
                  Referrer-Policy "strict-origin-when-cross-origin"
                  -Server
              }
              encode gzip zstd
              log
          }
          GRAFANA_BLOCK
          )
          EOF

          echo "Caddyfile generated ($(wc -l < /tmp/Caddyfile) lines)"

      - name: Set up SSH credentials
        env:
          DEPLOY_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          DEPLOY_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload Caddyfile to server
        env:
          DEPLOY_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          set -euo pipefail
          scp -i ~/.ssh/deploy_key \
            /tmp/Caddyfile \
            "$DEPLOY_USER@$DEPLOY_HOST:/opt/dcc/caddy/Caddyfile"

      - name: Set permissions and restart Caddy
        env:
          DEPLOY_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
          NETWORK:     ${{ inputs.network }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o ConnectTimeout=10 \
            "$DEPLOY_USER@$DEPLOY_HOST" bash -s << REMOTE
          set -euo pipefail
          NETWORK="${NETWORK}"
          CF=/opt/dcc/caddy/Caddyfile
          sudo chmod 644 "\$CF"
          sudo chown deploy:deploy "\$CF"
          echo "=== Caddyfile lines ==="
          wc -l "\$CF"
          echo "=== Geo proxy block ==="
          grep -A5 "handle /api/geo" "\$CF" | head -8
          echo "=== CSP ==="
          grep "Content-Security" "\$CF" | head -1

          docker restart "caddy-\${NETWORK}"
          echo "Caddy restarted."
          REMOTE
