name: Update Caddy
# Single source of truth for the Caddyfile. Writes the complete file from
# scratch and restarts Caddy. Run this whenever any domain config changes.
on:
  workflow_dispatch:
    inputs:
      network:
        required: true
        default: 'testnet'
        type: choice
        options: [testnet]
permissions:
  contents: read
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        env:
          NETWORK: ${{ inputs.network }}
        with:
          host:     ${{ secrets.TESTNET_DEPLOY_HOST }}
          username: ${{ secrets.TESTNET_DEPLOY_USER }}
          key:      ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          envs:     NETWORK
          script: |
            set -euo pipefail
            CADDYFILE=/opt/dcc/caddy/Caddyfile

            # Read secrets from the server — never committed to git.
            NODE_API_KEY=$(grep '^NODE_REST_API_KEY=' /opt/dcc/secrets/${NETWORK}.env | cut -d= -f2- || true)
            if [[ -z "${NODE_API_KEY:-}" ]]; then
              echo "WARNING: NODE_REST_API_KEY not in secrets — /peers/* will return 403"
              NODE_API_KEY="missing"
            fi

            # Back up before overwriting
            cp "$CADDYFILE" "${CADDYFILE}.bak.$(date +%s)" || true

            # Write the complete Caddyfile in one operation.
            # All domains for testnet are hardcoded here — no variable parsing.
            sudo tee "$CADDYFILE" > /dev/null << CADDYEOF
            # Generated by update-caddy.yml — do not edit manually
            {
                admin unix//run/caddy/admin.sock
                email ops@decentralamerica.com
            }

            testnet.decentralscan.com {
                # Proxy IP geolocation to ipinfo.io
                handle /api/geo/* {
                    uri strip_prefix /api/geo
                    reverse_proxy https://ipinfo.io {
                        header_up Host ipinfo.io
                    }
                }
                # Proxy green hosting checks
                handle /api/greencheck/* {
                    uri replace /api/greencheck /api/v3/greencheck
                    reverse_proxy https://api.thegreenwebfoundation.org {
                        header_up Host api.thegreenwebfoundation.org
                    }
                }
                reverse_proxy localhost:3000
                header {
                    Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
                    X-Content-Type-Options "nosniff"
                    X-Frame-Options "DENY"
                    Referrer-Policy "strict-origin-when-cross-origin"
                    X-XSS-Protection "0"
                    Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://*.decentralchain.io wss://*.decentralchain.io; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"
                    Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"
                    Cross-Origin-Opener-Policy "same-origin"
                    -Server
                }
                encode gzip zstd
                log
            }

            testnet-data-service.decentralchain.io {
                reverse_proxy localhost:8080
                header {
                    Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
                    X-Content-Type-Options "nosniff"
                    Referrer-Policy "strict-origin-when-cross-origin"
                    -Server
                }
                encode gzip zstd
                log
            }

            testnet-ws.decentralchain.io {
                reverse_proxy localhost:8081
                header {
                    Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
                    X-Content-Type-Options "nosniff"
                    Referrer-Policy "strict-origin-when-cross-origin"
                    -Server
                }
                log
            }

            testnet-node.decentralchain.io {
                @options method OPTIONS
                handle @options {
                    header Access-Control-Allow-Origin "*"
                    header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
                    header Access-Control-Allow-Headers "Content-Type, Authorization, Accept, X-API-Key"
                    header Access-Control-Max-Age "3600"
                    respond "" 204
                }
                @protected path /peers/* /debug/* /consensus/*
                handle @protected {
                    reverse_proxy localhost:6869 {
                        header_up X-API-Key "${NODE_API_KEY}"
                        header_up -Origin
                        header_up -Referer
                    }
                    header {
                        Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
                        Access-Control-Allow-Origin "*"
                        -Server
                    }
                }
                reverse_proxy localhost:6869 {
                    header_up -Origin
                    header_up -Referer
                }
                header {
                    Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
                    X-Content-Type-Options "nosniff"
                    Referrer-Policy "strict-origin-when-cross-origin"
                    Access-Control-Allow-Origin "*"
                    -Server
                }
                log
            }

            testnet-matcher.decentralchain.io {
                @options method OPTIONS
                handle @options {
                    header Access-Control-Allow-Origin "*"
                    header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
                    header Access-Control-Allow-Headers "Content-Type, Authorization, Accept"
                    header Access-Control-Max-Age "3600"
                    respond "" 204
                }
                reverse_proxy localhost:6886 {
                    header_up -Origin
                    header_up -Referer
                }
                header {
                    Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
                    X-Content-Type-Options "nosniff"
                    Referrer-Policy "strict-origin-when-cross-origin"
                    Access-Control-Allow-Origin "*"
                    -Server
                }
                log
            }
            CADDYEOF

            sudo chmod 644 "$CADDYFILE"
            sudo chown deploy:deploy "$CADDYFILE"

            echo "=== Domains in Caddyfile ==="
            grep "^[a-z]" "$CADDYFILE" | grep "\." | head -10

            docker restart "caddy-${NETWORK}"
            echo "Caddy restarted with complete Caddyfile."
