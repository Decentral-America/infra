name: Get Gen Node IPs
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  get-ips:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
      - name: Get LKE kubeconfig
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
        run: |
          CLUSTER_ID=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters" | \
            jq -r '.data[] | select(.label | test("testnet")) | .id' | head -1)
          RAW=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters/${CLUSTER_ID}/kubeconfig" | \
            jq -r '.kubeconfig')
          echo "$RAW" | base64 -d > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
      - name: Get gen-0 and gen-1 node IPs
        run: |
          echo "=== Gen-0 pod IP and node ==="
          kubectl get pod dcc-gen-0-0 -n dcc -o jsonpath='{.status.hostIP}' && echo ""
          echo "=== Gen-1 pod IP and node ==="
          kubectl get pod dcc-gen-1-0 -n dcc -o jsonpath='{.status.hostIP}' && echo ""
          echo "=== All pods with IPs ==="
          kubectl get pods -n dcc -o wide
          echo "=== Node IPs ==="
          kubectl get nodes -o wide
