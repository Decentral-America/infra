name: Fix Matcher Config (address scheme)
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  fix:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Create matcher config with correct testnet address scheme
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             docker stop matcher-testnet 2>/dev/null
             CONFIG_DIR="/opt/dcc/data/matcher-testnet/config"
             sudo mkdir -p "$CONFIG_DIR" 2>/dev/null
             sudo chown 113:113 "$CONFIG_DIR" 2>/dev/null
             echo "=== Creating testnet matcher config ==="
             sudo tee "$CONFIG_DIR/application.conf" > /dev/null << '"'"'CONF'"'"'
dcc {
  dex {
    address-scheme-character = "!"
    cli {
      default-args {
        address-scheme-byte = "!"
      }
    }
  }
}
CONF
             echo "Config written:"
             cat "$CONFIG_DIR/application.conf"
             sudo chown 113:113 "$CONFIG_DIR/application.conf" 2>/dev/null
             echo "=== Also check for DEX env vars ==="
             grep -iE "^DEX|^MATCHER" /opt/dcc/secrets/testnet.env 2>/dev/null | head -5 || echo "(no DEX/MATCHER vars)"
             echo "=== Restart matcher ==="
             docker start matcher-testnet 2>/dev/null && echo OK
             sleep 30
             docker logs matcher-testnet --tail=10 2>&1 | grep -iE "starting|address-scheme|ERROR|error|scheme|account|D\"|!|\!" | head -10
             docker ps --format "{{.Names}}\t{{.Status}}" | grep matcher'
          rm -f /tmp/id_rsa
