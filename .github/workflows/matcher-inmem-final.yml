name: Matcher in-mem with seed from secrets
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  fix:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Switch to in-mem, verify seed in secrets, restart
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             docker stop matcher-testnet 2>/dev/null
             DATA_DIR="/opt/dcc/data/matcher-testnet"
             SECRETS="/opt/dcc/secrets/testnet.env"
             echo "=== Check MATCHER_ACCOUNT_SEED in secrets ==="
             grep "^MATCHER_ACCOUNT_SEED=" "$SECRETS" 2>/dev/null | wc -c
             echo "=== Write in-mem config (uses MATCHER_ACCOUNT_SEED from env) ==="
             sudo mkdir -p "$DATA_DIR/config" 2>/dev/null
             printf '"'"'dcc.dex {\n  address-scheme-character = "!"\n  account-storage { type = in-mem }\n}\n'"'"' | sudo tee "$DATA_DIR/config/application.conf" > /dev/null
             sudo chown -R 113:113 "$DATA_DIR" 2>/dev/null
             echo "Config:"
             cat "$DATA_DIR/config/application.conf"
             echo "=== Remove stale account.dat ==="
             sudo rm -f "$DATA_DIR/account.dat" 2>/dev/null
             echo "=== Start matcher ==="
             docker start matcher-testnet 2>/dev/null && echo OK
             sleep 35
             docker logs matcher-testnet --since 2026-06-27T12:55:00 2>&1 | grep -v "class path\|at java\|at scala\|at io\|at org\|at com" | head -20
             docker ps --format "{{.Names}}\t{{.Status}}" | grep matcher'
          rm -f /tmp/id_rsa
