name: Matcher via JVM system properties
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  fix:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Set config via JAVA_TOOL_OPTIONS system properties
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             docker stop matcher-testnet 2>/dev/null
             SECRETS="/opt/dcc/secrets/testnet.env"
             echo "=== Remove all stale overrides ==="
             sudo sed -i "/^WAVES_DEX__/d;/^DCC_DEX__/d;/^JDK_JAVA_OPTIONS/d;/^JAVA_TOOL_OPTIONS/d;/^DEX_OPTS/d" "$SECRETS" 2>/dev/null
             echo "=== Inject via JAVA_TOOL_OPTIONS (wildcard JVM env var) ==="
             # Using \041 for ! (ASCII 33 = DCC testnet) to avoid shell history expansion
             printf "JAVA_TOOL_OPTIONS=-Ddcc.dex.address-scheme-character=\\041 -Ddcc.dex.account-storage.type=in-mem\n" | sudo tee -a "$SECRETS" > /dev/null
             echo "Added. Verifying:"
             grep "^JAVA_TOOL_OPTIONS" "$SECRETS"
             echo "=== Start matcher ==="
             docker start matcher-testnet 2>/dev/null && echo OK
             sleep 40
             docker logs matcher-testnet --tail=15 2>&1 | grep -iE "Starting|Blockchain Id|public key|address|ERROR|error|account|type" | grep -v "DEBUG\|class path\|at java" | head -10
             docker ps --format "{{.Names}}\t{{.Status}}" | grep matcher'
          rm -f /tmp/id_rsa
