name: Diag Alloy Recent Success
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: testnet
    steps:
      - name: Check for successful recent sends and current stream count
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          timeout 30 ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=10 "$SSH_USER@$SSH_HOST" 'bash -s' <<'REMOTE'
          echo "=== recent alloy log summary (last 30s, non-error) ==="
          docker logs alloy-testnet --since 30s 2>&1 | grep -v "timestamp too old\|too far behind" | tail -10
          echo "=== loki active streams via metrics ==="
          timeout 5 curl -s "http://127.0.0.1:3100/metrics" 2>/dev/null | grep "^loki_ingester_memory_streams " || echo "(metric not found)"
          REMOTE
          rm -f /tmp/id_rsa
