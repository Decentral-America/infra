# ──────────────────────────────────────────────────────────────────────────────
# T2 HotStuff Soak Test
#
# Exercises BFT resilience by killing gen nodes one at a time and together,
# verifying chain liveness under each failure scenario.
#
# Failure matrix:
#   A) gen-0 down → 2-of-3 quorum (main + gen-1) → T2 continues
#   B) gen-1 down → 2-of-3 quorum (main + gen-0) → T2 continues
#   C) both down  → 1-of-3 quorum (main only)     → T2 pauses, FairPoS continues
#   D) both back  → 3-of-3 quorum restored         → T2 resumes
#
# After each step: verify chain height advances (FairPoS never halts),
# and check the finalized height from GET /blocks/height/finalized and its
# lag behind the chain tip.
#
# NOTE: T2 HotStuff is DEPLOYED to testnet (image dev-hotstuff sha256:ea5da215,
# `dcc.hotstuff.enabled=true`) and COMMITTING across all nodes as of 2026-07-13
# (observational; feature-25 stays authoritative). Each phase below now also
# records the observational `hotStuffFinalizedHeight` from /node/status so this
# soak validates HotStuff-commit resilience under faults, not just feature-25.
# Remaining before mainnet enable: this soak's real results + external audit.
# feature-25 finalized height (GET /blocks/height/finalized) is the pass/fail
# authority; hotStuffFinalized is observed and expected to track it at
# tip-settled-depth when quorum holds, pause without quorum, and resume after.
# ──────────────────────────────────────────────────────────────────────────────
name: T2 Soak Test

on:
  workflow_call:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: t2-soak
  cancel-in-progress: false

jobs:
  soak:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: testnet
    steps:
      - name: Download kubeconfig
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
        run: |
          CID=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters" | \
            jq -r '.data[] | select(.label=="dcc-peer-testnet") | .id')
          echo "Cluster ID: $CID"
          RAW=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            -X GET "https://api.linode.com/v4/lke/clusters/${CID}/kubeconfig" | jq -r '.kubeconfig')
          echo "$RAW" | python3 -c 'import base64,sys; sys.stdout.buffer.write(base64.b64decode(sys.stdin.read().strip() + "=="))' > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV

      - uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d  # v5.1.0

      - name: Baseline — record chain + finalized height before soak
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          echo "=== Baseline state ==="
          kubectl get pods -n dcc -o wide 2>/dev/null | head -10
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no "${SSH_USER}@${SSH_HOST}" \
            'H=$(curl -s http://localhost:6869/blocks/height | python3 -c "import sys,json; print(json.load(sys.stdin)[\"height\"])" 2>/dev/null)
             F=$(curl -s http://localhost:6869/blocks/height/finalized | python3 -c "import sys,json; print(json.load(sys.stdin)[\"height\"])" 2>/dev/null)
             echo "height=$H finalized=$F"'

      # ── Phase A: kill gen-0 ────────────────────────────────────────────────
      - name: "Phase A — scale gen-0 to 0"
        run: kubectl scale statefulset dcc-gen-0 -n dcc --replicas=0

      - name: "Phase A — wait 3 min, check chain + T2"
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "Sleeping 180s..."
          sleep 180
          echo "=== Phase A (gen-0 down) ==="
          kubectl get pods -n dcc -o wide 2>/dev/null | grep gen || echo "(no gen pods running)"
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no "${SSH_USER}@${SSH_HOST}" \
            'H=$(curl -s http://localhost:6869/blocks/height | python3 -c "import sys,json; print(json.load(sys.stdin)[\"height\"])" 2>/dev/null)
             F=$(curl -s http://localhost:6869/blocks/height/finalized | python3 -c "import sys,json; print(json.load(sys.stdin)[\"height\"])" 2>/dev/null)
             S=$(curl -s http://localhost:6869/node/status | python3 -c "import sys,json; print(json.load(sys.stdin).get(\"hotStuffFinalizedHeight\",\"absent\"))" 2>/dev/null)
             echo "height=$H finalized=$F lag:$(( ${H:-0} - ${F:-0} )) hotStuffFinalized=$S (observational)"'

      - name: "Phase A — restore gen-0"
        run: |
          kubectl scale statefulset dcc-gen-0 -n dcc --replicas=1
          kubectl rollout status statefulset/dcc-gen-0 -n dcc --timeout=120s

      - name: "Phase A — wait 2 min for T2 to resume"
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          sleep 120
          echo "=== Phase A: T2 after gen-0 restored ==="
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no "${SSH_USER}@${SSH_HOST}" \
            'H=$(curl -s http://localhost:6869/blocks/height | python3 -c "import sys,json; print(json.load(sys.stdin)[\"height\"])" 2>/dev/null)
             F=$(curl -s http://localhost:6869/blocks/height/finalized | python3 -c "import sys,json; print(json.load(sys.stdin)[\"height\"])" 2>/dev/null)
             S=$(curl -s http://localhost:6869/node/status | python3 -c "import sys,json; print(json.load(sys.stdin).get(\"hotStuffFinalizedHeight\",\"absent\"))" 2>/dev/null)
             echo "height=$H finalized=$F lag:$(( ${H:-0} - ${F:-0} )) hotStuffFinalized=$S (observational)"'

      # ── Phase B: kill gen-1 ────────────────────────────────────────────────
      - name: "Phase B — scale gen-1 to 0"
        run: kubectl scale statefulset dcc-gen-1 -n dcc --replicas=0

      - name: "Phase B — wait 3 min, check chain + T2"
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          sleep 180
          echo "=== Phase B (gen-1 down) ==="
          kubectl get pods -n dcc -o wide 2>/dev/null | grep gen || echo "(no gen pods running)"
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no "${SSH_USER}@${SSH_HOST}" \
            'H=$(curl -s http://localhost:6869/blocks/height | python3 -c "import sys,json; print(json.load(sys.stdin)[\"height\"])" 2>/dev/null)
             F=$(curl -s http://localhost:6869/blocks/height/finalized | python3 -c "import sys,json; print(json.load(sys.stdin)[\"height\"])" 2>/dev/null)
             S=$(curl -s http://localhost:6869/node/status | python3 -c "import sys,json; print(json.load(sys.stdin).get(\"hotStuffFinalizedHeight\",\"absent\"))" 2>/dev/null)
             echo "height=$H finalized=$F lag:$(( ${H:-0} - ${F:-0} )) hotStuffFinalized=$S (observational)"'

      - name: "Phase B — restore gen-1"
        run: |
          kubectl scale statefulset dcc-gen-1 -n dcc --replicas=1
          kubectl rollout status statefulset/dcc-gen-1 -n dcc --timeout=120s

      - name: "Phase B — wait 2 min for T2 to resume"
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          sleep 120
          echo "=== Phase B: T2 after gen-1 restored ==="
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no "${SSH_USER}@${SSH_HOST}" \
            'H=$(curl -s http://localhost:6869/blocks/height | python3 -c "import sys,json; print(json.load(sys.stdin)[\"height\"])" 2>/dev/null)
             F=$(curl -s http://localhost:6869/blocks/height/finalized | python3 -c "import sys,json; print(json.load(sys.stdin)[\"height\"])" 2>/dev/null)
             S=$(curl -s http://localhost:6869/node/status | python3 -c "import sys,json; print(json.load(sys.stdin).get(\"hotStuffFinalizedHeight\",\"absent\"))" 2>/dev/null)
             echo "height=$H finalized=$F lag:$(( ${H:-0} - ${F:-0} )) hotStuffFinalized=$S (observational)"'

      # ── Phase C: kill both ─────────────────────────────────────────────────
      - name: "Phase C — scale both gen nodes to 0"
        run: |
          kubectl scale statefulset dcc-gen-0 dcc-gen-1 -n dcc --replicas=0

      - name: "Phase C — wait 3 min, T2 paused, FairPoS continues"
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          sleep 180
          echo "=== Phase C (both gen nodes down) ==="
          kubectl get pods -n dcc -o wide 2>/dev/null | grep gen || echo "(no gen pods running)"
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no "${SSH_USER}@${SSH_HOST}" \
            'H=$(curl -s http://localhost:6869/blocks/height | python3 -c "import sys,json; print(json.load(sys.stdin)[\"height\"])" 2>/dev/null)
             F=$(curl -s http://localhost:6869/blocks/height/finalized | python3 -c "import sys,json; print(json.load(sys.stdin)[\"height\"])" 2>/dev/null)
             S=$(curl -s http://localhost:6869/node/status | python3 -c "import sys,json; print(json.load(sys.stdin).get(\"hotStuffFinalizedHeight\",\"absent\"))" 2>/dev/null)
             echo "height=$H finalized=$F lag:$(( ${H:-0} - ${F:-0} )) hotStuffFinalized=$S (observational)"'

      # ── Phase D: restore both ──────────────────────────────────────────────
      - name: "Phase D — restore both gen nodes"
        run: |
          kubectl scale statefulset dcc-gen-0 dcc-gen-1 -n dcc --replicas=1
          kubectl rollout status statefulset/dcc-gen-0 -n dcc --timeout=120s
          kubectl rollout status statefulset/dcc-gen-1 -n dcc --timeout=120s

      - name: "Phase D — wait 3 min for full T2 recovery"
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          sleep 180
          echo "=== Phase D: T2 after full restore ==="
          kubectl get pods -n dcc -o wide 2>/dev/null | grep gen || echo "(no gen pods running)"
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no "${SSH_USER}@${SSH_HOST}" \
            'H=$(curl -s http://localhost:6869/blocks/height | python3 -c "import sys,json; print(json.load(sys.stdin)[\"height\"])" 2>/dev/null)
             F=$(curl -s http://localhost:6869/blocks/height/finalized | python3 -c "import sys,json; print(json.load(sys.stdin)[\"height\"])" 2>/dev/null)
             S=$(curl -s http://localhost:6869/node/status | python3 -c "import sys,json; print(json.load(sys.stdin).get(\"hotStuffFinalizedHeight\",\"absent\"))" 2>/dev/null)
             echo "height=$H finalized=$F lag:$(( ${H:-0} - ${F:-0} )) hotStuffFinalized=$S (observational)"
             echo "=== Kamon HotStuff round latency (p50/p95/p99) ==="
             curl -s http://localhost:6870/metrics 2>/dev/null | grep "hotstuff_round_latency" | grep -v "^#" | head -20 || echo "metrics not available at :6870"'

      - name: Cleanup
        if: always()
        run: rm -f /tmp/id_rsa /tmp/kubeconfig
