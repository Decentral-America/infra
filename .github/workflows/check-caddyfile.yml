name: Check Caddyfile
on:
  workflow_dispatch:
    inputs:
      network:
        required: true
        default: 'testnet'
        type: choice
        options: [testnet]
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        env:
          NETWORK: ${{ inputs.network }}
        with:
          host:     ${{ secrets.TESTNET_DEPLOY_HOST }}
          username: ${{ secrets.TESTNET_DEPLOY_USER }}
          key:      ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          envs:     NETWORK
          script: |
            echo "=== First 15 lines of Caddyfile ==="
            head -15 /opt/dcc/caddy/Caddyfile
            echo "=== geo block ==="
            sed -n '/api\/geo/,/^              }/p' /opt/dcc/caddy/Caddyfile | head -20
            echo "=== CSP in Caddyfile ==="
            grep "Content-Security" /opt/dcc/caddy/Caddyfile | head -2
