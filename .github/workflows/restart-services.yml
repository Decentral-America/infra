name: Restart Dependent Services
on:
  workflow_call:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  restart:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: testnet
    steps:
      - name: Restart blockchain-postgres-sync and matcher
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" '
            set +e
            echo "=== Disk usage before cleanup ==="
            df -h / 2>/dev/null | head -3

            echo "=== Save matcher image ref before cleanup (re-tag as :latest to survive prune) ==="
            MATCHER_IMG=$(docker ps -q | xargs -I{} docker inspect --format "{{.Config.Image}}" {} 2>/dev/null \
              | grep "decentral-america/matcher" | head -1 || true)
            if [ -n "$MATCHER_IMG" ]; then
              echo "Re-tagging $MATCHER_IMG as matcher-testnet-latest"
              docker tag "$MATCHER_IMG" "ghcr.io/decentral-america/matcher:matcher-testnet-latest" 2>/dev/null || true
            fi

            echo "=== Kill stray matcher containers (ALL using matcher image, except matcher-testnet) ==="
            docker ps -q | while read cid; do
              img=$(docker inspect --format "{{.Config.Image}}" "$cid" 2>/dev/null || true)
              cname=$(docker inspect --format "{{.Name}}" "$cid" 2>/dev/null | tr -d / || true)
              if echo "$img" | grep -q "decentral-america/matcher" && [ "$cname" != "matcher-testnet" ]; then
                echo "Removing stray matcher container: $cname ($cid)"
                docker rm -f "$cid" 2>/dev/null || true
              fi
            done
            echo "=== Prune stopped containers and dangling images ==="
            docker container prune -f 2>/dev/null || true
            docker image prune -f 2>/dev/null || true
            echo "=== Truncate large docker container log files (>50MB) ==="
            find /var/lib/docker/containers/ -name "*.log" -size +50M 2>/dev/null | while read f; do
              echo "Truncating: $f ($(du -sh "$f" 2>/dev/null | cut -f1))"
              sudo truncate -s 0 "$f" 2>/dev/null || true
            done
            echo "=== Vacuum journald to 100M ==="
            sudo journalctl --vacuum-size=100M 2>/dev/null || true
            echo "=== Clean old /tmp files (>2h) ==="
            find /tmp -maxdepth 1 -mmin +120 -not -name "." 2>/dev/null | while read f; do
              echo "Removing old tmp: $f"
              rm -rf "$f" 2>/dev/null || true
            done
            echo "=== Disk usage after cleanup ==="
            df -h / 2>/dev/null | head -3

            echo "=== Fix txs_19 FK constraint (add ON DELETE CASCADE if missing) ==="
            sudo -u postgres psql -d bps_testnet -c "DO \$fix\$ BEGIN IF EXISTS (SELECT 1 FROM information_schema.referential_constraints WHERE constraint_name = \$\$txs_19_block_uid_fkey\$\$ AND delete_rule != \$\$CASCADE\$\$) THEN ALTER TABLE txs_19 DROP CONSTRAINT txs_19_block_uid_fkey; ALTER TABLE txs_19 ADD CONSTRAINT txs_19_block_uid_fkey FOREIGN KEY (block_uid) REFERENCES blocks_microblocks(uid) ON DELETE CASCADE; RAISE NOTICE \$\$txs_19_block_uid_fkey updated to ON DELETE CASCADE\$\$; ELSE RAISE NOTICE \$\$txs_19_block_uid_fkey already CASCADE or not present\$\$; END IF; END \$fix\$;" 2>&1 || echo "FK fix skipped (postgres unavailable or no txs_19 table)"

            echo "=== Restarting blockchain-postgres-sync ==="
            if docker restart blockchain-postgres-sync-testnet 2>/dev/null; then
              echo "OK (restart)"
            else
              echo "Container missing — redeploy via compose"
              BPS_IMG=$(docker images --format "{{.Repository}}:{{.Tag}}" 2>/dev/null \
                | grep "blockchain-postgres-sync" | grep -v "<none>" | head -1)
              if [ -z "${BPS_IMG}" ]; then
                echo "No local BPS image — pulling from registry"
                docker pull ghcr.io/decentral-america/blockchain-postgres-sync:fbece975a0074868d20dc476324a0fa0587f2e70 2>/dev/null \
                  && BPS_IMG="ghcr.io/decentral-america/blockchain-postgres-sync:fbece975a0074868d20dc476324a0fa0587f2e70" \
                  || echo "Pull failed — redeploy from BPS repo workflow"
              fi
              if [ -n "${BPS_IMG}" ]; then
                echo "Using image: ${BPS_IMG}"
                IMAGE_TAG="${BPS_IMG}" NETWORK=testnet \
                  docker compose --project-name blockchain-postgres-sync-testnet \
                    -f /opt/dcc/compose/blockchain-postgres-sync.yml \
                    up -d --wait --wait-timeout 90 blockchain-postgres-sync \
                  && echo "OK (compose up)" || echo "FAILED (compose up)"
              else
                echo "FAILED — no image; run BPS deploy workflow from the BPS repo"
              fi
            fi
            sleep 8
            echo "=== BPS last 40 log lines ==="
            docker logs blockchain-postgres-sync-testnet --tail 40 2>&1 || echo "(no BPS container logs)"
            sleep 5
            echo "=== Restarting matcher ==="
            MATCHER_STATE=$(docker inspect --format "{{.State.Health.Status}}" matcher-testnet 2>/dev/null || echo "missing")
            if [ "${MATCHER_STATE}" = "healthy" ]; then
              echo "SKIPPED — matcher already healthy"
            elif docker inspect matcher-testnet >/dev/null 2>&1; then
              docker restart matcher-testnet 2>/dev/null && echo "OK (restart)" || echo "FAILED"
            else
              echo "matcher-testnet container missing — attempting compose up"
              if [ -f /opt/dcc/compose/matcher.yml ]; then
                MATCHER_IMG=$(docker images --format "{{.Repository}}:{{.Tag}}" 2>/dev/null \
                  | grep "decentral-america/matcher" | grep -v "<none>" | head -1 || true)
                if [ -z "$MATCHER_IMG" ]; then
                  echo "No local matcher image — pulling latest"
                  docker pull "ghcr.io/decentral-america/matcher:matcher-testnet-latest" 2>/dev/null \
                    && MATCHER_IMG="ghcr.io/decentral-america/matcher:matcher-testnet-latest" \
                    || echo "Pull failed — check GHCR auth"
                fi
                if [ -n "$MATCHER_IMG" ]; then
                  echo "Using matcher image: $MATCHER_IMG"
                  IMAGE_TAG="$MATCHER_IMG" NETWORK=testnet \
                    docker compose --project-name matcher-testnet \
                      -f /opt/dcc/compose/matcher.yml up -d \
                    && echo "OK (compose up)" || echo "FAILED (compose up)"
                else
                  echo "FAILED — no matcher image available"
                fi
              else
                echo "FAILED — /opt/dcc/compose/matcher.yml not found"
                ls /opt/dcc/compose/ 2>/dev/null || true
              fi
            fi
            sleep 10
            echo "=== Service health ==="
            docker ps | grep -E "postgres|matcher|node-scala" | sort'
          rm -f /tmp/id_rsa
