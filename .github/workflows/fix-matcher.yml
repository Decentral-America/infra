name: Fix Matcher Account Key
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  fix:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Fix matcher by recreating data dir and checking seed
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             docker stop matcher-testnet 2>/dev/null
             echo "=== Matcher data dir state ==="
             ls -la /opt/dcc/data/ 2>/dev/null | head -10
             ls -la /opt/dcc/data/matcher-testnet/ 2>/dev/null | head -10 || echo "(dir missing)"
             echo "=== Relevant matcher env vars (secrets) ==="
             grep -iE "^MATCHER|^DEX" /opt/dcc/secrets/testnet.env 2>/dev/null | sed "s/SEED=.*/SEED=***/" | sed "s/PASSWORD=.*/PASSWORD=***/"
             echo "=== Recreate matcher data dir ==="
             sudo mkdir -p /opt/dcc/data/matcher-testnet/data /opt/dcc/data/matcher-testnet/config 2>/dev/null
             sudo chown -R 113:113 /opt/dcc/data/matcher-testnet/ 2>/dev/null || sudo chmod -R 777 /opt/dcc/data/matcher-testnet/ 2>/dev/null
             ls -la /opt/dcc/data/matcher-testnet/
             echo "=== Start matcher ==="
             docker start matcher-testnet 2>/dev/null && echo OK
             sleep 20
             docker logs matcher-testnet --tail=15 2>&1 | grep -v "DEBUG\|INFO.*pekko\|at java\|at scala\|at io\|at org\|at com\|class path"
             docker ps --format "{{.Names}}\t{{.Status}}" | grep matcher'
          rm -f /tmp/id_rsa
