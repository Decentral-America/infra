name: Fix BPS Postgres Env
on:
  workflow_dispatch:
    inputs:
      network:
        required: true
        default: 'testnet'
        type: choice
        options: [testnet]
permissions:
  contents: read
jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        env:
          NETWORK: ${{ inputs.network }}
        with:
          host:     ${{ secrets.TESTNET_DEPLOY_HOST }}
          username: ${{ secrets.TESTNET_DEPLOY_USER }}
          key:      ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          envs:     NETWORK
          script: |
            set -euo pipefail
            SECRETS="/opt/dcc/secrets/${NETWORK}.env"

            # Get Postgres connection from data-service container (connects to same DB)
            PGHOST=$(docker exec "data-service-${NETWORK}" sh -c 'echo $PGHOST' 2>/dev/null || echo "localhost")
            PGPORT=$(docker exec "data-service-${NETWORK}" sh -c 'echo ${PGPORT:-5432}' 2>/dev/null || echo "5432")
            PGUSER=$(docker exec "data-service-${NETWORK}" sh -c 'echo $PGUSER' 2>/dev/null || echo "dcc")
            PGPASSWORD=$(docker exec "data-service-${NETWORK}" sh -c 'echo $PGPASSWORD' 2>/dev/null || true)
            PGDATABASE=$(docker exec "data-service-${NETWORK}" sh -c 'echo $PGDATABASE' 2>/dev/null || echo "dcc_testnet")

            if [[ -z "$PGPASSWORD" ]]; then
              PGPASSWORD=$(grep '^PGPASSWORD=' "$SECRETS" | cut -d= -f2- || true)
            fi

            echo "Postgres connection: host=${PGHOST} port=${PGPORT} user=${PGUSER} database=${PGDATABASE}"

            # Remove stale entries and inject fresh Postgres vars for BPS
            sudo sed -i '/^POSTGRES__HOST=/d;/^POSTGRES__PORT=/d;/^POSTGRES__USERNAME=/d;/^POSTGRES__DATABASE=/d;/^PGHOST=/d;/^PGPORT=/d;/^PGUSER=/d;/^PGPASSWORD=/d;/^PGDATABASE=/d;/^BLOCKCHAIN_UPDATES_URL=/d;/^CHAIN_ID=/d;/^STARTING_HEIGHT=/d' "$SECRETS"

            {
              printf 'PGHOST=%s\n'             "${PGHOST}"
              printf 'PGPORT=%s\n'             "${PGPORT}"
              printf 'PGUSER=%s\n'             "${PGUSER}"
              printf 'PGPASSWORD=%s\n'         "${PGPASSWORD}"
              printf 'PGDATABASE=%s\n'         "${PGDATABASE}"
              printf 'POSTGRES__HOST=%s\n'     "${PGHOST}"
              printf 'POSTGRES__PORT=%s\n'     "${PGPORT}"
              printf 'POSTGRES__USERNAME=%s\n' "${PGUSER}"
              printf 'POSTGRES__PASSWORD=%s\n' "${PGPASSWORD}"
              printf 'POSTGRES__DATABASE=%s\n' "${PGDATABASE}"
              printf 'BLOCKCHAIN_UPDATES_URL=grpc://localhost:6881\n'
              printf 'CHAIN_ID=33\n'
              printf 'STARTING_HEIGHT=1\n'
            } | sudo tee -a "$SECRETS" > /dev/null

            sudo chmod 640 "$SECRETS"
            sudo chown root:deploy "$SECRETS"

            # Get current image tag from the restarting container
            CURRENT_IMAGE=$(docker inspect "blockchain-postgres-sync-${NETWORK}" --format '{{.Config.Image}}' 2>/dev/null || echo "")
            if [[ -z "$CURRENT_IMAGE" ]]; then
              echo "::error::Cannot determine current BPS image"
              exit 1
            fi
            echo "Using image: $CURRENT_IMAGE"
            export IMAGE_TAG="$CURRENT_IMAGE"
            export NETWORK

            echo "Vars injected. Restarting BPS..."
            cd /opt/dcc/compose
            docker compose \
              --project-name "blockchain-postgres-sync-${NETWORK}" \
              --file blockchain-postgres-sync.yml \
              up --detach --wait --wait-timeout 120 blockchain-postgres-sync && echo "BPS healthy" || echo "BPS still unhealthy"
