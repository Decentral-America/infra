name: Diag Promtail Tools
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: testnet
    steps:
      - name: Check what binaries exist in the promtail container
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" \
            'for bin in wget curl nc ncat busybox python3 /promtail; do
               echo -n "$bin: "
               docker exec promtail-testnet which "$bin" 2>&1 || echo "not found"
             done
             echo "=== /proc/1/root/ available tools (ls /usr/bin /bin) ==="
             docker exec promtail-testnet sh -c "ls /bin /usr/bin 2>/dev/null | sort -u" | head -60'
          rm -f /tmp/id_rsa
