name: BPS Fix via exec inside container
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  fix:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Run BPS image with sleep, exec psql inside
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             docker stop blockchain-postgres-sync-testnet 2>/dev/null
             BPS_IMG=$(docker inspect blockchain-postgres-sync-testnet --format "{{.Config.Image}}" 2>/dev/null)
             echo "BPS image: $BPS_IMG"
             echo "=== Start BPS with sleep override ==="
             docker run -d --rm --name bps-reset-tmp \
               --network host \
               --env-file /opt/dcc/secrets/testnet.env \
               --cap-drop ALL \
               "$BPS_IMG" sleep 120
             sleep 3
             echo "=== Exec psql inside BPS container ==="
             docker exec bps-reset-tmp whoami 2>&1
             docker exec bps-reset-tmp psql -c "\dt" 2>&1 | head -20
             docker exec bps-reset-tmp sh -c "psql -c \"TRUNCATE blocks CASCADE\" 2>&1"
             docker exec bps-reset-tmp sh -c "psql -c \"TRUNCATE transactions CASCADE\" 2>&1"
             docker exec bps-reset-tmp sh -c "psql -c \"TRUNCATE microblocks CASCADE\" 2>&1"
             echo "=== Stop temp container ==="
             docker stop bps-reset-tmp 2>/dev/null
             echo "=== Restart BPS normally ==="
             docker start blockchain-postgres-sync-testnet 2>/dev/null && echo OK
             sleep 20
             docker logs blockchain-postgres-sync-testnet --tail=5 2>&1
             docker ps --format "{{.Names}}\t{{.Status}}" | grep -E "postgres|matcher"'
          rm -f /tmp/id_rsa
