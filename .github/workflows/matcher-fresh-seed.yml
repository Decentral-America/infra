name: Matcher Fresh Seed Setup
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  setup:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Write matcher config to data root and restart
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             docker stop matcher-testnet 2>/dev/null
             DATA_ROOT="/opt/dcc/data/matcher-testnet"
             echo "=== Contents of data root ==="
             ls -la "$DATA_ROOT/" 2>/dev/null
             echo "=== Write config to ROOT of data dir (not config subdir) ==="
             printf '"'"'dcc.dex {\n  address-scheme-character = "!"\n  account-storage { type = in-mem }\n}\n'"'"' | sudo tee "$DATA_ROOT/application.conf" > /dev/null
             sudo chown 113:113 "$DATA_ROOT/application.conf" 2>/dev/null
             echo "=== Also write to /etc inside container ==="
             docker run --rm -v /opt/dcc/data/matcher-testnet:/data alpine \
               sh -c "cat /data/application.conf" 2>/dev/null || echo "(alpine check)"
             echo "Config at root:"
             cat "$DATA_ROOT/application.conf"
             echo "=== Start matcher ==="
             docker start matcher-testnet 2>/dev/null && echo OK
             sleep 30
             docker logs matcher-testnet --tail=15 2>&1 | grep -v "class path\|at java\|at scala\|at io\|at org\|at com"
             docker ps --format "{{.Names}}\t{{.Status}}" | grep matcher'
          rm -f /tmp/id_rsa
