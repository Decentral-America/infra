name: Matcher via env var seed
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  fix:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Add matcher env vars to secrets and restart
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             docker stop matcher-testnet 2>/dev/null
             SECRETS="/opt/dcc/secrets/testnet.env"
             echo "=== Current matcher-related vars ==="
             grep -iE "^MATCHER|^DEX|^WAVES_DEX|^DCC_DEX" "$SECRETS" 2>/dev/null | sed "s/PASSWORD=.*/PASSWORD=***/;s/SEED=.*/SEED=***/"
             echo "=== Add missing matcher env vars ==="
             sudo sed -i "/^MATCHER_ACCOUNT_SEED=/d;/^MATCHER_ACCOUNT_PASSWORD=/d;/^DCC_DEX__/d" "$SECRETS" 2>/dev/null
             printf "MATCHER_ACCOUNT_SEED=tomorrow bleak cram rival inherit river genuine unknown guitar sister slot scale flip animal grit\nMATCHER_ACCOUNT_PASSWORD=+cUVQtSQTU+KRzP+Q1m+b5fgtHUSiNsWb4xAZp/ArVI=\n" | sudo tee -a "$SECRETS" > /dev/null
             echo "Added. Verifying:"
             grep -iE "^MATCHER" "$SECRETS" | sed "s/SEED=.*/SEED=***/;s/PASSWORD=.*/PASSWORD=***/"
             echo "=== Remove stale config override at data root ==="
             sudo rm -f /opt/dcc/data/matcher-testnet/application.conf 2>/dev/null
             echo "=== Start matcher ==="
             docker start matcher-testnet 2>/dev/null && echo OK
             sleep 35
             docker logs matcher-testnet --tail=20 2>&1 | grep -v "class path\|at java\|at scala\|at io\|at org\|at com"
             docker ps --format "{{.Names}}\t{{.Status}}" | grep matcher'
          rm -f /tmp/id_rsa
