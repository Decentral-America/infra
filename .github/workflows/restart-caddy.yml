name: Restart Caddy
on:
  workflow_dispatch:
    inputs:
      network:
        required: true
        default: 'testnet'
        type: choice
        options: [testnet]
permissions:
  contents: read
jobs:
  restart:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        env:
          NETWORK: ${{ inputs.network }}
        with:
          host:     ${{ secrets.TESTNET_DEPLOY_HOST }}
          username: ${{ secrets.TESTNET_DEPLOY_USER }}
          key:      ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          envs:     NETWORK
          script: |
            set -euo pipefail
            CADDYFILE=/opt/dcc/caddy/Caddyfile

            # Read node API key from secrets file — injected by push-secrets, never
            # committed to git. Caddy uses it to authenticate /peers/* requests so
            # the public blockchain explorer can display peer data.
            NODE_API_KEY=$(grep '^NODE_REST_API_KEY=' /opt/dcc/secrets/${NETWORK}.env | cut -d= -f2- || true)
            if [[ -z "$NODE_API_KEY" ]]; then
              echo "WARNING: NODE_REST_API_KEY not found in secrets file — peers endpoints will return 403"
              NODE_API_KEY="missing"
            fi

            # Remove existing node/matcher blocks so we can rewrite them cleanly
            sudo sed -i '/^testnet-node\.decentralchain\.io {/,/^}/d' "$CADDYFILE"
            sudo sed -i '/^testnet-matcher\.decentralchain\.io {/,/^}/d' "$CADDYFILE"
            sudo sed -i '/^[[:space:]]*$/d' "$CADDYFILE"

            # Append node and matcher Caddy blocks.
            # The DCC node returns 500 for requests with an unrecognised Origin header.
            # Strip Origin/Referer before proxying so the node sees a plain request;
            # Caddy re-adds CORS headers on the response.
            # /peers/* endpoints require the node API key — Caddy injects it from the
            # server-side secrets file so the key is never exposed to the browser.
            {
              printf '\ntestnet-node.decentralchain.io {\n'

              # Handle CORS preflight for all routes
              printf '    @options method OPTIONS\n'
              printf '    handle @options {\n'
              printf '        header Access-Control-Allow-Origin "*"\n'
              printf '        header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"\n'
              printf '        header Access-Control-Allow-Headers "Content-Type, Authorization, Accept, X-API-Key"\n'
              printf '        header Access-Control-Max-Age "3600"\n'
              printf '        respond "" 204\n'
              printf '    }\n'

              # Inject API key for protected endpoints (/peers/*, /debug/*, /consensus/*)
              printf '    @protected path /peers/* /debug/* /consensus/*\n'
              printf '    handle @protected {\n'
              printf '        reverse_proxy localhost:6869 {\n'
              printf '            header_up X-API-Key "%s"\n' "${NODE_API_KEY}"
              printf '            header_up -Origin\n'
              printf '            header_up -Referer\n'
              printf '        }\n'
              printf '        header {\n'
              printf '            Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"\n'
              printf '            Access-Control-Allow-Origin "*"\n'
              printf '            -Server\n'
              printf '        }\n'
              printf '    }\n'

              # All other endpoints
              printf '    reverse_proxy localhost:6869 {\n'
              printf '        header_up -Origin\n'
              printf '        header_up -Referer\n'
              printf '    }\n'
              printf '    header {\n'
              printf '        Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"\n'
              printf '        X-Content-Type-Options "nosniff"\n'
              printf '        Referrer-Policy "strict-origin-when-cross-origin"\n'
              printf '        Access-Control-Allow-Origin "*"\n'
              printf '        -Server\n'
              printf '    }\n'
              printf '    log\n'
              printf '}\n\n'

              printf 'testnet-matcher.decentralchain.io {\n'
              printf '    @options method OPTIONS\n'
              printf '    handle @options {\n'
              printf '        header Access-Control-Allow-Origin "*"\n'
              printf '        header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"\n'
              printf '        header Access-Control-Allow-Headers "Content-Type, Authorization, Accept"\n'
              printf '        header Access-Control-Max-Age "3600"\n'
              printf '        respond "" 204\n'
              printf '    }\n'
              printf '    reverse_proxy localhost:6886 {\n'
              printf '        header_up -Origin\n'
              printf '        header_up -Referer\n'
              printf '    }\n'
              printf '    header {\n'
              printf '        Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"\n'
              printf '        X-Content-Type-Options "nosniff"\n'
              printf '        Referrer-Policy "strict-origin-when-cross-origin"\n'
              printf '        Access-Control-Allow-Origin "*"\n'
              printf '        -Server\n'
              printf '    }\n'
              printf '    log\n'
              printf '}\n'
            } | sudo tee -a "$CADDYFILE" > /dev/null

            sudo chmod 644 "$CADDYFILE"
            sudo chown deploy:deploy "$CADDYFILE"

            echo "=== Domains in Caddyfile ==="
            grep "^[a-z]" "$CADDYFILE" | grep "\." | head -10

            docker restart "caddy-${NETWORK}"
            sleep 3
            echo "Done. Caddy restarted with API key injection for protected node endpoints."
