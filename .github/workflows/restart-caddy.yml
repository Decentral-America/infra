name: Restart Caddy
on:
  workflow_dispatch:
    inputs:
      network:
        required: true
        default: 'testnet'
        type: choice
        options: [testnet]
permissions:
  contents: read
jobs:
  restart:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        env:
          NETWORK: ${{ inputs.network }}
        with:
          host:     ${{ secrets.TESTNET_DEPLOY_HOST }}
          username: ${{ secrets.TESTNET_DEPLOY_USER }}
          key:      ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          envs:     NETWORK
          script: |
            echo "Restarting Caddy to re-trigger ACME cert provisioning..."
            docker restart "caddy-${NETWORK}"
            sleep 5
            docker logs "caddy-${NETWORK}" 2>&1 | grep -E "tls|acme|obtain|certificate|error|Error" | tail -20 || true
            echo "Done. Caddy restarted."
