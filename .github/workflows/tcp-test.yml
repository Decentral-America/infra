name: TCP Connectivity Test from Gen-0
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: kubeconfig
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
        run: |
          CID=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters" | \
            jq -r '.data[] | select(.label=="dcc-peer-testnet") | .id')
          curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters/${CID}/kubeconfig" \
            | jq -r '.kubeconfig' \
            | python3 -c 'import base64,sys; sys.stdout.buffer.write(base64.b64decode(sys.stdin.read().strip()+"=="))' \
            > /tmp/kubeconfig && chmod 600 /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
      - uses: azure/setup-kubectl@v4
      - name: TCP test from gen-0 to main-node
        env:
          GEN_0_API_KEY: ${{ secrets.GEN_0_NODE_REST_API_KEY }}
        run: |
          set +e
          echo "=== Pod state ==="
          kubectl get pod -n dcc dcc-gen-0-0 -o wide 2>/dev/null
          echo "=== TCP test: bash /dev/tcp from gen-0 ==="
          kubectl exec -n dcc dcc-gen-0-0 -- bash -c \
            'timeout 8 bash -c "echo > /dev/tcp/66.228.55.154/6868" && echo "TCP_OPEN" || echo "TCP_FAILED"' 2>&1
          echo "=== wget test: gen-0 → main-node REST ==="
          kubectl exec -n dcc dcc-gen-0-0 -- wget -qO- --timeout=8 \
            http://66.228.55.154:6869/node/version 2>&1 || echo "wget FAILED"
          echo "=== /proc/net/tcp for 9A37E442 (66.228.55.154) ==="
          kubectl exec -n dcc dcc-gen-0-0 -- sh -c \
            'cat /proc/net/tcp 2>/dev/null | awk "{print \$2,\$3,\$4}" | grep 9A37E442 || echo "(no connection to 66.228.55.154)"' 2>/dev/null
          echo "=== gen-0 suspended list ==="
          kubectl port-forward -n dcc dcc-gen-0-0 17869:6869 >/dev/null 2>&1 &
          PF=$!; sleep 3
          curl -s -H "X-API-Key: ${GEN_0_API_KEY}" \
            http://127.0.0.1:17869/peers/suspended 2>/dev/null
          echo ""
          curl -s -H "X-API-Key: ${GEN_0_API_KEY}" \
            http://127.0.0.1:17869/peers/connected 2>/dev/null | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(f'gen-0 peers={len(d.get(\"peers\",[]))}')" 2>/dev/null
          kill $PF 2>/dev/null; true
