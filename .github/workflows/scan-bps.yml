name: Scan BPS Image
on:
  workflow_dispatch:
permissions:
  contents: read
  security-events: write
jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Scan BPS image
        run: |
          docker pull ghcr.io/decentral-america/blockchain-postgres-sync:latest
          docker run --rm \
            -v /tmp/trivy:/root/.cache \
            aquasec/trivy:latest \
            image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --scanners vuln \
            ghcr.io/decentral-america/blockchain-postgres-sync:latest 2>&1 | tee /tmp/trivy-output.txt
          echo "Exit: $?"
          grep -E "CVE|RUSTSEC|Total" /tmp/trivy-output.txt | head -30
