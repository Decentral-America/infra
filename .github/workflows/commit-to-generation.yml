name: Commit generators to generation period

# Submits CommitToGenerationTransaction for gen-0, gen-1, and main node.
# Triggered by workflow_dispatch OR by touching trigger/commit-to-generation
# (the push trigger bypasses the GitHub REST API rate limit).
#
# The gen nodes must be running node-scala-testnet-latest with api-key-hash
# set to Blake2b256("dcc-testnet-commit") = B87ksWf7dVFJDwMQbYNf3mehN8cqcQ6aShcs5N18hNV3
# Both are set in dcc-nodes.yaml and applied by Flux.

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Target network'
        required: true
        default: 'testnet'
        type: choice
        options: [testnet]
      wipe_gen_nodes:
        description: 'Wipe gen node chain data before committing (only if nodes are on wrong chain)'
        required: false
        default: false
        type: boolean
  push:
    branches: [main]
    paths: ['trigger/commit-to-generation']

permissions:
  contents: read

env:
  NETWORK: ${{ inputs.network || 'testnet' }}

jobs:
  commit:
    name: Commit all generators to next generation period
    runs-on: ubuntu-latest
    environment: testnet

    steps:
      # ── 1. Cluster access ────────────────────────────────────────────────────
      - name: Download LKE kubeconfig
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
        run: |
          set -euo pipefail
          CID=$(curl -sf -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters" \
            | jq -r ".data[] | select(.label==\"dcc-peer-${NETWORK}\") | .id")
          echo "LKE cluster ID: $CID"
          curl -sf -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters/${CID}/kubeconfig" \
            | jq -r '.kubeconfig' \
            | python3 -c 'import base64,sys; sys.stdout.buffer.write(base64.b64decode(sys.stdin.read().strip()+"=="))' \
            > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> "$GITHUB_ENV"

      - name: Install kubectl (latest stable)
        run: |
          KUBECTL_VER=$(curl -Ls https://dl.k8s.io/release/stable.txt)
          curl -Lo /usr/local/bin/kubectl \
            "https://dl.k8s.io/release/${KUBECTL_VER}/bin/linux/amd64/kubectl"
          chmod +x /usr/local/bin/kubectl
          kubectl version --client --short 2>/dev/null || kubectl version --client

      # ── 2. Apply latest config (Flux reconcile) ───────────────────────────────
      - name: Flux reconcile — apply latest dcc-nodes.yaml
        run: |
          curl -s https://fluxcd.io/install.sh | bash >/dev/null 2>&1 || true
          export PATH="$PATH:/usr/local/bin"
          flux reconcile source git flux-system --timeout=2m \
            && echo "source: OK" || echo "source: non-fatal, continuing"
          flux reconcile kustomization dcc-apps --timeout=3m \
            && echo "kustomization: OK" || echo "kustomization: non-fatal, continuing"

      # ── 3. Optional chain data wipe ─────────────────────────────────────────
      - name: Wipe gen node chain data
        if: ${{ inputs.wipe_gen_nodes == true }}
        run: |
          set -euo pipefail
          kubectl scale statefulset dcc-gen-0 dcc-gen-1 dcc-val-0 --replicas=0 -n dcc
          kubectl wait pod -n dcc \
            -l 'app in (dcc-gen-0,dcc-gen-1,dcc-val-0)' \
            --for=delete --timeout=120s || true
          kubectl delete pvc \
            chain-data-dcc-gen-0-0 chain-data-dcc-gen-1-0 chain-data-dcc-val-0-0 \
            -n dcc --ignore-not-found=true
          sleep 10
          kubectl scale statefulset dcc-gen-0 dcc-gen-1 dcc-val-0 --replicas=1 -n dcc

      # ── 4. Rolling restart to pick up updated ConfigMap and image ─────────────
      - name: Rolling restart gen-0 and gen-1
        run: |
          kubectl rollout restart statefulset/dcc-gen-0 statefulset/dcc-gen-1 -n dcc || true
          echo "Rollout restart issued — waiting for pods to cycle..."

      # ── 5. Wait for both gen pods to be READY on the NEW image ───────────────
      - name: Wait for gen pods — new image AND readiness probe passing
        run: |
          for POD in dcc-gen-0-0 dcc-gen-1-0; do
            echo "--- Waiting for $POD ---"
            for i in $(seq 1 60); do
              sleep 10
              IMAGE=$(kubectl get pod "$POD" -n dcc \
                -o jsonpath='{.spec.containers[0].image}' 2>/dev/null || echo "unknown")
              READY=$(kubectl get pod "$POD" -n dcc \
                -o jsonpath='{.status.containerStatuses[0].ready}' 2>/dev/null || echo "false")
              STATE=$(kubectl get pod "$POD" -n dcc \
                -o jsonpath='{.status.containerStatuses[0].state}' 2>/dev/null || echo "{}")
              echo "  $i: image=$(basename $IMAGE) ready=$READY state=$STATE"
              if [[ "$IMAGE" == *"node-scala-testnet-latest"* && "$READY" == "true" ]]; then
                echo "✅ $POD is ready on the new image"
                break
              fi
              if [ "$i" -eq 60 ]; then
                echo "⚠️ $POD not ready after 10 minutes — proceeding anyway"
              fi
            done
          done

      # ── 6. Commit gen-0 via kubectl exec + wget (no port-forward) ────────────
      - name: Checkout infra (needed for secrets/ path in SOPS decrypt)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Decrypt gen node API keys from SOPS
        env:
          SOPS_AGE_KEY: ${{ secrets.AGE_SECRET_KEY }}
        run: |
          set -euo pipefail
          SOPS_VER="v3.13.1"
          curl -fsSL "https://github.com/getsops/sops/releases/download/${SOPS_VER}/sops-${SOPS_VER}.linux.amd64" \
            -o /tmp/sops && chmod +x /tmp/sops
          SECRETS=$(SOPS_AGE_KEY="$SOPS_AGE_KEY" /tmp/sops -d secrets/testnet.env)
          GEN0=$(echo "$SECRETS" | grep '^GEN_0_NODE_REST_API_KEY=' | cut -d= -f2-)
          GEN1=$(echo "$SECRETS" | grep '^GEN_1_NODE_REST_API_KEY=' | cut -d= -f2-)
          echo "GEN0_API_KEY=${GEN0}" >> "$GITHUB_ENV"
          echo "GEN1_API_KEY=${GEN1}" >> "$GITHUB_ENV"
          echo "gen-0 key available: $([ -n "$GEN0" ] && echo YES || echo MISSING)"
          echo "gen-1 key available: $([ -n "$GEN1" ] && echo YES || echo MISSING)"

      - name: Commit gen-0 (kubectl exec → wget → broadcast)
        env:
          PUBLIC_NODE: https://testnet-node.decentralchain.io
        run: |
          set -euo pipefail
          POD=dcc-gen-0-0
          PORT=6869
          GEN_API_KEY="${GEN0_API_KEY}"
          [ -z "${GEN_API_KEY:-}" ] && { echo "ERROR: gen-0 API key not set"; exit 1; }

          echo "=== gen-0: get wallet address ==="
          ADDR=$(kubectl exec -n dcc "$POD" -- \
            wget -qO- "http://127.0.0.1:${PORT}/addresses" \
            --header="X-API-Key: ${GEN_API_KEY}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)[0])")
          echo "Address: $ADDR"

          # Get period starts from the public node
          read CURRENT_PERIOD NEXT_PERIOD < <(curl -sf "$PUBLIC_NODE/blockchain/finality" \
            | python3 -c "
          import sys,json; d=json.load(sys.stdin)
          print(d['currentGenerationPeriod']['start'], d['nextGenerationPeriod']['start'])
          ")
          echo "Periods: current=$CURRENT_PERIOD next=$NEXT_PERIOD"

          commit_period() {
            local PERIOD=$1 PAYLOAD SIGNED TXID
            # no spaces in JSON — safe to pass directly as --post-data arg
            PAYLOAD=$(python3 -c "
          import json
          print(json.dumps({'type':19,'version':1,'sender':'$ADDR','generationPeriodStart':$PERIOD},separators=(',',':')))
            ")
            echo "Payload: $PAYLOAD"
            # Pass JSON directly to wget without sh -c wrapper: kubectl passes args as array,
            # no shell on the remote side, no quoting issues with double quotes in JSON.
            SIGNED=$(kubectl exec -n dcc "$POD" -- \
              wget -qO- \
              "--post-data=${PAYLOAD}" \
              "--header=Content-Type: application/json" \
              "--header=X-API-Key: ${GEN_API_KEY}" \
              "http://127.0.0.1:${PORT}/transactions/sign" \
              ) || { echo "  sign failed for period $PERIOD"; return 1; }
            echo "Signed: $SIGNED"
            TXID=$(echo "$SIGNED" \
              | curl -sf -X POST "$PUBLIC_NODE/transactions/broadcast" \
                  -H "Content-Type: application/json" -d @- \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id') or d)" \
              ) || { echo "  broadcast failed for period $PERIOD"; return 1; }
            echo "✅ gen-0 period $PERIOD TX: $TXID"
          }

          echo "=== Committing for current period $CURRENT_PERIOD ==="
          commit_period "$CURRENT_PERIOD" || echo "  (current period commit failed — may be too late)"
          echo "=== Committing for next period $NEXT_PERIOD ==="
          commit_period "$NEXT_PERIOD"

      # ── 7. Commit gen-1 ───────────────────────────────────────────────────────
      - name: Commit gen-1 (kubectl exec → wget → broadcast)
        env:
          PUBLIC_NODE: https://testnet-node.decentralchain.io
        run: |
          set -euo pipefail
          POD=dcc-gen-1-0
          PORT=6870
          GEN_API_KEY="${GEN1_API_KEY}"
          [ -z "${GEN_API_KEY:-}" ] && { echo "ERROR: gen-1 API key not set"; exit 1; }

          ADDR=$(kubectl exec -n dcc "$POD" -- \
            wget -qO- "http://127.0.0.1:${PORT}/addresses" \
            --header="X-API-Key: ${GEN_API_KEY}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)[0])")
          echo "Address: $ADDR"

          PUBKEY=$(kubectl exec -n dcc "$POD" -- \
            wget -qO- "http://127.0.0.1:${PORT}/addresses/publicKey/${ADDR}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['publicKey'])")
          echo "PubKey: $PUBKEY"

          read CURRENT_PERIOD NEXT_PERIOD < <(curl -sf "$PUBLIC_NODE/blockchain/finality" \
            | python3 -c "
          import sys,json; d=json.load(sys.stdin)
          print(d['currentGenerationPeriod']['start'], d['nextGenerationPeriod']['start'])
          ")

          commit_period() {
            local PERIOD=$1 PAYLOAD SIGNED TXID
            PAYLOAD=$(python3 -c "
          import json
          print(json.dumps({'type':19,'version':1,'sender':'$ADDR','generationPeriodStart':$PERIOD},separators=(',',':')))
            ")
            SIGNED=$(kubectl exec -n dcc "$POD" -- \
              wget -qO- \
              "--post-data=${PAYLOAD}" \
              "--header=Content-Type: application/json" \
              "--header=X-API-Key: ${GEN_API_KEY}" \
              "http://127.0.0.1:${PORT}/transactions/sign" \
              ) || { echo "  sign failed for period $PERIOD"; return 1; }
            TXID=$(echo "$SIGNED" \
              | curl -sf -X POST "$PUBLIC_NODE/transactions/broadcast" \
                  -H "Content-Type: application/json" -d @- \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id') or d)" \
              ) || { echo "  broadcast failed for period $PERIOD"; return 1; }
            echo "✅ gen-1 period $PERIOD TX: $TXID"
          }

          commit_period "$CURRENT_PERIOD" || echo "  (current period commit failed)"
          commit_period "$NEXT_PERIOD"

      # ── 8. Commit main node ───────────────────────────────────────────────────
      - name: Commit main node (SSH → localhost sign → broadcast)
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_KEY:  ${{ secrets.DEPLOY_KEY }}
          MAIN_API_KEY: ${{ secrets.MAIN_NODE_REST_API_KEY }}
          PUBLIC_NODE: https://testnet-node.decentralchain.io
        run: |
          set -euo pipefail
          install -dm 700 ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key && chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          read CURRENT_PERIOD NEXT_PERIOD < <(curl -sf "$PUBLIC_NODE/blockchain/finality" \
            | python3 -c "
          import sys,json; d=json.load(sys.stdin)
          print(d['currentGenerationPeriod']['start'], d['nextGenerationPeriod']['start'])
          ")
          echo "main node periods: current=$CURRENT_PERIOD next=$NEXT_PERIOD"

          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            bash -s -- "$MAIN_API_KEY" "$CURRENT_PERIOD" "$NEXT_PERIOD" "$PUBLIC_NODE" << 'REMOTE'
          set -euo pipefail
          API_KEY=$1; CURRENT_PERIOD=$2; NEXT_PERIOD=$3; PUBLIC_NODE=$4

          ADDR=$(curl -sf -H "X-API-Key: $API_KEY" http://localhost:6869/addresses \
            | python3 -c "import sys,json; print(json.load(sys.stdin)[0])")
          echo "Address: $ADDR"

          commit_period() {
            local PERIOD=$1
            local PAYLOAD
            PAYLOAD=$(python3 -c "
          import json
          print(json.dumps({'type':19,'version':1,'sender':'$ADDR','generationPeriodStart':$PERIOD},separators=(',',':')))
            ")
            local SIGNED
            SIGNED=$(echo "$PAYLOAD" | curl -sf -X POST http://localhost:6869/transactions/sign \
              -H "X-API-Key: $API_KEY" -H "Content-Type: application/json" -d @-) \
              || { echo "  sign failed for period $PERIOD"; return 1; }
            local TXID
            TXID=$(echo "$SIGNED" | curl -sf -X POST http://localhost:6869/transactions/broadcast \
              -H "Content-Type: application/json" -d @- \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id') or d)") \
              || { echo "  broadcast failed for period $PERIOD"; return 1; }
            echo "✅ main period $PERIOD TX: $TXID"
          }

          commit_period "$CURRENT_PERIOD" || echo "  (current period)"
          commit_period "$NEXT_PERIOD"
          REMOTE

      # ── 9. Verify ─────────────────────────────────────────────────────────────
      - name: Verify — check commitments appeared in finality API
        run: |
          sleep 15
          curl -sf https://testnet-node.decentralchain.io/blockchain/finality \
            | python3 -c "
          import sys,json
          d = json.load(sys.stdin)
          h = d['height']
          cp = d['currentGenerationPeriod']
          np = d['nextGenerationPeriod']
          print(f'height:             {h}')
          print(f'T0 finalizedHeight: {d[\"finalizedHeight\"]}')
          print(f'T2 hotStuff:        {d[\"hotStuffFinalizedHeight\"]}')
          print(f'current ({cp[\"start\"]}-{cp[\"end\"]}): {len(d[\"currentGenerators\"])} generators committed')
          for g in d[\"currentGenerators\"]: print(f'  → {g[\"address\"]}')
          print(f'next    ({np[\"start\"]}-{np[\"end\"]}): {len(d[\"nextGenerators\"])} generators committed')
          for g in d[\"nextGenerators\"]: print(f'  → {g[\"address\"]}')
          "
