name: Commit generators to generation period

# DEPRECATED — use auto-commit-generators.yml (dual-cron) or commit-generators-hotstuff.yml (manual).
# This workflow used a hardcoded weak API key ("dcc-testnet-commit") which no longer matches
# deployed nodes. It will fail silently. Left for historical reference only.
#
# Submits CommitToGenerationTransaction for gen-0, gen-1, and main node.
# Triggered by workflow_dispatch OR by touching trigger/commit-to-generation
# (the push trigger bypasses the GitHub REST API rate limit).
#
# The gen nodes must be running node-scala-testnet-latest with api-key-hash
# set to Blake2b256("dcc-testnet-commit") = B87ksWf7dVFJDwMQbYNf3mehN8cqcQ6aShcs5N18hNV3
# Both are set in dcc-nodes.yaml and applied by Flux.

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Target network'
        required: true
        default: 'testnet'
        type: choice
        options: [testnet]
      wipe_gen_nodes:
        description: 'Wipe gen node chain data before committing (only if nodes are on wrong chain)'
        required: false
        default: false
        type: boolean
      confirm_wipe:
        description: 'Required if wipe_gen_nodes is true: type WIPE to confirm PVC deletion'
        required: false
        type: string
  # Schedule REMOVED — superseded by auto-commit-generators.yml (dual staggered cron, every 5 min).
  # push trigger REMOVED — use workflow_dispatch for manual invocation.
  # This file is retained for the wipe_gen_nodes capability only.

permissions:
  contents: read

env:
  NETWORK: ${{ inputs.network || 'testnet' }}

jobs:
  commit:
    name: Commit all generators to next generation period
    runs-on: ubuntu-latest
    environment: testnet

    steps:
      # ── 1. Cluster access ────────────────────────────────────────────────────
      - name: Download LKE kubeconfig
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
        run: |
          set -euo pipefail
          CID=$(curl -sf -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters" \
            | jq -r ".data[] | select(.label==\"dcc-peer-${NETWORK}\") | .id")
          echo "LKE cluster ID: $CID"
          curl -sf -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters/${CID}/kubeconfig" \
            | jq -r '.kubeconfig' \
            | python3 -c 'import base64,sys; sys.stdout.buffer.write(base64.b64decode(sys.stdin.read().strip()+"=="))' \
            > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> "$GITHUB_ENV"

      - name: Install kubectl (latest stable)
        run: |
          KUBECTL_VER=$(curl -Ls https://dl.k8s.io/release/stable.txt)
          curl -Lo /usr/local/bin/kubectl \
            "https://dl.k8s.io/release/${KUBECTL_VER}/bin/linux/amd64/kubectl"
          chmod +x /usr/local/bin/kubectl
          kubectl version --client --short 2>/dev/null || kubectl version --client

      # ── 2. Apply latest config (Flux reconcile) ───────────────────────────────
      - name: Flux reconcile — apply latest dcc-nodes.yaml
        env:
          FLUX_VERSION: '2.9.0'
          FLUX_SHA256: '7aa9779fc7ec6d030e609dab7dbed8c6fc9e3a7f4670834ad02369268aaf341f'
        run: |
          curl -fsSL "https://github.com/fluxcd/flux2/releases/download/v${FLUX_VERSION}/flux_${FLUX_VERSION}_linux_amd64.tar.gz" -o /tmp/flux.tar.gz 2>/dev/null
          echo "${FLUX_SHA256}  /tmp/flux.tar.gz" | sha256sum --check --status \
            && { tar -xzf /tmp/flux.tar.gz -C /tmp flux && sudo install -m 755 /tmp/flux /usr/local/bin/flux; } \
            || echo "WARNING: flux install failed checksum verification or download — skipping flux reconcile"
          export PATH="$PATH:/usr/local/bin"
          flux reconcile source git flux-system --timeout=2m \
            && echo "source: OK" || echo "source: non-fatal, continuing"
          flux reconcile kustomization dcc-apps --timeout=3m \
            && echo "kustomization: OK" || echo "kustomization: non-fatal, continuing"

      # ── 3. Optional chain data wipe ─────────────────────────────────────────
      - name: Require explicit confirmation for chain data wipe
        if: ${{ inputs.wipe_gen_nodes == true }}
        env:
          CONFIRM: ${{ inputs.confirm_wipe }}
        run: |
          set -euo pipefail
          if [ "$CONFIRM" != "WIPE" ]; then
            echo "::error::wipe_gen_nodes deletes PVCs chain-data-dcc-gen-0-0, chain-data-dcc-gen-1-0, chain-data-dcc-val-0-0. Re-run with confirm_wipe set to exactly WIPE."
            exit 1
          fi

      - name: Wipe gen node chain data
        if: ${{ inputs.wipe_gen_nodes == true }}
        run: |
          set -euo pipefail
          kubectl scale statefulset dcc-gen-0 dcc-gen-1 dcc-val-0 --replicas=0 -n dcc
          kubectl wait pod -n dcc \
            -l 'app in (dcc-gen-0,dcc-gen-1,dcc-val-0)' \
            --for=delete --timeout=120s || true
          kubectl delete pvc \
            chain-data-dcc-gen-0-0 chain-data-dcc-gen-1-0 chain-data-dcc-val-0-0 \
            -n dcc --ignore-not-found=true
          sleep 10
          kubectl scale statefulset dcc-gen-0 dcc-gen-1 dcc-val-0 --replicas=1 -n dcc

      # ── 4. Wait for chain convergence ────────────────────────────────────────
      # Root cause of CommitToGeneration TX divergence: the TX lands in different
      # blocks on competing chains, creating different state hashes that prevent
      # chain switches (feature 21 validates state hashes). The fix: only submit
      # CommitToGenerationTransaction AFTER all nodes are on the SAME chain
      # (identical last block ID). This is the correct mainnet behaviour — validators
      # on a well-connected network converge before the period boundary.
      #
      # NOTE: the rolling restart step was removed. It caused gen nodes to fork
      # from the main node's chain. ConfigMap changes are picked up on the next
      # natural restart via Flux.
      - name: Wait for chain convergence (shared ancestor block)
        timeout-minutes: 30
        run: |
          set +e
          PUBLIC_NODE="https://testnet-node.decentralchain.io"
          ATTEMPTS=0
          MAX=60  # 30 min at 30s intervals
          # Check convergence at (min_height - 5) rather than current tip.
          # P2P latency means nodes are always 1-3 blocks apart at the tip even on
          # the same chain. Checking a shared ancestor 5 blocks back confirms they're
          # on the same canonical chain without requiring tip synchronization.

          while [ $ATTEMPTS -lt $MAX ]; do
            ATTEMPTS=$((ATTEMPTS + 1))

            # Get current heights
            H_MAIN=$(curl -sf --max-time 10 "$PUBLIC_NODE/blocks/height" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('height',0))" 2>/dev/null || echo 0)
            H_GEN0=$(kubectl exec -n dcc dcc-gen-0-0 -- \
              wget -qO- --timeout=8 "http://127.0.0.1:6869/blocks/height" 2>/dev/null \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('height',0))" 2>/dev/null || echo 0)
            H_GEN1=$(kubectl exec -n dcc dcc-gen-1-0 -- \
              wget -qO- --timeout=8 "http://127.0.0.1:6870/blocks/height" 2>/dev/null \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('height',0))" 2>/dev/null || echo 0)

            # Only check main node and gen-0 (gen-1 miner may be disabled and stuck at genesis).
            # DCC requires miner enabled to actively sync blocks.
            MIN_ACTIVE=$(( H_MAIN < H_GEN0 ? H_MAIN : H_GEN0 ))
            MIN_H=$(( MIN_ACTIVE > 5 ? MIN_ACTIVE - 5 : -1 ))
            echo "[$ATTEMPTS/$MAX] heights: main=$H_MAIN gen0=$H_GEN0 gen1=$H_GEN1 (checking main+gen0 only) at=$MIN_H"

            if [ "${MIN_H:-0}" -lt 1 ] 2>/dev/null; then
              echo "  (not enough blocks yet, waiting...)"
              sleep 30; continue
            fi

            # Check main node and gen-0 agree on block at MIN_H (shared ancestor)
            MAIN_BLK=$(curl -sf --max-time 10 "$PUBLIC_NODE/blocks/headers/$MIN_H" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null || echo "")
            GEN0_BLK=$(kubectl exec -n dcc dcc-gen-0-0 -- \
              wget -qO- --timeout=8 "http://127.0.0.1:6869/blocks/headers/$MIN_H" 2>/dev/null \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null || echo "")
            GEN1_BLK=$(kubectl exec -n dcc dcc-gen-1-0 -- \
              wget -qO- --timeout=8 "http://127.0.0.1:6870/blocks/headers/$MIN_H" 2>/dev/null \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null || echo "")

            echo "  block@$MIN_H: main=${MAIN_BLK:0:12} gen0=${GEN0_BLK:0:12} gen1=${GEN1_BLK:0:12}"

            if [ -n "$MAIN_BLK" ] && [ "$MAIN_BLK" = "$GEN0_BLK" ]; then
              echo "✅ Main node and gen-0 share ancestor at height $MIN_H (main=$H_MAIN gen0=$H_GEN0 gen1=$H_GEN1)"
              break
            fi

            if [ $ATTEMPTS -ge $MAX ]; then
              echo "❌ Convergence timeout — chains still divergent. Aborting TX submission."
              exit 1
            fi

            sleep 30
          done

      # ── 6. Commit gen-0 via kubectl exec + wget (no port-forward) ────────────
      - name: Checkout infra (needed for secrets/ path in SOPS decrypt)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Decrypt gen node API keys from SOPS
        env:
          SOPS_AGE_KEY: ${{ secrets.AGE_SECRET_KEY }}
        run: |
          set -euo pipefail
          SOPS_VER="v3.13.1"
          curl -fsSL "https://github.com/getsops/sops/releases/download/${SOPS_VER}/sops-${SOPS_VER}.linux.amd64" \
            -o /tmp/sops && chmod +x /tmp/sops
          SECRETS=$(SOPS_AGE_KEY="$SOPS_AGE_KEY" /tmp/sops -d secrets/testnet.env)
          echo "$SECRETS" | grep '^GEN_0_NODE_REST_API_KEY=' | cut -d= -f2- > /tmp/.gen0_key
          echo "$SECRETS" | grep '^GEN_1_NODE_REST_API_KEY=' | cut -d= -f2- > /tmp/.gen1_key
          chmod 600 /tmp/.gen0_key /tmp/.gen1_key
          echo "gen-0 key length: $(wc -c < /tmp/.gen0_key) bytes"
          echo "gen-1 key length: $(wc -c < /tmp/.gen1_key) bytes"

      - name: Commit gen-0 (kubectl exec → wget → broadcast)
        env:
          PUBLIC_NODE: https://testnet-node.decentralchain.io
        run: |
          set -euo pipefail
          POD=dcc-gen-0-0
          PORT=6869
          GEN_API_KEY=$(cat /tmp/.gen0_key 2>/dev/null | tr -d '\n')
          [ -z "${GEN_API_KEY:-}" ] && { echo "ERROR: gen-0 API key not available from /tmp/.gen0_key"; exit 1; }
          echo "gen-0 API key available (length ${#GEN_API_KEY})"

          echo "=== gen-0: get wallet address ==="
          ADDR=$(kubectl exec -n dcc "$POD" -- \
            wget -qO- "http://127.0.0.1:${PORT}/addresses" \
            --header="X-API-Key: ${GEN_API_KEY}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)[0])")
          echo "Address: $ADDR"

          # Get period starts from the public node
          read CURRENT_PERIOD NEXT_PERIOD < <(curl -sf "$PUBLIC_NODE/blockchain/finality" \
            | python3 -c "
          import sys,json; d=json.load(sys.stdin)
          print(d['currentGenerationPeriod']['start'], d['nextGenerationPeriod']['start'])
          ") || { echo "WARNING: could not read periods from finality API"; CURRENT_PERIOD=0; NEXT_PERIOD=0; }
          echo "Periods: current=$CURRENT_PERIOD next=$NEXT_PERIOD"

          commit_period() {
            local PERIOD=$1 PAYLOAD SIGNED TXID
            # no spaces in JSON — safe to pass directly as --post-data arg
            PAYLOAD=$(python3 -c "
          import json
          print(json.dumps({'type':19,'version':1,'sender':'$ADDR','generationPeriodStart':$PERIOD},separators=(',',':')))
            ")
            echo "Payload: $PAYLOAD"
            # Pass JSON directly to wget without sh -c wrapper: kubectl passes args as array,
            # no shell on the remote side, no quoting issues with double quotes in JSON.
            SIGNED=$(kubectl exec -n dcc "$POD" -- \
              wget -qO- \
              "--post-data=${PAYLOAD}" \
              "--header=Content-Type: application/json" \
              "--header=X-API-Key: ${GEN_API_KEY}" \
              "http://127.0.0.1:${PORT}/transactions/sign" \
              ) || { echo "  sign failed for period $PERIOD"; return 1; }
            echo "Signed: $SIGNED"
            TXID=$(echo "$SIGNED" \
              | curl -sf -X POST "$PUBLIC_NODE/transactions/broadcast" \
                  -H "Content-Type: application/json" -d @- \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id') or d)" \
              ) || { echo "  broadcast failed for period $PERIOD"; return 1; }
            echo "✅ gen-0 period $PERIOD TX: $TXID"
          }

          echo "=== Committing for current period $CURRENT_PERIOD ==="
          commit_period "$CURRENT_PERIOD" || echo "  (current period commit failed — may be too late)"
          echo "=== Committing for next period $NEXT_PERIOD ==="
          commit_period "$NEXT_PERIOD" || echo "  next period commit failed or already done"

      # ── 7. Commit gen-1 ───────────────────────────────────────────────────────
      - name: Commit gen-1 (kubectl exec → wget → broadcast)
        continue-on-error: true
        env:
          PUBLIC_NODE: https://testnet-node.decentralchain.io
        run: |
          POD=dcc-gen-1-0
          PORT=6870

          echo "=== Diagnostics ==="
          ls -la /tmp/.gen0_key /tmp/.gen1_key 2>/dev/null || echo "key files missing"
          GEN_API_KEY=$(cat /tmp/.gen1_key 2>/dev/null | tr -d '\n' || true)
          echo "gen-1 key length: ${#GEN_API_KEY}"
          if [ -z "${GEN_API_KEY:-}" ]; then
            echo "ERROR: gen-1 API key empty (continue-on-error is set — workflow proceeds)"
            exit 1
          fi
          kubectl get pod "$POD" -n dcc -o wide 2>/dev/null || echo "pod lookup failed"

          # gen-1 may still be coming up after rollout restart — wait up to 15 min
          echo "=== Waiting for gen-1 pod to be ready ==="
          for i in $(seq 1 90); do
            READY=$(kubectl get pod "$POD" -n dcc \
              -o jsonpath='{.status.containerStatuses[0].ready}' 2>/dev/null || echo "false")
            IMAGE=$(kubectl get pod "$POD" -n dcc \
              -o jsonpath='{.spec.containers[0].image}' 2>/dev/null || echo "")
            echo "  attempt $i: ready=$READY image=$(basename $IMAGE)"
            if [[ "$READY" == "true" && "$IMAGE" == *"node-scala-testnet-latest"* ]]; then
              echo "✅ gen-1 ready"
              break
            fi
            if [ "$i" -eq 90 ]; then
              echo "ERROR: gen-1 pod not ready after 15 minutes"
              kubectl describe pod "$POD" -n dcc 2>/dev/null | tail -20 || true
              exit 1
            fi
            sleep 10
          done

          ADDR=$(kubectl exec -n dcc "$POD" -- \
            wget -qO- "http://127.0.0.1:${PORT}/addresses" \
            --header="X-API-Key: ${GEN_API_KEY}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)[0])")
          echo "Address: $ADDR"

          read CURRENT_PERIOD NEXT_PERIOD < <(curl -sf "$PUBLIC_NODE/blockchain/finality" \
            | python3 -c "
          import sys,json; d=json.load(sys.stdin)
          print(d['currentGenerationPeriod']['start'], d['nextGenerationPeriod']['start'])
          ") || { echo "WARNING: could not read periods from finality API"; CURRENT_PERIOD=0; NEXT_PERIOD=0; }

          commit_period() {
            local PERIOD=$1 PAYLOAD SIGNED TXID
            PAYLOAD=$(python3 -c "
          import json
          print(json.dumps({'type':19,'version':1,'sender':'$ADDR','generationPeriodStart':$PERIOD},separators=(',',':')))
            ")
            SIGNED=$(kubectl exec -n dcc "$POD" -- \
              wget -qO- \
              "--post-data=${PAYLOAD}" \
              "--header=Content-Type: application/json" \
              "--header=X-API-Key: ${GEN_API_KEY}" \
              "http://127.0.0.1:${PORT}/transactions/sign" \
              ) || { echo "  sign failed for period $PERIOD"; return 1; }
            TXID=$(echo "$SIGNED" \
              | curl -sf -X POST "$PUBLIC_NODE/transactions/broadcast" \
                  -H "Content-Type: application/json" -d @- \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id') or d)" \
              ) || { echo "  broadcast failed for period $PERIOD"; return 1; }
            echo "✅ gen-1 period $PERIOD TX: $TXID"
          }

          commit_period "$CURRENT_PERIOD" || echo "  (current period commit failed)"
          commit_period "$NEXT_PERIOD"

      # ── 8. Commit main node ───────────────────────────────────────────────────
      - name: Commit main node (SSH → localhost sign → broadcast)
        continue-on-error: true
        env:
          DEPLOY_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          DEPLOY_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          MAIN_API_KEY: ${{ secrets.MAIN_NODE_REST_API_KEY }}
          PUBLIC_NODE: https://testnet-node.decentralchain.io
        run: |
          set -euo pipefail
          install -dm 700 ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key && chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          read CURRENT_PERIOD NEXT_PERIOD < <(curl -sf "$PUBLIC_NODE/blockchain/finality" \
            | python3 -c "
          import sys,json; d=json.load(sys.stdin)
          print(d['currentGenerationPeriod']['start'], d['nextGenerationPeriod']['start'])
          ") || { echo "WARNING: could not read periods from finality API"; CURRENT_PERIOD=0; NEXT_PERIOD=0; }
          echo "main node periods: current=$CURRENT_PERIOD next=$NEXT_PERIOD"

          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            bash -s -- "$MAIN_API_KEY" "$CURRENT_PERIOD" "$NEXT_PERIOD" "$PUBLIC_NODE" << 'REMOTE'
          set -euo pipefail
          API_KEY=$1; CURRENT_PERIOD=$2; NEXT_PERIOD=$3; PUBLIC_NODE=$4

          ADDR=$(curl -sf -H "X-API-Key: $API_KEY" http://localhost:6869/addresses \
            | python3 -c "import sys,json; print(json.load(sys.stdin)[0])")
          echo "Address: $ADDR"

          commit_period() {
            local PERIOD=$1
            local PAYLOAD
            PAYLOAD=$(python3 -c "
          import json
          print(json.dumps({'type':19,'version':1,'sender':'$ADDR','generationPeriodStart':$PERIOD},separators=(',',':')))
            ")
            local SIGNED
            SIGNED=$(echo "$PAYLOAD" | curl -sf -X POST http://localhost:6869/transactions/sign \
              -H "X-API-Key: $API_KEY" -H "Content-Type: application/json" -d @-) \
              || { echo "  sign failed for period $PERIOD"; return 1; }
            local TXID
            TXID=$(echo "$SIGNED" | curl -sf -X POST http://localhost:6869/transactions/broadcast \
              -H "Content-Type: application/json" -d @- \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id') or d)") \
              || { echo "  broadcast failed for period $PERIOD"; return 1; }
            echo "✅ main period $PERIOD TX: $TXID"
          }

          commit_period "$CURRENT_PERIOD" || echo "  (current period commit skipped)"
          commit_period "$NEXT_PERIOD" || echo "  (next period commit skipped — already committed)"
          REMOTE

      # ── 9. Verify ─────────────────────────────────────────────────────────────
      - name: Verify — check commitments appeared in finality API
        run: |
          sleep 15
          curl -sf https://testnet-node.decentralchain.io/blockchain/finality \
            | python3 -c "
          import sys,json
          d = json.load(sys.stdin)
          h = d['height']
          cp = d['currentGenerationPeriod']
          np = d['nextGenerationPeriod']
          print(f'height:             {h}')
          print(f'T0 finalizedHeight: {d[\"finalizedHeight\"]}')
          print(f'T2 hotStuff:        {d[\"hotStuffFinalizedHeight\"]}')
          print(f'current ({cp[\"start\"]}-{cp[\"end\"]}): {len(d[\"currentGenerators\"])} generators committed')
          for g in d[\"currentGenerators\"]: print(f'  → {g[\"address\"]}')
          print(f'next    ({np[\"start\"]}-{np[\"end\"]}): {len(d[\"nextGenerators\"])} generators committed')
          for g in d[\"nextGenerators\"]: print(f'  → {g[\"address\"]}')
          "
