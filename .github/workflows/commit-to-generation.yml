name: Commit generators to generation period

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Target network'
        required: true
        default: 'testnet'
        type: choice
        options:
          - testnet
      generation_period_start:
        description: 'Generation period start height (see /blockchain/finality → nextGenerationPeriod.start)'
        required: true
        default: '101'
      wipe_gen_nodes:
        description: 'Wipe gen node chain data before committing (use when gen nodes are on wrong chain)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  commit:
    name: Wipe + Commit to generation period
    runs-on: ubuntu-latest

    steps:
      - name: Download kubeconfig (LKE)
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
        run: |
          CID=$(curl -sf -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters" \
            | jq -r '.data[] | select(.label=="dcc-peer-${{ inputs.network }}") | .id')
          echo "Cluster ID: $CID"
          curl -sf -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters/${CID}/kubeconfig" \
            | jq -r '.kubeconfig' \
            | python3 -c 'import base64,sys; sys.stdout.buffer.write(base64.b64decode(sys.stdin.read().strip()+"=="))' \
            > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> "$GITHUB_ENV"

      - uses: azure/setup-kubectl@v4

      - name: Wipe gen node chain data (scale down → delete PVCs → scale up)
        if: ${{ inputs.wipe_gen_nodes == 'true' }}
        run: |
          set -euo pipefail
          echo "=== Scaling down all gen/val StatefulSets ==="
          kubectl scale statefulset dcc-gen-0 dcc-gen-1 dcc-val-0 --replicas=0 -n dcc
          echo "Waiting for pods to terminate..."
          kubectl wait pod -n dcc -l 'app in (dcc-gen-0,dcc-gen-1,dcc-val-0)' \
            --for=delete --timeout=120s || true

          echo "=== Deleting chain data PVCs ==="
          kubectl delete pvc chain-data-dcc-gen-0-0 chain-data-dcc-gen-1-0 chain-data-dcc-val-0-0 \
            -n dcc --ignore-not-found=true
          echo "Waiting for PVC deletion..."
          sleep 10

          echo "=== Scaling back up ==="
          kubectl scale statefulset dcc-gen-0 dcc-gen-1 dcc-val-0 --replicas=1 -n dcc
          echo "Waiting for pods to be Running..."
          kubectl wait pod -n dcc -l 'app in (dcc-gen-0,dcc-gen-1)' \
            --for=condition=Ready --timeout=300s

      - name: Wait for gen nodes to sync with main (height check)
        if: ${{ inputs.wipe_gen_nodes == 'true' }}
        run: |
          echo "Waiting for gen-0 to reach height 5+ on the fresh genesis..."
          for i in $(seq 1 30); do
            sleep 20
            kubectl port-forward -n dcc dcc-gen-0-0 16869:6869 >/dev/null 2>&1 &
            PF=$!; sleep 3
            H=$(curl -sf http://127.0.0.1:16869/blocks/height 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin)['height'])" 2>/dev/null || echo "0")
            kill $PF 2>/dev/null; true
            echo "  gen-0 height: $H"
            if [ "$H" -ge 5 ] 2>/dev/null; then
              echo "✅ gen-0 synced to height $H"
              break
            fi
          done

      # ── commit via port-forward (no API key needed after config update) ──────

      - name: Commit gen-0 (port-forward → sign → broadcast)
        env:
          PERIOD: ${{ inputs.generation_period_start }}
        run: |
          set -euo pipefail
          kubectl port-forward -n dcc dcc-gen-0-0 16869:6869 >/dev/null 2>&1 &
          PF_GEN0=$!
          sleep 4

          ADDR=$(curl -sf http://127.0.0.1:16869/addresses \
            | python3 -c "import sys,json; print(json.load(sys.stdin)[0])")
          echo "gen-0 address: $ADDR"

          PUBKEY=$(curl -sf "http://127.0.0.1:16869/addresses/publicKey/$ADDR" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['publicKey'])")
          echo "gen-0 pubkey: $PUBKEY"

          PAYLOAD=$(python3 -c "
          import json
          print(json.dumps({'type':19,'version':1,'senderPublicKey':'$PUBKEY','generationPeriodStart':$PERIOD}))
          ")

          SIGNED=$(echo "$PAYLOAD" \
            | curl -sf -X POST http://127.0.0.1:16869/transactions/sign \
                -H "Content-Type: application/json" \
                -d @-)
          echo "Signed tx: $SIGNED"

          kill $PF_GEN0 2>/dev/null; true

          TXID=$(echo "$SIGNED" \
            | curl -sf -X POST https://testnet-node.decentralchain.io/transactions/broadcast \
                -H "Content-Type: application/json" \
                -d @- \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "✅ gen-0 CommitToGeneration TX: $TXID"

      - name: Commit gen-1 (port-forward → sign → broadcast)
        env:
          PERIOD: ${{ inputs.generation_period_start }}
        run: |
          set -euo pipefail
          kubectl port-forward -n dcc dcc-gen-1-0 16870:6870 >/dev/null 2>&1 &
          PF_GEN1=$!
          sleep 4

          ADDR=$(curl -sf http://127.0.0.1:16870/addresses \
            | python3 -c "import sys,json; print(json.load(sys.stdin)[0])")
          echo "gen-1 address: $ADDR"

          PUBKEY=$(curl -sf "http://127.0.0.1:16870/addresses/publicKey/$ADDR" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['publicKey'])")
          echo "gen-1 pubkey: $PUBKEY"

          PAYLOAD=$(python3 -c "
          import json
          print(json.dumps({'type':19,'version':1,'senderPublicKey':'$PUBKEY','generationPeriodStart':$PERIOD}))
          ")

          SIGNED=$(echo "$PAYLOAD" \
            | curl -sf -X POST http://127.0.0.1:16870/transactions/sign \
                -H "Content-Type: application/json" \
                -d @-)
          echo "Signed tx: $SIGNED"

          kill $PF_GEN1 2>/dev/null; true

          TXID=$(echo "$SIGNED" \
            | curl -sf -X POST https://testnet-node.decentralchain.io/transactions/broadcast \
                -H "Content-Type: application/json" \
                -d @- \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "✅ gen-1 CommitToGeneration TX: $TXID"

      - name: Commit main node (SSH → localhost sign → broadcast)
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_KEY:  ${{ secrets.DEPLOY_KEY }}
          API_KEY:     ${{ secrets.MAIN_NODE_REST_API_KEY }}
          PERIOD:      ${{ inputs.generation_period_start }}
        run: |
          set -euo pipefail
          install -dm 700 ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key && chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          TXID=$(ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "API_KEY='$API_KEY' PERIOD=$PERIOD" bash -s << 'REMOTE'
          set -euo pipefail
          ADDR=$(curl -sf -H "X-API-Key: $API_KEY" http://localhost:6869/addresses \
            | python3 -c "import sys,json; print(json.load(sys.stdin)[0])")
          PUBKEY=$(curl -sf "http://localhost:6869/addresses/publicKey/$ADDR" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['publicKey'])")
          PAYLOAD=$(python3 -c "
          import json, os
          print(json.dumps({'type':19,'version':1,'senderPublicKey':'$PUBKEY','generationPeriodStart':$PERIOD}))
          ")
          SIGNED=$(echo "$PAYLOAD" \
            | curl -sf -X POST http://localhost:6869/transactions/sign \
                -H "X-API-Key: $API_KEY" \
                -H "Content-Type: application/json" \
                -d @-)
          echo "$SIGNED" \
            | curl -sf -X POST http://localhost:6869/transactions/broadcast \
                -H "Content-Type: application/json" \
                -d @- \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])"
          REMOTE
          )
          echo "✅ main CommitToGeneration TX: $TXID"

      - name: Verify all three commitments in nextGenerators
        run: |
          sleep 12
          curl -sf https://testnet-node.decentralchain.io/blockchain/finality \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(f'height:              {d[\"height\"]}')
          print(f'T0 finalizedHeight:  {d[\"finalizedHeight\"]}')
          print(f'T2 hotStuffFinalized:{d[\"hotStuffFinalizedHeight\"]}')
          print(f'currentGenerators:   {len(d[\"currentGenerators\"])} committed')
          print(f'nextGenerators (p{d[\"nextGenerationPeriod\"][\"start\"]}): {len(d[\"nextGenerators\"])} committed')
          for g in d[\"nextGenerators\"]:
            print(f'  → {g[\"address\"]}')
          "
