name: VPS Node Status
on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'manual'
  workflow_call:
permissions:
  contents: read
jobs:
  status:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: testnet
    steps:
      - name: Query VPS node finality and services
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             echo "=== Finality ==="
             curl -s http://localhost:6869/blockchain/finality 2>/dev/null | python3 -c "import json,sys; d=json.load(sys.stdin); print(\"H:\",d[\"height\"],\"T0:\",d[\"finalizedHeight\"],\"T2:\",d[\"hotStuffFinalizedHeight\"],\"CurGens:\",len(d.get(\"currentGenerators\",[])),\"NextGens:\",len(d.get(\"nextGenerators\",[])),\"Period:\",d.get(\"currentGenerationPeriod\",{}).get(\"start\",\"?\"),\"->\",d.get(\"currentGenerationPeriod\",{}).get(\"end\",\"?\"))" 2>/dev/null
             echo "=== HotStuff round latency (Kamon) ==="
             curl -s http://localhost:6870/metrics 2>/dev/null | grep -E "^hotstuff_round_latency" | grep -v "_bucket\|_sum\|_count" | head -5
             echo "=== BPS block count ==="
             sudo -u postgres psql -d bps_testnet -t -c "SELECT count(*) FROM blocks_microblocks;" 2>/dev/null
             echo "=== All running containers ==="
             docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.CreatedAt}}" 2>/dev/null || echo "(docker error)"
             echo "=== Matcher last 20 log lines ==="
             docker logs matcher-testnet --tail 20 2>&1 | grep -v "^$" || echo "(no matcher logs)"
             echo "=== Listening ports (ss) ==="
             ss -tlnp 2>/dev/null | grep -E "LISTEN|Local Address" | head -20 || echo "UNREACHABLE"
             echo "=== Matcher volume / account.dat check ==="
             ls -la /opt/dcc/data/matcher-testnet/ 2>/dev/null || echo "dir missing"
             echo "=== Matcher local.conf (secrets redacted) ==="
             sed -E "s/(password[[:space:]]*=[[:space:]]*).*/\1[REDACTED]/I; s/(api-key-hashes[[:space:]]*=[[:space:]]*).*/\1[REDACTED]/I" /opt/dcc/config/matcher-testnet/local.conf 2>/dev/null || echo "(no config)"
             echo "=== Redis auth status (password never printed) ==="
             REDIS_PASS=$(grep "^REDIS_PASSWORD=" /opt/dcc/secrets/testnet.env 2>/dev/null | cut -d= -f2-)
             if [ -z "$REDIS_PASS" ]; then
               echo "REDIS_PASSWORD not found in secrets file"
             else
               NOAUTH_RESULT=$(docker exec redis-testnet redis-cli -h 127.0.0.1 ping 2>&1)
               AUTH_RESULT=$(docker exec redis-testnet redis-cli -h 127.0.0.1 -a "$REDIS_PASS" ping 2>&1 | tail -1)
               echo "ping without password: $NOAUTH_RESULT"
               echo "ping with secrets-file password: $AUTH_RESULT"
             fi
             echo "=== Matcher log grep for Redis auth errors ==="
             MATCHER_REDIS_LINES=$(docker logs matcher-testnet --since 24h 2>&1 | grep -i "NOAUTH\|WRONGPASS\|redis" | tail -10)
             if [ -z "$MATCHER_REDIS_LINES" ]; then
               echo "(no redis-related matcher log lines in last 24h)"
             else
               echo "$MATCHER_REDIS_LINES"
             fi'
          rm -f /tmp/id_rsa
