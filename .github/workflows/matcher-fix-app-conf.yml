name: Fix Matcher and BPS + full status check
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  fix:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Restart BPS if stopped + full status check
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             echo "=== BPS exit reason (last logs) ==="
             docker logs blockchain-postgres-sync-testnet --tail=15 2>&1 \
               | grep -v "at java\|at scala\|at io\.\|at org\.\|at com\.\|at net\." | head -10

             echo "=== Restart BPS ==="
             BPS_STATUS=$(docker inspect --format "{{.State.Status}}" blockchain-postgres-sync-testnet 2>/dev/null)
             if [ "$BPS_STATUS" = "exited" ]; then
               docker start blockchain-postgres-sync-testnet && echo "BPS started"
               sleep 10
               echo "BPS init logs:"
               docker logs blockchain-postgres-sync-testnet --since 2026-06-27T14:00:00Z 2>&1 \
                 | grep -v "at java\|DEBUG" | head -10
             else
               echo "BPS status: $BPS_STATUS (no restart needed)"
             fi

             echo "=== ALL SERVICES ==="
             docker ps -a --format "{{.Names}}\t{{.Status}}" | sort

             echo "=== BLOCK GENERATORS (last 10 blocks) ==="
             HEIGHT=$(curl -s http://localhost:6869/blocks/height 2>/dev/null | python3 -c "import json,sys; print(json.load(sys.stdin)[\"height\"])" 2>/dev/null)
             echo "Current height: $HEIGHT"
             for h in $(seq $((HEIGHT-9)) $HEIGHT); do
               curl -s http://localhost:6869/blocks/at/$h 2>/dev/null | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get(\"height\",\"?\"), d.get(\"generator\",\"?\")[:20])" 2>/dev/null
             done

             echo "=== MATCHER ==="
             curl -s http://localhost:6886/matcher 2>/dev/null | head -2'
          rm -f /tmp/id_rsa
