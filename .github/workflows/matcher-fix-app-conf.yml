name: Fix Matcher - remove stale application.conf
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  fix:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Remove stale application.conf that overrides local.conf
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             docker stop matcher-testnet 2>/dev/null
             DATA_DIR="/opt/dcc/data/matcher-testnet"
             echo "=== Remove stale application.conf (it overrides local.conf!) ==="
             sudo rm -f "$DATA_DIR/config/application.conf" "$DATA_DIR/config/application.conf.image" 2>/dev/null
             echo "=== Write correct local.conf ==="
             printf "dcc.dex.address-scheme-character = \"\\041\"\ndcc.dex.account-storage.type = in-mem\n" | sudo tee "$DATA_DIR/config/local.conf" > /dev/null
             sudo chown -R 113:113 "$DATA_DIR" 2>/dev/null
             echo "Config dir contents:"
             ls -la "$DATA_DIR/config/"
             cat "$DATA_DIR/config/local.conf"
             echo "=== Start matcher ==="
             docker start matcher-testnet 2>/dev/null && echo OK
             sleep 8
             echo "=== Logs (should show Blockchain Id: ! now) ==="
             docker logs matcher-testnet --since 2026-06-27T13:40:00 2>&1 | grep -iE "Starting|Blockchain Id|public key|address|ERROR|error|account|type" | grep -v "class path\|at java" | head -10
             echo "=== Status ==="
             docker ps --format "{{.Names}}\t{{.Status}}" | grep matcher'
          rm -f /tmp/id_rsa
