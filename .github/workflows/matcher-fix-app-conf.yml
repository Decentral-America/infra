name: Fix Matcher - remove stale application.conf
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  fix:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Write local.conf to CORRECT config dir and restart
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             docker stop matcher-testnet 2>/dev/null

             echo "=== Both dirs on host ==="
             echo "DATA config (wrong, was shadowed by config mount):"
             ls -la /opt/dcc/data/matcher-testnet/config/ 2>/dev/null || echo "missing"
             echo "CONFIG dir (correct read-only bind mount to /var/lib/decentralchain-dex/config):"
             ls -la /opt/dcc/config/matcher-testnet/ 2>/dev/null || echo "DIR MISSING"

             echo "=== Write local.conf to CORRECT config dir ==="
             sudo mkdir -p /opt/dcc/config/matcher-testnet
             printf "dcc.dex {\n  address-scheme-character = \"!\"\n  account-storage.type = in-mem\n}\n" \
               | sudo tee /opt/dcc/config/matcher-testnet/local.conf > /dev/null
             echo "Written:"
             cat /opt/dcc/config/matcher-testnet/local.conf

             echo "=== Start matcher ==="
             docker start matcher-testnet
             sleep 15

             echo "=== First startup logs ==="
             docker logs matcher-testnet --since 2026-06-27T14:00:00Z 2>&1 \
               | grep -v "at java\|at scala\|at io\.\|at org\.\|at com\.\|at net\.\|DEBUG.*pekko\|class path\|WARNING.*Unsafe" \
               | head -25

             echo "=== Status ==="
             docker ps --format "{{.Names}}\t{{.Status}}" | grep matcher'
          rm -f /tmp/id_rsa
