name: Fix BPS - truncate tables and restart
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  fix:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Truncate BPS tables and restart
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             echo "=== Stop BPS ==="
             docker stop blockchain-postgres-sync-testnet 2>/dev/null
             echo "=== Truncate all BPS postgres tables ==="
             sudo -u postgres psql -d bps_testnet -c "DO \$\$ DECLARE r record; BEGIN FOR r IN SELECT tablename FROM pg_tables WHERE schemaname='"'"'public'"'"' LOOP EXECUTE '"'"'TRUNCATE '"'"'||r.tablename||'"'"' CASCADE'"'"'; END LOOP; END; \$\$;" 2>&1 | tail -3
             echo "=== Start BPS ==="
             docker start blockchain-postgres-sync-testnet
             sleep 15
             echo "=== BPS status ==="
             docker ps --format "{{.Names}}\t{{.Status}}" | grep bps
             docker logs blockchain-postgres-sync-testnet --since 2026-06-27T19:00:00Z 2>&1 | grep -v "at java\|at scala\|DEBUG" | head -10'
          rm -f /tmp/id_rsa
