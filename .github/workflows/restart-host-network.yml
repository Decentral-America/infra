name: Restart Main Node with Host Networking
on:
  workflow_call:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'This wipes chain data. Type WIPE-CONFIRMED to proceed.'
        required: true
        type: string
permissions:
  contents: read
concurrency:
  group: restart-host-network
  cancel-in-progress: false
jobs:
  restart:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: testnet
    steps:
      - name: Require explicit confirmation
        if: github.event_name == 'workflow_dispatch'
        env:
          CONFIRM: ${{ inputs.confirm }}
        run: |
          set -euo pipefail
          if [ "$CONFIRM" != "WIPE-CONFIRMED" ]; then
            echo "::error::This restarts the node with --network host AND wipes chain data (rm -rf /data/data /data/peers.dat). Re-run with confirm set to exactly WIPE-CONFIRMED."
            exit 1
          fi

      - name: Stop bridge container, start with host networking + wipe chain
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          install -d -m 700 ~/.ssh
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=yes -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" '
            set -e
            IMG="ghcr.io/decentral-america/node-scala@sha256:9d7d4f31ed297d52730d4a10b71341e89f4d5ec43b7b16b0988838fca12cc692"
            echo "=== Stop and remove bridge-mode container ==="
            docker stop node-scala-testnet 2>/dev/null || true
            docker rm node-scala-testnet 2>/dev/null || true
            echo "=== Wipe chain data ==="
            docker run --rm -v node-state-testnet:/data alpine \
              sh -c "rm -rf /data/data /data/peers.dat && echo WIPED" 2>/dev/null || true
            echo "=== Pull latest image ==="
            docker pull "$IMG"
            echo "=== Start with host networking (no NAT, direct P2P) ==="
            docker run -d \
              --name node-scala-testnet \
              --network host \
              --restart unless-stopped \
              --memory 4g \
              --memory-reservation 1g \
              --security-opt no-new-privileges:true \
              --cap-drop ALL \
              --read-only \
              --tmpfs /tmp:size=256m,mode=1777,exec \
              -v node-state-testnet:/var/lib/dcc \
              -v /opt/dcc/config/node-testnet/dcc.conf:/etc/dcc/dcc.conf:ro \
              -v /opt/dcc/plugins/testnet:/usr/share/dcc/lib/plugins:ro \
              --env-file /opt/dcc/secrets/testnet.env \
              -e DCC_NETWORK=testnet \
              -e DCC_HEAP_SIZE=2g \
              -e DCC_REST_API_BIND=0.0.0.0 \
              "$IMG"
            sleep 20
            echo "=== Container state ==="
            docker ps
            echo "=== Network mode ==="
            docker inspect node-scala-testnet --format "NetworkMode={{.HostConfig.NetworkMode}}" 2>/dev/null || true
            echo "=== Port check ==="
            ss -tlnp | grep 6868 || echo "(no 6868 listener yet)"
            echo "=== Version ==="
            curl -sf http://localhost:6869/node/version 2>/dev/null || echo "(starting up)"
            echo OK'
          rm -f /tmp/id_rsa
