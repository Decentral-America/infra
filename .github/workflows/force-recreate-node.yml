name: Force Recreate Node with Latest Image
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  recreate:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Recreate node-scala-testnet with latest image + wipe chain
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" 'set -e
            IMG="ghcr.io/decentral-america/node-scala:node-scala-testnet-latest"
            COMPOSE_DIR="/opt/dcc/compose"
            echo "Current: $(docker inspect node-scala-testnet --format {{.Config.Image}} 2>/dev/null || echo unknown)"
            echo "Target: $IMG"
            docker stop node-scala-testnet 2>/dev/null || true
            docker rm node-scala-testnet 2>/dev/null || true
            docker run --rm -v node-state-testnet:/data alpine \
              sh -c "rm -rf /data/data /data/peers.dat && echo WIPED" 2>/dev/null || true
            IMAGE_TAG="$IMG" NETWORK=testnet \
              docker compose -f "$COMPOSE_DIR/node-scala.yml" up -d
            sleep 20
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Image}}" | grep node-scala
            curl -sf http://localhost:6869/node/version 2>/dev/null || echo "(starting up)"
            echo OK'
          rm -f /tmp/id_rsa
