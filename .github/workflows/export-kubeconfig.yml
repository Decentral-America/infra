# ──────────────────────────────────────────────────────────────────────────────
# One-shot: export the LKE kubeconfig age-encrypted to an operator's public key.
# The artifact is encrypted with the caller-supplied age recipient, so it is
# useless to anyone without the matching private key. Delete after use.
# ──────────────────────────────────────────────────────────────────────────────
name: Export Kubeconfig (age-encrypted)

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Target network'
        required: true
        default: 'testnet'
        type: choice
        options: [testnet]
      age_recipient:
        description: 'age public key to encrypt the kubeconfig to'
        required: true
        type: string

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Fetch kubeconfig + age-encrypt to recipient
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
          RECIPIENT: ${{ inputs.age_recipient }}
        run: |
          set -euo pipefail
          # Pinned + checksum-verified, matching the sops install pattern used
          # elsewhere in this repo (push-secrets.yml) — an unpinned apt-get
          # install pulls whatever Debian happens to package, with no guarantee
          # it matches the PQ-capable age this org standardized on (v1.3.1).
          AGE_VERSION="v1.3.1"
          AGE_SHA256="bdc69c09cbdd6cf8b1f333d372a1f58247b3a33146406333e30c0f26e8f51377"
          curl -fsSL "https://github.com/FiloSottile/age/releases/download/${AGE_VERSION}/age-${AGE_VERSION}-linux-amd64.tar.gz" \
            -o /tmp/age.tar.gz
          echo "${AGE_SHA256}  /tmp/age.tar.gz" | sha256sum --check --status \
            || { echo "::error::age tarball SHA256 mismatch — aborting"; exit 1; }
          tar -xzf /tmp/age.tar.gz -C /tmp
          sudo install -m 755 /tmp/age/age /usr/local/bin/age
          rm -rf /tmp/age.tar.gz /tmp/age
          CID=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters" | \
            jq -r '.data[] | select(.label=="dcc-peer-${{ inputs.network }}") | .id')
          echo "cluster id: $CID"
          curl -s -H "Authorization: Bearer $LINODE_TOKEN" -X GET \
            "https://api.linode.com/v4/lke/clusters/${CID}/kubeconfig" | jq -r '.kubeconfig' \
            | python3 -c 'import base64,sys; sys.stdout.buffer.write(base64.b64decode(sys.stdin.read().strip()+"=="))' \
            > kubeconfig.plain
          age -r "$RECIPIENT" -o kubeconfig.age kubeconfig.plain
          rm -f kubeconfig.plain
          echo "encrypted bytes: $(wc -c < kubeconfig.age)"

      - name: Upload encrypted kubeconfig
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: kubeconfig-age
          path: kubeconfig.age
          retention-days: 1
