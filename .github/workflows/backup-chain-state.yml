name: Backup Chain State

on:
  schedule:
    - cron: '0 3 * * *'   # daily 03:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Create snapshot and upload to R2
        env:
          SSH_KEY:              ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST:             ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER:             ${{ secrets.TESTNET_DEPLOY_USER }}
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_SECRET:   ${{ secrets.BACKUP_OBJ_ENDPOINT }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa

          # Credentials are injected as shell variable assignments on the SSH
          # command line (R2_KEY=... R2_SECRET=... R2_ENDPOINT_ENV=... bash -s).
          # They travel over the encrypted SSH channel, never written to disk on VPS.
          # R2_ENDPOINT_ENV: set via GitHub secret BACKUP_OBJ_ENDPOINT (preferred).
          # Falls back to /opt/dcc/secrets/testnet.env for legacy compatibility.
          ssh -i /tmp/id_rsa \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            "${SSH_USER}@${SSH_HOST}" \
            "R2_KEY='${R2_ACCESS_KEY_ID}' R2_SECRET='${R2_SECRET_ACCESS_KEY}' R2_ENDPOINT_ENV='${R2_ENDPOINT_SECRET}' bash -s" << 'ENDSSH'
          set -euo pipefail

          SNAP_NAME="node-state-$(date +%Y%m%d-%H%M%S).tar.gz"
          SNAP_PATH="/tmp/${SNAP_NAME}"

          echo "=== Creating snapshot ${SNAP_NAME} ==="
          docker run --rm \
            -v node-state-testnet:/data \
            -v /tmp:/backup \
            alpine tar czf "/backup/${SNAP_NAME}" -C /data .

          SNAP_SIZE=$(du -sh "${SNAP_PATH}" | cut -f1)
          echo "Snapshot size: ${SNAP_SIZE}"

          # R2 endpoint resolution (in priority order):
          #   1. R2_ENDPOINT_ENV — injected from GitHub secret BACKUP_OBJ_ENDPOINT
          #   2. /opt/dcc/secrets/testnet.env — legacy fallback (written by push-secrets.yml)
          # Format: https://<account_id>.r2.cloudflarestorage.com
          if [[ -n "${R2_ENDPOINT_ENV:-}" ]]; then
            R2_ENDPOINT="${R2_ENDPOINT_ENV}"
          else
            R2_ENDPOINT=$(grep -oP '(?<=BACKUP_OBJ_ENDPOINT=).+' /opt/dcc/secrets/testnet.env 2>/dev/null | tr -d '\r' || true)
          fi
          if [[ -z "${R2_ENDPOINT}" ]]; then
            echo "ERROR: BACKUP_OBJ_ENDPOINT not set." >&2
            echo "  Set GitHub secret BACKUP_OBJ_ENDPOINT in the testnet environment, or" >&2
            echo "  run push-secrets.yml with a SOPS file that includes BACKUP_OBJ_ENDPOINT." >&2
            rm -f "${SNAP_PATH}"
            exit 1
          fi

          echo "=== Writing ephemeral rclone config ==="
          RCLONE_CONF=$(mktemp)
          chmod 600 "${RCLONE_CONF}"
          printf '[r2]\ntype = s3\nprovider = Cloudflare\nenv_auth = false\naccess_key_id = %s\nsecret_access_key = %s\nendpoint = %s\nacl = private\n' \
            "${R2_KEY}" "${R2_SECRET}" "${R2_ENDPOINT}" > "${RCLONE_CONF}"

          echo "=== Uploading to R2 ==="
          rclone copy "${SNAP_PATH}" r2:pg-backups-testnet/chain-state/ \
            --config "${RCLONE_CONF}" \
            --no-traverse \
            --stats-one-line

          echo "=== Pruning old snapshots (keep 7 most recent) ==="
          LISTED=$(rclone lsf r2:pg-backups-testnet/chain-state/ \
            --config "${RCLONE_CONF}" \
            --include "node-state-*.tar.gz" | sort)
          TOTAL=$(printf '%s\n' "${LISTED}" | grep -c . || true)
          if [ "${TOTAL}" -gt 7 ]; then
            TO_DELETE=$(printf '%s\n' "${LISTED}" | head -n $(( TOTAL - 7 )))
            while IFS= read -r OLD; do
              echo "  Deleting old snapshot: ${OLD}"
              rclone deletefile "r2:pg-backups-testnet/chain-state/${OLD}" \
                --config "${RCLONE_CONF}"
            done <<< "${TO_DELETE}"
          else
            echo "  ${TOTAL} snapshot(s) present — no pruning needed"
          fi

          # Remove credentials from disk immediately
          rm -f "${SNAP_PATH}" "${RCLONE_CONF}"

          echo "=== Backup complete ==="
          echo "SNAP_NAME=${SNAP_NAME}"
          echo "SNAP_SIZE=${SNAP_SIZE}"
          ENDSSH

          rm -f /tmp/id_rsa

      - name: Write step summary
        if: always()
        run: |
          {
            echo "## Chain State Backup"
            echo ""
            echo "- **Schedule**: daily 03:00 UTC"
            echo "- **Destination**: \`r2:pg-backups-testnet/chain-state/\`"
            echo "- **Retention**: 7 most recent snapshots"
          } >> "$GITHUB_STEP_SUMMARY"
