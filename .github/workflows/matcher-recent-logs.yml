name: Get Matcher Recent Raw Logs
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  logs:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Get last 30 matcher log lines unfiltered
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             echo "=== /blockchain/finality ==="
             curl -s http://localhost:6869/blockchain/finality 2>/dev/null
             echo ""
             echo "=== /activation/status (features 22,25) ==="
             curl -s http://localhost:6869/activation/status 2>/dev/null | python3 -c "import json,sys; d=json.load(sys.stdin); [print(f) for f in d.get(\"features\",[]) if f.get(\"id\") in [22,25]]" 2>/dev/null
             echo "=== CommitToGeneration txs ==="
             curl -s "http://localhost:6869/transactions/address/3FPKHBRpG3xKz3RcGUzDpxFLmJtLQ2YVFt3/limit/20" 2>/dev/null | python3 -c "import json,sys; txs=json.load(sys.stdin); [print(t.get(\"type\"),t.get(\"id\",\"\")[:20]) for t in (txs[0] if isinstance(txs,list) and txs else []) if t.get(\"type\") in [17,18,26,27,28]]" 2>/dev/null || echo "no special txs"
             echo "=== Node log HotStuff lines ==="
             docker logs node-scala-testnet --since 2026-06-27T14:00:00Z 2>&1 | grep -i "hotstuff\|finality\|committed\|validator" | tail -10'
          rm -f /tmp/id_rsa
