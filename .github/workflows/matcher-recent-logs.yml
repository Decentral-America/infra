name: Get Matcher Recent Raw Logs
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  logs:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Get last 30 matcher log lines unfiltered
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             echo "=== Height and peers ==="
             curl -s http://localhost:6869/blocks/height 2>/dev/null
             curl -s http://localhost:6869/peers/connected 2>/dev/null | python3 -c "import json,sys; d=json.load(sys.stdin); print(\"Peers:\",len(d.get(\"peers\",[])), [(p[\"address\"],p.get(\"applicationName\",\"\")[:15]) for p in d.get(\"peers\",[])])" 2>/dev/null
             echo "=== Finality ==="
             curl -s http://localhost:6869/blockchain/finality 2>/dev/null | python3 -c "import json,sys; d=json.load(sys.stdin); print(\"H:\",d[\"height\"],\"T0:\",d[\"finalizedHeight\"],\"T2:\",d[\"hotStuffFinalizedHeight\"],\"CurGens:\",len(d.get(\"currentGenerators\",[])),\"NextGens:\",len(d.get(\"nextGenerators\",[]))) " 2>/dev/null
             echo "=== Recent node log (block appends) ==="
             docker logs node-scala-testnet --since 2026-06-27T15:20:00Z 2>&1 | grep -i "appended\|append\|height\|peer\|disconnect\|score\|hotstuff\|error" | grep -v "HTTP\|GET\|POST" | tail -15'
          rm -f /tmp/id_rsa
