name: Get Matcher Recent Raw Logs
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  logs:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Get last 30 matcher log lines unfiltered
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             echo "=== Matcher status ==="
             docker ps --format "{{.Names}}\t{{.Status}}" | grep matcher
             echo "=== Correct config (config dir) ==="
             cat /opt/dcc/config/matcher-testnet/local.conf 2>/dev/null
             echo "=== Blockchain ID check and startup logs ==="
             docker logs matcher-testnet --since 2026-06-27T14:00:00Z 2>&1 \
               | grep -v "at java\|at scala\|at io\.\|at org\.\|at com\.\|at net\.\|DEBUG.*pekko\|class path\|WARNING.*Unsafe\|jfr\|kanela" \
               | head -30
             echo "=== Service status (all) ==="
             docker ps --format "{{.Names}}\t{{.Status}}" | grep -E "testnet"'
          rm -f /tmp/id_rsa
