name: Get Matcher Recent Raw Logs
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  logs:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Get last 30 matcher log lines unfiltered
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             echo "=== Matcher status ==="
             docker ps --format "{{.Names}}\t{{.Status}}" | grep matcher
             echo "=== Config dir ==="
             ls -la /opt/dcc/data/matcher-testnet/config/ 2>/dev/null
             cat /opt/dcc/data/matcher-testnet/config/local.conf 2>/dev/null
             echo "=== First 40 lines of latest run (since 13:30) ==="
             docker logs matcher-testnet --since 2026-06-27T13:30:00Z 2>&1 | grep -v "at java\|at scala\|at io\.\|at org\.\|at com\.\|at net\.\|DEBUG.*pekko" | head -40
             echo "=== Last 10 lines of latest run ==="
             docker logs matcher-testnet --since 2026-06-27T13:30:00Z 2>&1 | tail -10'
          rm -f /tmp/id_rsa
