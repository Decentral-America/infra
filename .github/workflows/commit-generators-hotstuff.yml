name: Commit Generators to HotStuff (T2 Activation)
# Submits CommitToGenerationTransaction (type 19) for all 3 generators.
# The node's /transactions/sign endpoint auto-derives BLS keys from the
# generator's Ed25519 private key and computes the Proof of Possession.
# Run this once per generation period (every 100 blocks) to keep T2 active.
on:
  workflow_call:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  commit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: testnet
    steps:
      - name: Install kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d  # v5.1.0

      - name: Get LKE kubeconfig
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
        run: |
          CLUSTER_ID=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters" | \
            jq -r '.data[] | select(.label | test("testnet")) | .id' | head -1)
          RAW=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters/${CLUSTER_ID}/kubeconfig" | \
            jq -r '.kubeconfig')
          echo "$RAW" | base64 -d > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
          echo "LKE cluster $CLUSTER_ID kubeconfig downloaded"

      - name: Verify cluster connectivity
        run: kubectl cluster-info --request-timeout=10s

      - name: Commit main node generator
        env:
          SSH_KEY:      ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST:     ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER:     ${{ secrets.TESTNET_DEPLOY_USER }}
          MAIN_API_KEY: ${{ secrets.MAIN_NODE_REST_API_KEY }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          # Write key to temp file to avoid SSH quoting issues with Base64 special chars
          echo "${MAIN_API_KEY}" > /tmp/.main_key
          scp -i /tmp/id_rsa -o StrictHostKeyChecking=no /tmp/.main_key "${SSH_USER}@${SSH_HOST}:/tmp/.main_key" 2>/dev/null
          rm -f /tmp/.main_key
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             API_KEY=$(cat /tmp/.main_key 2>/dev/null | tr -d "\n")
             rm -f /tmp/.main_key
             ADDR="31RPEKcz71a3hdxt8z7qLhTpRMuRV2kUyr6"
             echo "=== Signing CommitToGeneration for main node ==="
             SIGNED=$(curl -s -X POST http://localhost:6869/transactions/sign \
               -H "X-API-Key: $API_KEY" \
               -H "Content-Type: application/json" \
               -d "{\"type\":19,\"sender\":\"$ADDR\"}")
             echo "Signed response: $SIGNED" | head -c 300
             echo ""
             if echo "$SIGNED" | grep -q "\"id\""; then
               echo "=== Broadcasting ==="
               RESULT=$(curl -s -X POST http://localhost:6869/transactions/broadcast \
                 -H "Content-Type: application/json" \
                 -d "$SIGNED")
               echo "Broadcast result: $RESULT" | head -c 300
             else
               echo "Sign failed or already committed — skipping broadcast"
             fi'
          rm -f /tmp/id_rsa

      - name: Commit gen-0 generator (port-forward)
        continue-on-error: true
        env:
          API_KEY: ${{ secrets.GEN_0_NODE_REST_API_KEY }}
        run: |
          ADDR="31PmKNdHAU5sZbtg8TrzKh8WfE7E8xBc9WD"
          echo "=== Port-forward gen-0 REST API (localhost:16869) ==="
          kubectl port-forward pod/dcc-gen-0-0 -n dcc 16869:6869 &
          PF_PID=$!
          sleep 5
          echo "=== Signing CommitToGeneration for gen-0 ==="
          SIGNED=$(curl -s -X POST http://localhost:16869/transactions/sign \
            -H "X-API-Key: $API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"type\":19,\"sender\":\"$ADDR\"}")
          echo "Signed response: $SIGNED" | head -c 300
          echo ""
          if echo "$SIGNED" | grep -q '"id"'; then
            # gen-0's connection to the main node has been observed to be
            # genuinely intermittent (probabilistic, not on a fixed
            # schedule) -- it briefly appears in peers/connected and then
            # silently drops with no logged reason. A 6-attempt/2-minute
            # retry window sometimes still misses every connected gap in a
            # single run, so widen it: 15 attempts over ~5 minutes gives
            # meaningfully more chances to land inside a connected window
            # without materially lengthening the overall workflow.
            for attempt in $(seq 1 15); do
              echo "=== Broadcasting (attempt ${attempt}/15) ==="
              RESULT=$(curl -s -X POST http://localhost:16869/transactions/broadcast \
                -H "Content-Type: application/json" \
                -d "$SIGNED")
              echo "Broadcast result: $RESULT" | head -c 300
              echo ""
              if ! echo "$RESULT" | grep -q "not enough connections"; then
                break
              fi
              [ "$attempt" -lt 15 ] && sleep 20
            done
          else
            echo "Sign failed or already committed"
          fi
          kill $PF_PID 2>/dev/null || true

      - name: Commit gen-1 generator (port-forward)
        continue-on-error: true
        env:
          API_KEY: ${{ secrets.GEN_1_NODE_REST_API_KEY }}
        run: |
          ADDR="31dLhqhGoGVhtkf5msWFmgZn1ErrVR6b9qV"
          echo "=== Port-forward gen-1 REST API (localhost:16870 -> pod:6870) ==="
          kubectl port-forward pod/dcc-gen-1-0 -n dcc 16870:6870 &
          PF_PID=$!
          sleep 5
          echo "=== Signing CommitToGeneration for gen-1 ==="
          SIGNED=$(curl -s -X POST http://localhost:16870/transactions/sign \
            -H "X-API-Key: $API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"type\":19,\"sender\":\"$ADDR\"}")
          echo "Signed response: $SIGNED" | head -c 300
          echo ""
          if echo "$SIGNED" | grep -q '"id"'; then
            echo "=== Broadcasting ==="
            RESULT=$(curl -s -X POST http://localhost:16870/transactions/broadcast \
              -H "Content-Type: application/json" \
              -d "$SIGNED")
            echo "Broadcast result: $RESULT" | head -c 300
          else
            echo "Sign failed or already committed"
          fi
          kill $PF_PID 2>/dev/null || true

      - name: Verify generators committed
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          sleep 15
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'curl -s http://localhost:6869/blockchain/finality | python3 -c "import json,sys; d=json.load(sys.stdin); print(\"Height:\",d[\"height\"],\"T0:\",d[\"finalizedHeight\"],\"T2:\",d[\"hotStuffFinalizedHeight\"],\"NextGens:\",d.get(\"nextGenerators\",[]))"'
          rm -f /tmp/id_rsa
