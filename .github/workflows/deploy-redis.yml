# ──────────────────────────────────────────────────────────────────────────────
# One-time Redis infrastructure deploy.
#
# Redis is not versioned by app CI — it is infrastructure that runs once and
# stays running. This workflow is triggered manually to start or update Redis.
#
# Run this BEFORE the first websocket-api deploy.
#
# Required secrets (in infra environments testnet/stagenet/mainnet):
#   TESTNET_DEPLOY_HOST, TESTNET_DEPLOY_USER, TESTNET_DEPLOY_SSH_KEY
#   (same pattern for stagenet/mainnet)
# ──────────────────────────────────────────────────────────────────────────────

name: Deploy Redis

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Target network'
        required: true
        default: 'testnet'
        type: choice
        options: [testnet, stagenet, mainnet]

permissions:
  contents: read

concurrency:
  group: deploy-redis-${{ inputs.network }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Redis → ${{ inputs.network }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Gates mainnet/stagenet behind release-approvers; testnet is ungated.
    environment: ${{ inputs.network }}

    steps:
      - name: Checkout infra repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up SSH credentials
        env:
          DEPLOY_HOST: ${{ inputs.network == 'testnet' && secrets.TESTNET_DEPLOY_HOST || inputs.network == 'stagenet' && secrets.STAGENET_DEPLOY_HOST || secrets.MAINNET_DEPLOY_HOST }}
          DEPLOY_KEY:  ${{ inputs.network == 'testnet' && secrets.TESTNET_DEPLOY_SSH_KEY || inputs.network == 'stagenet' && secrets.STAGENET_DEPLOY_SSH_KEY || secrets.MAINNET_DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload redis.yml to server
        env:
          DEPLOY_HOST: ${{ inputs.network == 'testnet' && secrets.TESTNET_DEPLOY_HOST || inputs.network == 'stagenet' && secrets.STAGENET_DEPLOY_HOST || secrets.MAINNET_DEPLOY_HOST }}
          DEPLOY_USER: ${{ inputs.network == 'testnet' && secrets.TESTNET_DEPLOY_USER || inputs.network == 'stagenet' && secrets.STAGENET_DEPLOY_USER || secrets.MAINNET_DEPLOY_USER }}
        run: |
          set -euo pipefail
          scp -i ~/.ssh/deploy_key \
            compose/redis.yml \
            "$DEPLOY_USER@$DEPLOY_HOST:/opt/dcc/compose/"

      - name: Start or update Redis
        env:
          DEPLOY_HOST: ${{ inputs.network == 'testnet' && secrets.TESTNET_DEPLOY_HOST || inputs.network == 'stagenet' && secrets.STAGENET_DEPLOY_HOST || secrets.MAINNET_DEPLOY_HOST }}
          DEPLOY_USER: ${{ inputs.network == 'testnet' && secrets.TESTNET_DEPLOY_USER || inputs.network == 'stagenet' && secrets.STAGENET_DEPLOY_USER || secrets.MAINNET_DEPLOY_USER }}
          NETWORK:     ${{ inputs.network }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=10 \
            "$DEPLOY_USER@$DEPLOY_HOST" bash -s << REMOTE
          set -euo pipefail
          NETWORK="${NETWORK}"

          # Source REDIS_PASSWORD from the secrets file (written by push-secrets).
          REDIS_PASS=\$(grep '^REDIS_PASSWORD=' /opt/dcc/secrets/\${NETWORK}.env | cut -d= -f2- || true)
          if [[ -z "\$REDIS_PASS" ]]; then
            echo "::error::REDIS_PASSWORD not found in /opt/dcc/secrets/\${NETWORK}.env"
            exit 1
          fi

          CONTAINER="redis-\${NETWORK}"
          # Every compose file in /opt/dcc/compose defaults to the same Compose
          # project name (the directory basename, "compose"), so --remove-orphans
          # on any one of them treats every OTHER service's containers as orphans
          # and deletes them. Pin an explicit, isolated project name so orphan
          # detection only ever considers redis's own services.
          PROJECT="redis-\${NETWORK}"

          # If redis-<network> exists from before this project name was pinned
          # (e.g. the old raw `docker run` deploy, or a prior unscoped compose
          # run), it isn't tracked under \$PROJECT and will collide on the name.
          docker rm -f "\$CONTAINER" 2>/dev/null || true

          # compose/redis.yml is the single source of truth for how Redis runs
          # (version, user, cap_drop, healthcheck, resource limits, exporter).
          # Do not reimplement it here with docker run.
          cd /opt/dcc
          NETWORK="\${NETWORK}" REDIS_PASSWORD="\${REDIS_PASS}" \
            docker compose -p "\$PROJECT" -f compose/redis.yml pull
          NETWORK="\${NETWORK}" REDIS_PASSWORD="\${REDIS_PASS}" \
            docker compose -p "\$PROJECT" -f compose/redis.yml up -d --remove-orphans

          echo "Waiting for Redis to become healthy..."
          for i in \$(seq 1 20); do
            status=\$(docker inspect --format '{{.State.Health.Status}}' "\$CONTAINER" 2>/dev/null || echo "unknown")
            if [[ "\$status" == "healthy" ]]; then
              echo "Redis is healthy on \${NETWORK}."
              exit 0
            fi
            echo "Attempt \$i/20 — status=\$status — waiting 3s..."
            sleep 3
          done

          echo "=== Redis failed to become healthy. Logs: ==="
          docker logs "\$CONTAINER" 2>&1 | tail -30
          exit 1
          REMOTE
