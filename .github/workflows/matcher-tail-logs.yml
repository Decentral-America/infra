name: Get Matcher Tail Logs
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  logs:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Get matcher recent/tail logs
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             echo "=== Matcher status ==="
             docker ps --format "{{.Names}}\t{{.Status}}" | grep matcher
             echo "=== BPS status ==="
             docker ps --format "{{.Names}}\t{{.Status}}" | grep postgres
             echo "=== Matcher TAIL logs (last 30 lines) ==="
             docker logs matcher-testnet --tail=30 2>&1 | grep -v "DEBUG\|at java\|at scala\|at io\.netty\|at org\.apache\|at com\.google\|class path"
             echo "=== Data dir contents ==="
             ls -la /opt/dcc/data/matcher-testnet/ 2>/dev/null
             ls -la /opt/dcc/data/matcher-testnet/config/ 2>/dev/null | head -10'
          rm -f /tmp/id_rsa
