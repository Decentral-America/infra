name: Read Matcher Entrypoint Script
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  read:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Read entrypoint.sh and binary launcher
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             MATCHER_IMG=$(docker inspect matcher-testnet --format "{{.Config.Image}}" 2>/dev/null)
             echo "=== /usr/local/bin/entrypoint.sh ==="
             docker run --rm --entrypoint cat "$MATCHER_IMG" /usr/local/bin/entrypoint.sh 2>/dev/null
             echo "=== /usr/share/decentralchain-dex/bin/decentralchain-dex ==="
             docker run --rm --entrypoint cat "$MATCHER_IMG" /usr/share/decentralchain-dex/bin/decentralchain-dex 2>/dev/null | head -50
             echo "=== MATCHER_ACCOUNT_SEED in secrets ==="
             grep "^MATCHER_ACCOUNT_SEED" /opt/dcc/secrets/testnet.env 2>/dev/null | wc -c
             echo "=== local.conf contents ==="
             cat /opt/dcc/data/matcher-testnet/config/local.conf 2>/dev/null'
          rm -f /tmp/id_rsa
