name: Fix Matcher Address Scheme
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  fix:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Add address scheme env var and restart matcher
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             docker stop matcher-testnet 2>/dev/null
             SECRETS="/opt/dcc/secrets/testnet.env"
             echo "=== Remove stale scheme vars ==="
             sudo sed -i "/^WAVES_DEX__/d;/^DCC_DEX__/d;/^DEX_ADDRESS_SCHEME/d" "$SECRETS" 2>/dev/null
             echo "=== Add testnet address scheme (! = ASCII 33 = DCC testnet) ==="
             printf "WAVES_DEX__ADDRESS_SCHEME_CHARACTER=!\nDCC_DEX__ADDRESS_SCHEME_CHARACTER=!\n" | sudo tee -a "$SECRETS" > /dev/null
             echo "Current relevant vars:"
             grep -iE "^MATCHER|^WAVES_DEX|^DCC_DEX" "$SECRETS" | sed "s/SEED=.*/SEED=***/;s/PASSWORD=.*/PASSWORD=***/"
             echo "=== Start matcher ==="
             docker start matcher-testnet 2>/dev/null && echo OK
             sleep 35
             docker logs matcher-testnet --since 2026-06-27T12:27:00 2>&1 | grep -iE "Starting|started|Public key|address|Blockchain Id|ERROR|error|scheme" | grep -v "DEBUG\|class path\|at java" | head -20
             docker ps --format "{{.Names}}\t{{.Status}}" | grep matcher'
          rm -f /tmp/id_rsa
