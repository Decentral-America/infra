# ──────────────────────────────────────────────────────────────────────────────
# Bootstrap Flux GitOps on the LKE peer-node cluster
#
# Run this ONCE after `provision.yml apply` creates the LKE cluster.
# Uses an SSH deploy key (not GITHUB_TOKEN) so Flux can pull from GitHub
# after the workflow completes — GITHUB_TOKEN is scoped to Actions and
# is rejected for external git operations.
#
# Required secrets (repo-level):
#   LINODE_TOKEN    — Linode API token
#   AGE_KEY_testnet — age private key for sops-age in-cluster secret
#   GITHUB_TOKEN    — auto-provided; used only for gh CLI (deploy-key add)
# ──────────────────────────────────────────────────────────────────────────────

name: Bootstrap Flux

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Target network'
        required: true
        default: 'testnet'
        type: choice
        options:
          - testnet

permissions:
  contents: write

concurrency:
  group: flux-bootstrap-${{ inputs.network }}
  cancel-in-progress: false

jobs:
  bootstrap:
    name: Bootstrap Flux — ${{ inputs.network }}
    runs-on: ubuntu-latest
    environment: infra-${{ inputs.network }}-provision

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Flux CLI
        run: |
          curl -s https://fluxcd.io/install.sh | bash
          flux --version

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Download kubeconfig from Linode API
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
        run: |
          CLUSTER_ID=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters" | \
            jq -r '.data[] | select(.label=="dcc-peer-${{ inputs.network }}") | .id')
          echo "Cluster ID: $CLUSTER_ID"
          RAW=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            -H "Content-Type: application/json" -X GET \
            "https://api.linode.com/v4/lke/clusters/${CLUSTER_ID}/kubeconfig" | \
            jq -r '.kubeconfig')
          echo "$RAW" | python3 -c 'import base64,sys; sys.stdout.buffer.write(base64.b64decode(sys.stdin.read().strip() + "=="))' > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV

      - name: Verify cluster connectivity
        run: kubectl cluster-info

      - name: Load pre-provisioned Flux deploy key
        env:
          FLUX_DEPLOY_KEY: ${{ secrets.FLUX_DEPLOY_KEY_testnet }}
        run: |
          # Key is pre-registered as deploy key on the repo (admin op done once).
          # Stored as FLUX_DEPLOY_KEY_testnet GitHub secret.
          echo "$FLUX_DEPLOY_KEY" > /tmp/flux-deploy-key
          chmod 600 /tmp/flux-deploy-key

      - name: Pre-provision flux-system namespace and sops-age secret
        env:
          AGE_KEY: ${{ secrets.AGE_KEY_testnet }}
        run: |
          kubectl create namespace flux-system --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic sops-age \
            --namespace=flux-system \
            --from-literal=age.agekey="$AGE_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "sops-age provisioned"

      - name: Flux bootstrap with SSH deploy key
        run: |
          # "y" answers the "Please give the key access to your repository?" prompt.
          # The key is pre-registered — we confirm it's already in place.
          echo "y" | flux bootstrap git \
            --url=ssh://git@github.com/Decentral-America/infra.git \
            --branch=main \
            --path=clusters/${{ inputs.network }} \
            --private-key-file=/tmp/flux-deploy-key \
            --network-policy=false \
            --components-extra=image-reflector-controller,image-automation-controller

      - name: Verify Flux is healthy
        run: flux check
