name: Wipe testnet chain data

on:
  workflow_dispatch:
    inputs:
      network:
        # Only testnet has DEPLOY_HOST/USER/SSH_KEY secrets provisioned today
        # (verified: no STAGENET_DEPLOY_* org secrets exist). The wipe step below
        # is hardcoded to TESTNET_DEPLOY_* and node-scala-testnet/node-state-testnet —
        # do not add stagenet back here until both the secrets exist AND the wipe
        # step is parameterized by ${{ inputs.network }}, or this will silently
        # wipe testnet while claiming to target stagenet.
        description: 'Network to wipe'
        required: true
        default: 'testnet'
        type: choice
        options: [testnet]
      confirm:
        description: 'Type WIPE-CONFIRMED to proceed (irreversible — destroys all chain data)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  wipe:
    name: Wipe chain data on ${{ inputs.network }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.network }}
    steps:
      - name: Verify confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "WIPE-CONFIRMED" ]; then
            echo "ERROR: confirm input must be exactly 'WIPE-CONFIRMED'. Got: '${{ inputs.confirm }}'"
            echo "This workflow permanently destroys all chain data and cannot be undone."
            exit 1
          fi

      - name: Setup SSH key
        run: |
          install -dm 700 ~/.ssh
          echo "${{ secrets.TESTNET_DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.TESTNET_DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Stop node, wipe chain data, remove volume
        env:
          DEPLOY_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
          NETWORK: ${{ inputs.network }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "$DEPLOY_USER@$DEPLOY_HOST" bash -s << 'REMOTE'
          set -euo pipefail
          echo "Stopping node-scala-testnet..."
          docker stop node-scala-testnet 2>/dev/null || true
          docker rm node-scala-testnet 2>/dev/null || true

          echo "Wiping chain volume..."
          # Try both volume name variants
          docker volume rm node-state-testnet 2>/dev/null || true
          docker volume rm dcc-node-state-testnet 2>/dev/null || true

          echo "Recreating empty volume..."
          docker volume create node-state-testnet
          echo "Volume created:"
          docker volume ls | grep -E "state|dcc" || echo "(no matching volumes — unexpected)"

          echo "Done — chain data wiped."
          REMOTE
