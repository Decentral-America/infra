name: Fix Matcher - write local.conf to correct config dir
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  fix:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Check dirs, write correct local.conf, restart matcher
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             echo "=== Stop matcher ==="
             docker stop matcher-testnet 2>/dev/null

             echo "=== DATA dir (wrong one we were writing to) ==="
             ls -la /opt/dcc/data/matcher-testnet/ 2>/dev/null | head -10
             ls -la /opt/dcc/data/matcher-testnet/config/ 2>/dev/null

             echo "=== CONFIG dir (correct one, read-only mount) ==="
             ls -la /opt/dcc/config/matcher-testnet/ 2>/dev/null || echo "DIR NOT FOUND"

             echo "=== Write local.conf to CORRECT config dir ==="
             sudo mkdir -p /opt/dcc/config/matcher-testnet 2>/dev/null
             SEED_B64=$(printf "tomorrow bleak cram rival inherit river genuine unknown guitar sister slot scale flip animal grit" | base64 -w0)
             sudo tee /opt/dcc/config/matcher-testnet/local.conf > /dev/null <<EOF
dcc.dex {
  address-scheme-character = "!"
  account-storage {
    type = in-mem
    in-mem {
      seed-in-base64 = "${SEED_B64}"
      nonce = 0
    }
  }
}
EOF
             echo "Written:"
             cat /opt/dcc/config/matcher-testnet/local.conf

             echo "=== Start matcher ==="
             docker start matcher-testnet
             sleep 12

             echo "=== Logs since start ==="
             docker logs matcher-testnet --since 2026-06-27T13:55:00Z 2>&1 | grep -v "at java\|at scala\|at io\.\|at org\.\|at com\.\|at net\.\|DEBUG.*pekko\|class path" | head -20

             echo "=== Status ==="
             docker ps --format "{{.Names}}\t{{.Status}}" | grep matcher'
          rm -f /tmp/id_rsa
