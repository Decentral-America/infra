# ──────────────────────────────────────────────────────────────────────────────
# Unified testnet node release — ONE image ref to EVERY node, both substrates.
#
# The testnet spans two substrates with historically separate deploy paths, so nothing forced them to
# run the same image (→ half-deploys, mixed protocol versions). See clusters/testnet/TOPOLOGY.md.
#
# This is a THIN ORCHESTRATOR: it does NOT reimplement any deploy logic — it CALLS the existing,
# battle-tested reusable workflows with the same image ref, so both substrates move together:
#   • VPS main node  → deploy-specific-sha.yml   (SSH + docker run)
#   • LKE k8s swarm  → pin-node-image-digest.yml (pin nodes.yaml to the resolved digest + PR → Flux)
#
# Run THIS for any testnet image change. The single-substrate workflows remain for emergency/repair.
# North star (see TOPOLOGY.md): consolidate the VPS onto k8s so there is one GitOps substrate and the
# `vps` job below can be dropped entirely.
# ──────────────────────────────────────────────────────────────────────────────
name: Deploy Testnet Release (all nodes, one image)

on:
  workflow_dispatch:
    inputs:
      image_ref:
        description: 'node-scala tag or digest to release to ALL testnet nodes (e.g. testnet-latest, dev-hotstuff)'
        required: true
        default: 'testnet-latest'
        type: string
      deploy_vps:
        description: 'Also SSH-deploy the VPS main node (uncheck to only pin the k8s swarm)'
        type: boolean
        default: true

concurrency:
  group: deploy-testnet-release
  cancel-in-progress: false

jobs:
  # VPS main node — reuse the proven SSH deploy workflow verbatim.
  vps:
    if: ${{ inputs.deploy_vps }}
    uses: ./.github/workflows/deploy-specific-sha.yml
    secrets: inherit
    with:
      sha_tag: ${{ inputs.image_ref }}

  # LKE k8s swarm — reuse the proven digest-pin workflow verbatim (resolves the ref → digest, PRs nodes.yaml).
  k8s:
    uses: ./.github/workflows/pin-node-image-digest.yml
    secrets: inherit
    with:
      image_ref: ${{ inputs.image_ref }}
