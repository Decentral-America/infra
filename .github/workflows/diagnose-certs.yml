name: Diagnose Caddy Certs
on:
  workflow_dispatch:
    inputs:
      network:
        required: true
        default: 'testnet'
        type: choice
        options: [testnet]
permissions:
  contents: read
jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        env:
          NETWORK: ${{ inputs.network }}
        with:
          host:     ${{ secrets.TESTNET_DEPLOY_HOST }}
          username: ${{ secrets.TESTNET_DEPLOY_USER }}
          key:      ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          envs:     NETWORK
          script: |
            echo "=== Caddy container status ==="
            docker ps --filter name=caddy --format "{{.Names}} {{.Status}}"
            echo "=== Recent Caddy logs (tls/acme only) ==="
            docker logs caddy-${NETWORK} 2>&1 | grep -E '"logger":"tls|acme|obtain|certif|error.*tls|tls.*error' | tail -30 || true
            echo "=== Is node running on port 6869? ==="
            ss -tlnp | grep 6869 || echo "nothing on 6869"
            echo "=== Is matcher running on port 6886? ==="
            ss -tlnp | grep 6886 || echo "nothing on 6886"
