name: Test if local.conf is read by matcher
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Write invalid type to local.conf to prove if its read
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             docker stop matcher-testnet 2>/dev/null
             DATA_DIR="/opt/dcc/data/matcher-testnet"
             echo "=== Write INVALID type to local.conf (to test if file is read) ==="
             sudo mkdir -p "$DATA_DIR/config" 2>/dev/null
             printf "dcc.dex.account-storage.type = xyzzy_invalid_type_abc\n" | sudo tee "$DATA_DIR/config/local.conf" > /dev/null
             sudo chown -R 113:113 "$DATA_DIR" 2>/dev/null
             echo "File written:"
             cat "$DATA_DIR/config/local.conf"
             echo "File permissions:"
             ls -la "$DATA_DIR/config/"
             echo "=== Start matcher ==="
             docker start matcher-testnet 2>/dev/null && echo OK
             sleep 8
             echo "=== Error (if file read: shows invalid type, if NOT read: shows account.dat) ==="
             docker logs matcher-testnet --since 2026-06-27T13:35:00 2>&1 | grep -iE "ERROR|error|invalid|type|account|Starting" | grep -v "class path\|at java\|at org" | head -5
             docker stop matcher-testnet 2>/dev/null
             echo "=== Restore correct local.conf ==="
             printf "dcc.dex.address-scheme-character = \"\\041\"\ndcc.dex.account-storage.type = in-mem\n" | sudo tee "$DATA_DIR/config/local.conf" > /dev/null
             sudo chown -R 113:113 "$DATA_DIR" 2>/dev/null'
          rm -f /tmp/id_rsa
