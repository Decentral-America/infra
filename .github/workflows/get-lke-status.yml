name: Get LKE Status
on:
  workflow_dispatch:
jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - name: Get node IP and pod status
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
        run: |
          echo "=== LKE Node IP ==="
          curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/linode/instances/98957806" | jq -r '.ipv4[]'

      - name: Download kubeconfig
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
        run: |
          RAW=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            -X GET "https://api.linode.com/v4/lke/clusters/615553/kubeconfig" | jq -r '.kubeconfig')
          echo "$RAW" | python3 -c 'import base64,sys; sys.stdout.buffer.write(base64.b64decode(sys.stdin.read().strip() + "=="))' > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV

      - uses: azure/setup-kubectl@v4
      - name: Check pod + node status
        run: |
          echo "=== NODES ==="
          kubectl get nodes -o wide
          echo "=== PODS ==="
          kubectl get pods -A
          echo "=== FLUX KUSTOMIZATIONS ==="
          kubectl get kustomizations -A 2>/dev/null || true
