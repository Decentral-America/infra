name: Get LKE Status
on:
  workflow_dispatch:
jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - name: Download kubeconfig
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
        run: |
          RAW=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            -X GET "https://api.linode.com/v4/lke/clusters/615553/kubeconfig" | jq -r '.kubeconfig')
          echo "$RAW" | python3 -c 'import base64,sys; sys.stdout.buffer.write(base64.b64decode(sys.stdin.read().strip() + "=="))' > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
      - uses: azure/setup-kubectl@v4
      - name: Check all pods
        run: |
          kubectl get pods -n dcc -o wide
          echo "=== GEN-0 LOGS ===" && kubectl logs -n dcc dcc-gen-0-0 --previous 2>/dev/null | tail -5 || kubectl logs -n dcc dcc-gen-0-0 2>/dev/null | tail -5 || echo "no logs"
          echo "=== GEN-1 LOGS ===" && kubectl logs -n dcc dcc-gen-1-0 --previous 2>/dev/null | tail -5 || kubectl logs -n dcc dcc-gen-1-0 2>/dev/null | tail -5 || echo "no logs"
          echo "=== VAL-0 LOGS ===" && kubectl logs -n dcc dcc-val-0-0 2>/dev/null | tail -5 || echo "no logs"
