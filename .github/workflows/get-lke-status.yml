name: Get LKE Status
on:
  workflow_dispatch:
jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - name: Download kubeconfig
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
        run: |
          RAW=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            -X GET "https://api.linode.com/v4/lke/clusters/615553/kubeconfig" | jq -r '.kubeconfig')
          echo "$RAW" | python3 -c 'import base64,sys; sys.stdout.buffer.write(base64.b64decode(sys.stdin.read().strip() + "=="))' > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
      - uses: azure/setup-kubectl@v4
      - name: Restart pods + monitor
        run: |
          echo "=== DELETE PODS (force restart with new secret) ==="
          kubectl delete pod dcc-gen-0-0 dcc-gen-1-0 dcc-val-0-0 -n dcc --ignore-not-found
          echo "=== WAITING 30s FOR NEW PODS ==="
          sleep 30
          echo "=== POD STATUS ==="
          kubectl get pods -n dcc
          echo "=== GEN-0 LOGS ==="
          kubectl logs -n dcc dcc-gen-0-0 2>/dev/null | tail -20 || echo "no logs yet"
