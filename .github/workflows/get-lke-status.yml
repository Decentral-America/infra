name: Get LKE Status
on:
  workflow_dispatch:
jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - name: Download kubeconfig
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
        run: |
          RAW=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            -X GET "https://api.linode.com/v4/lke/clusters/615553/kubeconfig" | jq -r '.kubeconfig')
          echo "$RAW" | python3 -c 'import base64,sys; sys.stdout.buffer.write(base64.b64decode(sys.stdin.read().strip() + "=="))' > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
      - name: Install Flux CLI
        run: curl -s https://fluxcd.io/install.sh | bash
      - uses: azure/setup-kubectl@v4
      - name: Reconcile and restart
        run: |
          echo "=== RECONCILE ==="
          flux reconcile source git flux-system && flux reconcile kustomization dcc-apps --timeout=2m || true
          echo "=== WVDATA IN PODS ==="
          kubectl get pod dcc-gen-0-0 -n dcc -o jsonpath='{.spec.containers[0].env}' 2>/dev/null | python3 -c "import json,sys; [print(e['name'],'=',e.get('value','<from-secret>')) for e in json.load(sys.stdin) if 'WVDATA' in e['name']]" || echo "pod not found"
          echo "=== DELETE PODS ==="
          kubectl delete pod dcc-gen-0-0 dcc-gen-1-0 dcc-val-0-0 -n dcc --ignore-not-found
          sleep 40
          echo "=== POD STATUS ==="
          kubectl get pods -n dcc
          echo "=== GEN-0 LOGS ==="
          kubectl logs -n dcc dcc-gen-0-0 2>/dev/null | tail -10 || echo "no logs"
