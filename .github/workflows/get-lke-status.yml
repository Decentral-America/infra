name: Get LKE Status
on:
  workflow_dispatch:
jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - name: Download kubeconfig
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
        run: |
          RAW=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            -X GET "https://api.linode.com/v4/lke/clusters/615553/kubeconfig" | jq -r '.kubeconfig')
          echo "$RAW" | python3 -c 'import base64,sys; sys.stdout.buffer.write(base64.b64decode(sys.stdin.read().strip() + "=="))' > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV

      - name: Install Flux CLI
        run: curl -s https://fluxcd.io/install.sh | bash

      - uses: azure/setup-kubectl@v4

      - name: Force reconcile + check status
        run: |
          echo "=== FORCING FLUX RECONCILE ==="
          flux reconcile kustomization dcc-apps --timeout=3m
          echo "=== POD STATUS ==="
          kubectl get pods -n dcc -o wide
          echo "=== GEN-0 DESCRIBE ==="
          kubectl describe pod dcc-gen-0-0 -n dcc | grep -A8 "State:\|Last State:\|Reason:\|Exit Code:\|Message:"
          echo "=== GEN-0 LOGS ==="
          kubectl logs -n dcc dcc-gen-0-0 --previous --tail=40 2>/dev/null || kubectl logs -n dcc dcc-gen-0-0 --tail=40 2>/dev/null || echo "no logs yet"
