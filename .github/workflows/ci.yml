name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: infra-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TOFU_VERSION: '1.12.1'

jobs:
  validate:
    name: Validate Infrastructure
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # ── OpenTofu ──────────────────────────────────────────────────────────────
      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}
          tofu_wrapper: false

      - name: tofu fmt check
        working-directory: terraform
        run: tofu fmt -check -recursive -diff

      - name: tofu init
        working-directory: terraform
        run: tofu init -backend=false

      - name: tofu validate
        working-directory: terraform
        run: tofu validate

      # ── Docker Compose validation ─────────────────────────────────────────────
      - name: Validate Docker Compose files
        env:
          IMAGE_TAG: 'ghcr.io/decentral-america/ci-validation:latest'
        run: |
          # Create dummy env/config files so compose config can parse references
          sudo mkdir -p /opt/dcc/secrets /opt/dcc/caddy
          sudo touch /opt/dcc/secrets/mainnet.env /opt/dcc/caddy/Caddyfile
          for f in compose/*.yml; do
            echo "Validating $f..."
            docker compose -f "$f" config --quiet
          done

      # ── Shell script linting ──────────────────────────────────────────────────
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          find . -name '*.sh' -type f | while read -r script; do
            echo "Checking $script..."
            shellcheck -x "$script"
          done
