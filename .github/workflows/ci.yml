name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: infra-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  TOFU_VERSION: '1.12.1'

jobs:
  validate:
    name: Validate Infrastructure
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      # ── OpenTofu ──────────────────────────────────────────────────────────────
      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}
          tofu_wrapper: false

      - name: tofu fmt check
        working-directory: terraform
        run: tofu fmt -check -recursive -diff

      - name: tofu init
        working-directory: terraform
        run: tofu init -backend=false

      - name: tofu validate
        working-directory: terraform
        run: tofu validate

      # ── Docker Compose validation ─────────────────────────────────────────────
      - name: Validate Docker Compose files
        env:
          IMAGE_TAG: 'ghcr.io/decentral-america/ci-validation:latest'
        run: |
          # Create dummy env/config files so compose config can parse references
          sudo mkdir -p /opt/dcc/secrets /opt/dcc/caddy
          sudo touch /opt/dcc/secrets/mainnet.env /opt/dcc/secrets/testnet.env /opt/dcc/secrets/stagenet.env /opt/dcc/caddy/Caddyfile
          for f in compose/*.yml; do
            echo "Validating $f..."
            docker compose -f "$f" config --quiet
          done

      # ── Shell script linting ──────────────────────────────────────────────────
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          find . -name '*.sh' -type f | while read -r script; do
            echo "Checking $script..."
            shellcheck -x "$script"
          done

      # ── StackScript ASCII check ───────────────────────────────────────────────
      # Linode StackScript API rejects any non-ASCII character (bytes > 0x7F).
      # This check catches em dashes, Unicode arrows, box-drawing chars, etc.
      # before they reach the API and cause a cryptic position-N error.
      - name: Check bootstrap.sh is pure ASCII
        run: |
          if LC_ALL=C grep -Pn '[^\x00-\x7F]' terraform/scripts/bootstrap.sh; then
            echo "FAIL: bootstrap.sh contains non-ASCII characters (shown above)"
            echo "Linode StackScript API only accepts ASCII. Replace with -- or ->"
            exit 1
          fi
          echo "OK: bootstrap.sh is pure ASCII"
