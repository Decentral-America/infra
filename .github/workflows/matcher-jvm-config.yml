name: Matcher JVM config.file injection
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  fix:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Inject config file path via JVM option
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             docker stop matcher-testnet 2>/dev/null
             SECRETS="/opt/dcc/secrets/testnet.env"
             DATA_DIR="/opt/dcc/data/matcher-testnet"
             echo "=== Remove stale env overrides ==="
             sudo sed -i "/^WAVES_DEX__/d;/^DCC_DEX__/d;/^JDK_JAVA_OPTIONS/d;/^JAVA_TOOL_OPTIONS/d;/^DEX_OPTS/d" "$SECRETS" 2>/dev/null
             echo "=== Add JVM config.file override ==="
             printf "JDK_JAVA_OPTIONS=-Dconfig.file=/var/lib/decentralchain-dex/config/application.conf\n" | sudo tee -a "$SECRETS" > /dev/null
             echo "Added JVM option"
             echo "=== Ensure config has correct settings ==="
             cat "$DATA_DIR/config/application.conf" 2>/dev/null
             echo "=== Start matcher ==="
             docker start matcher-testnet 2>/dev/null && echo OK
             sleep 35
             docker logs matcher-testnet --tail=20 2>&1 | grep -iE "Starting|Blockchain Id|address|public key|ERROR|error|account|type|scheme" | grep -v "DEBUG\|class path" | head -15
             docker ps --format "{{.Names}}\t{{.Status}}" | grep matcher'
          rm -f /tmp/id_rsa
