name: Inject Node API Key
on:
  workflow_dispatch:
    inputs:
      network:
        required: true
        default: 'testnet'
        type: choice
        options: [testnet]
permissions:
  contents: read
jobs:
  inject:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Decrypt SOPS and extract NODE_REST_API_KEY
        id: extract
        env:
          SOPS_AGE_KEY: ${{ secrets.AGE_KEY_TESTNET }}
          NETWORK:      ${{ inputs.network }}
        run: |
          set -euo pipefail

          SOPS_VERSION="v3.13.1"
          SOPS_SHA256="620a9d7e3352ababeca6908cea24a6e8b14ce89a448ddbd3f94f1ef3398f470a"
          curl -fsSL "https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/sops-${SOPS_VERSION}.linux.amd64" -o /tmp/sops-bin
          echo "${SOPS_SHA256}  /tmp/sops-bin" | sha256sum --check --status
          install -m 755 /tmp/sops-bin /usr/local/bin/sops
          rm /tmp/sops-bin

          SECRETS=$(sops --decrypt "secrets/${NETWORK}.env")
          NODE_API_KEY=$(printf '%s' "${SECRETS}" | grep '^NODE_REST_API_KEY=' | cut -d= -f2-)

          if [[ -z "${NODE_API_KEY:-}" ]]; then
            echo "::error::NODE_REST_API_KEY not found in SOPS secrets/${NETWORK}.env"
            exit 1
          fi

          echo "NODE_REST_API_KEY found"
          # Write to masked output so the key never appears in logs
          echo "node_api_key=${NODE_API_KEY}" >> "$GITHUB_OUTPUT"

      - name: Inject key to server secrets file
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        env:
          NETWORK:      ${{ inputs.network }}
          NODE_API_KEY: ${{ steps.extract.outputs.node_api_key }}
        with:
          host:     ${{ secrets.TESTNET_DEPLOY_HOST }}
          username: ${{ secrets.TESTNET_DEPLOY_USER }}
          key:      ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          envs:     NETWORK,NODE_API_KEY
          script: |
            sudo sed -i '/^NODE_REST_API_KEY=/d' /opt/dcc/secrets/${NETWORK}.env
            printf 'NODE_REST_API_KEY=%s\n' "${NODE_API_KEY}" | sudo tee -a /opt/dcc/secrets/${NETWORK}.env > /dev/null
            sudo chmod 640 /opt/dcc/secrets/${NETWORK}.env
            echo "NODE_REST_API_KEY injected."
