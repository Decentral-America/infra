# One-shot node pool recycle to apply k8s patch (1.35.3 → 1.35.5).
# Delete this workflow after it runs.
name: Recycle LKE Node Pool

on:
  workflow_dispatch:
    inputs:
      cluster_id:
        description: 'LKE Cluster ID'
        required: true
        default: '615553'
      pool_id:
        description: 'Node pool ID (leave empty to auto-detect)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  recycle:
    runs-on: ubuntu-latest
    steps:
      - name: Get pool ID and recycle
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
          CLUSTER_ID: ${{ inputs.cluster_id }}
          POOL_ID_INPUT: ${{ inputs.pool_id }}
        run: |
          set -euo pipefail
          if [ -z "$POOL_ID_INPUT" ]; then
            POOL_ID=$(curl -sf -H "Authorization: Bearer $LINODE_TOKEN" \
              "https://api.linode.com/v4/lke/clusters/${CLUSTER_ID}/pools" | \
              jq -r '.data[0].id')
            echo "Auto-detected pool ID: $POOL_ID"
          else
            POOL_ID="$POOL_ID_INPUT"
          fi

          echo "Recycling pool $POOL_ID on cluster $CLUSTER_ID..."
          curl -sf -H "Authorization: Bearer $LINODE_TOKEN" \
            -H "Content-Type: application/json" \
            -X POST \
            "https://api.linode.com/v4/lke/clusters/${CLUSTER_ID}/pools/${POOL_ID}/recycle"

          echo "Recycle request sent. Nodes will roll within ~5 minutes."
          echo "Monitor with: kubectl get nodes -w"
