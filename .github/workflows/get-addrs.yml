name: Get Node Addresses
on:
  workflow_dispatch:
jobs:
  addrs:
    runs-on: ubuntu-latest
    steps:
      - name: Download kubeconfig
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
        run: |
          RAW=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            -X GET "https://api.linode.com/v4/lke/clusters/615553/kubeconfig" | jq -r '.kubeconfig')
          echo "$RAW" | python3 -c 'import base64,sys; sys.stdout.buffer.write(base64.b64decode(sys.stdin.read().strip() + "=="))' > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
      - uses: azure/setup-kubectl@v4
      - name: Get addresses
        run: |
          # Use port-forward + public endpoints
          kubectl port-forward -n dcc dcc-gen-0-0 16869:6869 &
          PF0=$!; sleep 3

          echo "=== GEN-0 HEIGHT ==="
          curl -s http://127.0.0.1:16869/blocks/height

          echo "=== GEN-0 WALLET.DAT (base64) ==="
          kubectl exec -n dcc dcc-gen-0-0 -- bash -c 'base64 /var/lib/dcc/wallet/wallet.dat 2>/dev/null' || echo "failed"

          echo "=== GEN-0 WALLET DIR ==="
          kubectl exec -n dcc dcc-gen-0-0 -- bash -c 'ls -la /var/lib/dcc/wallet/' || echo "failed"

          kill $PF0 2>/dev/null; true
