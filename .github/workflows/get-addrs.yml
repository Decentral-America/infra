name: Get Node Addresses
on:
  workflow_dispatch:
jobs:
  addrs:
    runs-on: ubuntu-latest
    steps:
      - name: Derive DCC wallet addresses from seeds
        run: |
          cd /tmp
          npm install @waves/waves-crypto 2>&1 | tail -3
          node -e "
          const c = require('./node_modules/@waves/waves-crypto');
          const CHAIN='!'.charCodeAt(0);
          const a0 = c.address({publicKey: c.keyPair('pizza walk tourist speed dress wagon link property answer sell drum random loop high paper').publicKey}, CHAIN);
          const a1 = c.address({publicKey: c.keyPair('love earth taxi into alone reopen common blade curtain rookie result depart left ensure state').publicKey}, CHAIN);
          const am = c.address({publicKey: c.keyPair('PCK4Fstm8w9CcR1YmQdAPjUCBLUwyETzRci2Ypo93xXGgqVb2HJUh9Gq4R16').publicKey}, CHAIN);
          console.log('GEN-0:', a0);
          console.log('GEN-1:', a1);
          console.log('MINER (expect 31RPEKcz...):', am);
          "
