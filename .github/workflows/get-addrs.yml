name: Get Node Addresses
on:
  workflow_dispatch:
jobs:
  addrs:
    runs-on: ubuntu-latest
    steps:
      - name: Derive DCC wallet addresses from seeds
        run: |
          npm install -g @waves/waves-crypto 2>/dev/null || true
          node << 'JS'
          const crypto = require('@waves/waves-crypto');
          // Chain ID '!' = 33
          const CHAIN_ID = '!'.charCodeAt(0);

          function getAddress(seed) {
            const keyPair = crypto.keyPair(seed);
            const addr = crypto.address({ publicKey: keyPair.publicKey }, CHAIN_ID);
            return addr;
          }

          const gen0 = getAddress('pizza walk tourist speed dress wagon link property answer sell drum random loop high paper');
          const gen1 = getAddress('love earth taxi into alone reopen common blade curtain rookie result depart left ensure state');
          const miner = getAddress('PCK4Fstm8w9CcR1YmQdAPjUCBLUwyETzRci2Ypo93xXGgqVb2HJUh9Gq4R16');

          console.log('GEN-0 address:', gen0);
          console.log('GEN-1 address:', gen1);
          console.log('MINER verify (should be 31RPEKcz...):', miner);
          JS
