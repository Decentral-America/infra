name: Get Node Addresses
on:
  workflow_dispatch:
jobs:
  addrs:
    runs-on: ubuntu-latest
    steps:
      - name: Download kubeconfig
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
        run: |
          RAW=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            -X GET "https://api.linode.com/v4/lke/clusters/615553/kubeconfig" | jq -r '.kubeconfig')
          echo "$RAW" | python3 -c 'import base64,sys; sys.stdout.buffer.write(base64.b64decode(sys.stdin.read().strip() + "=="))' > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
      - uses: azure/setup-kubectl@v4
      - name: Get wallet addresses
        run: |
          echo "=== GEN-0 ADDRESS (via wget or sh curl) ==="
          kubectl exec -n dcc dcc-gen-0-0 -- sh -c 'wget -qO- http://127.0.0.1:6869/addresses 2>/dev/null || curl -s http://127.0.0.1:6869/addresses 2>/dev/null' || echo "not available"
          echo "=== GEN-1 ADDRESS ==="
          kubectl exec -n dcc dcc-gen-1-0 -- sh -c 'wget -qO- http://127.0.0.1:6870/addresses 2>/dev/null || curl -s http://127.0.0.1:6870/addresses 2>/dev/null' || echo "not available"
