name: Check Peers and HotStuff
on:
  workflow_call:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: testnet
    steps:
      - uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d  # v5.1.0
      - name: Get LKE kubeconfig
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
        run: |
          set -euo pipefail
          CLUSTER_ID=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters" | \
            jq -r '.data[] | select(.label | test("testnet")) | .id' | head -1)
          RAW=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters/${CLUSTER_ID}/kubeconfig" | jq -r '.kubeconfig')
          echo "$RAW" | base64 -d > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
      - name: find dcc.config.directory and check writability in gen-0's live pod
        run: |
          echo "=== gen-0 process command line (find -Ddcc.config.directory) ==="
          kubectl exec -n dcc dcc-gen-0-0 -- sh -c "cat /proc/1/cmdline | tr '\0' '\n' | grep -i 'dcc.config.directory\|dcc.directory'"
          echo "=== is /etc/dcc writable? ==="
          kubectl exec -n dcc dcc-gen-0-0 -- sh -c "touch /etc/dcc/test-write 2>&1 && echo WRITABLE && rm -f /etc/dcc/test-write || echo NOT-WRITABLE"
      - name: inject trace-level logback override into the live pod (no restart)
        run: |
          cat > /tmp/logback.xml << 'LOGBACK'
          <?xml version="1.0" encoding="UTF-8"?>
          <configuration>
            <logger name="com.decentralchain.network" level="TRACE"/>
          </configuration>
          LOGBACK
          kubectl cp /tmp/logback.xml dcc/dcc-gen-0-0:/etc/dcc/logback.xml
          echo "=== injected, logback scan=true should pick it up within 30s ==="
          sleep 35
          echo "=== confirm no crash from the injection ==="
          kubectl get pod dcc-gen-0-0 -n dcc -o jsonpath='{.status.containerStatuses[0].restartCount}'
      - name: wait 6 minutes to catch a full cycle
        run: sleep 360
      - name: dump gen-0's trace-level activity toward main, then remove override
        run: |
          echo "=== gen-0 trace-level close/suspend activity toward main (66.228.55.154) ==="
          kubectl logs dcc-gen-0-0 -n dcc --since=7m | grep -aiE "66.228.55.154|Suspending|was closed|Channel closed|exceptionCaught|IOException|Connection reset|handleOutgoing|Connecting to|haven't sent|havent sent" | tail -150
          echo "=== remove override ==="
          kubectl exec -n dcc dcc-gen-0-0 -- rm -f /etc/dcc/logback.xml
