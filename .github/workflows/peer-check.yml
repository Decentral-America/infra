name: Check Peers and HotStuff
on:
  workflow_call:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: testnet
    steps:
      - uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d  # v5.1.0
      - name: Get LKE kubeconfig
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
        run: |
          set -euo pipefail
          CLUSTER_ID=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters" | \
            jq -r '.data[] | select(.label | test("testnet")) | .id' | head -1)
          RAW=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters/${CLUSTER_ID}/kubeconfig" | jq -r '.kubeconfig')
          echo "$RAW" | base64 -d > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
      - name: gen-1/val-0 actual height vs main, and full recent log
        run: |
          echo "=== gen-1 height ==="
          kubectl exec -n dcc dcc-gen-1-0 -- wget -qO- http://127.0.0.1:6869/blocks/height
          echo ""
          echo "=== val-0 height ==="
          kubectl exec -n dcc dcc-val-0-0 -- wget -qO- http://127.0.0.1:6869/blocks/height
          echo ""
          echo "=== gen-0 height ==="
          kubectl exec -n dcc dcc-gen-0-0 -- wget -qO- http://127.0.0.1:6869/blocks/height
          echo ""
          echo "=== gen-1 peers/connected (own view) ==="
          kubectl exec -n dcc dcc-gen-1-0 -- wget -qO- http://127.0.0.1:6869/peers/connected
          echo ""
          echo "=== gen-1 last 40 log lines, completely unfiltered ==="
          kubectl logs dcc-gen-1-0 -n dcc --tail=40
