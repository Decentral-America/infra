name: Final Fork Reconciliation Check
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: testnet
    steps:
      - uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d
      - name: Get LKE kubeconfig
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
        run: |
          set -euo pipefail
          CLUSTER_ID=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" "https://api.linode.com/v4/lke/clusters" | jq -r '.data[] | select(.label | test("testnet")) | .id' | head -1)
          RAW=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" "https://api.linode.com/v4/lke/clusters/${CLUSTER_ID}/kubeconfig" | jq -r '.kubeconfig')
          echo "$RAW" | base64 -d > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
      - name: current heights + last 50 block generators + peer connectivity
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          echo "=== current time (UTC) ==="
          date -u
          MAIN_H=$(ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 "${SSH_USER}@${SSH_HOST}" "docker exec node-scala-testnet wget -qO- http://127.0.0.1:6869/blocks/height")
          echo "main: $MAIN_H"
          for pod in dcc-gen-0-0 dcc-gen-1-0 dcc-val-0-0; do
            H=$(kubectl exec -n dcc $pod -- wget -qO- http://127.0.0.1:6869/blocks/height 2>&1 || echo fail)
            echo "$pod: $H"
          done
          echo "=== live miner.quorum in each pod's mounted config (/etc/dcc/dcc.conf) ==="
          for pod in dcc-gen-0-0 dcc-gen-1-0 dcc-val-0-0; do
            Q=$(kubectl exec -n dcc $pod -- sh -c 'grep -E "quorum" /etc/dcc/dcc.conf 2>/dev/null | head -1' 2>&1 || echo "n/a")
            echo "$pod: $Q"
          done
          echo "=== each pod's OWN /peers/connected (mesh from gen side, not main behind NAT) ==="
          for pod in dcc-gen-0-0 dcc-gen-1-0 dcc-val-0-0; do
            P=$(kubectl exec -n dcc $pod -- wget -qO- http://127.0.0.1:6869/peers/connected 2>/dev/null || echo '{}')
            N=$(echo "$P" | python3 -c "import json,sys; d=json.load(sys.stdin); p=d.get('peers',d) if isinstance(d,dict) else d; print(len(p) if isinstance(p,list) else 0, [x.get('peerName') or x.get('declaredAddress') for x in p] if isinstance(p,list) else '')" 2>/dev/null || echo "0")
            echo "$pod connected: $N"
          done
          echo "=== main peers connected ==="
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 "${SSH_USER}@${SSH_HOST}" "docker exec node-scala-testnet wget -qO- http://127.0.0.1:6869/peers/connected" > /tmp/peers.json || echo '{}' > /tmp/peers.json
          cat /tmp/peers.json || true
          python3 -c "import json; d = json.load(open('/tmp/peers.json')); peers = d.get('peers', d) if isinstance(d, dict) else d; print(len(peers) if isinstance(peers, list) else 'n/a', 'peers:', [p.get('declaredAddress') or p.get('address') for p in peers] if isinstance(peers, list) else peers)" || echo "peers/connected parse failed, continuing"
          MH=$(echo "$MAIN_H" | grep -o '[0-9]*')
          FROM=$((MH-49))
          echo "=== generator distribution over last 50 blocks (height $FROM-$MH) ==="
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 "${SSH_USER}@${SSH_HOST}" \
            "docker exec node-scala-testnet wget -qO- http://127.0.0.1:6869/blocks/seq/${FROM}/${MH}" | \
            python3 -c "import json,sys,collections; d=json.load(sys.stdin); c=collections.Counter(b.get('generator') for b in d); [print(f'{gen}: {count}/50') for gen,count in c.most_common()]"
          echo "=== node images/versions (LKE vs main) ==="
          for pod in dcc-gen-0-0 dcc-gen-1-0 dcc-val-0-0; do
            echo "$pod image: $(kubectl get pod -n dcc $pod -o jsonpath='{.spec.containers[0].image}' 2>&1)"
            echo "$pod version: $(kubectl exec -n dcc $pod -- wget -qO- http://127.0.0.1:6869/node/version 2>/dev/null || echo n/a)"
          done
          echo "main version: $(ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 "${SSH_USER}@${SSH_HOST}" "docker exec node-scala-testnet wget -qO- http://127.0.0.1:6869/node/version" 2>/dev/null || echo n/a)"
          echo "main RepoDigest: $(ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 "${SSH_USER}@${SSH_HOST}" "docker inspect --format '{{index .RepoDigests 0}}' node-scala-testnet" 2>/dev/null || echo n/a)"
          echo "=== gen-0 RAW last 70 log lines (full connect->close lifecycle, find real drop cause) ==="
          kubectl logs -n dcc dcc-gen-0-0 --since=6m 2>&1 | tail -70 | jq -rR 'fromjson? | "\(.["@timestamp"][11:19]) \(.level[0:4]) \(.logger_name|split(".")|last|.[0:22]) | \(.message[0:150])"' 2>/dev/null || echo "(jq parse failed, raw:)" && kubectl logs -n dcc dcc-gen-0-0 --since=6m 2>&1 | tail -40
          echo "=== drop-count in last 10 min (clean post-fix window) + last 3 drop reasons ==="
          for pod in dcc-gen-0-0 dcc-gen-1-0 dcc-val-0-0; do
            echo "--- $pod ---"
            echo -n "  Suspending/Channel-closed in last 10m: "
            kubectl logs -n dcc $pod --since=10m 2>&1 | grep -E "Suspending|Channel closed \(expected\)" | wc -l
            echo "  recent drop lines:"
            kubectl logs -n dcc $pod --since=10m 2>&1 | grep -E "Suspending|Channel closed|blacklist|fork|invalid block" | tail -3 | sed 's/^/    /' || echo "    (none)"
          done
