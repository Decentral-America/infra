name: Check Peers and HotStuff
on:
  workflow_call:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: testnet
    steps:
      - name: diagnose export failure
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'echo "=== container status ==="
             docker inspect node-scala-testnet --format "status={{.State.Status}}"
             echo "=== ls /var/lib/dcc inside container ==="
             docker exec node-scala-testnet sh -c "ls -la /var/lib/dcc" 2>&1
             echo "=== attempt tar with explicit exit code ==="
             docker exec node-scala-testnet sh -c "tar czf /tmp/mainstate.tar.gz -C /var/lib/dcc data; echo EXIT=\$?" 2>&1
             echo "=== ls /tmp inside container ==="
             docker exec node-scala-testnet sh -c "ls -la /tmp" 2>&1'
          rm -f /tmp/id_rsa
