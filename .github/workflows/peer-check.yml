name: Check Peers and HotStuff
on:
  workflow_call:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: testnet
    steps:
      - uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d  # v5.1.0
      - name: Get LKE kubeconfig
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
        run: |
          set -euo pipefail
          CLUSTER_ID=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters" | \
            jq -r '.data[] | select(.label | test("testnet")) | .id' | head -1)
          RAW=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters/${CLUSTER_ID}/kubeconfig" | jq -r '.kubeconfig')
          echo "$RAW" | base64 -d > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
      - name: gen-0's OWN close-reason logs (never checked before)
        run: |
          echo "=== gen-0 restart count (sanity) ==="
          kubectl get pod dcc-gen-0-0 -n dcc -o jsonpath='{.status.containerStatuses[0].restartCount}'
          echo ""
          echo "=== gen-0 pod log: close/suspend/idle/error activity in last 30 min ==="
          kubectl logs dcc-gen-0-0 -n dcc --since=30m | grep -aiE "was closed|suspend|Already connected|Replacing dead|Channel closed|havent sent|haven't sent|closing it|IOException|Connection reset|exceptionCaught|handleOutgoing|Connecting to" | tail -100
          echo "=== gen-0's own suspension-residence-time / connection settings from its logback ==="
          kubectl logs dcc-gen-0-0 -n dcc --since=30m | grep -aiE "Accepted handshake|Connecting to" | tail -20
      - name: gen-1 and val-0 same check
        run: |
          echo "=== gen-1 close-reason activity ==="
          kubectl logs dcc-gen-1-0 -n dcc --since=30m | grep -aiE "was closed|suspend|Already connected|Replacing dead|Channel closed|havent sent|haven't sent|closing it|IOException|Connection reset|exceptionCaught" | tail -50
          echo "=== val-0 close-reason activity ==="
          kubectl logs dcc-val-0-0 -n dcc --since=30m | grep -aiE "was closed|suspend|Already connected|Replacing dead|Channel closed|havent sent|haven't sent|closing it|IOException|Connection reset|exceptionCaught" | tail -50
