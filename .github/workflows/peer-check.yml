name: Check Peers and HotStuff
on:
  workflow_call:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: testnet
    steps:
      - name: precise idle-timeout message search on main
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'docker logs node-scala-testnet --since 20m 2>&1 > /tmp/main.log
             wc -l /tmp/main.log
             echo "=== search 1: closing it ==="
             grep -ac "closing it" /tmp/main.log
             echo "=== search 2: sent a message ==="
             grep -ac "sent a message" /tmp/main.log
             echo "=== search 3: haven ==="
             grep -ac "haven" /tmp/main.log
             echo "=== all lines mentioning BrokenConnectionDetector class name if present ==="
             grep -ac "BrokenConnectionDetector" /tmp/main.log
             echo "=== score/GetSignatures/keepalive traffic (to see if periodic protocol messages exist) ==="
             grep -aiE "score|GetSignatures|ping" /tmp/main.log | tail -10
             rm -f /tmp/main.log'
          rm -f /tmp/id_rsa
