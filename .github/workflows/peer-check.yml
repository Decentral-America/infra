name: Check Peers and HotStuff
on:
  workflow_call:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: testnet
    steps:
      - uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d  # v5.1.0
      - name: Get LKE kubeconfig
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
        run: |
          set -euo pipefail
          CLUSTER_ID=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters" | \
            jq -r '.data[] | select(.label | test("testnet")) | .id' | head -1)
          RAW=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters/${CLUSTER_ID}/kubeconfig" | jq -r '.kubeconfig')
          echo "$RAW" | base64 -d > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
      - name: check gen-1 and val-0's own mining attempts
        run: |
          echo "=== gen-1 mining errors/attempts (last 60 min) ==="
          kubectl logs dcc-gen-1-0 -n dcc --since=60m | grep -aiE "Error mining|not allowed to generate|generating balance|Started voting|New height" | tail -20
          echo "=== val-0 mining errors/attempts (last 60 min) ==="
          kubectl logs dcc-val-0-0 -n dcc --since=60m | grep -aiE "Error mining|not allowed to generate|generating balance|Started voting|New height" | tail -20
          echo "=== gen-1 image + restart count ==="
          kubectl get pod dcc-gen-1-0 -n dcc -o jsonpath='{.spec.containers[0].image}{"\n"}{.status.containerStatuses[0].restartCount}'
      - name: check finality endpoint on gen-1 directly
        run: |
          kubectl port-forward -n dcc dcc-gen-1-0 17870:6870 >/dev/null 2>&1 &
          PF=$!; sleep 3
          echo "=== gen-1's own /blockchain/finality ==="
          curl -s http://127.0.0.1:17870/blockchain/finality
          echo ""
          kill $PF 2>/dev/null || true
