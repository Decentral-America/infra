name: Check Peers and HotStuff
on:
  workflow_call:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: testnet
    steps:
      - uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d  # v5.1.0
      - name: Get LKE kubeconfig
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
        run: |
          set -euo pipefail
          CLUSTER_ID=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters" | \
            jq -r '.data[] | select(.label | test("testnet")) | .id' | head -1)
          RAW=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters/${CLUSTER_ID}/kubeconfig" | jq -r '.kubeconfig')
          echo "$RAW" | base64 -d > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
      - name: confirm new image and restart counts
        run: |
          kubectl get pod dcc-gen-0-0 -n dcc -o jsonpath='{.spec.containers[0].image}'
          echo ""
          kubectl get pods -n dcc -o custom-columns=NAME:.metadata.name,RESTARTS:.status.containerStatuses[0].restartCount,READY:.status.containerStatuses[0].ready
      - name: wait 6 minutes for a natural reconnect cycle
        run: sleep 360
      - name: watch for the new close/suspend/reset log lines on gen-0
        run: |
          echo "=== gen-0's log: close/suspend/reset activity (real info-level now) ==="
          kubectl logs dcc-gen-0-0 -n dcc --since=7m | grep -aiE "Channel closed|Suspending|Connection reset|Exception caught|Connection established|Accepted handshake" | tail -60
