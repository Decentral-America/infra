name: Check Peers and HotStuff
on:
  workflow_call:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: testnet
    steps:
      - uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d  # v5.1.0
      - name: Get LKE kubeconfig
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
        run: |
          set -euo pipefail
          CLUSTER_ID=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters" | \
            jq -r '.data[] | select(.label | test("testnet")) | .id' | head -1)
          RAW=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters/${CLUSTER_ID}/kubeconfig" | jq -r '.kubeconfig')
          echo "$RAW" | base64 -d > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
      - name: wait until just before predicted reconnect, then start live tail
        run: |
          echo "current time: $(date -u +%H:%M:%S)"
          echo "predicted next gen-0<->main handshake: ~17:52:53 UTC"
          nohup bash -c "kubectl logs -f dcc-gen-0-0 -n dcc --since=1s > /tmp/gen0-live.log 2>&1" &
          echo "tail started, pid=$!"
          sleep 150
      - name: dump the captured window, unfiltered, around the handshake
        run: |
          echo "=== total lines captured ==="
          wc -l /tmp/gen0-live.log
          echo "=== full unfiltered content ==="
          cat /tmp/gen0-live.log
          rm -f /tmp/gen0-live.log
