name: Check Peers and HotStuff
on:
  workflow_call:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: testnet
    steps:
      - name: raw TCP state on main toward gen-0/1/val-0
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          for i in 1 2 3 4 5 6; do
            ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
              "${SSH_USER}@${SSH_HOST}" \
              'echo "=== $(date -u +%H:%M:%S) ==="
               ss -tn state established "( dport = :6863 or dport = :6864 or dport = :6865 or sport = :6863 or sport = :6864 or sport = :6865 )" 2>/dev/null
               ss -tn "( dst 172.105.64.89 )" 2>/dev/null'
            sleep 60
          done
          rm -f /tmp/id_rsa
