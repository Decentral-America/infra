name: Check Peers and HotStuff
on:
  workflow_call:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: testnet
    steps:
      - uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d  # v5.1.0
      - name: Get LKE kubeconfig
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
        run: |
          set -euo pipefail
          CLUSTER_ID=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters" | \
            jq -r '.data[] | select(.label | test("testnet")) | .id' | head -1)
          RAW=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters/${CLUSTER_ID}/kubeconfig" | jq -r '.kubeconfig')
          echo "$RAW" | base64 -d > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
      - name: check which pod(s) are on the SAME node as gen-0
        run: |
          echo "=== node assignment for all 3 gen pods ==="
          kubectl get pods -n dcc -o custom-columns=NAME:.metadata.name,NODE:.spec.nodeName
      - name: correlate each pod's own handshake-to-main timestamps around 18:28:43-44
        run: |
          echo "=== gen-0's handshakes to main (DCC testnet node), full 15 min ==="
          kubectl logs dcc-gen-0-0 -n dcc --since=15m | grep -a "DCC testnet node" | python3 -c "import sys,json; [print(json.loads(l)['@timestamp']) for l in sys.stdin]"
          echo "=== gen-1's handshakes to main ==="
          kubectl logs dcc-gen-1-0 -n dcc --since=15m | grep -a "DCC testnet node" | python3 -c "import sys,json; [print(json.loads(l)['@timestamp']) for l in sys.stdin]"
          echo "=== val-0's handshakes to main ==="
          kubectl logs dcc-val-0-0 -n dcc --since=15m | grep -a "DCC testnet node" | python3 -c "import sys,json; [print(json.loads(l)['@timestamp']) for l in sys.stdin]"
