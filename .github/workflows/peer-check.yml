name: Check Peers and HotStuff
on:
  workflow_call:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: testnet
    steps:
      - name: grab debug logs and restore INFO level
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          echo "=== check current state ==="
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=20 \
            "${SSH_USER}@${SSH_HOST}" \
            'docker inspect node-scala-testnet --format "restarts={{.RestartCount}} status={{.State.Status}} started={{.State.StartedAt}}"'
          echo "=== dump all channel-close activity since debug mode started ==="
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=20 \
            "${SSH_USER}@${SSH_HOST}" \
            'docker logs node-scala-testnet --since 8m 2>&1 | grep -aiE "was closed|suspend|Already connected|Replacing dead|Channel closed|havent sent|Malformed|requirement failed|closing it" | tail -80'
          echo "=== restore INFO level ==="
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=20 \
            "${SSH_USER}@${SSH_HOST}" \
            'IMAGE=$(docker inspect node-scala-testnet --format "{{.Config.Image}}")
             docker rm -f node-scala-testnet 2>&1 | tail -1 || true
             IMAGE_TAG="$IMAGE" NETWORK=testnet docker compose -p node-scala-testnet -f /opt/dcc/compose/node-scala.yml up -d --wait --wait-timeout 120 node-scala
             docker inspect node-scala-testnet --format "restored: restarts={{.RestartCount}} status={{.State.Status}}"'
          rm -f /tmp/id_rsa
