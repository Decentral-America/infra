name: Check Peers and HotStuff
on:
  workflow_call:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: testnet
    steps:
      - uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d  # v5.1.0
      - name: Get LKE kubeconfig
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
        run: |
          set -euo pipefail
          CLUSTER_ID=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters" | \
            jq -r '.data[] | select(.label | test("testnet")) | .id' | head -1)
          RAW=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters/${CLUSTER_ID}/kubeconfig" | jq -r '.kubeconfig')
          echo "$RAW" | base64 -d > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
      - name: check ConfigMap current state and Flux status
        run: |
          echo "=== ConfigMap keys right now ==="
          kubectl get configmap gen-0-config -n dcc -o jsonpath='{.data}' | python3 -m json.tool 2>/dev/null || kubectl get configmap gen-0-config -n dcc -o yaml | grep -A2 "^data:"
          echo "=== Flux kustomization last-applied time and interval ==="
          kubectl get kustomization apps -n flux-system -o jsonpath='{.spec.interval} last-applied={.status.lastAppliedRevision}' 2>/dev/null || echo "(flux CRD query failed, checking events)"
          echo ""
          echo "=== recent events on the ConfigMap ==="
          kubectl get events -n dcc --field-selector involvedObject.name=gen-0-config --sort-by='.lastTimestamp' 2>/dev/null | tail -10
