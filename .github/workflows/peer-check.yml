name: Check Peers and HotStuff
on:
  workflow_call:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: testnet
    steps:
      - name: set debug level
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=20 \
            "${SSH_USER}@${SSH_HOST}" \
            'IMAGE=$(docker inspect node-scala-testnet --format "{{.Config.Image}}")
             docker rm -f node-scala-testnet 2>&1 | tail -1 || true
             IMAGE_TAG="$IMAGE" NETWORK=testnet DCC_LOG_LEVEL=DEBUG docker compose -p node-scala-testnet -f /opt/dcc/compose/node-scala.yml up -d --wait --wait-timeout 120 node-scala
             docker inspect node-scala-testnet --format "restarts={{.RestartCount}} status={{.State.Status}}"'
          rm -f /tmp/id_rsa
      - name: sleep 10 minutes (separate step so no single SSH session needs to survive it)
        run: sleep 600
      - name: dump close activity and restore INFO level
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          echo "=== channel-close activity ==="
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=20 \
            "${SSH_USER}@${SSH_HOST}" \
            'docker logs node-scala-testnet --since 10m 2>&1 | grep -aiE "channel was closed|peer.*suspend|Already connected|Replacing dead|Channel closed|havent sent|Malformed|requirement failed|closing it|handleOutgoing|nio-worker" | grep -aviE "peers/suspended" | tail -100'
          echo "=== restore INFO ==="
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=20 \
            "${SSH_USER}@${SSH_HOST}" \
            'IMAGE=$(docker inspect node-scala-testnet --format "{{.Config.Image}}")
             docker rm -f node-scala-testnet 2>&1 | tail -1 || true
             IMAGE_TAG="$IMAGE" NETWORK=testnet docker compose -p node-scala-testnet -f /opt/dcc/compose/node-scala.yml up -d --wait --wait-timeout 120 node-scala
             docker inspect node-scala-testnet --format "restored: restarts={{.RestartCount}} status={{.State.Status}}"'
          rm -f /tmp/id_rsa
