name: Check Peers and HotStuff
on:
  workflow_call:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: testnet
    steps:
      - name: simplest possible TCP polling
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'echo "=== sanity: what does ss -tn show right now, unfiltered? ==="
             ss -tn | head -20
             echo "=== nohup tight poll ==="
             nohup bash -c "
              for i in \$(seq 1 150); do
                echo \"=== \$(date -u +%H:%M:%S) ===\" >> /tmp/ss-poll.log
                ss -tn >> /tmp/ss-poll.log 2>&1
                sleep 2
              done
             " > /dev/null 2>&1 &
             disown
             echo "started"'
          rm -f /tmp/id_rsa
      - name: wait 5.5 minutes
        run: sleep 330
      - name: fetch and grep results
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'wc -l /tmp/ss-poll.log
             echo "=== lines mentioning 172.105.64 ==="
             grep -B2 "172.105.64" /tmp/ss-poll.log | head -100
             rm -f /tmp/ss-poll.log'
          rm -f /tmp/id_rsa
