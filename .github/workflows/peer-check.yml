name: Check Peers and HotStuff
on:
  workflow_call:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: testnet
    steps:
      - uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d  # v5.1.0
      - name: Get LKE kubeconfig
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
        run: |
          set -euo pipefail
          CLUSTER_ID=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters" | \
            jq -r '.data[] | select(.label | test("testnet")) | .id' | head -1)
          RAW=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters/${CLUSTER_ID}/kubeconfig" | jq -r '.kubeconfig')
          echo "$RAW" | base64 -d > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
      - name: launch tcpdump pod
        run: |
          cat <<'POD' | kubectl apply -f -
          apiVersion: v1
          kind: Pod
          metadata:
            name: tcpdump-debug3
            namespace: dcc
          spec:
            hostNetwork: true
            nodeName: lke615553-902887-0b399b6d0000
            restartPolicy: Never
            containers:
              - name: tcpdump
                image: nicolaka/netshoot:latest
                command: ["sh", "-c", "tcpdump -i any -w /tmp/capture.pcap 'port 6868' & echo $! > /tmp/tcpdump.pid; sleep 700"]
                securityContext:
                  privileged: true
          POD
          kubectl wait --for=condition=Ready pod/tcpdump-debug3 -n dcc --timeout=60s
      - name: wait 10 minutes
        run: sleep 600
      - name: stop tcpdump, get FULL detail (with -A for ascii payload) around any duplicate-SYN burst, cleanup
        run: |
          kubectl exec -n dcc tcpdump-debug3 -- sh -c "kill \$(cat /tmp/tcpdump.pid) 2>/dev/null; sleep 2"
          kubectl cp dcc/tcpdump-debug3:/tmp/capture.pcap /tmp/capture.pcap
          echo "=== find duplicate-SYN clusters (two SYNs within 5s of each other) ==="
          kubectl exec -n dcc tcpdump-debug3 -- tcpdump -r /tmp/capture.pcap -tttt -n 'tcp[tcpflags] & tcp-syn != 0 and tcp[tcpflags] & tcp-ack == 0' 2>&1 | tail -30
          echo "=== full packet lengths + flags, chronological, whole capture ==="
          kubectl exec -n dcc tcpdump-debug3 -- tcpdump -r /tmp/capture.pcap -tttt -n 2>&1 | awk '{print}' > /tmp/full.txt
          wc -l /tmp/full.txt
          echo "=== packets with actual payload length in the first 90s after each new-SYN cluster (to see if handshake DATA flows on duplicates) ==="
          grep -E "length [1-9]" /tmp/full.txt | head -100
          echo "=== cleanup ==="
          kubectl delete pod tcpdump-debug3 -n dcc --grace-period=0 --force 2>&1 | tail -1
