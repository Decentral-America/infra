name: Check Peers and HotStuff
on:
  workflow_call:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: testnet
    steps:
      - name: Check peers and recent blocks
        env:
          SSH_KEY:      ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST:     ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER:     ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'cd /opt/dcc/plugins/testnet
             for f in *.jar; do
               echo "--- $f ---"
               python3 -c "
import zipfile
z = zipfile.ZipFile(\"$f\")
names = [n for n in z.namelist() if n == \"application.conf\"]
if names:
    print(z.read(\"application.conf\").decode())
else:
    print(\"(no application.conf in this jar)\")
"
             done'
          rm -f /tmp/id_rsa
