name: Reset Matcher LevelDB State
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  reset:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Clear matcher LevelDB and restart
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             docker stop matcher-testnet 2>/dev/null
             echo "=== Matcher data dir ==="
             ls -la /opt/dcc/data/matcher-testnet/ 2>/dev/null | head -10
             echo "=== Clear matcher LevelDB state ==="
             rm -rf /opt/dcc/data/matcher-testnet/ && echo "CLEARED" || echo "FAILED (try sudo)"
             sudo rm -rf /opt/dcc/data/matcher-testnet/ 2>/dev/null && echo "CLEARED via sudo" || true
             echo "=== Restart matcher ==="
             docker start matcher-testnet 2>/dev/null && echo OK
             sleep 20
             echo "=== Matcher health ==="
             docker ps --format "{{.Names}}\t{{.Status}}" | grep matcher
             docker logs matcher-testnet --tail=8 2>&1'
          rm -f /tmp/id_rsa
