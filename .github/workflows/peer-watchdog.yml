name: Peer Reconnection Watchdog

# Polls the main node's peer count every 5 minutes.
# If connected peers = 0, immediately forces P2P connections to all gen nodes
# via the REST API. If that fails (node unreachable), triggers wipe-peers-and-restart.
#
# This is the automated replacement for the manual "mainnode-ops wipe-peers-and-restart"
# that was being run every 30-45 minutes. Recovery is now sub-5-minutes automatic.

# Deliberately NOT gated behind a required-reviewer environment: a watchdog
# that needs a human to click "approve" every 5 minutes at 3am defeats its own
# purpose. Blast radius is instead bounded by: testnet-only scope, a
# concurrency lock so overlapping ticks can't double-fire, a timeout under the
# cron interval, and a 15-minute debounce (via a repo variable) on the
# destructive kill/wipe/restart path so a flapping node can't be wiped every
# 5 minutes indefinitely.

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

concurrency:
  group: peer-watchdog
  cancel-in-progress: false

permissions:
  contents: read
  actions: write  # read/write the PEER_WATCHDOG_LAST_WIPE_TS debounce variable

jobs:
  watchdog:
    name: Check peer count and reconnect if needed
    runs-on: ubuntu-latest
    timeout-minutes: 4
    environment: testnet
    steps:
      - name: Check peers and reconnect if zero
        env:
          SSH_KEY:      ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST:     ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER:     ${{ secrets.TESTNET_DEPLOY_USER }}
          MAIN_API_KEY: ${{ secrets.MAIN_NODE_REST_API_KEY }}
          GH_TOKEN:     ${{ github.token }}
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          SSH="ssh -i /tmp/id_rsa -o StrictHostKeyChecking=yes -o ConnectTimeout=15 ${SSH_USER}@${SSH_HOST}"

          # ── 1. Get peer count and chain height from local REST API ──────────
          PEER_INFO=$($SSH "
            set +e
            PEERS=\$(curl -sf --max-time 8 -H 'X-API-Key: ${MAIN_API_KEY}' \
              http://localhost:6869/peers/connected 2>/dev/null)
            if [ -z \"\$PEERS\" ]; then
              echo 'peers_count=-1'
            else
              COUNT=\$(echo \"\$PEERS\" | python3 -c \
                'import sys,json; d=json.load(sys.stdin); print(len(d.get(\"peers\",[])))')
              echo \"peers_count=\$COUNT\"
              echo \"\$PEERS\" | python3 -c \
                'import sys,json; d=json.load(sys.stdin); [print(\"  peer:\",p.get(\"address\")) for p in d.get(\"peers\",[])]'
            fi
            HEIGHT=\$(curl -sf --max-time 8 http://localhost:6869/blocks/height 2>/dev/null \
              | python3 -c 'import sys,json; print(json.load(sys.stdin).get(\"height\",0))' 2>/dev/null || echo 0)
            echo \"chain_height=\$HEIGHT\"
          " 2>&1 || echo "peers_count=-1 chain_height=0")

          echo "Node state:"
          echo "$PEER_INFO"

          PEER_COUNT=$(echo "$PEER_INFO" | grep 'peers_count=' | cut -d= -f2 | head -1)
          CHAIN_HEIGHT=$(echo "$PEER_INFO" | grep 'chain_height=' | cut -d= -f2 | head -1)

          echo ""
          echo "peers=$PEER_COUNT  height=$CHAIN_HEIGHT"

          if [ "${PEER_COUNT:-0}" -gt 0 ] 2>/dev/null; then
            echo "✅ Node has $PEER_COUNT peer(s) — no action needed"
            rm -f /tmp/id_rsa
            exit 0
          fi

          echo "⚠️  Zero peers detected (peers=$PEER_COUNT, height=$CHAIN_HEIGHT). Attempting reconnection..."

          # ── 2. Try REST API force-connect (fast path — no restart) ──────────
          CONNECT_RESULT=$($SSH "
            set +e
            API_KEY='${MAIN_API_KEY}'
            OK=0
            echo '--- forcing P2P connections ---'
            for ADDR in '172.105.64.89:6863' '172.105.64.89:6864' '172.105.64.89:6865'; do
              HOST=\${ADDR%:*}; PORT=\${ADDR#*:}
              R=\$(curl -sf --max-time 8 -X POST http://localhost:6869/peers/connect \
                -H 'X-API-Key: '\$API_KEY \
                -H 'Content-Type: application/json' \
                -d \"{\\\"host\\\":\\\"\$HOST\\\",\\\"port\\\":\$PORT}\" 2>&1)
              echo \"  \$ADDR → \$R\"
              OK=\$((OK + 1))
            done
            sleep 15
            AFTER=\$(curl -sf --max-time 8 -H 'X-API-Key: '\$API_KEY \
              http://localhost:6869/peers/connected 2>/dev/null \
              | python3 -c 'import sys,json; d=json.load(sys.stdin); print(len(d.get(\"peers\",[])))')
            echo \"peers_after=\$AFTER\"
          " 2>&1 || echo "peers_after=-1")

          echo "$CONNECT_RESULT"
          PEERS_AFTER=$(echo "$CONNECT_RESULT" | grep 'peers_after=' | cut -d= -f2 | head -1)

          if [ "${PEERS_AFTER:-0}" -gt 0 ] 2>/dev/null; then
            echo "✅ Reconnection successful — $PEERS_AFTER peer(s) now connected"
            rm -f /tmp/id_rsa
            exit 0
          fi

          # ── 3. REST connect failed — debounce, then wipe peers.dat and restart ──
          echo "⚠️  REST connect did not restore peers (peers_after=$PEERS_AFTER)."

          REPO="${GITHUB_REPOSITORY}"
          NOW=$(date +%s)
          LAST_WIPE=$(gh api "repos/${REPO}/actions/variables/PEER_WATCHDOG_LAST_WIPE_TS" --jq '.value' 2>/dev/null || echo 0)
          ELAPSED=$(( NOW - ${LAST_WIPE:-0} ))
          if [ "$ELAPSED" -lt 900 ]; then
            echo "⏳ Last destructive wipe was ${ELAPSED}s ago (< 900s debounce) — skipping to avoid flapping. Investigate manually if this persists."
            rm -f /tmp/id_rsa
            exit 0
          fi

          echo "Running wipe-peers-and-restart..."
          # Debounce is written only after a confirmed-successful restart (below) —
          # writing it here would block retries for 15 min if the wipe itself fails
          # partway (e.g. container killed but restart fails), leaving the node down
          # with no automatic recovery attempt until the debounce expires.
          if $SSH 'set -e
            CID=$(docker ps 2>/dev/null \
              | grep -iE "dcc|decentralchain|waves|node-scala" | awk "{print \$1}" | head -1)
            if [ -z "$CID" ]; then echo "ERROR: container not found"; exit 1; fi
            NAME=$(docker inspect "$CID" --format "{{.Name}}" | sed "s|/||")
            echo "SIGKILL $NAME to prevent peer-save on graceful shutdown..."
            docker kill "$CID" 2>/dev/null || true
            sleep 3
            echo "Wiping peers.dat..."
            docker start "$NAME" 2>/dev/null && sleep 3
            docker exec "$NAME" sh -c "rm -f /var/lib/dcc/peers.dat && echo WIPED" 2>/dev/null || true
            docker restart "$NAME" && echo "OK - node restarted with clean peer state"'; then
            gh api "repos/${REPO}/actions/variables/PEER_WATCHDOG_LAST_WIPE_TS" -X PATCH -f "value=${NOW}" >/dev/null 2>&1 \
              || gh api "repos/${REPO}/actions/variables" -X POST -f "name=PEER_WATCHDOG_LAST_WIPE_TS" -f "value=${NOW}" >/dev/null 2>&1 \
              || echo "WARNING: could not persist debounce timestamp"
            rm -f /tmp/id_rsa
            echo "🔄 Node restarted. Peers will reconnect within 60 seconds."
          else
            rm -f /tmp/id_rsa
            echo "::error::wipe-peers-and-restart failed — node may be left in a killed/broken state. No debounce recorded; the next tick will retry immediately."
            exit 1
          fi

      - name: Upload watchdog result
        if: always()
        run: |
          mkdir -p /tmp/watchdog
          echo "run_id=${{ github.run_id }} time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" > /tmp/watchdog/result.txt
