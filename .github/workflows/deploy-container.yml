# ──────────────────────────────────────────────────────────────────────────────
# Reusable: Deploy Docker container via SSH
#
# Callers in other repos use:
#
#   jobs:
#     deploy:
#       uses: Decentral-America/infra/.github/workflows/deploy-container.yml@main
#       with:
#         network:     mainnet
#         image:       ghcr.io/decentral-america/scanner:abc1234
#         service:     scanner
#         compose_dir: /opt/dcc/compose
#       secrets: inherit
#
# The job declares environment: ${{ inputs.network }} at the job level, so GHA
# reads DEPLOY_* secrets from THIS repo's (infra) environments, not the caller's.
# This is the key architectural insight that eliminates secret repetition.
#
# Required infra repo environments (mainnet/stagenet/testnet) with secrets:
#   DEPLOY_HOST             — Linode server IP
#   DEPLOY_USER             — SSH user
#   DEPLOY_SSH_KEY          — Ed25519 private key (base64)
#   DEPLOY_HOST_FINGERPRINT — Ed25519 host fingerprint
#
# Note: infra repo must be PUBLIC for cross-org reusable workflows to work
# on GitHub Free plan. No secrets are in the code — all sensitive values are
# in GitHub Secrets or on-server /opt/dcc/secrets/<network>.env files.
# ──────────────────────────────────────────────────────────────────────────────

name: Deploy Container

on:
  workflow_call:
    inputs:
      network:
        description: 'Target network (mainnet | stagenet | testnet)'
        required: true
        type: string
      image:
        description: 'Full image reference to pull (e.g. ghcr.io/decentral-america/scanner:abc1234)'
        required: true
        type: string
      service:
        description: 'Docker Compose service name to restart'
        required: true
        type: string
      compose_dir:
        description: 'Absolute path to docker-compose files on the server'
        required: false
        type: string
        default: '/opt/dcc/compose'
      wait_timeout:
        description: 'Seconds to wait for container to become healthy (docker compose up --wait-timeout). Increase for JVM services that have long startup: node-scala needs 180+.'
        required: false
        type: number
        default: 120
    secrets:
      GHCR_TOKEN:
        required: true
        description: 'PAT with read:packages for GHCR pull on server'
      # DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, DEPLOY_HOST_FINGERPRINT are
      # NOT declared here. The deploy job has environment: ${{ inputs.network }}
      # which reads them directly from infra repo's environments (testnet/stagenet/mainnet).
      # Callers only need to pass GHCR_TOKEN. No duplication across repos.

permissions:
  contents: read

# Prevent parallel deploys of the same service+network from racing.
# cancel-in-progress: false is critical — never cancel an in-flight deploy.
concurrency:
  group: deploy-${{ inputs.service }}-${{ inputs.network }}
  cancel-in-progress: false

jobs:
  # ── Container security scan ─────────────────────────────────────────────────
  # Trivy scans the image for HIGH/CRITICAL CVEs before it is deployed.
  # A clean scan is a hard gate: the deploy job only runs if this passes.
  # This catches vulnerabilities introduced between CI build and production deploy,
  # ensuring no image with known critical flaws reaches the live environment.
  scan:
    name: Trivy scan ${{ inputs.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      security-events: write  # upload SARIF to GitHub Security tab

    steps:
      - name: Checkout infra repository
        # Required to make .trivyignore available in the working directory.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: Decentral-America/infra
          persist-credentials: false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scan
        # Hard gate — exits 1 on any unfixed HIGH/CRITICAL CVE not in .trivyignore.
        # Known accepted CVEs (with documented justification) are in infra/.trivyignore.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref:      '${{ inputs.image }}'
          format:         'table'
          severity:       'HIGH,CRITICAL'
          # Exit 1 if any HIGH or CRITICAL vuln found — hard gate for all networks.
          exit-code:      '1'
          ignore-unfixed:              true
          scanners:                    'vuln'
          version:                     'v0.71.0'
          # CVEs in OS packages pending Debian 12 backport — not exploitable via
          # our attack surface. See .trivyignore at root of this repo for details.
          trivyignores: '.trivyignore'

      - name: Upload Trivy SARIF to GitHub Security
        if: always() && hashFiles('trivy-results.sarif') != ''
        # continue-on-error: SARIF upload is informational only — GitHub Code
        # Scanning rejects uploads from non-default branches ("commit not found").
        # Scan results still appear in annotations. Never block the deploy gate.
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          sarif_file: trivy-results.sarif

  deploy:
    name: Deploy ${{ inputs.service }} → ${{ inputs.network }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: scan
    # DEPLOY_* secrets are org-level with network prefix (TESTNET_/STAGENET_/MAINNET_).
    # Cross-repo workflow_call cannot access callee environment secrets, so we use
    # org-level secrets accessible to all repos without duplication.

    steps:
      - name: Checkout infra repository
        # Checks out THIS (infra) repo so we can upload the latest compose file.
        # This ensures the compose file on the server is always in sync with the
        # version in git — no manual copying required.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # Explicit repo required: when called via workflow_call from another repo,
          # actions/checkout defaults to the CALLER's repo, not infra's.
          repository: Decentral-America/infra
          persist-credentials: false

      - name: Set up SSH credentials
        # Writes the deploy key to a mode-600 file and pre-populates known_hosts
        # so subsequent scp/ssh steps do not need StrictHostKeyChecking=no.
        # All remote operations use native scp/ssh — no third-party actions.
        env:
          DEPLOY_HOST: ${{ inputs.network == 'testnet' && secrets.TESTNET_DEPLOY_HOST || inputs.network == 'stagenet' && secrets.STAGENET_DEPLOY_HOST || secrets.MAINNET_DEPLOY_HOST }}
          DEPLOY_KEY:  ${{ inputs.network == 'testnet' && secrets.TESTNET_DEPLOY_SSH_KEY || inputs.network == 'stagenet' && secrets.STAGENET_DEPLOY_SSH_KEY || secrets.MAINNET_DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload compose file to server
        # Uploads compose/<service>.yml to $compose_dir/ (filename only, no subdirectory prefix).
        env:
          DEPLOY_HOST: ${{ inputs.network == 'testnet' && secrets.TESTNET_DEPLOY_HOST || inputs.network == 'stagenet' && secrets.STAGENET_DEPLOY_HOST || secrets.MAINNET_DEPLOY_HOST }}
          DEPLOY_USER: ${{ inputs.network == 'testnet' && secrets.TESTNET_DEPLOY_USER || inputs.network == 'stagenet' && secrets.STAGENET_DEPLOY_USER || secrets.MAINNET_DEPLOY_USER }}
        run: |
          set -euo pipefail
          scp -i ~/.ssh/deploy_key \
            "compose/${{ inputs.service }}.yml" \
            "$DEPLOY_USER@$DEPLOY_HOST:${{ inputs.compose_dir }}/"

      - name: Upload node config to server
        # Only runs for the node-scala service. Pushes the network-specific HOCON config
        # to /opt/dcc/config/node-<network>/dcc.conf (the volume mount path).
        if: inputs.service == 'node-scala'
        env:
          DEPLOY_HOST: ${{ inputs.network == 'testnet' && secrets.TESTNET_DEPLOY_HOST || inputs.network == 'stagenet' && secrets.STAGENET_DEPLOY_HOST || secrets.MAINNET_DEPLOY_HOST }}
          DEPLOY_USER: ${{ inputs.network == 'testnet' && secrets.TESTNET_DEPLOY_USER || inputs.network == 'stagenet' && secrets.STAGENET_DEPLOY_USER || secrets.MAINNET_DEPLOY_USER }}
        run: |
          set -euo pipefail
          scp -i ~/.ssh/deploy_key \
            "node-config/${{ inputs.network }}/dcc.conf" \
            "$DEPLOY_USER@$DEPLOY_HOST:/opt/dcc/config/node-${{ inputs.network }}/"

      - name: Pull image, deploy, and auto-rollback on failure
        env:
          # GHCR_TOKEN must be set as an org/repo secret with read:packages scope.
          # Passed into the SSH heredoc so the server can authenticate to GHCR
          # before pulling (packages are private by default on GHCR).
          GHCR_TOKEN:        ${{ secrets.GHCR_TOKEN }}
          DEPLOY_HOST:       ${{ inputs.network == 'testnet' && secrets.TESTNET_DEPLOY_HOST || inputs.network == 'stagenet' && secrets.STAGENET_DEPLOY_HOST || secrets.MAINNET_DEPLOY_HOST }}
          DEPLOY_USER:       ${{ inputs.network == 'testnet' && secrets.TESTNET_DEPLOY_USER || inputs.network == 'stagenet' && secrets.STAGENET_DEPLOY_USER || secrets.MAINNET_DEPLOY_USER }}
          INPUT_IMAGE:       ${{ inputs.image }}
          INPUT_NETWORK:     ${{ inputs.network }}
          INPUT_SERVICE:     ${{ inputs.service }}
          INPUT_COMPOSE_DIR: ${{ inputs.compose_dir }}
          INPUT_WAIT_TIMEOUT: ${{ inputs.wait_timeout }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=10 \
            "$DEPLOY_USER@$DEPLOY_HOST" bash -s << REMOTE
          set -euo pipefail
          export IMAGE_TAG="${INPUT_IMAGE}"
          export NETWORK="${INPUT_NETWORK}"
          SERVICE="${INPUT_SERVICE}"
          COMPOSE_DIR="${INPUT_COMPOSE_DIR}"
          GHCR_TOKEN="${GHCR_TOKEN}"
          INPUT_WAIT_TIMEOUT="${INPUT_WAIT_TIMEOUT}"

          # ── Pre-flight: ensure writable config dir for node-scala ─────────
          # bootstrap.sh creates /opt/dcc/config/node-<NETWORK>/ as deploy:deploy,
          # but manual sudo operations can change ownership to root. Self-heal here
          # so the node-config SCP step always has a writable target.
          if [[ "\$SERVICE" == "node-scala" ]]; then
            sudo install -d -m 755 -o deploy -g deploy "/opt/dcc/config/node-\${NETWORK}"
          fi

          echo "Authenticating with GHCR..."
          echo "\$GHCR_TOKEN" | docker login ghcr.io -u x-access-token --password-stdin

          # ── Capture previous image for rollback ────────────────────────
          # docker inspect returns the image digest/tag currently running.
          # If the container doesn't exist yet (first deploy), PREV_IMAGE
          # will be empty and the rollback block is a no-op.
          PREV_IMAGE=\$(docker inspect --format '{{.Config.Image}}' "\${SERVICE}-\${NETWORK}" 2>/dev/null || echo "")
          echo "Previous image: \${PREV_IMAGE:-<none — first deploy>}"

          # ── Clean up project-label mismatch (one-time migration) ──────────
          # Containers created before --project-name was introduced carry the
          # directory-based label (e.g. "compose"). docker compose up with a
          # different --project-name sees no matching container and tries to
          # CREATE one — but the name is taken → conflict. Detect and remove
          # the mismatched container so docker compose can recreate it cleanly.
          EXISTING_PROJECT=\$(docker inspect \
            --format '{{index .Config.Labels "com.docker.compose.project"}}' \
            "\${SERVICE}-\${NETWORK}" 2>/dev/null || true)
          EXPECTED_PROJECT="\${SERVICE}-\${NETWORK}"
          if [[ -n "\$EXISTING_PROJECT" && "\$EXISTING_PROJECT" != "\$EXPECTED_PROJECT" ]]; then
            echo "Removing \${SERVICE}-\${NETWORK} (project '\$EXISTING_PROJECT' ≠ '\$EXPECTED_PROJECT')..."
            docker rm -f "\${SERVICE}-\${NETWORK}"
          fi

          echo "Pulling \$IMAGE_TAG"
          docker pull "\$IMAGE_TAG"

          echo "Deploying \$SERVICE on \$NETWORK..."
          cd "\$COMPOSE_DIR"

          # docker compose up --wait blocks until the container is running/healthy
          # (respects healthcheck if defined, otherwise just waits for running state).
          # --wait-timeout caps the wait. --project-name isolates this service's
          # compose project so other services in the same directory (e.g. caddy) are
          # not treated as orphans and removed. Never use --remove-orphans here.
          if ! docker compose \
            --project-name "\${SERVICE}-\${NETWORK}" \
            --file "\${SERVICE}.yml" up \
            --detach \
            --wait \
            --wait-timeout "\$INPUT_WAIT_TIMEOUT" \
            "\$SERVICE"; then

            echo "::error::Health check failed for \$SERVICE on \$NETWORK."

            # ── Auto-rollback to the previous image ───────────────────────
            if [[ -n "\$PREV_IMAGE" ]]; then
              echo "Rolling back to previous image: \$PREV_IMAGE"
              export IMAGE_TAG="\$PREV_IMAGE"
              docker compose \
                --project-name "\${SERVICE}-\${NETWORK}" \
                --file "\${SERVICE}.yml" up \
                --detach \
                --wait \
                --wait-timeout "\$INPUT_WAIT_TIMEOUT" \
                "\$SERVICE" \
                && echo "Rollback successful: \$PREV_IMAGE is running." \
                || echo "::error::Rollback also failed — manual intervention required."
            else
              echo "No previous image to roll back to (first deploy). Manual intervention required."
            fi

            exit 1
          fi

          # Prune dangling images to reclaim disk space (keeps referenced images)
          docker image prune -f

          echo "Deploy complete: \$IMAGE_TAG → \$NETWORK"
          REMOTE
