name: Tune HotStuff Round Timeout
# Reads hotstuff_round_latency_ms histogram from Kamon (port 6870),
# computes p99 + 20% margin, updates dcc.conf and nodes.yaml, commits,
# then restarts the main node. Set timeout_ms != 0 to override.
on:
  workflow_dispatch:
    inputs:
      timeout_ms:
        description: 'Timeout override in ms (0 = auto-compute from Kamon p99+20%)'
        required: false
        default: '0'
        type: string
  workflow_call:

permissions:
  contents: write

jobs:
  tune:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: testnet
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Compute new round-timeout-ms from Kamon p99
        id: compute
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa

          MANUAL="${{ inputs.timeout_ms }}"
          if [ "${MANUAL}" != "0" ] && [ -n "${MANUAL}" ]; then
            echo "Manual override: ${MANUAL}ms"
            echo "NEW_TIMEOUT=${MANUAL}" >> "$GITHUB_OUTPUT"
            echo "SOURCE=manual" >> "$GITHUB_OUTPUT"
            rm -f /tmp/id_rsa
            exit 0
          fi

          echo "=== Fetch Kamon histogram from port 6870 ==="
          METRICS=$(ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'curl -s http://localhost:6870/metrics 2>/dev/null | grep "hotstuff_round_latency" | grep -v "^#"')
          rm -f /tmp/id_rsa
          echo "Raw histogram lines:"
          echo "$METRICS"

          # Compute p99+20% in Python. Uses $'...\n...' quoting so no heredoc
          # terminator appears at column 0 (which truncates the YAML run block).
          NEW_TIMEOUT=$(echo "$METRICS" | python3 -c $'import sys,re,math\nlines=sys.stdin.read().strip().splitlines()\nbuckets={}\ntotal=0\nfor l in lines:\n    m=re.match(r\'hotstuff_round_latency_ms_bucket\\{le="([^"]+)"\\}\\s+(\\d+)\',l)\n    if m: buckets[float(m.group(1))]=int(m.group(2))\n    m2=re.match(r\'hotstuff_round_latency_ms_count\\s+(\\d+)\',l)\n    if m2: total=int(m2.group(1))\nif not buckets or not total: print(1200); sys.exit(0)\ntgt=0.99*total\npc,pl=0,0.0\nfor le,c in sorted(buckets.items()):\n    if le==float("inf"): continue\n    if c>=tgt:\n        frac=(tgt-pc)/max(c-pc,1); p99=pl+frac*(le-pl); break\n    pc=c; pl=le\nelse:\n    p99=sorted(k for k in buckets if k!=float("inf"))[-1]\nprint(max(400,int(math.ceil(p99*1.20/50)*50)))')

          echo "=== Computed: ${NEW_TIMEOUT}ms ==="
          echo "NEW_TIMEOUT=${NEW_TIMEOUT}" >> "$GITHUB_OUTPUT"
          echo "SOURCE=kamon-p99" >> "$GITHUB_OUTPUT"

      - name: Update configs in repo
        run: |
          NEW_TIMEOUT="${{ steps.compute.outputs.NEW_TIMEOUT }}"
          echo "Applying round-timeout-ms = ${NEW_TIMEOUT}ms (source: ${{ steps.compute.outputs.SOURCE }})"

          sed -i "s/round-timeout-ms = [0-9]*/round-timeout-ms = ${NEW_TIMEOUT}/" \
            node-config/testnet/dcc.conf
          grep "round-timeout" node-config/testnet/dcc.conf

          sed -i "s/round-timeout-ms = [0-9]*/round-timeout-ms = ${NEW_TIMEOUT}/g" \
            clusters/testnet/apps/nodes.yaml
          grep "round-timeout" clusters/testnet/apps/nodes.yaml

      - name: Commit and push
        run: |
          NEW_TIMEOUT="${{ steps.compute.outputs.NEW_TIMEOUT }}"
          git config user.name "jourlez"
          git config user.email "josuecr.288@gmail.com"
          git add node-config/testnet/dcc.conf clusters/testnet/apps/nodes.yaml
          git diff --cached --stat
          git commit -m "ops(testnet): tune round-timeout-ms -> ${NEW_TIMEOUT}ms (HotStuff p99+20%)"
          git push

      - name: Deploy to VPS and restart node
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          scp -i /tmp/id_rsa -o StrictHostKeyChecking=no \
            node-config/testnet/dcc.conf \
            "${SSH_USER}@${SSH_HOST}:/tmp/dcc.conf.new"
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set -e
             sudo cp /tmp/dcc.conf.new /opt/dcc/config/node-testnet/dcc.conf
             sudo chown root:root /opt/dcc/config/node-testnet/dcc.conf
             sudo chmod 644 /opt/dcc/config/node-testnet/dcc.conf
             rm -f /tmp/dcc.conf.new
             docker restart node-scala-testnet
             sleep 45
             docker logs node-scala-testnet --since 50s 2>&1 | grep -i "round-timeout\|started" | head -5
             curl -s http://localhost:6869/blocks/height 2>/dev/null'
          rm -f /tmp/id_rsa
          echo "Gen nodes pick up change via Flux GitOps ~1 min after push above"
