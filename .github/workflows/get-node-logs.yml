name: Get Node Startup Logs
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  logs:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Get node and BPS crash logs
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             echo "=== Removing stale proto classes from plugin JARs ==="
             PLUGINS=/opt/dcc/plugins/testnet
             for jar in dcc-grpc.jar dcc-ext.jar; do
               cp "$PLUGINS/$jar" "$PLUGINS/$jar.bak" 2>/dev/null
               zip -d "$PLUGINS/$jar" "io/decentralchain/protobuf/*" "scalapb/*" "io/decentralchain/events/*" 2>&1 || echo "$jar: zip -d result above"
             done
             echo "=== Restarting node ==="
             docker restart node-scala-testnet
             sleep 25
             echo "=== Container + gRPC port ==="
             docker ps --format "{{.Names}}\t{{.Status}}" | grep node-scala
             ss -tlnp 2>/dev/null | grep 6881 || echo "port 6881 not yet open"
             curl -s http://localhost:6869/node/version 2>/dev/null || echo "(starting)"'
          rm -f /tmp/id_rsa
