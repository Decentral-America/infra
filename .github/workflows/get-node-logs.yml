name: Get Node Startup Logs
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  logs:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Get latest node logs and status
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             echo "=== Container status ==="
             docker ps -a --format "{{.Names}}\t{{.Status}}" | grep -E "node-scala|blockchain-postgres|matcher"
             echo "=== Port 6881 ==="
             ss -tlnp 2>/dev/null | grep 6881 || echo "port 6881 not open"
             echo "=== Last 5 min node logs ==="
             docker logs node-scala-testnet --since 5m 2>&1 | grep -i "BlockchainUpdates\|Enable extension\|6881\|startup.*check\|ERROR\|height\|version\|Blockchain Id" | head -15
             echo "=== Height ==="
             curl -s http://localhost:6869/blocks/height 2>/dev/null || echo "(not responding)"'
          rm -f /tmp/id_rsa
