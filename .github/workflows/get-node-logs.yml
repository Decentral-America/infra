name: Get Node Startup Logs
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  logs:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Get node and BPS crash logs
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             echo "=== Node ERROR/WARN/miner logs (last 5 min) ==="
             docker logs node-scala-testnet --since 5m 2>&1 | grep -i "error\|warn\|miner\|generat\|append\|block\|peer\|suspend\|blacklist\|hotstuff\|wallet\|height" | grep -v "at java\|at scala\|at io\.\|at org\.\|at com\.\|at net\.\|WARNING.*Unsafe\|HTTP 200" | head -40
             echo "=== Node last 20 raw lines ==="
             docker logs node-scala-testnet --tail=20 2>&1 | grep -v "at java\|at scala\|at io\.\|at org\.\|at com\.\|at net\.\|WARNING.*Unsafe\|HTTP 200" | head -20
             echo "=== BPS crash logs ==="
             docker logs blockchain-postgres-sync-testnet --tail=10 2>&1 | grep -v "^Error:" | head -8
             echo "=== Container status ==="
             docker ps -a --format "{{.Names}}\t{{.Status}}"
             echo "=== Matcher health ==="
             curl -s --max-time 5 http://localhost:6886/matcher 2>/dev/null || echo "matcher not responding on 6886"
             echo "=== Chain height ==="
             curl -s http://localhost:6869/blocks/height 2>/dev/null'
          rm -f /tmp/id_rsa
