name: Get Node Startup Logs
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  logs:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Get node and BPS status
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             echo "=== Container status ==="
             docker ps -a --format "{{.Names}}\t{{.Status}}"
             echo "=== Port 6881 ==="
             ss -tlnp 2>/dev/null | grep 6881 || echo "port 6881 not open"
             echo "=== BPS logs ==="
             docker logs blockchain-postgres-sync-testnet --tail=5 2>&1 | grep -v "^Error:" | head -5
             echo "=== Node version + height ==="
             curl -s http://localhost:6869/node/version 2>/dev/null
             curl -s http://localhost:6869/blocks/height 2>/dev/null
             echo "=== Node ERROR logs ==="
             docker logs node-scala-testnet 2>&1 | grep "ERROR\|NoSuchMethod\|BlockchainUpdates.*started\|grpc.*6881" | head -10'
          rm -f /tmp/id_rsa
