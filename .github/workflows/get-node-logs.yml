name: Get Node Startup Logs
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  logs:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Delete stale BlockchainUpdates state and restart
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             echo "=== Stopping node ==="
             docker stop node-scala-testnet
             echo "=== Deleting stale blockchain-updates state ==="
             docker run --rm -v node-state-testnet:/data alpine sh -c "rm -rf /data/blockchain-updates && echo DELETED"
             echo "=== Starting node ==="
             docker start node-scala-testnet
             sleep 30
             echo "=== Container status ==="
             docker ps --format "{{.Names}}\t{{.Status}}" | grep node-scala
             echo "=== Extension startup ==="
             docker logs node-scala-testnet 2>&1 | grep -i "BlockchainUpdates\|Enable extension\|6881\|started gRPC\|height" | head -8
             echo "=== Port 6881 ==="
             ss -tlnp 2>/dev/null | grep 6881 || echo "port 6881 not open yet"'
          rm -f /tmp/id_rsa
