name: Get Node Startup Logs
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  logs:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Get node and BPS crash logs
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'true'
          python3 -c "
import base64
s='''import zipfile,shutil
P=(\"io/decentralchain/protobuf\",\"scalapb/\",\"io/decentralchain/events/\")
for j in [\"/opt/dcc/plugins/testnet/dcc-grpc.jar\",\"/opt/dcc/plugins/testnet/dcc-ext.jar\"]:
 t=\"/tmp/fj.zip\"
 try:
  n=0
  zin=zipfile.ZipFile(j)
  zout=zipfile.ZipFile(t,\"w\",8)
  for i in zin.infolist():
   if i.filename.startswith(P): n+=1
   else: zout.writestr(i,zin.read(i.filename))
  zout.close(); zin.close()
  shutil.copyfile(j,j+\".bak\"); shutil.move(t,j)
  print(j+\": removed \"+str(n))
 except Exception as e: print(j+\": \"+str(e))
'''
print(base64.b64encode(s.encode()).decode())
" > /tmp/encoded_script.txt
          ENCODED=$(cat /tmp/encoded_script.txt)
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            "set +e
             echo '${ENCODED}' | base64 -d | python3
             echo '=== Restarting node ==='
             docker restart node-scala-testnet
             sleep 25
             docker ps --format '{{.Names}}\t{{.Status}}' | grep node-scala
             ss -tlnp 2>/dev/null | grep 6881 || echo 'port 6881 not yet open'
             curl -s http://localhost:6869/node/version 2>/dev/null || echo '(starting)'"
          rm -f /tmp/id_rsa
