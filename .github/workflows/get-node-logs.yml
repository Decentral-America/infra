name: Get Node Startup Logs
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  logs:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Delete corrupt extension DB and restart
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             echo "=== Stop node ==="
             docker stop node-scala-testnet
             echo "=== Delete corrupt blockchain-updates DB ==="
             docker run --rm -v node-state-testnet:/data alpine sh -c "rm -rf /data/blockchain-updates && echo DELETED"
             echo "=== Start node ==="
             docker start node-scala-testnet
             sleep 35
             echo "=== Container status ==="
             docker ps --format "{{.Names}}\t{{.Status}}" | grep node-scala
             echo "=== Extension startup ==="
             docker logs node-scala-testnet --since 1m 2>&1 | grep -i "BlockchainUpdates\|Enable extension\|Error\|height\|started gRPC\|6881" | head -10
             echo "=== Port 6881 ==="
             ss -tlnp 2>/dev/null | grep 6881 || echo "port 6881 not open"
             echo "=== Height ==="
             curl -s http://localhost:6869/blocks/height 2>/dev/null'
          rm -f /tmp/id_rsa
