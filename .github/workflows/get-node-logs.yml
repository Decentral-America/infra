name: Get Node Startup Logs
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  logs:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Get node startup extension logs
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             echo "=== Startup extension messages (first 100 lines) ==="
             docker logs node-scala-testnet 2>&1 | head -100 | grep -v "HTTP 200"
             echo "=== Port 6881 ==="
             ss -tlnp 2>/dev/null | grep 6881 || echo "port 6881 not open"
             echo "=== BPS current log ==="
             docker logs blockchain-postgres-sync-testnet --tail=3 2>&1 | grep -v "^Error:" | head -3'
          rm -f /tmp/id_rsa
