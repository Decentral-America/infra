name: Get Node Startup Logs
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  logs:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Check application.conf in plugin JARs
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             echo "=== application.conf in dcc-ext.jar ==="
             unzip -p /opt/dcc/plugins/testnet/dcc-ext.jar application.conf 2>/dev/null || echo "(no application.conf in dcc-ext.jar)"
             echo "=== application.conf in dcc-grpc.jar ==="
             unzip -p /opt/dcc/plugins/testnet/dcc-grpc.jar application.conf 2>/dev/null || echo "(no application.conf in dcc-grpc.jar)"
             echo "=== application.conf in dcc-grpc.jar.disabled (original) ==="
             unzip -p /opt/dcc/plugins/testnet/dcc-grpc.jar.disabled application.conf 2>/dev/null || echo "(no application.conf)"
             echo "=== Height + Port ==="
             curl -s http://localhost:6869/blocks/height 2>/dev/null
             ss -tlnp 2>/dev/null | grep 6881 || echo "port 6881 not open"'
          rm -f /tmp/id_rsa
