name: Get Node Startup Logs
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  logs:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Check extension services in lib JARs
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             echo "=== META-INF/services in lib JARs ==="
             for f in /usr/share/dcc/lib/*.jar; do
               if unzip -l "$f" 2>/dev/null | grep -q "META-INF/services"; then
                 echo "JAR: $(basename $f)"
                 unzip -p "$f" META-INF/services/com.decentralchain.Extension 2>/dev/null || echo "  (no com.decentralchain.Extension service)"
               fi
             done
             echo "=== Plugins dir ==="
             ls -la /opt/dcc/plugins/testnet/ 2>/dev/null
             echo "=== Node height ==="
             curl -s http://localhost:6869/blocks/height 2>/dev/null'
          rm -f /tmp/id_rsa
