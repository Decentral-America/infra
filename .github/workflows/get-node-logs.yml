name: Get Node Startup Logs
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  logs:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Get node startup logs
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             echo "=== Container status ==="
             docker ps -a --format "{{.Names}}\t{{.Status}}\t{{.Image}}" | grep node-scala
             echo "=== Last 30 lines of node logs ==="
             docker logs node-scala-testnet --tail=30 2>&1
             echo "=== Any core dumps or OOM ==="
             journalctl -n 20 --no-pager 2>/dev/null | grep -i "oom\|killed\|core" | tail -5'
          rm -f /tmp/id_rsa
