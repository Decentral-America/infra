name: Get Node Startup Logs
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  logs:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Check META-INF/services specifically in each plugin JAR
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             echo "=== Plugin dir ==="
             ls -lh /opt/dcc/plugins/testnet/
             for jar in /opt/dcc/plugins/testnet/*.jar /opt/dcc/plugins/testnet/*.disabled; do
               echo "--- $jar ---"
               unzip -p "$jar" META-INF/services/com.decentralchain.Extension 2>/dev/null || echo "  (no Extension service file)"
             done
             echo "=== Node height ==="
             curl -s http://localhost:6869/blocks/height 2>/dev/null
             echo "=== Port 6881 ==="
             ss -tlnp 2>/dev/null | grep 6881 || echo "port 6881 not open"'
          rm -f /tmp/id_rsa
