name: Get Node Startup Logs
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  logs:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Remove stale plugin JARs and restart node
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             echo "=== Removing stale plugin JARs (extensions are in lib/dcc-grpc-server now) ==="
             sudo mv /opt/dcc/plugins/testnet/dcc-grpc.jar /opt/dcc/plugins/testnet/dcc-grpc.jar.disabled 2>/dev/null && echo "dcc-grpc.jar disabled"
             sudo mv /opt/dcc/plugins/testnet/dcc-ext.jar /opt/dcc/plugins/testnet/dcc-ext.jar.disabled 2>/dev/null && echo "dcc-ext.jar disabled"
             ls /opt/dcc/plugins/testnet/
             echo "=== Restarting node ==="
             docker restart node-scala-testnet
             sleep 30
             echo "=== Container status ==="
             docker ps --format "{{.Names}}\t{{.Status}}" | grep node-scala
             echo "=== Port 6881 ==="
             ss -tlnp 2>/dev/null | grep 6881 || echo "port 6881 not open"
             echo "=== Startup extension logs ==="
             docker logs node-scala-testnet 2>&1 | grep -i "BlockchainUpdates\|Enable extension\|6881\|grpc.*bound" | head -5
             echo "=== Height ==="
             curl -s http://localhost:6869/blocks/height 2>/dev/null'
          rm -f /tmp/id_rsa
