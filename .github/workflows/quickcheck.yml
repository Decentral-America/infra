name: quickcheck
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: testnet
    steps:
      - name: check
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'cd /opt/dcc/plugins/testnet
             echo "=== sha256sums ==="
             sha256sum *.jar
             echo "=== application.conf inside each jar ==="
             for f in *.jar; do
               echo "--- $f ---"
               unzip -p "$f" application.conf 2>&1 | head -5
             done'
          rm -f /tmp/id_rsa
