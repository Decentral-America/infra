name: quickcheck
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: testnet
    steps:
      - name: check
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'echo "=== matcher status ==="
             docker ps --format "{{.Names}} {{.Status}}" | grep matcher
             echo "=== matcher recent logs ==="
             docker logs matcher-testnet --tail 40 2>&1
             echo "=== is anything listening on 6887 (DEXExtension gRPC)? ==="
             docker exec node-scala-testnet sh -c "cat /proc/net/tcp | grep -i :1AE7" || true
             ss -tlnp 2>/dev/null | grep 6887 || echo "nothing on 6887"'
          rm -f /tmp/id_rsa
