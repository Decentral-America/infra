name: Diag Alloy Log Ingestion
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: testnet
    steps:
      - name: Verify Alloy is shipping logs into Loki
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" 'bash -s' <<'REMOTE'
          echo "=== alloy container health ==="
          docker inspect alloy-testnet --format "{{.State.Health.Status}}"
          echo "=== alloy last 100 lines, errors only ==="
          docker logs alloy-testnet --tail 100 2>&1 | grep -i "error" | tail -20 || echo "(no errors)"
          echo "=== loki own health ==="
          docker exec loki-testnet /usr/bin/loki -health
          echo "=== recent matcher-testnet lines in loki (last 5 min) ==="
          NOW=$(date +%s)
          FROM=$((NOW - 300))
          curl -s -G "http://127.0.0.1:3100/loki/api/v1/query_range" \
            --data-urlencode 'query={container="matcher-testnet"}' \
            --data-urlencode "limit=3" \
            --data-urlencode "start=${FROM}000000000" \
            --data-urlencode "end=${NOW}000000000" > /tmp/loki_result.json
          head -c 1500 /tmp/loki_result.json
          echo
          rm -f /tmp/loki_result.json
          REMOTE
          rm -f /tmp/id_rsa
