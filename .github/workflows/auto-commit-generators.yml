name: Auto-Commit Generators (T2 HotStuff)
# Commits all 3 generators to the next generation period automatically.
# Generation periods are 100 blocks (~50 min). Two staggered 10-min crons
# combine to fire every 5 min (12 attempts/hour) — GitHub cron can miss
# individual fires; this redundancy means a single missed fire can't stall T2.
on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 min (primary — high-frequency to survive cron gaps)
    - cron: '5,15,25,35,45,55 * * * *'  # at :05/:15/:25/:35/:45/:55 (fills any 10-min gaps)
  workflow_dispatch: {}
  workflow_call:
permissions:
  contents: read
jobs:
  commit:
    runs-on: ubuntu-latest
    # Worst case: gen-0, gen-1, and val-0 each exhaust their 15x20s retry
    # window (~5 min each) = ~15 min just for retries, plus kubectl/SSH
    # setup and the finality report. 15 min was fine for the old single-shot
    # attempts but is too tight now.
    timeout-minutes: 25
    environment: testnet
    steps:
      - name: Install kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d  # v5.1.0

      - name: Get LKE kubeconfig
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
        run: |
          CLUSTER_ID=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters" | \
            jq -r '.data[] | select(.label | test("testnet")) | .id' | head -1)
          RAW=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters/${CLUSTER_ID}/kubeconfig" | \
            jq -r '.kubeconfig')
          echo "$RAW" | base64 -d > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV

      - name: Commit main node generator
        env:
          SSH_KEY:      ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST:     ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER:     ${{ secrets.TESTNET_DEPLOY_USER }}
          MAIN_API_KEY: ${{ secrets.MAIN_NODE_REST_API_KEY }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          # Write key to temp file to avoid SSH quoting issues with Base64 special chars
          echo "${MAIN_API_KEY}" > /tmp/.main_key
          scp -i /tmp/id_rsa -o StrictHostKeyChecking=no /tmp/.main_key "${SSH_USER}@${SSH_HOST}:/tmp/.main_key" 2>/dev/null
          rm -f /tmp/.main_key
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             API_KEY=$(cat /tmp/.main_key 2>/dev/null | tr -d "\n")
             rm -f /tmp/.main_key
             ADDR="31RPEKcz71a3hdxt8z7qLhTpRMuRV2kUyr6"
             SIGNED=$(curl -s -X POST http://localhost:6869/transactions/sign \
               -H "X-API-Key: $API_KEY" -H "Content-Type: application/json" \
               -d "{\"type\":19,\"sender\":\"$ADDR\"}" 2>/dev/null)
             if echo "$SIGNED" | grep -q "\"id\""; then
               RESULT=$(curl -s -X POST http://localhost:6869/transactions/broadcast \
                 -H "Content-Type: application/json" -d "$SIGNED" 2>/dev/null)
               echo "Main: $(echo $RESULT | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get(\"id\",d.get(\"message\",\"?\"))[:40])" 2>/dev/null)"
             else
               echo "Main: sign failed: $(echo $SIGNED | head -c 150)"
             fi'
          rm -f /tmp/id_rsa

      - name: Commit gen-0 generator
        env:
          API_KEY: ${{ secrets.GEN_0_NODE_REST_API_KEY }}
        run: |
          ADDR="31PmKNdHAU5sZbtg8TrzKh8WfE7E8xBc9WD"
          kubectl port-forward pod/dcc-gen-0-0 -n dcc 16869:6869 &
          PF_PID=$!
          sleep 5
          SIGNED=$(curl -s -X POST http://localhost:16869/transactions/sign \
            -H "X-API-Key: $API_KEY" -H "Content-Type: application/json" \
            -d "{\"type\":19,\"sender\":\"$ADDR\"}")
          if echo "$SIGNED" | grep -q '"id"'; then
            # gen-0's connection to the main node stays probabilistic even
            # with the HandshakeHandler stale-dedup fix live (2026-07-07
            # incident) -- a single-shot attempt misses often enough that
            # this cron (fires every 5 min) was relying purely on
            # volume-of-attempts across a whole 100-block generation period
            # to eventually land one (confirmed live: 4/4 consecutive
            # single-shot cron fires failed on 2026-07-07 while the chain
            # kept progressing regardless). A short retry here makes each
            # individual fire much more likely to succeed on its own.
            for attempt in $(seq 1 15); do
              RESULT=$(curl -s -X POST http://localhost:16869/transactions/broadcast \
                -H "Content-Type: application/json" -d "$SIGNED")
              if ! echo "$RESULT" | grep -q "not enough connections"; then break; fi
              [ "$attempt" -lt 15 ] && sleep 20
            done
            echo "Gen-0: $(echo $RESULT | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get(\"id\",d.get(\"message\",\"?\"))[:40])" 2>/dev/null) (attempt ${attempt}/15)"
          else
            echo "Gen-0: already committed or sign failed"
          fi
          kill $PF_PID 2>/dev/null || true

      - name: Commit gen-1 generator
        env:
          API_KEY: ${{ secrets.GEN_1_NODE_REST_API_KEY }}
        run: |
          ADDR="31dLhqhGoGVhtkf5msWFmgZn1ErrVR6b9qV"
          kubectl port-forward pod/dcc-gen-1-0 -n dcc 16870:6870 &
          PF_PID=$!
          sleep 5
          SIGNED=$(curl -s -X POST http://localhost:16870/transactions/sign \
            -H "X-API-Key: $API_KEY" -H "Content-Type: application/json" \
            -d "{\"type\":19,\"sender\":\"$ADDR\"}")
          if echo "$SIGNED" | grep -q '"id"'; then
            for attempt in $(seq 1 15); do
              RESULT=$(curl -s -X POST http://localhost:16870/transactions/broadcast \
                -H "Content-Type: application/json" -d "$SIGNED")
              if ! echo "$RESULT" | grep -q "not enough connections"; then break; fi
              [ "$attempt" -lt 15 ] && sleep 20
            done
            echo "Gen-1: $(echo $RESULT | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get(\"id\",d.get(\"message\",\"?\"))[:40])" 2>/dev/null) (attempt ${attempt}/15)"
          else
            echo "Gen-1: already committed or sign failed"
          fi
          kill $PF_PID 2>/dev/null || true

      - name: Commit val-0 generator (T2 upgrade)
        # val-0 has miner+hotstuff enabled (nodes.yaml). Address needs verification:
        # run check-val0-address.yml to get the actual wallet address, then update
        # ADDR below. Val-0 also needs DCC funding before it can generate blocks.
        # continue-on-error: true ensures this step never blocks main/gen-0/gen-1.
        # Port 6871 is val-0's REST API port.
        continue-on-error: true
        env:
          API_KEY: ${{ secrets.VAL_0_NODE_REST_API_KEY }}
        run: |
          ADDR="31VMNVAvVh67dPZ41nMnYZvhoZFW7wwPrmq"
          kubectl port-forward pod/dcc-val-0-0 -n dcc 16871:6871 &
          PF_PID=$!
          sleep 5
          SIGNED=$(curl -s -X POST http://localhost:16871/transactions/sign \
            -H "X-API-Key: $API_KEY" -H "Content-Type: application/json" \
            -d "{\"type\":19,\"sender\":\"$ADDR\"}")
          if echo "$SIGNED" | grep -q '"id"'; then
            for attempt in $(seq 1 15); do
              RESULT=$(curl -s -X POST http://localhost:16871/transactions/broadcast \
                -H "Content-Type: application/json" -d "$SIGNED")
              if ! echo "$RESULT" | grep -q "not enough connections"; then break; fi
              [ "$attempt" -lt 15 ] && sleep 20
            done
            echo "Val-0: $(echo $RESULT | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get(\"id\",d.get(\"message\",\"?\"))[:40])" 2>/dev/null) (attempt ${attempt}/15)"
          else
            echo "Val-0: already committed or sign failed"
          fi
          kill $PF_PID 2>/dev/null || true

      - name: Report finality
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            "${SSH_USER}@${SSH_HOST}" \
            'curl -s http://localhost:6869/blockchain/finality | python3 -c "import json,sys; d=json.load(sys.stdin); print(\"H:\",d[\"height\"],\"T0:\",d[\"finalizedHeight\"],\"T2:\",d[\"hotStuffFinalizedHeight\"],\"CurGens:\",len(d.get(\"currentGenerators\",[])),\"NextGens:\",len(d.get(\"nextGenerators\",[])))  "' 2>/dev/null
          rm -f /tmp/id_rsa
