name: Rebalance Validators to 26.67M each
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type REBALANCE-CONFIRMED to proceed (moves 6.67M DCC each to gen-0/gen-1; re-running duplicates the transfers)'
        required: true
        type: string
permissions:
  contents: read
jobs:
  rebalance:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Verify confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "REBALANCE-CONFIRMED" ]; then
            echo "ERROR: confirm input must be exactly 'REBALANCE-CONFIRMED'. Got: '${{ inputs.confirm }}'"
            echo "This workflow transfers 6.67M DCC to gen-0 and 6.67M DCC to gen-1 from main. Re-running duplicates the transfers."
            exit 1
          fi

      - name: Install kubectl
        uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede  # v4.0.1

      - name: Get LKE kubeconfig
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
        run: |
          CLUSTER_ID=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters" | \
            jq -r '.data[] | select(.label | test("testnet")) | .id' | head -1)
          RAW=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters/${CLUSTER_ID}/kubeconfig" | \
            jq -r '.kubeconfig')
          echo "$RAW" | base64 -d > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV

      - name: Transfer 6.67M DCC from main to gen-0
        env:
          SSH_KEY:      ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST:     ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER:     ${{ secrets.TESTNET_DEPLOY_USER }}
          MAIN_API_KEY: ${{ secrets.MAIN_NODE_REST_API_KEY }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          echo "${MAIN_API_KEY}" > /tmp/.main_key
          scp -i /tmp/id_rsa -o StrictHostKeyChecking=no /tmp/.main_key "${SSH_USER}@${SSH_HOST}:/tmp/.main_key" 2>/dev/null
          rm -f /tmp/.main_key
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             MAIN="31RPEKcz71a3hdxt8z7qLhTpRMuRV2kUyr6"
             GEN0="31PmKNdHAU5sZbtg8TrzKh8WfE7E8xBc9WD"
             GEN1="31dLhqhGoGVhtkf5msWFmgZn1ErrVR6b9qV"
             MAIN_KEY=$(cat /tmp/.main_key 2>/dev/null | tr -d "\n"); rm -f /tmp/.main_key
             echo "=== Current balances ==="
             curl -s "http://localhost:6869/addresses/balance/$MAIN" | python3 -c "import json,sys; print(\"Main:\", json.load(sys.stdin)[\"balance\"]//100000000, \"DCC\")"
             curl -s "http://localhost:6869/addresses/balance/$GEN0" | python3 -c "import json,sys; print(\"Gen-0:\", json.load(sys.stdin)[\"balance\"]//100000000, \"DCC\")"
             curl -s "http://localhost:6869/addresses/balance/$GEN1" | python3 -c "import json,sys; print(\"Gen-1:\", json.load(sys.stdin)[\"balance\"]//100000000, \"DCC\")"
             echo "=== Transfer 1: main->gen-0 (6.67M DCC) ==="
             P1=$(python3 -c "import json; print(json.dumps({\"type\":4,\"sender\":\"$MAIN\",\"recipient\":\"$GEN0\",\"amount\":666666600000000,\"fee\":100000,\"attachment\":\"\"}))")
             S1=$(curl -s -X POST http://localhost:6869/transactions/sign -H "Content-Type: application/json" -H "X-API-Key: $MAIN_KEY" -d "$P1")
             echo "Signed: $(echo $S1 | python3 -c "import json,sys; print(json.load(sys.stdin).get(\"id\",\"error\")[:30])" 2>/dev/null)"
             R1=$(curl -s -X POST http://localhost:6869/transactions/broadcast -H "Content-Type: application/json" -d "$S1")
             echo "TX1: $(echo $R1 | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get(\"id\",d.get(\"message\",\"error\"))[:40])" 2>/dev/null)"
             echo "=== Transfer 2: main->gen-1 (6.67M DCC) ==="
             P2=$(python3 -c "import json; print(json.dumps({\"type\":4,\"sender\":\"$MAIN\",\"recipient\":\"$GEN1\",\"amount\":666666700000000,\"fee\":100000,\"attachment\":\"\"}))")
             S2=$(curl -s -X POST http://localhost:6869/transactions/sign -H "Content-Type: application/json" -H "X-API-Key: $MAIN_KEY" -d "$P2")
             echo "Signed: $(echo $S2 | python3 -c "import json,sys; print(json.load(sys.stdin).get(\"id\",\"error\")[:30])" 2>/dev/null)"
             R2=$(curl -s -X POST http://localhost:6869/transactions/broadcast -H "Content-Type: application/json" -d "$S2")
             echo "TX2: $(echo $R2 | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get(\"id\",d.get(\"message\",\"error\"))[:40])" 2>/dev/null)"'
          rm -f /tmp/id_rsa

      - name: Verify final balances and quorum math
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          sleep 15
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             echo "=== Final balances (target: ~26.67M each) ==="
             for A in "31RPEKcz71a3hdxt8z7qLhTpRMuRV2kUyr6" "31PmKNdHAU5sZbtg8TrzKh8WfE7E8xBc9WD" "31dLhqhGoGVhtkf5msWFmgZn1ErrVR6b9qV"; do
               B=$(curl -s "http://localhost:6869/addresses/balance/$A" | python3 -c "import json,sys; print(json.load(sys.stdin)[\"balance\"]//100000000)")
               echo "  $A: $B DCC"
             done
             echo "=== Quorum check (2/3 of total ~= 53.3M) ==="
             echo "Any 2 validators should sum > 53.3M for T2 QC"
             echo "=== Pending TXs ==="
             curl -s http://localhost:6869/transactions/unconfirmed/size 2>/dev/null'
          rm -f /tmp/id_rsa
