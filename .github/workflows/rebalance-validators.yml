name: Rebalance Validators to 30M each
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  rebalance:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Get LKE kubeconfig
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
        run: |
          CLUSTER_ID=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters" | \
            jq -r '.data[] | select(.label | test("testnet")) | .id' | head -1)
          RAW=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters/${CLUSTER_ID}/kubeconfig" | \
            jq -r '.kubeconfig')
          echo "$RAW" | base64 -d > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV

      - name: Check balances and transfer main to gen-1 (10M DCC)
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             MAIN="31RPEKcz71a3hdxt8z7qLhTpRMuRV2kUyr6"
             GEN0="31PmKNdHAU5sZbtg8TrzKh8WfE7E8xBc9WD"
             GEN1="31dLhqhGoGVhtkf5msWFmgZn1ErrVR6b9qV"
             MAIN_KEY="***REDACTED_MAIN_API_KEY***="
             echo "=== Current balances ==="
             curl -s "http://localhost:6869/addresses/balance/$MAIN" | python3 -c "import json,sys; print(\"Main:\", json.load(sys.stdin)[\"balance\"]//100000000, \"DCC\")"
             curl -s "http://localhost:6869/addresses/balance/$GEN0" | python3 -c "import json,sys; print(\"Gen-0:\", json.load(sys.stdin)[\"balance\"]//100000000, \"DCC\")"
             curl -s "http://localhost:6869/addresses/balance/$GEN1" | python3 -c "import json,sys; print(\"Gen-1:\", json.load(sys.stdin)[\"balance\"]//100000000, \"DCC\")"
             echo "=== Transfer 1: main->gen-1 (10M DCC) ==="
             PAYLOAD=$(printf '\''{"type":4,"sender":"%s","recipient":"%s","amount":1000000000000000,"fee":100000,"attachment":""}'\''" $MAIN $GEN1)
             SIGNED=$(curl -s -X POST http://localhost:6869/transactions/sign -H "Content-Type: application/json" -H "X-API-Key: $MAIN_KEY" -d "$PAYLOAD")
             echo "Signed TX: $(echo $SIGNED | python3 -c "import json,sys; print(json.load(sys.stdin).get(\"id\",\"error\")[:30])" 2>/dev/null)"
             RESULT=$(curl -s -X POST http://localhost:6869/transactions/broadcast -H "Content-Type: application/json" -d "$SIGNED")
             echo "Broadcast: $(echo $RESULT | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get(\"id\",d.get(\"message\",\"error\"))[:40])" 2>/dev/null)"'
          rm -f /tmp/id_rsa

      - name: Transfer gen-0 to gen-1 (5M DCC) via port-forward
        run: |
          GEN0_KEY="***REDACTED_GEN0_API_KEY***="
          GEN0="31PmKNdHAU5sZbtg8TrzKh8WfE7E8xBc9WD"
          GEN1="31dLhqhGoGVhtkf5msWFmgZn1ErrVR6b9qV"
          kubectl port-forward pod/dcc-gen-0-0 -n dcc 16869:6869 &
          PF_PID=$!
          sleep 5
          PAYLOAD=$(printf '{"type":4,"sender":"%s","recipient":"%s","amount":500000000000000,"fee":100000,"attachment":""}' "$GEN0" "$GEN1")
          SIGNED=$(curl -s -X POST http://localhost:16869/transactions/sign -H "Content-Type: application/json" -H "X-API-Key: $GEN0_KEY" -d "$PAYLOAD")
          echo "Signed TX: $(echo $SIGNED | python3 -c "import json,sys; print(json.load(sys.stdin).get('id','error')[:30])")"
          RESULT=$(curl -s -X POST http://localhost:16869/transactions/broadcast -H "Content-Type: application/json" -d "$SIGNED")
          echo "Broadcast: $(echo $RESULT | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('id',d.get('message','error'))[:40])")"
          kill $PF_PID 2>/dev/null || true

      - name: Verify final balances
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          sleep 15
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             echo "=== Final balances (30M/30M/30M target) ==="
             for A in "31RPEKcz71a3hdxt8z7qLhTpRMuRV2kUyr6" "31PmKNdHAU5sZbtg8TrzKh8WfE7E8xBc9WD" "31dLhqhGoGVhtkf5msWFmgZn1ErrVR6b9qV"; do
               B=$(curl -s "http://localhost:6869/addresses/balance/$A" | python3 -c "import json,sys; print(json.load(sys.stdin)[\"balance\"]//100000000)")
               echo "  $A: $B DCC"
             done
             curl -s http://localhost:6869/transactions/unconfirmed/size 2>/dev/null'
          rm -f /tmp/id_rsa
