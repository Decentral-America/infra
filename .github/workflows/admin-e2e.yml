name: Admin Panel E2E Test Suite
run-name: E2E (${{ inputs.suite || 'smoke' }}) — ${{ inputs.correlation_id }}

# Runs the e2e-blockchain vitest specs directly against testnet, in an isolated
# ephemeral runner — the funded test seed and rate-limit bypass key are pulled
# from GitHub Actions secrets here and never touch the admin-dashboard
# container. Dispatched by the admin dashboard's "Run E2E" button (control
# plane) via workflow_dispatch; this job (data plane) does the actual work.
#
# Tests live in DecentralChain/packages/e2e-blockchain/src/.
# Smoke suite: network/node-api, transactions/transfer, network/peers (~5 min)
# Full suite:  all spec files (~20 min)
# Custom suite: an explicit list of spec paths (space-separated) via `specs`.
#
# `correlation_id` lets the dispatching caller find this exact run afterward —
# GitHub's workflow_dispatch API doesn't return a run id synchronously, so the
# caller matches on the templated run-name above instead.
#
# Results are emitted as vitest's JSON reporter (structured, not scraped from
# ANSI text) and uploaded as an artifact for the dashboard to fetch once this
# run completes — GitHub's API does not expose live logs for in-progress runs.
on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        required: false
        default: 'smoke'
        type: choice
        options: [smoke, full, custom]
      specs:
        description: 'Space-separated spec paths (only used when suite=custom)'
        required: false
        default: ''
        type: string
      correlation_id:
        description: 'Opaque id the dispatching caller uses to find this run'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: admin-e2e
  cancel-in-progress: false

jobs:
  e2e:
    name: E2E (${{ inputs.suite || 'smoke' }}) vs testnet
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: Decentral-America/DecentralChain
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install all workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build required workspace packages (bypass Nx Cloud)
        # --filter-prod builds @decentralchain/transactions AND its full
        # RUNTIME dependency chain (bignumber, marshall, protobuf-schemas,
        # ts-lib-crypto, types) in one topologically-ordered pass, instead
        # of listing each package by hand -- which is exactly what went
        # stale before: transfer.spec.ts imports @decentralchain/transactions,
        # but only types/ts-lib-crypto/node-api were ever added here, so the
        # smoke suite's transfer test was silently dropped rather than the
        # real gap -- a missing build step -- ever being fixed.
        #
        # Plain --filter (not -prod) also pulls in devDependencies, which
        # here includes @decentralchain/crypto -- a separate WASM package
        # needing a Rust toolchain this runner doesn't have, for a package
        # nothing here actually imports at runtime. Verified locally:
        # --filter-prod's dependency list includes bignumber (a real
        # transitive runtime need of node-api) but excludes crypto.
        env:
          NX_NO_CLOUD: 'true'
          NX_SKIP_NX_CACHE: 'true'
        run: |
          pnpm --filter-prod "@decentralchain/transactions..." build

      - name: Resolve spec set
        id: specs
        run: |
          set -euo pipefail
          case "${{ inputs.suite || 'smoke' }}" in
            smoke)
              echo "specs=src/network/node-api.spec.ts src/network/peers.spec.ts src/transactions/transfer.spec.ts" >> "$GITHUB_OUTPUT"
              ;;
            full)
              echo "specs=" >> "$GITHUB_OUTPUT"
              ;;
            custom)
              echo "specs=${{ inputs.specs }}" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Run E2E suite
        id: vitest
        env:
          DCC_TEST_NODE_URL: https://testnet-node.decentralchain.io
          DCC_TEST_CHAIN_ID: "!"
          DCC_TEST_MINER_SEED: ${{ secrets.GEN_0_SEED_PHRASE }}
          DCC_TEST_DS_URL: https://testnet-data-service.decentralchain.io
          DCC_TEST_MATCHER_URL: https://testnet-matcher.decentralchain.io
          DCC_TEST_E2E_BYPASS_KEY: ${{ secrets.E2E_RATE_LIMIT_BYPASS_KEY }}
        working-directory: packages/e2e-blockchain
        # Two reporters: `verbose` for a human-readable step summary, `json`
        # (to an absolute path) for the admin dashboard to parse structurally
        # once this run completes — machine parsing, not regex-scraping ANSI
        # text. `pipefail` is required: without it, `| tee`'s own exit code
        # (~always 0) would mask a real vitest failure and report success.
        run: |
          set -o pipefail
          echo "## E2E ${{ inputs.suite || 'smoke' }} suite — testnet" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          pnpm exec vitest run --reporter=verbose --reporter=json --outputFile=/tmp/e2e-results.json \
            ${{ steps.specs.outputs.specs }} \
            2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: e2e-results-${{ inputs.correlation_id }}
          path: /tmp/e2e-results.json
          retention-days: 7
