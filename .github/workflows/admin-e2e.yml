name: Admin Panel E2E Test Suite

# Runs the e2e-blockchain vitest specs directly against testnet.
# Tests live in DecentralChain/packages/e2e-blockchain/src/.
# Smoke suite: network/node-api, transactions/transfer, network/peers (~5 min)
# Full suite:  all spec files (~20 min)
#
# NOTE: The admin panel /api/e2e/stream endpoint was designed for local VPS
# execution where the DecentralChain codebase is at /opt/dcc/DecentralChain.
# This workflow runs tests directly from the CI runner instead.
on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        required: false
        default: 'smoke'
        type: choice
        options: [smoke, full]

permissions:
  contents: read

jobs:
  e2e:
    name: E2E (${{ inputs.suite || 'smoke' }}) vs testnet
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          repository: Decentral-America/DecentralChain

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: packages/e2e-blockchain

      - name: Run E2E smoke suite
        if: ${{ inputs.suite == 'smoke' || inputs.suite == '' }}
        env:
          DCC_TEST_NODE_URL: https://testnet-node.decentralchain.io
          DCC_TEST_CHAIN_ID: "!"
          DCC_TEST_MINER_SEED: ${{ secrets.GEN_0_SEED_PHRASE }}
          DCC_TEST_DS_URL: https://testnet-data-service.decentralchain.io
          DCC_TEST_MATCHER_URL: https://testnet-matcher.decentralchain.io
        working-directory: packages/e2e-blockchain
        run: |
          echo "## E2E Smoke Suite — testnet" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          pnpm exec vitest run --reporter=verbose \
            src/network/node-api.spec.ts \
            src/network/peers.spec.ts \
            2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Run E2E full suite
        if: ${{ inputs.suite == 'full' }}
        env:
          DCC_TEST_NODE_URL: https://testnet-node.decentralchain.io
          DCC_TEST_CHAIN_ID: "!"
          DCC_TEST_MINER_SEED: ${{ secrets.GEN_0_SEED_PHRASE }}
          DCC_TEST_DS_URL: https://testnet-data-service.decentralchain.io
          DCC_TEST_MATCHER_URL: https://testnet-matcher.decentralchain.io
        working-directory: packages/e2e-blockchain
        run: |
          echo "## E2E Full Suite — testnet" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          pnpm exec vitest run --reporter=verbose 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
