name: Create matcher local.conf
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  fix:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Write local.conf and restart matcher
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             docker stop matcher-testnet 2>/dev/null
             SECRETS="/opt/dcc/secrets/testnet.env"
             DATA_DIR="/opt/dcc/data/matcher-testnet"
             echo "=== Remove stale JVM overrides ==="
             sudo sed -i "/^WAVES_DEX__/d;/^DCC_DEX__/d;/^JDK_JAVA_OPTIONS/d;/^JAVA_TOOL_OPTIONS/d;/^DEX_OPTS/d" "$SECRETS" 2>/dev/null
             echo "=== Create local.conf (THE correct config file path from CMD) ==="
             sudo mkdir -p "$DATA_DIR/config" 2>/dev/null
             printf "dcc.dex {\n  address-scheme-character = \"\\041\"\n  account-storage { type = in-mem }\n}\n" | sudo tee "$DATA_DIR/config/local.conf" > /dev/null
             sudo chown -R 113:113 "$DATA_DIR" 2>/dev/null
             echo "local.conf:"
             cat "$DATA_DIR/config/local.conf"
             echo "=== Entrypoint reads this file ==="
             echo "Docker CMD = /var/lib/decentralchain-dex/config/local.conf"
             echo "=== Start matcher ==="
             docker start matcher-testnet 2>/dev/null && echo OK
             sleep 40
             docker logs matcher-testnet --since 2026-06-27T13:15:00 2>&1 | grep -iE "Picked up|Starting|Blockchain Id|public key|address|ERROR|error|account|type|scheme" | grep -v "DEBUG\|class path\|at java" | head -15
             docker ps --format "{{.Names}}\t{{.Status}}" | grep matcher'
          rm -f /tmp/id_rsa
