name: Diag Loki Health
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: testnet
    steps:
      - name: Check loki health and logs
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" \
            'echo "=== health status ==="
             docker inspect loki-testnet --format "{{json .State.Health}}" | head -c 3000
             echo
             echo "=== last 40 log lines ==="
             docker logs loki-testnet --tail 40 2>&1'
          rm -f /tmp/id_rsa
