name: Diag Redis Command
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: testnet
    steps:
      - name: Inspect redis command args (password redacted) and healthcheck config
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" \
            'echo "=== redis-testnet Cmd (requirepass value redacted) ==="
             docker inspect redis-testnet --format "{{json .Config.Cmd}}" | sed -E "s/(requirepass[\", ]*)[^\",]*/\1[REDACTED]/gI"
             echo
             echo "=== requirepass length check (0 = no password set) ==="
             REDIS_PASS=$(grep "^REDIS_PASSWORD=" /opt/dcc/secrets/testnet.env 2>/dev/null | cut -d= -f2-)
             echo "secrets file password length: ${#REDIS_PASS}"
             docker exec redis-testnet redis-cli -h 127.0.0.1 CONFIG GET requirepass | tail -1 | wc -c
             echo "=== promtail healthcheck ==="
             docker inspect promtail-testnet --format "{{json .State.Health}}" | head -c 2000
             echo
             docker logs promtail-testnet --tail 15 2>&1'
          rm -f /tmp/id_rsa
