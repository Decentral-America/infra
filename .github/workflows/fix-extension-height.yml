name: Fix BlockchainUpdates Height
on:
  workflow_call:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  fix:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Swap BPS to correct image (no DB wipe)
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
          NEW_IMAGE: ghcr.io/decentral-america/blockchain-postgres-sync:fbece975a0074868d20dc476324a0fa0587f2e70
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no "${SSH_USER}@${SSH_HOST}" \
            "set -e
             echo '=== Pull new image ==='
             docker pull ${NEW_IMAGE}
             echo '=== Stop and remove old container ==='
             docker stop blockchain-postgres-sync-testnet 2>&1 | tail -1 || true
             docker rm blockchain-postgres-sync-testnet 2>&1 | tail -1 || true
             echo '=== Start with correct image (no DB wipe) ==='
             IMAGE_TAG=${NEW_IMAGE} NETWORK=testnet docker compose -f /opt/dcc/compose/blockchain-postgres-sync.yml up -d --remove-orphans blockchain-postgres-sync
             sleep 35
             docker ps --format '{{.Names}}\t{{.Status}}\t{{.Image}}' | grep blockchain-postgres
             docker logs blockchain-postgres-sync-testnet --since 40s 2>&1 | grep -v '^Error:' | head -15
             echo '=== Verify migrations ran (txs_19 table must exist) ==='
             sudo -u postgres psql -d bps_testnet -c '\dt txs_19' 2>&1 | grep -q 'txs_19' && echo 'txs_19 table: OK' || echo 'WARN: txs_19 table missing — migrations may not have run'
             echo '=== BPS health check ==='
             curl -sf http://localhost:9090/readiness 2>/dev/null && echo 'BPS /readiness: OK' || echo 'BPS /readiness: not yet ready (normal within first 60s)'"
          rm -f /tmp/id_rsa
