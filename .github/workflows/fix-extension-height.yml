name: Fix BlockchainUpdates Height
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  fix:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Deploy new BPS image, reset DB, migrate, start consumer
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
          NEW_IMAGE: ghcr.io/decentral-america/blockchain-postgres-sync:81184af0797f04506bae4cc59949cf39b2e7febf
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no "${SSH_USER}@${SSH_HOST}" \
            "set -e
             echo '=== Pull new image ==='
             docker pull ${NEW_IMAGE}
             echo '=== Stop and remove BPS consumer ==='
             docker stop blockchain-postgres-sync-testnet 2>&1 | tail -1 || true
             docker rm blockchain-postgres-sync-testnet 2>&1 | tail -1 || true
             echo '=== Drop and recreate bps_testnet ==='
             sudo -u postgres psql -c 'DROP DATABASE IF EXISTS bps_testnet;'
             sudo -u postgres psql -c 'CREATE DATABASE bps_testnet OWNER dcc;'
             echo '=== Run Diesel migrations with new image ==='
             docker run --rm --network host --env-file /opt/dcc/secrets/testnet.env ${NEW_IMAGE} ./migration up
             echo '=== Verify DB is empty ==='
             sudo -u postgres psql -d bps_testnet -c 'SELECT count(*) FROM blocks_microblocks;'
             echo '=== Check BPS env vars ==='
             docker run --rm --env-file /opt/dcc/secrets/testnet.env --entrypoint env ${NEW_IMAGE} | grep -E 'POSTGRES__|BPS_' | grep -v PASSWORD
             echo '=== Update container to new image and start ==='
             IMAGE_TAG=${NEW_IMAGE} NETWORK=testnet docker compose -f /opt/dcc/compose/blockchain-postgres-sync.yml up -d blockchain-postgres-sync
             sleep 5
             docker logs blockchain-postgres-sync-testnet 2>&1 | head -20
             sleep 30
             docker ps --format '{{.Names}}\t{{.Status}}' | grep blockchain-postgres
             docker logs blockchain-postgres-sync-testnet --since 40s 2>&1 | grep -v '^Error:' | head -20"
          rm -f /tmp/id_rsa
