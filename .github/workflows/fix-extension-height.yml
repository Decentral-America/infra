name: Fix BlockchainUpdates Height
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  fix:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Delete stale extension DB and restart
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no "${SSH_USER}@${SSH_HOST}" \
            'set +e
             docker stop node-scala-testnet
             docker run --rm -v node-state-testnet:/data alpine sh -c "rm -rf /data/blockchain-updates && echo DELETED"
             docker start node-scala-testnet
             sleep 35
             docker ps --format "{{.Names}}\t{{.Status}}" | grep node-scala
             docker logs node-scala-testnet --since 1m 2>&1 | grep -i "BlockchainUpdates\|DEXExtension\|Enable extension\|6881\|started gRPC\|ERROR" | head -8
             ss -tlnp 2>/dev/null | grep 6881 || echo "port 6881 check"
             curl -s http://localhost:6869/blocks/height 2>/dev/null'
          rm -f /tmp/id_rsa
