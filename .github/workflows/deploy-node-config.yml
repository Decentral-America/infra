name: Deploy Node Config to VPS
# Copies dcc.conf from this repo to the VPS and restarts the node (no data wipe)
on:
  workflow_call:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: testnet
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Copy dcc.conf to VPS and restart node
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          # Copy updated dcc.conf to VPS
          scp -i /tmp/id_rsa -o StrictHostKeyChecking=no \
            node-config/testnet/dcc.conf \
            "${SSH_USER}@${SSH_HOST}:/tmp/dcc.conf.new"
          # Apply and restart without data wipe
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             echo "=== Update dcc.conf ==="
             sudo cp /tmp/dcc.conf.new /opt/dcc/config/node-testnet/dcc.conf
             sudo chown root:root /opt/dcc/config/node-testnet/dcc.conf
             echo "=== Current height ==="
             curl -s http://localhost:6869/blocks/height 2>/dev/null
             echo "=== Restart node (no data wipe) ==="
             docker stop node-scala-testnet
             docker rm node-scala-testnet
             docker run -d \
               --name node-scala-testnet \
               --network host \
               --restart unless-stopped \
               --memory 4g \
               --memory-reservation 1g \
               --security-opt no-new-privileges:true \
               --cap-drop ALL \
               --read-only \
               --tmpfs /tmp:size=256m,mode=1777,exec \
               -v node-state-testnet:/var/lib/dcc \
               -v /opt/dcc/config/node-testnet/dcc.conf:/etc/dcc/dcc.conf:ro \
               -v /opt/dcc/plugins/testnet:/usr/share/dcc/lib/plugins:ro \
               --env-file /opt/dcc/secrets/testnet.env \
               -e DCC_NETWORK=testnet \
               -e DCC_HEAP_SIZE=2g \
               -e DCC_REST_API_BIND=0.0.0.0 \
               ghcr.io/decentral-america/node-scala:node-scala-testnet-latest
             sleep 20
             echo "=== Node status ==="
             docker ps | grep node-scala
             echo "=== HotStuff in config ==="
             grep -A3 hotstuff /opt/dcc/config/node-testnet/dcc.conf
             echo "=== Node version ==="
             curl -s http://localhost:6869/node/version 2>/dev/null || echo "(starting)"'
          rm -f /tmp/id_rsa
