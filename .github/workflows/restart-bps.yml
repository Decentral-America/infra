name: Restart BPS and check gen heights
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  restart:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Restart BPS, check gens
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             echo "=== BPS exit reason (last 20 log lines) ==="
             docker logs blockchain-postgres-sync-testnet --tail=20 2>&1 | grep -v "at java\|at scala\|at io\.\|at org\.\|at com\.\|at net\." | head -15

             echo "=== Restart BPS ==="
             docker start blockchain-postgres-sync-testnet
             sleep 10

             echo "=== BPS status ==="
             docker ps --format "{{.Names}}\t{{.Status}}" | grep bps

             echo "=== BPS initial logs ==="
             docker logs blockchain-postgres-sync-testnet --since 2026-06-27T14:00:00Z 2>&1 | grep -v "at java\|at scala\|DEBUG" | head -15

             echo "=== Node height ==="
             curl -s http://localhost:6869/blocks/height 2>/dev/null

             echo "=== Gen-0 height (via node peer API) ==="
             curl -s http://localhost:6869/peers/connected 2>/dev/null | python3 -c "
import json,sys
d=json.load(sys.stdin)
for p in d.get(\"peers\",[]):
    print(p.get(\"address\",\"\"), p.get(\"applicationName\",\"\"))
" 2>/dev/null

             echo "=== Block generators at recent heights ==="
             for h in $(seq 1605 1614); do
               curl -s http://localhost:6869/blocks/at/$h 2>/dev/null | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get(\"height\",\"?\"), d.get(\"generator\",\"?\")[:20])" 2>/dev/null
             done'
          rm -f /tmp/id_rsa
