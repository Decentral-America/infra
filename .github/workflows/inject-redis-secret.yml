# ──────────────────────────────────────────────────────────────────────────────
# One-shot: inject Redis credentials into the server secrets file.
#
# Reads TESTNET_REDIS_PASSWORD from GitHub secrets and appends:
#   REDIS_PASSWORD, REPO__PASSWORD, REDIS_URL
# to /opt/dcc/secrets/testnet.env on the backend server.
#
# Safe to re-run — deduplicates entries before writing.
# Run this before deploy-redis and before deploying websocket-api.
# ──────────────────────────────────────────────────────────────────────────────

name: Inject Redis Secret

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Target network'
        required: true
        default: 'testnet'
        type: choice
        options: [testnet, stagenet, mainnet]

permissions:
  contents: read

concurrency:
  group: inject-redis-${{ inputs.network }}
  cancel-in-progress: false

jobs:
  inject:
    name: Inject Redis credentials → ${{ inputs.network }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Gates mainnet/stagenet behind release-approvers; testnet is ungated.
    environment: ${{ inputs.network }}

    steps:
      - name: Resolve and validate the network-specific Redis password
        id: redis
        env:
          NETWORK:                 ${{ inputs.network }}
          TESTNET_REDIS_PASSWORD:  ${{ secrets.TESTNET_REDIS_PASSWORD }}
          STAGENET_REDIS_PASSWORD: ${{ secrets.STAGENET_REDIS_PASSWORD }}
          MAINNET_REDIS_PASSWORD:  ${{ secrets.MAINNET_REDIS_PASSWORD }}
        run: |
          set -euo pipefail
          case "$NETWORK" in
            testnet)  PASSWORD="$TESTNET_REDIS_PASSWORD" ;;
            stagenet) PASSWORD="$STAGENET_REDIS_PASSWORD" ;;
            mainnet)  PASSWORD="$MAINNET_REDIS_PASSWORD" ;;
            *) echo "::error::Unknown network '$NETWORK'"; exit 1 ;;
          esac
          if [ -z "$PASSWORD" ]; then
            NAME=$(echo "$NETWORK" | tr '[:lower:]' '[:upper:]')_REDIS_PASSWORD
            echo "::error::${NAME} is not set as a repo secret. Add it before running this workflow for '${NETWORK}'."
            exit 1
          fi
          echo "::add-mask::$PASSWORD"
          echo "password=$PASSWORD" >> "$GITHUB_OUTPUT"

      - name: Set up SSH credentials
        env:
          DEPLOY_HOST: ${{ inputs.network == 'testnet' && secrets.TESTNET_DEPLOY_HOST || inputs.network == 'stagenet' && secrets.STAGENET_DEPLOY_HOST || secrets.MAINNET_DEPLOY_HOST }}
          DEPLOY_KEY:  ${{ inputs.network == 'testnet' && secrets.TESTNET_DEPLOY_SSH_KEY || inputs.network == 'stagenet' && secrets.STAGENET_DEPLOY_SSH_KEY || secrets.MAINNET_DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Inject Redis credentials via SSH
        env:
          DEPLOY_HOST:    ${{ inputs.network == 'testnet' && secrets.TESTNET_DEPLOY_HOST || inputs.network == 'stagenet' && secrets.STAGENET_DEPLOY_HOST || secrets.MAINNET_DEPLOY_HOST }}
          DEPLOY_USER:    ${{ inputs.network == 'testnet' && secrets.TESTNET_DEPLOY_USER || inputs.network == 'stagenet' && secrets.STAGENET_DEPLOY_USER || secrets.MAINNET_DEPLOY_USER }}
          NETWORK:        ${{ inputs.network }}
          REDIS_PASSWORD: ${{ steps.redis.outputs.password }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=10 \
            "$DEPLOY_USER@$DEPLOY_HOST" bash -s << REMOTE
          set -euo pipefail
          NETWORK="${NETWORK}"
          REDIS_PASSWORD="${REDIS_PASSWORD}"

          SECRETS_FILE="/opt/dcc/secrets/\${NETWORK}.env"

          # Remove any existing Redis lines (idempotent re-run support)
          sudo sed -i '/^REDIS_PASSWORD=/d;/^REPO__PASSWORD=/d;/^REDIS_URL=/d' "\$SECRETS_FILE"

          # Append Redis credentials
          {
            printf 'REDIS_PASSWORD=%s\n'            "\${REDIS_PASSWORD}"
            printf 'REPO__PASSWORD=%s\n'            "\${REDIS_PASSWORD}"
            printf 'REDIS_URL=redis://:%s@127.0.0.1:6379/\n' "\${REDIS_PASSWORD}"
          } | sudo tee -a "\$SECRETS_FILE" > /dev/null

          sudo chmod 640 "\$SECRETS_FILE"
          sudo chown root:deploy "\$SECRETS_FILE"

          echo "Redis credentials injected into \${SECRETS_FILE}."
          REMOTE
