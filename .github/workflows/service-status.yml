name: Main Node Service Status
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  status:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Check all service containers
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" '
            echo "=== Container Health ==="
            docker ps --format "{{.Names}}\t{{.Status}}" | sort
            echo "=== blockchain-postgres-sync last 20 logs ==="
            docker logs blockchain-postgres-sync-testnet --tail=20 2>&1 | tail -10
            echo "=== matcher last 10 logs ==="
            docker logs matcher-testnet --tail=10 2>&1 | tail -5
            echo "=== Node version ==="
            curl -sf http://localhost:6869/node/version 2>/dev/null
            echo ""
            echo "=== Node height ==="
            curl -sf http://localhost:6869/blocks/height 2>/dev/null'
          rm -f /tmp/id_rsa
