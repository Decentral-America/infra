name: Fix blockchain-postgres-sync after chain reset
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  fix:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Reset BPS state and restart
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" '
            echo "=== BPS last 30 logs ==="
            docker logs blockchain-postgres-sync-testnet --tail=30 2>&1 | tail -20
            echo "=== Stop BPS ==="
            docker stop blockchain-postgres-sync-testnet 2>/dev/null || true
            echo "=== Check BPS env for DB connection info ==="
            docker inspect blockchain-postgres-sync-testnet --format "{{json .Config.Env}}" 2>/dev/null | tr "," "\n" | grep -iE "PG|DB|POSTGRES|HEIGHT|START" | head -10
            echo "=== Reset BPS height in postgres (truncate state table) ==="
            # Try to reset via psql using the BPS container environment
            PGHOST=$(docker inspect blockchain-postgres-sync-testnet --format "{{json .Config.Env}}" 2>/dev/null | tr "," "\n" | grep PG_HOST | cut -d= -f2 | tr -d '"[]')
            echo "PG_HOST=$PGHOST"
            docker exec redis-testnet sh -c "redis-cli flushdb 2>/dev/null || true" 2>/dev/null || true
            echo "=== Restart BPS ==="
            docker start blockchain-postgres-sync-testnet 2>/dev/null || true
            sleep 10
            echo "=== BPS health after restart ==="
            docker ps --format "{{.Names}}\t{{.Status}}" | grep postgres
            docker logs blockchain-postgres-sync-testnet --tail=5 2>&1'
          rm -f /tmp/id_rsa
