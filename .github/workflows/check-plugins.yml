name: Check Plugins Dir
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Check plugin JARs for Block$Header and BlockchainUpdates
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no "${SSH_USER}@${SSH_HOST}" \
            'python3 -c "
import zipfile
for jar in [\"/opt/dcc/plugins/testnet/dcc-grpc.jar\", \"/opt/dcc/plugins/testnet/dcc-ext.jar\"]:
    try:
        z = zipfile.ZipFile(jar)
        names = z.namelist()
        has_bh = [n for n in names if n == \"io/decentralchain/protobuf/block/Block\$Header.class\"]
        has_bu = [n for n in names if \"BlockchainUpdates\" in n or \"blockchain_updates\" in n.lower()]
        has_svc = [n for n in names if \"META-INF/services\" in n]
        print(f\"{jar}:\")
        print(f\"  Block\$Header: {has_bh}\")
        print(f\"  BlockchainUpdates: {has_bu[:3]}\")
        print(f\"  Services: {has_svc[:3]}\")
    except Exception as e:
        print(f\"{jar}: ERROR {e}\")
"'
          rm -f /tmp/id_rsa
