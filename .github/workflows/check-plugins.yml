name: Check Plugins Dir
on:
  workflow_dispatch: {}
permissions:
  contents: read
  packages: read
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Login and inspect startup script + classpath
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Check startup script classpath order
        run: |
          docker pull ghcr.io/decentral-america/node-scala:node-scala-testnet-latest
          docker create --name tmp_inspect ghcr.io/decentral-america/node-scala:node-scala-testnet-latest
          echo "=== Startup script header (classpath order) ==="
          docker cp tmp_inspect:/usr/share/dcc/bin/ /tmp/dcc-bin/
          grep -A5 "declare -r app_classpath\|CLASSPATH\|plugins" /tmp/dcc-bin/* 2>/dev/null | head -30
          echo "=== Files in /usr/share/dcc/lib/plugins in image ==="
          docker exec tmp_inspect ls /usr/share/dcc/lib/plugins/ 2>/dev/null || echo "(empty or no container)"
          docker rm tmp_inspect 2>/dev/null
