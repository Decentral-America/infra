name: Check Plugins Dir
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Check VPS plugins directory
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no "${SSH_USER}@${SSH_HOST}" \
            'echo "=== Plugins JARs ==="
             ls -lh /opt/dcc/plugins/testnet/
             echo "=== Block Header in dcc-grpc.jar ==="
             jar tf /opt/dcc/plugins/testnet/dcc-grpc.jar | grep -i "Block"
             echo "=== Block Header in dcc-ext.jar ==="
             jar tf /opt/dcc/plugins/testnet/dcc-ext.jar | grep -i "Block"'
          rm -f /tmp/id_rsa
