name: Check Plugins Dir
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Check VPS plugins directory
        env:
          SSH_KEY: ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no "${SSH_USER}@${SSH_HOST}" \
            'python3 -c "import zipfile; z=zipfile.ZipFile(\"/opt/dcc/plugins/testnet/dcc-grpc.jar\"); matches=[n for n in z.namelist() if \"Block\" in n]; print(\"dcc-grpc.jar Block classes:\", matches[:10])"
             python3 -c "import zipfile; z=zipfile.ZipFile(\"/opt/dcc/plugins/testnet/dcc-ext.jar\"); matches=[n for n in z.namelist() if \"Block\" in n]; print(\"dcc-ext.jar Block classes:\", matches[:10])"'
          rm -f /tmp/id_rsa
