# ──────────────────────────────────────────────────────────────────────────────
# Infrastructure Drift Detection — scheduled OpenTofu plan
#
# Runs `tofu plan` against each active workspace (mainnet/stagenet/testnet)
# weekly and posts a summary of any detected drift to the GitHub Step Summary.
# If drift is found, the job fails and triggers a GitHub notification to admins.
#
# "Drift" = differences between the desired state in terraform/ and the actual
# state of live Linode resources. Causes: manual console changes, provider
# updates, resource replacement, Linode-side modifications.
#
# This workflow is READ-ONLY — it plans but never applies. Changes are only
# applied via the manual provision.yml workflow_dispatch with human approval.
#
# Schedule: weekly on Monday at 06:00 UTC (after the Sunday GHCR cleanup,
# before business hours in US/EU time zones).
#
# Required secrets (infra repo level, same as provision.yml):
#   LINODE_TOKEN         — Linode API token (read-only is sufficient for plan)
#   R2_ACCESS_KEY_ID     — Cloudflare R2 API token Access Key ID (state read)
#   R2_SECRET_ACCESS_KEY — Cloudflare R2 API token Secret Access Key (state read)
# Required org secret:
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare account ID (used to build R2 endpoint URL)
# ──────────────────────────────────────────────────────────────────────────────

name: Drift Detection

on:
  schedule:
    # Weekly Monday at 06:00 UTC
    - cron: '0 6 * * 1'

  workflow_dispatch:
    inputs:
      network:
        description: 'Network to check (or "all" for all networks)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - mainnet
          - stagenet
          - testnet

permissions:
  contents: read

# Only one drift-detect run at a time — concurrent plans against the same
# workspace can interleave state reads and produce inconsistent output.
concurrency:
  group: infra-drift-detect
  cancel-in-progress: false

jobs:
  drift:
    name: Drift check (${{ matrix.network }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: terraform/

    strategy:
      fail-fast: false
      matrix:
        # On manual dispatch for a single network, the matrix still runs all
        # entries but the filter step below skips the irrelevant ones.
        # GHA doesn't support dynamic matrix from workflow_dispatch inputs,
        # so we filter at the step level.
        network: [mainnet, stagenet, testnet]

    steps:
      - name: Skip if not requested network
        if: >-
          github.event_name == 'workflow_dispatch' &&
          inputs.network != 'all' &&
          inputs.network != matrix.network
        working-directory: ${{ github.workspace }}
        env:
          MATRIX_NETWORK: ${{ matrix.network }}
          INPUT_NETWORK: ${{ inputs.network }}
        run: |
          echo "Skipping ${MATRIX_NETWORK} (requested: ${INPUT_NETWORK})"
          exit 0

      - name: Checkout
        if: >-
          github.event_name != 'workflow_dispatch' ||
          inputs.network == 'all' ||
          inputs.network == matrix.network
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Set up OpenTofu
        if: >-
          github.event_name != 'workflow_dispatch' ||
          inputs.network == 'all' ||
          inputs.network == matrix.network
        uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          tofu_version: '1.12.1'

      - name: Write backend config
        if: >-
          github.event_name != 'workflow_dispatch' ||
          inputs.network == 'all' ||
          inputs.network == matrix.network
        run: |
          set -euo pipefail
          printf 'bucket   = "dcc-tofu-state"\n'                                        > backend.hcl
          printf 'region   = "auto"\n'                                                  >> backend.hcl
          printf 'endpoint = "https://%s.eu.r2.cloudflarestorage.com"\n' "$CF_ACCOUNT_ID" >> backend.hcl
          printf 'access_key = "%s"\n' "$R2_ACCESS_KEY_ID"                             >> backend.hcl
          printf 'secret_key = "%s"\n' "$R2_SECRET_ACCESS_KEY"                         >> backend.hcl
        env:
          CF_ACCOUNT_ID:       ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:    ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: OpenTofu Init
        if: >-
          github.event_name != 'workflow_dispatch' ||
          inputs.network == 'all' ||
          inputs.network == matrix.network
        run: |
          set -euo pipefail
          tofu init -backend-config=backend.hcl -input=false
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
          TF_VAR_state_encryption_passphrase: ${{ secrets.TOFU_STATE_PASSPHRASE }}

      - name: Select workspace
        if: >-
          github.event_name != 'workflow_dispatch' ||
          inputs.network == 'all' ||
          inputs.network == matrix.network
        run: tofu workspace select -or-create "${{ matrix.network }}"
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
          TF_VAR_state_encryption_passphrase: ${{ secrets.TOFU_STATE_PASSPHRASE }}

      - name: OpenTofu Plan (drift detection)
        id: plan
        if: >-
          github.event_name != 'workflow_dispatch' ||
          inputs.network == 'all' ||
          inputs.network == matrix.network
        # -detailed-exitcode:
        #   0 = no changes (clean)
        #   1 = error
        #   2 = changes detected (drift)
        # We capture the exit code and convert it to a readable status.
        run: |
          set +e
          tofu plan \
            -detailed-exitcode \
            -input=false \
            -var-file="${{ matrix.network }}.tfvars" \
            -out=tfplan-${{ matrix.network }} \
            > plan-output.txt 2>&1
          PLAN_EXIT=$?
          set -e
          cat plan-output.txt

          case $PLAN_EXIT in
            0)
              echo "status=clean"       >> "$GITHUB_OUTPUT"
              echo "exit_code=0"        >> "$GITHUB_OUTPUT"
              ;;
            2)
              echo "status=drift"       >> "$GITHUB_OUTPUT"
              echo "exit_code=2"        >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "status=error"       >> "$GITHUB_OUTPUT"
              echo "exit_code=$PLAN_EXIT" >> "$GITHUB_OUTPUT"
              ;;
          esac
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
          TF_VAR_state_encryption_passphrase: ${{ secrets.TOFU_STATE_PASSPHRASE }}
          # root_password and deploy_ssh_public_key have defaults in variables.tf for
          # drift detection — do NOT pass them here; an empty string overrides the default.
          #
          # TF_VAR_DEFAULT_MATCHER: set only via provision.yml; empty string is a valid
          # sentinel for drift detection (stackscript_data has ignore_changes).
          # Do NOT set TF_VAR_blockchain_updates_url here — testnet.tfvars already
          # provides the correct value (grpc://localhost:6881). Passing an empty secret
          # overrides the tfvars value and fails the URL validation block.
          TF_VAR_DEFAULT_MATCHER: ${{ secrets.TF_VAR_DEFAULT_MATCHER }}

      - name: Write drift summary
        if: >-
          always() && (
            github.event_name != 'workflow_dispatch' ||
            inputs.network == 'all' ||
            inputs.network == matrix.network
          )
        run: |
          NETWORK="${{ matrix.network }}"
          STATUS="${{ steps.plan.outputs.status }}"

          echo "## Drift Detection: $NETWORK" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          case "$STATUS" in
            clean)
              echo "✅ **No drift detected** — live infrastructure matches the desired state." >> "$GITHUB_STEP_SUMMARY"
              ;;
            drift)
              echo "⚠️ **Drift detected** — live infrastructure differs from terraform state." >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "Run the \`provision.yml\` workflow with \`action=apply\` to reconcile." >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "<details><summary>Plan output</summary>" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              cat plan-output.txt >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "</details>" >> "$GITHUB_STEP_SUMMARY"
              ;;
            error)
              echo "❌ **Plan failed** — check workflow logs for details." >> "$GITHUB_STEP_SUMMARY"
              ;;
          esac

      - name: Fail if drift or error detected
        if: >-
          (steps.plan.outputs.status != 'clean' && steps.plan.outputs.status != '') &&
          (github.event_name != 'workflow_dispatch' ||
           inputs.network == 'all' ||
           inputs.network == matrix.network)
        run: |
          echo "::error::Infrastructure drift detected for ${{ matrix.network }}. Review the plan output and apply via provision.yml."
          exit 1
