# ──────────────────────────────────────────────────────────────────────────────
# Main Node Operations — SSH into the main node VPS and run a named operation.
#
# Operations:
#   status   — show DCC process status + last 50 log lines
#   restart  — restart the DCC service/container (clears in-memory blacklist)
#   logs     — tail last 200 log lines
#   peers    — dump connected peer list via local REST API
# ──────────────────────────────────────────────────────────────────────────────
name: Main Node Ops

on:
  workflow_dispatch:
    inputs:
      operation:
        description: 'Operation to run on the main node'
        required: true
        type: choice
        options:
          - status
          - restart
          - logs
          - peers

permissions:
  contents: read

jobs:
  mainnode-op:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Run operation via SSH
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa
          chmod 600 /tmp/id_rsa
          SSH="ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 ${SSH_USER}@${SSH_HOST}"
          mkdir -p /tmp/mainnode-results

          {
            case "${{ inputs.operation }}" in
              status)
                $SSH 'echo "=== processes on ports 6868/6869 ==="
                  ss -tlnp 2>/dev/null | grep -E "6868|6869" || netstat -tlnp 2>/dev/null | grep -E "6868|6869" || echo "(ss/netstat unavailable)"
                  echo "=== lsof port 6869 ==="
                  lsof -i :6869 2>/dev/null || fuser 6869/tcp 2>/dev/null || echo "(lsof unavailable)"
                  echo "=== all running processes ==="
                  ps aux | head -5
                  ps aux | grep -v grep | grep -v "^$USER.*ps aux" | tail -20
                  echo "=== systemd all running ==="
                  systemctl list-units --state=running --type=service 2>/dev/null | head -20 || echo "(no systemd)"
                  echo "=== docker containers ==="
                  docker ps 2>/dev/null || echo "(no docker)"
                  echo "=== REST API ping ==="
                  curl -sf http://localhost:6869/node/version 2>/dev/null || echo "(6869 unavailable)"
                  curl -sf http://localhost:6868/node/version 2>/dev/null || echo "(6868 unavailable)"'
                ;;
              restart)
                $SSH 'set -e
                  # discover the service/container name dynamically
                  SVC=$(systemctl list-units --state=running 2>/dev/null | grep -iE "dcc|decentralchain|waves" | awk "{print \$1}" | head -1)
                  if [ -n "$SVC" ]; then
                    echo "Restarting systemd service: $SVC"
                    systemctl restart "$SVC" && echo "OK"
                  else
                    CID=$(docker ps --format "{{.ID}} {{.Names}}" 2>/dev/null | grep -iE "dcc|decentralchain|waves" | awk "{print \$1}" | head -1)
                    if [ -n "$CID" ]; then
                      echo "Restarting docker container: $CID"
                      docker restart "$CID" && echo "OK"
                    else
                      echo "ERROR: no DCC service found via systemd or docker"
                      ps aux | grep -iE "java|dcc|decentralchain" | grep -v grep
                      exit 1
                    fi
                  fi'
                ;;
              logs)
                $SSH 'journalctl -n 200 --no-pager 2>/dev/null || docker logs --tail 200 $(docker ps -q | head -1) 2>/dev/null || echo "(no logs)"'
                ;;
              peers)
                $SSH 'curl -sf http://127.0.0.1:6869/peers/connected 2>/dev/null || curl -sf http://127.0.0.1:6868/peers/connected 2>/dev/null || echo "(REST unavailable)"'
                ;;
            esac
          } | tee /tmp/mainnode-results/output.txt
          rm -f /tmp/id_rsa

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mainnode-ops-${{ inputs.operation }}-${{ github.run_id }}
          path: /tmp/mainnode-results/output.txt
          retention-days: 3
