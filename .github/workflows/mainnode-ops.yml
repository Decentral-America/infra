# ──────────────────────────────────────────────────────────────────────────────
# Main Node Operations — SSH into the main node VPS and run a named operation.
#
# Operations:
#   status   — show DCC process status + last 50 log lines
#   restart  — restart the DCC service/container (clears in-memory blacklist)
#   logs     — tail last 200 log lines
#   peers    — dump connected peer list via local REST API
# ──────────────────────────────────────────────────────────────────────────────
name: Main Node Ops

on:
  workflow_dispatch:
    inputs:
      operation:
        description: 'Operation to run on the main node'
        required: true
        type: choice
        options:
          - status
          - restart
          - wipe-peers-and-restart
          - wipe-chain-and-restart
          - disable-microblocks-and-restart
          - disable-miner-and-restart
          - enable-miner-and-restart
          - connect-to-gen-nodes
          - logs
          - peers

permissions:
  contents: read

jobs:
  mainnode-op:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Run operation via SSH
        env:
          SSH_KEY:     ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST:    ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER:    ${{ secrets.TESTNET_DEPLOY_USER }}
          MAIN_API_KEY: ${{ secrets.MAIN_NODE_REST_API_KEY }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa
          chmod 600 /tmp/id_rsa
          SSH="ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 ${SSH_USER}@${SSH_HOST}"
          mkdir -p /tmp/mainnode-results

          {
            case "${{ inputs.operation }}" in
              status)
                $SSH 'echo "=== docker containers ==="
                  docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" 2>/dev/null || echo "(no docker)"
                  echo "=== REST API ping ==="
                  curl -sf http://localhost:6869/node/version 2>/dev/null || echo "(6869 unavailable)"
                  echo "=== DCC network config (known-peers, blacklisted-peers) ==="
                  CID=$(docker ps --format "{{.Names}}" 2>/dev/null | grep -iE "node-scala" | head -1)
                  if [ -n "$CID" ]; then
                    docker exec "$CID" sh -c "grep -A 30 \"network {\" /etc/dcc/dcc.conf 2>/dev/null || find /etc/dcc -name \"*.conf\" -exec grep -l \"network\" {} +" 2>/dev/null
                    echo "=== peers.dat size ==="
                    docker exec "$CID" sh -c "ls -la /var/lib/dcc/peers.dat 2>/dev/null || echo (no peers.dat)"
                    echo "=== recent DCC logs (peer/handshake/blacklist) ==="
                    docker logs --tail=100 "$CID" 2>/dev/null | grep -iE "peer|handshake|blacklist|connect|172.105" | tail -20 || echo "(no matching logs)"
                  fi'
                ;;
              restart)
                $SSH 'set -e
                  SVC=$(systemctl list-units --state=running 2>/dev/null | grep -iE "dcc|decentralchain|waves" | awk "{print \$1}" | head -1)
                  if [ -n "$SVC" ]; then
                    echo "Restarting systemd service: $SVC"
                    systemctl restart "$SVC" && echo "OK"
                  else
                    CID=$(docker ps --format "{{.ID}} {{.Names}}" 2>/dev/null | grep -iE "dcc|decentralchain|waves|node-scala" | awk "{print \$1}" | head -1)
                    if [ -n "$CID" ]; then
                      echo "Restarting docker container: $CID"
                      docker restart "$CID" && echo "OK"
                    else
                      echo "ERROR: no DCC service found"
                      exit 1
                    fi
                  fi'
                ;;
              wipe-peers-and-restart)
                $SSH 'set -e
                  CID=$(docker ps --format "{{.ID}} {{.Names}}" 2>/dev/null | grep -iE "dcc|decentralchain|waves|node-scala" | awk "{print \$1}" | head -1)
                  if [ -z "$CID" ]; then echo "ERROR: container not found"; exit 1; fi
                  NAME=$(docker inspect "$CID" --format "{{.Name}}" | sed "s|/||")
                  echo "Killing $NAME (SIGKILL to prevent peer-save on graceful shutdown)..."
                  docker kill "$CID" 2>/dev/null || true
                  sleep 2
                  echo "Wiping peers.dat..."
                  docker run --rm -v "$(docker inspect $NAME --format "{{range .Mounts}}{{if eq .Destination \"/var/lib/dcc\"}}{{.Source}}{{end}}{{end}}")":/data alpine sh -c "rm -f /data/peers.dat && echo WIPED" 2>/dev/null || echo "(peers.dat wipe via volume failed — trying start+exec+restart)"
                  docker start "$NAME" 2>/dev/null && sleep 2
                  docker exec "$NAME" sh -c "rm -f /var/lib/dcc/peers.dat && echo WIPED-LIVE" 2>/dev/null || echo "(live wipe failed)"
                  docker restart "$NAME" && echo "OK"'
                ;;
              disable-miner-and-restart)
                $SSH 'set -e
                  CID=$(docker ps --format "{{.Names}}" 2>/dev/null | grep -iE "node-scala" | head -1)
                  if [ -z "$CID" ]; then echo "ERROR: container not found"; exit 1; fi
                  echo "Disabling miner in $CID config..."
                  docker exec "$CID" sh -c "sed -i \"s/enable = yes/enable = no/\" /etc/dcc/dcc.conf && echo PATCHED" 2>/dev/null || echo "(sed failed)"
                  docker exec "$CID" grep "enable" /etc/dcc/dcc.conf 2>/dev/null | grep -i "miner" -A1 | head -5 || true
                  docker restart "$CID" && echo "OK - miner disabled"'
                ;;
              enable-miner-and-restart)
                $SSH 'set -e
                  CID=$(docker ps --format "{{.Names}}" 2>/dev/null | grep -iE "node-scala" | head -1)
                  if [ -z "$CID" ]; then echo "ERROR: container not found"; exit 1; fi
                  echo "Enabling miner in $CID config (miner block only)..."
                  docker exec "$CID" sh -c "awk \"/miner \{/{f=1} f && /enable = no/{sub(/enable = no/,\"enable = yes\"); f=0} {print}\" /etc/dcc/dcc.conf > /tmp/dcc_patched.conf && mv /tmp/dcc_patched.conf /etc/dcc/dcc.conf && echo PATCHED" 2>/dev/null || echo "(awk patch failed)"
                  docker exec "$CID" grep -A3 "miner {" /etc/dcc/dcc.conf 2>/dev/null | head -8 || true
                  docker restart "$CID" && echo "OK - miner enabled"'
                ;;
              disable-microblocks-and-restart)
                # Sets micro-block-interval = 0 in the miner section of dcc.conf
                # so key blocks have no microblock references, fixing cross-chain validation
                $SSH 'set -e
                  CID=$(docker ps --format "{{.Names}}" 2>/dev/null | grep -iE "node-scala" | head -1)
                  if [ -z "$CID" ]; then echo "ERROR: container not found"; exit 1; fi
                  echo "Setting micro-block-interval = 0 in $CID config..."
                  # Check if already set
                  if docker exec "$CID" grep -q "micro-block-interval = 0" /etc/dcc/dcc.conf 2>/dev/null; then
                    echo "(already set)"
                  else
                    # Inject after "miner {" block
                    docker exec "$CID" sh -c "sed -i \"/miner {/a\\    micro-block-interval = 0\" /etc/dcc/dcc.conf && echo PATCHED" 2>/dev/null
                  fi
                  echo "Restarting $CID..."
                  docker restart "$CID" && echo "OK"'
                ;;
              wipe-chain-and-restart)
                # DANGER: wipes entire blockchain state. Use for full testnet reset.
                $SSH 'set -e
                  CID=$(docker ps --format "{{.ID}} {{.Names}}" 2>/dev/null | grep -iE "dcc|decentralchain|waves|node-scala" | awk "{print \$1}" | head -1)
                  if [ -z "$CID" ]; then echo "ERROR: container not found"; exit 1; fi
                  NAME=$(docker inspect "$CID" --format "{{.Name}}" | sed "s|/||")
                  echo "Wiping /var/lib/dcc/data and peers.dat in $NAME..."
                  docker exec "$NAME" sh -c "rm -rf /var/lib/dcc/data /var/lib/dcc/peers.dat && echo WIPED"
                  echo "Restarting $NAME..."
                  docker restart "$NAME" && echo "OK - chain wiped and restarted from genesis"'
                ;;
              connect-to-gen-nodes)
                # Force the main node to connect to gen-0 and gen-1 via REST API
                # Uses MAIN_NODE_REST_API_KEY secret
                $SSH "set -e
                  API_KEY='$MAIN_API_KEY'
                  echo '=== Connecting to gen-0 (172.105.64.89:6863) ==='
                  curl -sf -X POST http://localhost:6869/peers/connect \\
                    -H 'X-API-Key: '\$API_KEY \\
                    -H 'Content-Type: application/json' \\
                    -d '{\"host\":\"172.105.64.89\",\"port\":6863}' || echo '(connect call failed)'
                  echo '=== Connecting to gen-1 (172.105.64.89:6864) ==='
                  curl -sf -X POST http://localhost:6869/peers/connect \\
                    -H 'X-API-Key: '\$API_KEY \\
                    -H 'Content-Type: application/json' \\
                    -d '{\"host\":\"172.105.64.89\",\"port\":6864}' || echo '(connect call failed)'
                  echo '=== Current connected peers ==='
                  curl -sf -H 'X-API-Key: '\$API_KEY http://localhost:6869/peers/connected | python3 -c 'import sys,json; d=json.load(sys.stdin); [print(p.get(\"address\")) for p in d.get(\"peers\",[])]' 2>/dev/null || echo '(peer list unavailable)'"
                ;;
              logs)
                $SSH 'CID=$(docker ps --format "{{.Names}}" 2>/dev/null | grep -iE "node-scala" | head -1)
                  echo "=== DCC container last 30min peer/sync/error logs ==="
                  if [ -n "$CID" ]; then
                    docker logs --since 35m "$CID" 2>&1 | \
                      grep -iE "peer|handshake|score|sync|connect|blacklist|172.105|New height|Rollback|switch|error|invalid|reject|warn" | \
                      grep -ivE "kamon|REST API|gRPC|HTTP" | tail -60
                  else
                    echo "(DCC container not found)"
                  fi'
                ;;
              peers)
                $SSH 'curl -sf http://127.0.0.1:6869/peers/connected 2>/dev/null || curl -sf http://127.0.0.1:6868/peers/connected 2>/dev/null || echo "(REST unavailable)"'
                ;;
            esac
          } | tee /tmp/mainnode-results/output.txt
          rm -f /tmp/id_rsa

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mainnode-ops-${{ inputs.operation }}-${{ github.run_id }}
          path: /tmp/mainnode-results/output.txt
          retention-days: 3
