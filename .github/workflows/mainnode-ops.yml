# ──────────────────────────────────────────────────────────────────────────────
# Main Node Operations - SSH into the main node VPS and run a named operation.
#
# Operations:
#   status   - show DCC process status + last 50 log lines
#   restart  - restart the DCC service/container (clears in-memory blacklist)
#   logs     - tail last 200 log lines
#   peers    - dump connected peer list via local REST API
# ──────────────────────────────────────────────────────────────────────────────
name: Main Node Ops

on:
  workflow_dispatch:
    inputs:
      operation:
        description: 'Operation to run on the main node'
        required: true
        type: choice
        options:
          - status
          - restart
          - wipe-peers-and-restart
          - wipe-chain-and-restart
          - clear-known-peers-and-restart
          - disable-blacklisting-and-restart
          - disable-microblocks-and-restart
          - disable-miner-and-restart
          - patch-period-length-and-restart
          - fix-genesis-config-and-restart
          - restore-genesis-config-and-restart
          - debug-peer-restart
          - patch-invalid-blocks-timeout-and-restart
          - enable-miner-and-restart
          - connect-to-gen-nodes
          - logs
          - peers

permissions:
  contents: read

jobs:
  mainnode-op:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Run operation via SSH
        env:
          SSH_KEY:     ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST:    ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER:    ${{ secrets.TESTNET_DEPLOY_USER }}
          MAIN_API_KEY: ${{ secrets.MAIN_NODE_REST_API_KEY }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa
          chmod 600 /tmp/id_rsa
          SSH="ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 ${SSH_USER}@${SSH_HOST}"
          mkdir -p /tmp/mainnode-results

          {
            case "${{ inputs.operation }}" in
              status)
                $SSH 'echo "=== docker containers ==="
                  docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" 2>/dev/null || echo "(no docker)"
                  echo "=== REST API ping ==="
                  curl -sf http://localhost:6869/node/version 2>/dev/null || echo "(6869 unavailable)"
                  echo "=== DCC network config (known-peers, blacklisted-peers) ==="
                  CID=$(docker ps --format "{{.Names}}" 2>/dev/null | grep -iE "node-scala" | head -1)
                  if [ -n "$CID" ]; then
                    docker exec "$CID" sh -c "grep -A 30 \"network {\" /etc/dcc/dcc.conf 2>/dev/null || find /etc/dcc -name \"*.conf\" -exec grep -l \"network\" {} +" 2>/dev/null
                    echo "=== peers.dat size ==="
                    docker exec "$CID" sh -c "ls -la /var/lib/dcc/peers.dat 2>/dev/null || echo (no peers.dat)"
                    echo "=== recent DCC logs (peer/handshake/blacklist) ==="
                    docker logs --tail=100 "$CID" 2>/dev/null | grep -iE "peer|handshake|blacklist|connect|172.105" | tail -20 || echo "(no matching logs)"
                  fi'
                ;;
              restart)
                $SSH 'set -e
                  SVC=$(systemctl list-units --state=running 2>/dev/null | grep -iE "dcc|decentralchain|waves" | awk "{print \$1}" | head -1)
                  if [ -n "$SVC" ]; then
                    echo "Restarting systemd service: $SVC"
                    systemctl restart "$SVC" && echo "OK"
                  else
                    CID=$(docker ps --format "{{.ID}} {{.Names}}" 2>/dev/null | grep -iE "dcc|decentralchain|waves|node-scala" | awk "{print \$1}" | head -1)
                    if [ -n "$CID" ]; then
                      echo "Restarting docker container: $CID"
                      docker restart "$CID" && echo "OK"
                    else
                      echo "ERROR: no DCC service found"
                      exit 1
                    fi
                  fi'
                ;;
              wipe-peers-and-restart)
                $SSH 'set -e
                  CID=$(docker ps --format "{{.ID}} {{.Names}}" 2>/dev/null | grep -iE "dcc|decentralchain|waves|node-scala" | awk "{print \$1}" | head -1)
                  if [ -z "$CID" ]; then echo "ERROR: container not found"; exit 1; fi
                  NAME=$(docker inspect "$CID" --format "{{.Name}}" | sed "s|/||")
                  echo "Killing $NAME (SIGKILL to prevent peer-save on graceful shutdown)..."
                  docker kill "$CID" 2>/dev/null || true
                  sleep 2
                  echo "Wiping peers.dat..."
                  docker run --rm -v "$(docker inspect $NAME --format "{{range .Mounts}}{{if eq .Destination \"/var/lib/dcc\"}}{{.Source}}{{end}}{{end}}")":/data alpine sh -c "rm -f /data/peers.dat && echo WIPED" 2>/dev/null || echo "(peers.dat wipe via volume failed - trying start+exec+restart)"
                  docker start "$NAME" 2>/dev/null && sleep 2
                  docker exec "$NAME" sh -c "rm -f /var/lib/dcc/peers.dat && echo WIPED-LIVE" 2>/dev/null || echo "(live wipe failed)"
                  docker restart "$NAME" && echo "OK"'
                ;;
              disable-miner-and-restart)
                # Only disables the miner section - NOT rest-api or other sections.
                # Uses awk to find the miner block and replace enable = yes within it only.
                $SSH 'set -e
                  CID=$(docker ps --format "{{.Names}}" 2>/dev/null | grep -iE "node-scala" | head -1)
                  if [ -z "$CID" ]; then echo "ERROR: container not found"; exit 1; fi
                  HOST_CONF="/opt/dcc/config/node-testnet/dcc.conf"
                  if [ ! -f "$HOST_CONF" ]; then
                    HOST_CONF=$(docker inspect "$CID" --format "{{range .Mounts}}{{if eq .Destination \"/etc/dcc\"}}{{.Source}}{{end}}{{end}}" 2>/dev/null)/dcc.conf
                  fi
                  echo "Disabling ONLY miner in $HOST_CONF (awk targeted patch)..."
                  awk "/miner \{/{in_miner=1} in_miner && /enable = yes/{sub(/enable = yes/, \"enable = no\"); in_miner=0} /\}/{in_miner=0} {print}" \
                    "$HOST_CONF" > /tmp/dcc_m.conf && mv /tmp/dcc_m.conf "$HOST_CONF" && echo "PATCHED"
                  grep -A3 "miner {" "$HOST_CONF" | head -5 || true
                  echo "rest-api section (should still be enabled):"
                  grep -A3 "rest-api {" "$HOST_CONF" | head -5 || true
                  docker restart "$CID" && echo "OK - miner disabled"'
                ;;
              enable-miner-and-restart)
                $SSH 'set -e
                  CID=$(docker ps --format "{{.Names}}" 2>/dev/null | grep -iE "node-scala" | head -1)
                  if [ -z "$CID" ]; then echo "ERROR: container not found"; exit 1; fi
                  HOST_CONF="/opt/dcc/config/node-testnet/dcc.conf"
                  if [ ! -f "$HOST_CONF" ]; then
                    HOST_CONF=$(docker inspect "$CID" --format "{{range .Mounts}}{{if eq .Destination \"/etc/dcc\"}}{{.Source}}{{end}}{{end}}" 2>/dev/null)/dcc.conf
                  fi
                  echo "Enabling miner in $HOST_CONF..."
                  sed -i "s/enable = no/enable = yes/g" "$HOST_CONF" && echo "patched"
                  grep -A3 "miner {" "$HOST_CONF" | head -5 || true
                  docker restart "$CID" && echo "OK - miner enabled"'
                ;;
              debug-peer-restart)
                # Wipe chain + peers, force connections, capture docker stdout WARN logs.
                # The ExensionAppender WARN at line 87 shows the EXACT block validation error.
                $SSH 'set -e
                  CID=$(docker ps --format "{{.Names}}" 2>/dev/null | grep -iE "node-scala" | head -1)
                  if [ -z "$CID" ]; then echo "ERROR: container not found"; exit 1; fi
                  echo "Wiping chain data + peers.dat..."
                  docker exec "$CID" sh -c "rm -rf /var/lib/dcc/data /var/lib/dcc/peers.dat && echo WIPED" 2>/dev/null || true
                  docker restart "$CID" && sleep 15
                  echo "Forcing peer connections..."
                  curl -sf -X POST http://localhost:6869/peers/connect -H "Content-Type: application/json" -d "{\"host\":\"172.105.64.89\",\"port\":6863}" 2>/dev/null || true
                  curl -sf -X POST http://localhost:6869/peers/connect -H "Content-Type: application/json" -d "{\"host\":\"172.105.64.89\",\"port\":6864}" 2>/dev/null || true
                  sleep 120
                  echo "=== Docker stdout logs (last 3 min) - looking for exact block error ==="
                  docker logs --since 3m "$CID" 2>&1 | \
                    grep -iE "blacklist|invalid|error|warn|extension|fork|hash|appending|declined|signature" | \
                    grep -iv "kamon\|REST\|gRPC\|HTTP\|score.*chan\|utx" | tail -40'
                ;;
              restore-genesis-config-and-restart)
                # Restores initial-base-target = 218 (genesis-signed value - immutable)
                # Use when fix-genesis-config-and-restart incorrectly set 272
                $SSH 'set -e
                  CID=$(docker ps --format "{{.Names}}" 2>/dev/null | grep -iE "node-scala" | head -1)
                  if [ -z "$CID" ]; then echo "ERROR: container not found"; exit 1; fi
                  HOST_CONF="/opt/dcc/config/node-testnet/dcc.conf"
                  if [ ! -f "$HOST_CONF" ]; then
                    HOST_CONF=$(docker inspect "$CID" --format "{{range .Mounts}}{{if eq .Destination \"/etc/dcc\"}}{{.Source}}{{end}}{{end}}" 2>/dev/null)/dcc.conf
                  fi
                  echo "Restoring genesis values in $HOST_CONF..."
                  awk "{gsub(/initial-base-target *= *[0-9]+/, \"initial-base-target = 218\"); print}" \
                    "$HOST_CONF" > /tmp/dcc_restored.conf && mv /tmp/dcc_restored.conf "$HOST_CONF" && echo "RESTORED"
                  grep "initial-base-target" "$HOST_CONF"
                  docker restart "$CID" && echo "OK"'
                ;;
              fix-genesis-config-and-restart)
                # Applies all genesis config fixes: initial-base-target=272, generation-period-length=100
                # Run this before a clean reset to ensure main node matches gen node config.
                $SSH 'set -e
                  CID=$(docker ps --format "{{.Names}}" 2>/dev/null | grep -iE "node-scala" | head -1)
                  if [ -z "$CID" ]; then echo "ERROR: container not found"; exit 1; fi
                  HOST_CONF="/opt/dcc/config/node-testnet/dcc.conf"
                  if [ ! -f "$HOST_CONF" ]; then
                    HOST_CONF=$(docker inspect "$CID" --format "{{range .Mounts}}{{if eq .Destination \"/etc/dcc\"}}{{.Source}}{{end}}{{end}}" 2>/dev/null)/dcc.conf
                  fi
                  echo "Applying genesis config fixes to $HOST_CONF..."
                  awk "{gsub(/initial-base-target *= *[0-9]+/, \"initial-base-target = 272\"); gsub(/generation-period-length *= *[0-9]+/, \"generation-period-length = 100\"); print}" \
                    "$HOST_CONF" > /tmp/dcc_fixed.conf && mv /tmp/dcc_fixed.conf "$HOST_CONF" && echo "PATCHED"
                  grep -E "initial-base-target|generation-period-length" "$HOST_CONF"
                  docker restart "$CID" && echo "OK"'
                ;;
              patch-invalid-blocks-timeout-and-restart)
                # Reduces invalid-blocks-storage.timeout from 1h default to 1m.
                # Prevents persistent peer blacklisting after a single failed block validation.
                $SSH 'set -e
                  CID=$(docker ps --format "{{.Names}}" 2>/dev/null | grep -iE "node-scala" | head -1)
                  if [ -z "$CID" ]; then echo "ERROR: container not found"; exit 1; fi
                  HOST_CONF="/opt/dcc/config/node-testnet/dcc.conf"
                  if [ ! -f "$HOST_CONF" ]; then
                    HOST_CONF=$(docker inspect "$CID" --format "{{range .Mounts}}{{if eq .Destination \"/etc/dcc\"}}{{.Source}}{{end}}{{end}}" 2>/dev/null)/dcc.conf
                  fi
                  echo "Current synchronization section:"
                  grep -A6 "synchronization {" "$HOST_CONF" | head -8
                  echo "Patching invalid-blocks-storage timeout..."
                  if grep -q "invalid-blocks-storage" "$HOST_CONF"; then
                    awk "{gsub(/timeout *= *[0-9]+[a-z]*/, \"timeout = 1m\"); print}" "$HOST_CONF" > /tmp/dcc_patched.conf && mv /tmp/dcc_patched.conf "$HOST_CONF" && echo "PATCHED (existing)"
                  else
                    awk "/synchronization \{/{print; print \"    invalid-blocks-storage {\"; print \"      timeout = 1m\"; print \"    }\"; next} {print}" "$HOST_CONF" > /tmp/dcc_patched.conf && mv /tmp/dcc_patched.conf "$HOST_CONF" && echo "PATCHED (added)"
                  fi
                  grep -A8 "synchronization {" "$HOST_CONF" | head -10
                  docker restart "$CID" && echo "OK"'
                ;;
              patch-period-length-and-restart)
                # Restores generation-period-length = 100.
                # Writes a patch script to /tmp and runs it - avoids shell quoting issues.
                $SSH 'set -e
                  CID=$(docker ps --format "{{.Names}}" 2>/dev/null | grep -iE "node-scala" | head -1)
                  if [ -z "$CID" ]; then echo "ERROR: container not found"; exit 1; fi
                  HOST_CONF="/opt/dcc/config/node-testnet/dcc.conf"
                  if [ ! -f "$HOST_CONF" ]; then
                    HOST_CONF=$(docker inspect "$CID" --format "{{range .Mounts}}{{if eq .Destination \"/etc/dcc\"}}{{.Source}}{{end}}{{end}}" 2>/dev/null)/dcc.conf
                  fi
                  echo "Patching $HOST_CONF..."
                  grep "generation-period-length" "$HOST_CONF" || echo "(not found)"
                  # Use awk to replace any generation-period-length value with 100
                  awk "{gsub(/generation-period-length *= *[0-9]+/, \"generation-period-length = 100\"); print}" \
                    "$HOST_CONF" > /tmp/dcc_patched.conf && \
                    mv /tmp/dcc_patched.conf "$HOST_CONF" && echo "PATCHED"
                  grep "generation-period-length" "$HOST_CONF"
                      exit 1
                    fi
                  fi
                  docker restart "$CID" && echo "OK - period length patched to 1000"'
                ;;
              disable-microblocks-and-restart)
                # Sets micro-block-interval = 0 in the miner section of dcc.conf
                # so key blocks have no microblock references, fixing cross-chain validation
                $SSH 'set -e
                  CID=$(docker ps --format "{{.Names}}" 2>/dev/null | grep -iE "node-scala" | head -1)
                  if [ -z "$CID" ]; then echo "ERROR: container not found"; exit 1; fi
                  echo "Setting micro-block-interval = 0 in $CID config..."
                  # Check if already set
                  if docker exec "$CID" grep -q "micro-block-interval = 0" /etc/dcc/dcc.conf 2>/dev/null; then
                    echo "(already set)"
                  else
                    # Inject after "miner {" block
                    docker exec "$CID" sh -c "sed -i \"/miner {/a\\    micro-block-interval = 0\" /etc/dcc/dcc.conf && echo PATCHED" 2>/dev/null
                  fi
                  echo "Restarting $CID..."
                  docker restart "$CID" && echo "OK"'
                ;;
              clear-known-peers-and-restart)
                # Removes gen node IPs from main-node's known-peers.
                # Root cause of sync failure: both sides connect simultaneously → PeerKey collision →
                # duplicate detection closes one channel → suspension cycling → sync never triggers.
                # With empty known-peers, gen nodes connect OUT to main-node only (no race condition).
                $SSH 'set -e
                  CID=$(docker ps --format "{{.Names}}" 2>/dev/null | grep -iE "node-scala" | head -1)
                  if [ -z "$CID" ]; then echo "ERROR: container not found"; exit 1; fi
                  HOST_CONF="/opt/dcc/config/node-testnet/dcc.conf"
                  if [ ! -f "$HOST_CONF" ]; then
                    HOST_CONF=$(docker inspect "$CID" --format "{{range .Mounts}}{{if eq .Destination \"/etc/dcc\"}}{{.Source}}{{end}}{{end}}" 2>/dev/null)/dcc.conf
                  fi
                  echo "Clearing known-peers from $HOST_CONF..."
                  # Replace the known-peers block with an empty list
                  python3 - "$HOST_CONF" << "PYEOF"
import sys, re
f = sys.argv[1]
with open(f) as h:
    content = h.read()
# Replace known-peers = [...] with known-peers = []
content = re.sub(r"known-peers\s*=\s*\[[^\]]*\]", "known-peers = []", content, flags=re.DOTALL)
with open(f, "w") as h:
    h.write(content)
print("PATCHED")
PYEOF
                  grep "known-peers" "$HOST_CONF"
                  docker restart "$CID" && echo "OK - known-peers cleared, gen nodes will connect to main-node (not vice versa)"'
                ;;
              disable-blacklisting-and-restart)
                # Applies RC#2 fix: sets enable-blacklisting = no and suspension-residence-time = 10s.
                # This prevents gen-0/gen-1 from being locked out for 1h after a failed chain-switch
                # block validation. Also reduces invalid-blocks-storage.timeout to 30s.
                # Safe to run at any time — clears current in-memory blacklist via restart.
                $SSH 'set -e
                  CID=$(docker ps --format "{{.Names}}" 2>/dev/null | grep -iE "node-scala" | head -1)
                  if [ -z "$CID" ]; then echo "ERROR: container not found"; exit 1; fi
                  HOST_CONF="/opt/dcc/config/node-testnet/dcc.conf"
                  if [ ! -f "$HOST_CONF" ]; then
                    HOST_CONF=$(docker inspect "$CID" --format "{{range .Mounts}}{{if eq .Destination \"/etc/dcc\"}}{{.Source}}{{end}}{{end}}" 2>/dev/null)/dcc.conf
                  fi
                  echo "Applying RC#2 network fix to $HOST_CONF..."
                  # Inject enable-blacklisting = no and suspension-residence-time = 10s after known-peers block
                  if grep -q "enable-blacklisting" "$HOST_CONF"; then
                    echo "(enable-blacklisting already set)"
                  else
                    awk "/known-peers = \[/{in_peers=1} in_peers && /^\s*\]/{print; print \"    enable-blacklisting = no\"; print \"    suspension-residence-time = 10s\"; in_peers=0; next} {print}" \
                      "$HOST_CONF" > /tmp/dcc_bl.conf && mv /tmp/dcc_bl.conf "$HOST_CONF" && echo "PATCHED: enable-blacklisting + suspension-residence-time"
                  fi
                  # Patch invalid-blocks-storage.timeout if present
                  if grep -q "invalid-blocks-storage" "$HOST_CONF"; then
                    awk "{gsub(/timeout = [0-9]+[hms]/, \"timeout = 30s\"); print}" \
                      "$HOST_CONF" > /tmp/dcc_ibs.conf && mv /tmp/dcc_ibs.conf "$HOST_CONF" && echo "PATCHED: invalid-blocks-storage.timeout = 30s"
                  fi
                  echo "--- network section ---"
                  grep -A20 "network {" "$HOST_CONF" | head -20
                  echo "--- synchronization section ---"
                  grep -A8 "synchronization {" "$HOST_CONF" | head -10 || echo "(no synchronization section)"
                  echo "Restarting with cleared blacklist..."
                  docker restart "$CID" && echo "OK - blacklisting disabled, new connections accepted immediately"'
                ;;
              wipe-chain-and-restart)
                # DANGER: wipes entire blockchain state. Use for full testnet reset.
                # After restart, forces peer connections immediately (bypasses PeerManager backoff).
                $SSH 'set -e
                  CID=$(docker ps --format "{{.ID}} {{.Names}}" 2>/dev/null | grep -iE "dcc|decentralchain|waves|node-scala" | awk "{print \$1}" | head -1)
                  if [ -z "$CID" ]; then echo "ERROR: container not found"; exit 1; fi
                  NAME=$(docker inspect "$CID" --format "{{.Name}}" | sed "s|/||")
                  echo "Wiping /var/lib/dcc/data and peers.dat in $NAME..."
                  docker exec "$NAME" sh -c "rm -rf /var/lib/dcc/data /var/lib/dcc/peers.dat && echo WIPED"
                  echo "Restarting $NAME..."
                  docker restart "$NAME" && echo "OK - chain wiped and restarted from genesis"'
                ;;
              connect-to-gen-nodes)
                # Force the main node to connect to gen-0 and gen-1 via REST API
                # Uses MAIN_NODE_REST_API_KEY secret
                $SSH "set -e
                  API_KEY='$MAIN_API_KEY'
                  echo '=== Connecting to gen-0 (172.105.64.89:6863) ==='
                  curl -sf -X POST http://localhost:6869/peers/connect \\
                    -H 'X-API-Key: '\$API_KEY \\
                    -H 'Content-Type: application/json' \\
                    -d '{\"host\":\"172.105.64.89\",\"port\":6863}' || echo '(connect call failed)'
                  echo '=== Connecting to gen-1 (172.105.64.89:6864) ==='
                  curl -sf -X POST http://localhost:6869/peers/connect \\
                    -H 'X-API-Key: '\$API_KEY \\
                    -H 'Content-Type: application/json' \\
                    -d '{\"host\":\"172.105.64.89\",\"port\":6864}' || echo '(connect call failed)'
                  echo '=== Current connected peers ==='
                  curl -sf -H 'X-API-Key: '\$API_KEY http://localhost:6869/peers/connected | python3 -c 'import sys,json; d=json.load(sys.stdin); [print(p.get(\"address\")) for p in d.get(\"peers\",[])]' 2>/dev/null || echo '(peer list unavailable)'"
                ;;
              logs)
                $SSH 'CID=$(docker ps --format "{{.Names}}" 2>/dev/null | grep -iE "node-scala" | head -1)
                  if [ -n "$CID" ]; then
                    echo "=== DCC container last 10min FULL logs ==="
                    docker logs --since 10m "$CID" 2>&1 | tail -80
                  else
                    echo "=== DCC container NOT RUNNING ==="
                    docker ps -a --format "table {{.Names}}\t{{.Status}}" 2>/dev/null | head -10
                  fi'
                ;;
              peers)
                $SSH 'curl -sf http://127.0.0.1:6869/peers/connected 2>/dev/null || curl -sf http://127.0.0.1:6868/peers/connected 2>/dev/null || echo "(REST unavailable)"'
                ;;
            esac
          } | tee /tmp/mainnode-results/output.txt
          rm -f /tmp/id_rsa

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mainnode-ops-${{ inputs.operation }}-${{ github.run_id }}
          path: /tmp/mainnode-results/output.txt
          retention-days: 3
