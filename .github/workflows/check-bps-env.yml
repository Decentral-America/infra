name: Check BPS Env
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        with:
          host:     ${{ secrets.TESTNET_DEPLOY_HOST }}
          username: ${{ secrets.TESTNET_DEPLOY_USER }}
          key:      ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          script: |
            echo "=== POSTGRES vars in secrets file ==="
            grep -E "^POSTGRES__|^PGHOST|^PGPORT|^PGUSER|^PGDATABASE|^BLOCKCHAIN_UPDATES|^REDIS_URL|^CHAIN_ID|^STARTING_HEIGHT" /opt/dcc/secrets/testnet.env | sed 's/=.*/=***/' || echo "grep found nothing"
            echo "=== BPS container state ==="
            docker inspect blockchain-postgres-sync-testnet --format '{{.State.Status}} {{.State.ExitCode}}' 2>/dev/null || echo "container not found"
