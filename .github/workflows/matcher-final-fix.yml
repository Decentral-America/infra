name: Matcher Final Fix - local.conf plus JAVA_OPTS
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  fix:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Write local.conf and add JAVA_OPTS override
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             docker stop matcher-testnet 2>/dev/null
             SECRETS="/opt/dcc/secrets/testnet.env"
             DATA_DIR="/opt/dcc/data/matcher-testnet"
             echo "=== Read dex.conf to see include path ==="
             MATCHER_IMG=$(docker inspect matcher-testnet --format "{{.Config.Image}}" 2>/dev/null)
             docker run --rm --entrypoint cat "$MATCHER_IMG" /usr/share/decentralchain-dex/conf/dex.conf 2>/dev/null | head -20
             echo "=== Remove stale overrides ==="
             sudo sed -i "/^WAVES_DEX__/d;/^DCC_DEX__/d;/^JDK_JAVA_OPTIONS/d;/^JAVA_TOOL_OPTIONS/d;/^DEX_OPTS/d;/^JAVA_OPTS=/d" "$SECRETS" 2>/dev/null
             echo "=== Add JAVA_OPTS with address scheme (entrypoint appends this) ==="
             printf "JAVA_OPTS=-Ddcc.dex.address-scheme-character=\\041 -Ddcc.dex.account-storage.type=in-mem\n" | sudo tee -a "$SECRETS" > /dev/null
             grep "^JAVA_OPTS" "$SECRETS"
             echo "=== Recreate local.conf with correct settings ==="
             sudo mkdir -p "$DATA_DIR/config" 2>/dev/null
             printf "dcc.dex {\n  address-scheme-character = \"\\041\"\n  account-storage { type = in-mem }\n}\n" | sudo tee "$DATA_DIR/config/local.conf" > /dev/null
             sudo chown -R 113:113 "$DATA_DIR" 2>/dev/null
             echo "local.conf:"
             cat "$DATA_DIR/config/local.conf"
             echo "=== Start matcher ==="
             docker start matcher-testnet 2>/dev/null && echo OK
             sleep 40
             docker logs matcher-testnet --tail=15 2>&1 | grep -iE "Picked up|Matcher starting|Blockchain Id|address|public key|ERROR|error|JAVA_OPTS|type" | grep -v "DEBUG\|class path\|at java" | head -15
             docker ps --format "{{.Names}}\t{{.Status}}" | grep matcher'
          rm -f /tmp/id_rsa
