name: Inspect Node Image Classes
on:
  workflow_dispatch: {}
permissions:
  contents: read
  packages: read
jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Check application.conf in ALL lib JARs
        run: |
          docker pull ghcr.io/decentral-america/node-scala:node-scala-testnet-latest 2>/dev/null
          docker create --name tmp_inspect ghcr.io/decentral-america/node-scala:node-scala-testnet-latest
          docker cp tmp_inspect:/usr/share/dcc/lib/ /tmp/dcc-lib/ 2>/dev/null
          docker rm tmp_inspect
          echo "=== JARs with application.conf containing dcc.extensions ==="
          find /tmp/dcc-lib -name "*.jar" | while read jar; do
            result=$(unzip -p "$jar" application.conf 2>/dev/null | grep -i "extension")
            if [ -n "$result" ]; then
              echo "FOUND in $(basename $jar):"
              unzip -p "$jar" application.conf 2>/dev/null | grep -A5 -B5 "extension"
            fi
          done
          echo "=== Done ==="
