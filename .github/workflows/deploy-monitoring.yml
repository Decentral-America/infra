name: Deploy Monitoring Config
# Deploys monitoring config files to the VPS:
#   - prometheus.yml + alerts.yml → hot-reload Prometheus
#   - loki-config.yaml + promtail-config.yaml → (re)start Loki/Promtail stack
#   - datasources/*.yaml → copied for Grafana provisioning
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - uses: actions/checkout@v4
      - name: Deploy monitoring config and reload Prometheus
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa

          # Copy all monitoring config files in one scp call
          scp -i /tmp/id_rsa -o StrictHostKeyChecking=no \
            monitoring/prometheus.yml \
            monitoring/alerts.yml \
            monitoring/loki-config.yaml \
            monitoring/promtail-config.yaml \
            monitoring/datasources/loki.yaml \
            monitoring/datasources/prometheus.yaml \
            "${SSH_USER}@${SSH_HOST}:/tmp/"

          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no "${SSH_USER}@${SSH_HOST}" \
            'set -e
             sudo cp /tmp/prometheus.yml /opt/dcc/monitoring/prometheus.yml
             sudo cp /tmp/alerts.yml /opt/dcc/monitoring/alerts.yml
             sudo cp /tmp/loki-config.yaml /opt/dcc/monitoring/loki-config.yaml
             sudo cp /tmp/promtail-config.yaml /opt/dcc/monitoring/promtail-config.yaml
             sudo mkdir -p /opt/dcc/monitoring/datasources
             sudo cp /tmp/loki.yaml /opt/dcc/monitoring/datasources/loki.yaml
             sudo cp /tmp/prometheus.yaml /opt/dcc/monitoring/datasources/prometheus.yaml
             rm -f /tmp/prometheus.yml /tmp/alerts.yml /tmp/loki-config.yaml \
                   /tmp/promtail-config.yaml /tmp/loki.yaml /tmp/prometheus.yaml

             echo "=== Hot-reload Prometheus ==="
             curl -s -X POST http://127.0.0.1:9091/-/reload && echo "Reloaded"
             echo "=== Verify alerts loaded ==="
             sleep 3
             curl -s http://127.0.0.1:9091/api/v1/rules 2>/dev/null | python3 -c "
import json,sys
d=json.load(sys.stdin)
groups = d.get(\"data\",{}).get(\"groups\",[])
print(f\"Rule groups: {len(groups)}\")
for g in groups:
    print(f\"  {g[\"name\"]}: {len(g[\"rules\"])} rules\")
" 2>/dev/null || echo "(prometheus not reachable yet)"

             echo "=== (Re)start Loki + Promtail ==="
             NETWORK="${NETWORK:-testnet}" docker compose \
               -f /opt/dcc/compose/loki.yml \
               up -d --remove-orphans
             echo "=== Loki/Promtail status ==="
             docker ps --format "{{.Names}}\t{{.Status}}" | grep -E "(loki|promtail)" || echo "(not running yet)"
             sleep 5
             curl -s http://127.0.0.1:3100/ready 2>/dev/null || echo "(loki starting)"'
          rm -f /tmp/id_rsa
