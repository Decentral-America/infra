# ──────────────────────────────────────────────────────────────────────────────
# Cluster Diagnostics — on-demand health + P2P connectivity report for the
# Frankfurt LKE peer-node cluster. Safe to run anytime.
# ──────────────────────────────────────────────────────────────────────────────
name: Cluster Diagnostics

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Target network'
        required: true
        default: 'testnet'
        type: choice
        options:
          - testnet
      roll:
        description: 'Force Flux reconcile + roll the dcc StatefulSets before diagnosing'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Download kubeconfig
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
        run: |
          CID=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/lke/clusters" | \
            jq -r '.data[] | select(.label=="dcc-peer-${{ inputs.network }}") | .id')
          echo "Cluster ID: $CID"
          RAW=$(curl -s -H "Authorization: Bearer $LINODE_TOKEN" \
            -X GET "https://api.linode.com/v4/lke/clusters/${CID}/kubeconfig" | jq -r '.kubeconfig')
          echo "$RAW" | python3 -c 'import base64,sys; sys.stdout.buffer.write(base64.b64decode(sys.stdin.read().strip() + "=="))' > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV

      - uses: azure/setup-kubectl@v4

      - name: Reconcile + roll (optional remediation)
        if: ${{ inputs.roll }}
        run: |
          set +e
          curl -s https://fluxcd.io/install.sh | bash >/dev/null 2>&1
          export PATH=$PATH:/usr/local/bin
          echo "=== flux reconcile source + apps ==="
          flux reconcile source git flux-system --timeout=2m
          flux reconcile kustomization dcc-apps --timeout=3m
          echo "=== rolling StatefulSets ==="
          kubectl rollout restart statefulset/dcc-gen-0 statefulset/dcc-gen-1 statefulset/dcc-val-0 -n dcc
          for s in dcc-gen-0 dcc-gen-1 dcc-val-0; do
            kubectl rollout status statefulset/$s -n dcc --timeout=180s
          done
          echo "=== settle 60s for peer discovery ==="
          sleep 60

      - name: TCP connectivity test gen-0 → main node
        run: |
          set +e
          echo "=== Testing TCP connectivity gen-0 → 66.228.55.154:6868 ==="
          kubectl exec -n dcc dcc-gen-0-0 -- sh -c \
            'nc -zv -w5 66.228.55.154 6868 2>&1 && echo "TCP OK" || echo "TCP FAILED"' 2>/dev/null
          echo "=== gen-0 outbound connections to 66.228.55.154 ==="
          kubectl exec -n dcc dcc-gen-0-0 -- sh -c \
            'cat /proc/net/tcp /proc/net/tcp6 2>/dev/null | awk "{print \$3}" | grep -i "425CED42\|9A37E442" || echo "(no connections to 66.228.55.154)"' 2>/dev/null
          echo "=== gen-0 recent P2P connection attempt logs ==="
          kubectl logs -n dcc dcc-gen-0-0 --tail=500 2>/dev/null | \
            grep -iE "connect|handshake|peer|66.228|score|blacklist|suspend" | \
            grep -ivE "utx|kamon|REST API|gRPC" | tail -15

      - name: DEEP DUMP gen-0 (config + listeners + conns + logs)
        run: |
          set +e
          echo "===== gen-0: effective network block in /etc/dcc/dcc.conf ====="
          kubectl exec -n dcc dcc-gen-0-0 -- sh -c 'sed -n "/network {/,/}/p" /etc/dcc/dcc.conf' 2>/dev/null
          echo "===== gen-0: combined conf the node actually loads (cmdline + head) ====="
          kubectl exec -n dcc dcc-gen-0-0 -- sh -c 'tr "\0" " " < /proc/1/cmdline; echo; for f in /tmp/dcc-combined*.conf; do echo "--$f--"; head -40 "$f"; done' 2>/dev/null
          echo "===== gen-0: /proc/net/tcp (hex local:rem) — 1ACF=6863 1AD4=6868 9A37E442=66.228.55.154 ====="
          kubectl exec -n dcc dcc-gen-0-0 -- sh -c 'cat /proc/net/tcp; echo IPV6; cat /proc/net/tcp6' 2>/dev/null | awk '{print $2, $3, $4}' | grep -iE "1ACF|1AD0|1AD1|1AD4|9A37E442|0A" | head -30
          echo "===== gen-0: NETWORK dial/handshake lines (DEBUG) ====="
          kubectl logs -n dcc dcc-gen-0-0 --tail=2000 2>/dev/null \
            | grep -iE "Connecting|Connected to|handshake|Channel closed|connection issue|66.228.55.154|172.104.159.229|outgoing channel|Established|[Bb]lacklist|suspend|Accepted|peer|declared|application" \
            | grep -ivE "utx|observer|REST API|gRPC" | tail -40
          echo "===== val-0 status ====="
          kubectl get pod dcc-val-0-0 -n dcc 2>/dev/null
          kubectl logs -n dcc dcc-val-0-0 --tail=8 2>/dev/null | grep -iE "wallet|password|peer|Bound|error|started" | tail -8

      - name: Pod + PVC + node status
        run: |
          echo "=== NODES ==="; kubectl get nodes -o wide
          echo "=== PODS ==="; kubectl get pods -n dcc -o wide
          echo "=== PVCs ==="; kubectl get pvc -n dcc
          echo "=== RESTART COUNTS ==="; kubectl get pods -n dcc -o jsonpath='{range .items[*]}{.metadata.name}{": restarts="}{.status.containerStatuses[0].restartCount}{"\n"}{end}'

      - name: P2P connectivity via port-forward
        run: |
          for pod_port in "dcc-gen-0-0:6869" "dcc-gen-1-0:6870" "dcc-val-0-0:6871"; do
            POD="${pod_port%%:*}"; PORT="${pod_port##*:}"
            echo "===== $POD ====="
            kubectl port-forward -n dcc "$POD" "1$PORT:$PORT" >/dev/null 2>&1 &
            PF=$!; sleep 4
            echo "  height: $(curl -s http://127.0.0.1:1$PORT/blocks/height 2>/dev/null)"
            echo "  version: $(curl -s http://127.0.0.1:1$PORT/node/version 2>/dev/null)"
            echo "  peer count: $(curl -s http://127.0.0.1:1$PORT/peers/connected 2>/dev/null | head -c 400)"
            kill $PF 2>/dev/null; true
          done

      - name: Recent P2P log lines per generator
        run: |
          for POD in dcc-gen-0-0 dcc-gen-1-0 dcc-val-0-0; do
            echo "===== $POD (network/peer logs) ====="
            kubectl logs -n dcc "$POD" --tail=200 2>/dev/null | grep -iE "peer|connect|handshake|declared|blacklist|66.228.55.154|172.104" | tail -15 || echo "  (no matching log lines)"
          done

      - name: Miner + generation state per generator
        run: |
          set +e
          for POD in dcc-gen-0-0 dcc-gen-1-0; do
            echo "===== $POD miner logs ====="
            kubectl logs -n dcc "$POD" --tail=500 2>/dev/null \
              | grep -iE "miner|mine|generat|period|commit|allowed|scheduled|fairpos|wallet|account|balance|seed|key|hotstuff" \
              | grep -ivE "utx|observer|REST API|gRPC|kamon|handshake" | tail -30
          done
          echo "===== gen-0: miner + wallet conf section ====="
          kubectl exec -n dcc dcc-gen-0-0 -- sh -c \
            'grep -A 20 "miner {" /etc/dcc/dcc.conf; echo "---"; grep -A 5 "wallet {" /etc/dcc/dcc.conf' 2>/dev/null
          echo "===== gen-1: miner + wallet conf section ====="
          kubectl exec -n dcc dcc-gen-1-0 -- sh -c \
            'grep -A 20 "miner {" /etc/dcc/dcc.conf; echo "---"; grep -A 5 "wallet {" /etc/dcc/dcc.conf' 2>/dev/null
          echo "===== main node /blocks/headers/last (via TCP) ====="
          curl -s --max-time 5 "http://66.228.55.154:6869/blocks/headers/last" | python3 -c \
            'import sys,json; d=json.load(sys.stdin); print(json.dumps({k:d.get(k) for k in ["height","timestamp","generator","generationSignature","baseTarget","nextGenerators","committedGenerators"]},indent=2))' 2>/dev/null || echo "  (REST unavailable)"
          echo "===== gen-0 /blocks/headers/last ====="
          kubectl port-forward -n dcc dcc-gen-0-0 16872:6869 >/dev/null 2>&1 &
          PF=$!; sleep 4
          curl -s --max-time 5 "http://127.0.0.1:16872/blocks/headers/last" | python3 -c \
            'import sys,json; d=json.load(sys.stdin); print(json.dumps({k:d.get(k) for k in ["height","timestamp","generator","generationSignature","baseTarget","nextGenerators","committedGenerators"]},indent=2))' 2>/dev/null || echo "  (REST unavailable)"
          kill $PF 2>/dev/null; true

      - name: Flux reconciliation status
        run: |
          curl -s https://fluxcd.io/install.sh | bash >/dev/null 2>&1
          export PATH=$PATH:/usr/local/bin
          flux get kustomizations -A 2>/dev/null || kubectl get kustomizations -A

      - name: Build + upload JSON results artifact
        if: always()
        run: |
          set +e
          mkdir -p /tmp/diag-results

          # Collect heights + versions + miner state into structured JSON
          python3 - <<'PYEOF'
          import subprocess, json, re, os

          def pf_query(pod, local_port, remote_port, path):
              """Port-forward a pod and hit its REST API, return parsed JSON or None."""
              pf = subprocess.Popen(
                  ["kubectl","port-forward","-n","dcc",pod,f"{local_port}:{remote_port}"],
                  stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
              import time; time.sleep(3)
              try:
                  r = subprocess.run(["curl","-s","--max-time","4",f"http://127.0.0.1:{local_port}{path}"],
                      capture_output=True, text=True, timeout=8)
                  return json.loads(r.stdout) if r.stdout.strip() else None
              except Exception:
                  return None
              finally:
                  pf.terminate()
                  time.sleep(0.5)

          def pod_logs(pod, tail=300):
              r = subprocess.run(["kubectl","logs","-n","dcc",pod,f"--tail={tail}"],
                  capture_output=True, text=True)
              return r.stdout.splitlines()

          def filter_logs(lines, include_re, exclude_re=None):
              out = [l for l in lines if re.search(include_re, l, re.I)]
              if exclude_re:
                  out = [l for l in out if not re.search(exclude_re, l, re.I)]
              return out[-5:] if out else []

          results = {}
          for pod, lport, rport in [("dcc-gen-0-0",16881,6869),("dcc-gen-1-0",16882,6870),("dcc-val-0-0",16883,6871)]:
              h = pf_query(pod, lport, rport, "/blocks/height")
              last = pf_query(pod, lport, rport, "/blocks/headers/last")
              logs = pod_logs(pod)
              results[pod] = {
                  "height": h.get("height") if h else None,
                  "last_generator": last.get("generator") if last else None,
                  "committed_generators": last.get("committedGenerators") if last else None,
                  "next_generators": last.get("nextGenerators") if last else None,
                  "last_miner_log": filter_logs(logs, r'miner|allowed|period|commit', r'utx|kamon|REST API|gRPC'),
                  "last_sync_log":  filter_logs(logs, r'synchroni|score|peer|blacklist|handshake|height|connect|block', r'utx|kamon|REST API|gRPC|HotStuff'),
              }

          with open("/tmp/diag-results/results.json","w") as f:
              json.dump(results, f, indent=2)
          print(json.dumps(results, indent=2))
          PYEOF

        env:
          KUBECONFIG: /tmp/kubeconfig

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: diag-results-${{ github.run_id }}
          path: /tmp/diag-results/results.json
          retention-days: 3
