name: BPS Direct Logs
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  logs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        with:
          host:     ${{ secrets.TESTNET_DEPLOY_HOST }}
          username: ${{ secrets.TESTNET_DEPLOY_USER }}
          key:      ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          script: |
            echo "=== BPS last 50 log lines ==="
            docker logs blockchain-postgres-sync-testnet 2>&1 | tail -50 || true
            echo "=== Container exit code ==="
            docker inspect blockchain-postgres-sync-testnet --format '{{.State.ExitCode}} {{.State.Error}}' 2>/dev/null || true
