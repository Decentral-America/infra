name: Stress Test — DCC Testnet
run-name: Stress test (${{ inputs.target_tps || '100' }} TPS / ${{ inputs.duration || '120' }}s) — ${{ inputs.correlation_id }}

# Runs the DCC load tester against testnet, in an isolated ephemeral runner —
# the funded sender seed is pulled from GitHub Actions secrets here and never
# touches the admin-dashboard container. Dispatched by the admin dashboard's
# "Run Stress Test" button (control plane) via workflow_dispatch; this job
# (data plane) does the actual work.
#
# Builds the Rust binary from source, runs a sustained TPS test, and reports
# p50/p99/p99.9 latency + error rate.
#
# Conservative defaults: 100 TPS / 120s. Increase for capacity testing.
# The gen-0 seed is the primary sender; use --sender-count to scale.
#
# `correlation_id` lets the dispatching caller find this exact run afterward —
# GitHub's workflow_dispatch API doesn't return a run id synchronously, so the
# caller matches on the templated run-name above instead.
#
# Results are posted to the GitHub Step Summary AND uploaded as a JSONL
# artifact (one `{"event":...}` object per line — tick/phase_end/final, see
# apps/load-tester/src/metrics.rs) for the dashboard to render the full
# TPS-over-time chart once this run completes — GitHub's API does not expose
# live logs for in-progress runs, so this is rendered after the fact, not live.
on:
  workflow_dispatch:
    inputs:
      target_tps:
        description: 'Target sustained TPS (1-2000)'
        required: false
        default: '100'
        type: string
      duration:
        description: 'Duration in seconds (1-600)'
        required: false
        default: '120'
        type: string
      workers:
        description: 'Concurrent tokio workers'
        required: false
        default: '50'
        type: string
      sender_count:
        description: 'Number of sender accounts (derived from seed)'
        required: false
        default: '3'
        type: string
      target_node:
        description: 'Node REST URL to target'
        required: false
        default: 'https://testnet-node.decentralchain.io'
        type: string
      chain_id:
        description: 'Chain id character'
        required: false
        default: '!'
        type: string
      correlation_id:
        description: 'Opaque id the dispatching caller uses to find this run'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: stress-test
  cancel-in-progress: false

jobs:
  stress-test:
    name: Load test (${{ inputs.target_tps || '100' }} TPS / ${{ inputs.duration || '120' }}s)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # load-tester lives in the DecentralChain monorepo, not this repo.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: Decentral-America/DecentralChain
          persist-credentials: false
          sparse-checkout: |
            apps/load-tester

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: '1.96'

      - name: Cache Rust build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/load-tester/target
          key: load-tester-${{ hashFiles('apps/load-tester/Cargo.lock') }}
          restore-keys: load-tester-

      - name: Build load-tester
        working-directory: apps/load-tester
        run: cargo build --release --quiet

      - name: Run stress test
        id: loadtest
        env:
          DCC_PRIVATE_KEY: ${{ secrets.GEN_0_SEED_PHRASE }}
        working-directory: apps/load-tester
        # `--json` (see src/cli.rs) emits one JSON object per line — tick
        # every second, phase_end, then final — which is what the dashboard
        # parses for its post-run TPS chart. `pipefail` is required: without
        # it, `| tee`'s own exit code masks a real load-tester failure.
        run: |
          set -o pipefail
          echo "## DCC Testnet Stress Test" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Config:** ${{ inputs.target_tps || '100' }} TPS / ${{ inputs.duration || '120' }}s / ${{ inputs.sender_count || '3' }} senders" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ./target/release/load-tester \
            --json \
            --node "${{ inputs.target_node || 'https://testnet-node.decentralchain.io' }}" \
            --chain-id "${{ inputs.chain_id || '!' }}" \
            --workers "${{ inputs.workers || '50' }}" \
            --target-tps "${{ inputs.target_tps || '100' }}" \
            --duration "${{ inputs.duration || '120' }}" \
            --sender-count "${{ inputs.sender_count || '3' }}" \
            2>&1 | tee /tmp/load-test-output.jsonl
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Node:** ${{ inputs.target_node || 'https://testnet-node.decentralchain.io' }} | **Chain:** ${{ inputs.chain_id || '!' }}" >> $GITHUB_STEP_SUMMARY

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: load-test-results-${{ inputs.correlation_id }}
          path: /tmp/load-test-output.jsonl
          retention-days: 30
