name: Check Main Node Port Binding
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Check port 6868 binding and connectivity
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" '
            echo "=== docker port bindings ==="
            docker port node-scala-testnet 2>/dev/null || docker inspect node-scala-testnet --format "{{.NetworkSettings.Ports}}" 2>/dev/null
            echo "=== netstat port 6868 ==="
            ss -tlnp | grep 6868 || netstat -tlnp 2>/dev/null | grep 6868 || echo "(no listener on 6868)"
            echo "=== docker inspect Networks ==="
            docker inspect node-scala-testnet --format "{{json .NetworkSettings.Networks}}" 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); [print(k,v.get(\"IPAddress\")) for k,v in d.items()]" 2>/dev/null
            echo "=== iptables DNAT for 6868 ==="
            iptables -t nat -L DOCKER -n 2>/dev/null | grep 6868 || echo "(no iptables entry)"
            echo "=== Container bind-address in config ==="
            grep -E "bind-address|port.*6868|declared" /opt/dcc/config/node-testnet/dcc.conf 2>/dev/null | head -5
            echo "=== Version running ==="
            curl -sf http://localhost:6869/node/version 2>/dev/null || echo "(not responding)"'
          rm -f /tmp/id_rsa
