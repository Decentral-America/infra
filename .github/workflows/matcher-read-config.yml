name: Read Matcher Image Config
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  read:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Read matcher image config and copy to data dir
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             docker stop matcher-testnet 2>/dev/null
             MATCHER_IMG=$(docker inspect matcher-testnet --format "{{.Config.Image}}" 2>/dev/null)
             DATA_DIR="/opt/dcc/data/matcher-testnet"
             echo "=== List image data dir ==="
             docker run --rm --entrypoint ls "$MATCHER_IMG" /var/lib/decentralchain-dex/ 2>/dev/null
             echo "=== Image config/application.conf ==="
             docker run --rm --entrypoint cat "$MATCHER_IMG" /var/lib/decentralchain-dex/config/application.conf 2>/dev/null || echo "(no image config)"
             echo "=== Copy image config to data dir if missing ==="
             sudo mkdir -p "$DATA_DIR/config" 2>/dev/null
             docker run --rm --entrypoint cat "$MATCHER_IMG" /var/lib/decentralchain-dex/config/application.conf 2>/dev/null | sudo tee "$DATA_DIR/config/application.conf.image" > /dev/null
             echo "=== Fix: remove empty account.dat, set in-mem via secrets ==="
             sudo rm -f "$DATA_DIR/account.dat" 2>/dev/null
             echo "Current data dir:"
             ls -la "$DATA_DIR/" 2>/dev/null
             echo "Current config:"
             cat "$DATA_DIR/config/application.conf" 2>/dev/null || echo "(no user config)"
             echo "=== Start matcher ==="
             docker start matcher-testnet 2>/dev/null && echo OK
             sleep 30
             docker logs matcher-testnet --tail=15 2>&1 | grep -v "class path\|at java\|at scala\|at io\|at org\|at com" | tail -10
             docker ps --format "{{.Names}}\t{{.Status}}" | grep matcher'
          rm -f /tmp/id_rsa
