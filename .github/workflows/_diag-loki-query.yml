name: Diag Loki Query
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: testnet
    steps:
      - name: Query Loki for recent matcher-testnet log lines
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 "$SSH_USER@$SSH_HOST" 'bash -s' <<'REMOTE'
          echo "=== alloy log tail, errors only ==="
          docker logs alloy-testnet --tail 50 --since 3m 2>&1 | grep -i error || echo "(no errors)"
          echo "=== loki query for matcher-testnet, last 5 min ==="
          NOW=$(date +%s)
          FROM=$((NOW - 300))
          curl -s -G "http://127.0.0.1:3100/loki/api/v1/query_range" \
            --data-urlencode 'query={container="matcher-testnet"}' \
            --data-urlencode 'limit=2' \
            --data-urlencode "start=${FROM}000000000" \
            --data-urlencode "end=${NOW}000000000" \
            -o /tmp/loki_out.json -w "http_status=%{http_code}\n"
          head -c 1200 /tmp/loki_out.json
          echo
          rm -f /tmp/loki_out.json
          REMOTE
          rm -f /tmp/id_rsa
