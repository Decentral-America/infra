name: BPS Reset Correct Database
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  fix:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Reset BPS using correct bps_testnet database
        env:
          SSH_KEY:  ${{ secrets.TESTNET_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.TESTNET_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.TESTNET_DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa && chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" \
            'set +e
             docker stop blockchain-postgres-sync-testnet 2>/dev/null
             PGPW=$(grep "^POSTGRES__PASSWORD=" /opt/dcc/secrets/testnet.env 2>/dev/null | cut -d= -f2)
             echo "Password found: $([ -n "$PGPW" ] && echo YES || echo NO)"
             echo "=== Test connection to bps_testnet ==="
             PGPASSWORD="$PGPW" psql -h 127.0.0.1 -U dcc -d bps_testnet -c "SELECT 1" 2>&1 | head -3
             echo "=== Tables in bps_testnet ==="
             PGPASSWORD="$PGPW" psql -h 127.0.0.1 -U dcc -d bps_testnet -c "\dt" 2>&1 | head -20
             echo "=== Truncate all tables in bps_testnet ==="
             PGPASSWORD="$PGPW" psql -h 127.0.0.1 -U dcc -d bps_testnet -c "DO \$\$ DECLARE r record; BEGIN FOR r IN SELECT tablename FROM pg_tables WHERE schemaname='"'"'public'"'"' LOOP EXECUTE '"'"'TRUNCATE '"'"'||r.tablename||'"'"' CASCADE'"'"'; END LOOP; END; \$\$;" 2>&1
             echo "=== Restart BPS ==="
             docker start blockchain-postgres-sync-testnet 2>/dev/null && echo OK
             sleep 20
             docker logs blockchain-postgres-sync-testnet --tail=5 2>&1
             docker ps --format "{{.Names}}\t{{.Status}}" | grep -E "postgres|matcher"'
          rm -f /tmp/id_rsa
